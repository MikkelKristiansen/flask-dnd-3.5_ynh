<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opslagsværk — DM</title>
<link rel="stylesheet" href="{{ url_for('static', filename='dm-content-browser.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='dm-statblock.css') }}">
<style>
:root{--bg:#403932;--surface:#4a4139;--card:#554c43;--accent:#DAC597;
--text:#ede7d5;--muted:#a5a195;--border:#6b5f53;--red:#b5432c;--ok:#7fa86b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;
 padding:2rem 1rem;display:flex;flex-direction:column;align-items:center;}
a{color:var(--accent);}
.wrap{width:100%;max-width:720px;}
.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem;}
h1{color:var(--accent);font-size:1.5rem;letter-spacing:.5px;}
.back{font-size:.85rem;text-decoration:none;color:var(--muted);}
.back:hover{color:var(--accent);}
.hint{color:var(--muted);font-size:.8rem;line-height:1.5;margin-bottom:.8rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>📖 Opslagsværk</h1>
    <span><a class="back" href="{{ url_for('dm.index') }}">← Kampagner</a></span>
  </div>
  <p class="hint">Browse hele kataloget (monstre, fælder, døre, magiske genstande). Søg på navn eller CR,
    klik et navn for statblokken. (I eventyr-editoren kan du desuden indsætte referencer direkte.)</p>

  <div id="browse-panel" class="browse-panel" data-entity-api="{{ entity_api }}" data-from="{{ from_session }}">
    <div class="br-tabs"></div>
    <input type="text" class="br-search" placeholder="Søg (navn eller CR)…" aria-label="Søg i opslagsværk">
    <div class="br-list"></div>
  </div>
</div>
<script src="{{ url_for('static', filename='dm-content-browser.js') }}"></script>
<script src="{{ url_for('static', filename='dm-give-loot.js') }}"></script>
</body>
</html>
