# Aelred — Human Cleric 1, Lawful Good
name: Aelred
race: Human
class: Cleric
level: 1
alignment: Lawful Good
deity: Aldric, den Vågne Vogter   # generisk LG god for helbredelse og beskyttelse
size: medium

experience_points: 0

hp:
  current: 9          # 1d8 (8, max ved level 1) + CON-mod (+1)
  max: 9

ability_scores:
  str: 14
  dex: 10
  con: 13
  int: 10
  wis: 16
  cha: 15

saves:
  fortitude: 2   # base — CON-modifier (+1) tilføjes automatisk → +3
  reflex: 0      # base — DEX-modifier (+0) tilføjes automatisk → +0
  will: 2        # base — WIS-modifier (+3) tilføjes automatisk → +5

combat:
  # Rustning/skjold ligger nu i inventory (state: worn) og udledes derfra.
  # AC: 10 + rustning(+4) + skjold(+2) + Dex(0) → 16/10/16
  # initiative: Dex-mod + Improved Initiative (+4) → +4
  bab: 0
  speed: 30
  # grapple beregnes: BAB + STR-mod + størrelses-modifier (Medium = 0)

# Angreb udledes nu af våben i inventory med state: wielded (se nederst).
# (Rene spell-/unarmed-angreb ville stå her som før — Aelred har ingen.)

skills:
- id: concentration
  ranks: 4.0
  misc: 0
- id: heal
  ranks: 4.0
  misc: 0
- id: knowledge_religion
  ranks: 4.0
  misc: 0
feats:
- improved_initiative
- extend_spell
conditions: []
spells_prepared:
  0:
  - guidance
  - light
  - resistance
  1:
  - bless
  - magic_stone
spells_used: {}
domains:
- healing
- protection
domain_spells_prepared:
  1: sanctuary
domain_spells_used: {}
inventory:
# I brug / båret — navne, vægte, skade osv. slås op i kataloget via ref
- ref: weapons/mace_light          # Light Mace i hånden → angreb (+2 / 1d6+2)
  state: wielded
- ref: weapons/sling               # slynge i hånden; ranged men får Str (undtagelse)
  state: wielded
  str_mult: 1
- ref: armor/chain_shirt           # +4 AC (let rustning)
  state: worn
- ref: armor/heavy_steel_shield    # +2 AC
  state: worn
# I rygsæk / på person
- ref: items/sling_bullets_10
- ref: items/holy_symbol_wooden
  notes: spellcasting focus (DF)
- ref: items/backpack_empty
- ref: items/rations_trail_per_day
  qty: 5
  notes: 5 dage
- ref: items/waterskin
  notes: fuld
gold:
  pp: 0
  gp: 12
  sp: 0
  cp: 0

class_features:
  turn_undead: 1d20 + 2 (CHA) — turning check; (3 + CHA-mod) = 5 forsøg/dag
  spontaneous_casting: Kan ofre forberedt spell → Cure-spell (positiv energi)
  aura: Stærk Lawful + Good aura (jf. detect-spells)
  # Domæner (Healing + Protection) vises nu fra databasen, jf. domains-feltet.

racial_traits:
  bonus_feat: 1 ekstra feat ved level 1 (Extend Spell)
  skill_points: +1 skill point pr. level (medregnet automatisk)
  size: Medium
  speed: 30 ft. (før armor)

notes: |
  Aelred er en menneskelig klerik af Lawful Good alignment, viet til
  helbredelse og beskyttelse (domænerne Healing og Protection).

  Deity-navnet "Aldric, den Vågne Vogter" er et forslag — sig til hvis du
  hellere vil have en SRD-gud (fx Heironeous) eller et andet navn.

  Forberedte formler ved dagens start (du bad mig vælge):
    Orisons: Guidance, Light, Resistance
    1.-niveau: Cure Light Wounds, Bless + Sanctuary (domæne-pladsen)
  Skift gerne ud — alle fire 1.-niveau cleric-spells i db'en er nu:
  Cure Light Wounds, Bless, Sanctuary, Endure Elements, Magic Stone,
  Obscuring Mist.

  Skill points level 1: (2 cleric + 0 INT + 1 human) × 4 = 12 →
  Concentration 4, Heal 4, Knowledge (Religion) 4.
