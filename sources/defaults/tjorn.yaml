  animal: riding_dog
  hp_current: 12
  tricks:
  - Attack
  - Come
  - Seek
  - Stay
  - Down
  - Guard
  - Heel
class_features:
  nature_sense: +2 Knowledge (Nature) og Survival
  wild_empathy: 1d20 + 2 (level) + 0 (CHA) — Diplomacy mod dyr
  woodland_stride: Bevæger sig normalt igennem naturligt svært terræn
  spontaneous_casting: Kan ofre forberedt spell → Summon Nature's Ally (1 fuld runde)
  animal_companion: Varg (Riding Dog)

racial_traits:
  stat_mods: +2 CON, -2 STR
  size: Small
  size_bonuses: +1 AC, +1 angreb, +4 Hide
