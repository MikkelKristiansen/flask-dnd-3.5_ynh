notes: |
  Tjørn er fra gnom-landsbyen Gravelwood i Arn Forest.
  Bærer Grumles (grævling) klo i en læderrem om halsen.
  Moren Edna er druide i Silverwood på den anden side af floden.
  Deity ændret fra Obad-Hai til Silvanus (jf. booklet).

  DM-bonus (session 2): +2 Know. (Nature), +1 Know. (Local/Silver Marches),
