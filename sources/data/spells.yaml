- id: command
  name: Command
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Language-Dependent, Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 round
  save: Will negates
  spell_resistance: Yes
  components: V
  target_label: Target
  description: |-
    You give the subject a single command, which it obeys to the best of its ability at its earliest opportunity. You may select from the following options.

    _Approach:_ On its turn, the subject moves toward you as quickly and directly as possible for 1 round.

    _Drop:_ On its turn, the subject drops whatever it is holding.

    _Fall:_ On its turn, the subject falls to the ground and remains prone for 1 round.

    _Flee:_ On its turn, the subject moves away from you as quickly as possible for 1 round.

    _Halt:_ The subject stands in place for 1 round. It may not take any actions but is not considered helpless.

    If the subject can't carry out your command on its turn, the spell automatically fails.
- id: comprehend_languages
  name: Comprehend Languages
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Target
  description: |-
    You can understand the spoken words of creatures or read otherwise incomprehensible written messages. The ability to read does not necessarily impart insight into the material, merely its literal meaning. The spell enables you to understand or read an unknown language, not speak or write it.

    Written material can be read at the rate of one page (250 words) per minute. Magical writing cannot be read, though the spell reveals that it is magical. This spell does not decipher codes or reveal messages concealed in otherwise normal text.

    _Comprehend languages_ can be made permanent with a _permanency_ spell.
