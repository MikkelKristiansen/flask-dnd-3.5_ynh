  duration: 10 minutes; see text
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    You instill courage in the subject, granting it a +4 morale bonus against fear effects for 10 minutes. If the subject is under the influence of a fear effect when receiving the spell, that effect is suppressed for the duration of the spell.

    Multiple creatures targeted must be no more than 30 feet apart from each other. _Remove fear_ counters and dispels _cause fear_.
- id: shield_of_faith
  name: Shield of Faith
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: This spell creates a shimmering, magical field around the touched
    creature that averts attacks. The spell grants the subject a +2 deflection 
    bonus to AC, with an additional +1 to the bonus for every six levels you 
    have (maximum +5 deflection bonus at 18th level).
- id: summon_monster_i
  name: Summon Monster I
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One summoned creature
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell summons an extraplanar creature (typically an outsider, elemental, or magical beast native to another plane). It appears where you designate and acts immediately, on your turn. It attacks your opponents to the best of its ability. If you can communicate with the creature, you can direct it not to attack, to attack particular enemies, or to perform other actions.

    The spell conjures one of the creatures from the 1st-level list on the Summon Monster table. You choose which kind of creature to summon, and you can change that choice each time you cast the spell.

    A summoned monster cannot summon or otherwise conjure another creature, nor can it use any teleportation or planar travel abilities. Creatures cannot be summoned into an environment that cannot support them. The creature attacks your opponents to the best of its ability, and it remains for the duration unless dismissed.

    When you use a summoning spell to summon a chaotic, evil, good, or lawful creature, it is a spell of that type.
- id: cure_minor_wounds
  name: Cure Minor Wounds
