  name: Detect Law
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: This spell functions like _detect evil_, except that it detects the auras of lawful creatures, clerics of lawful deities, lawful spells, and lawful magic items, and you are vulnerable to an overwhelming lawful aura if you are chaotic.
- id: detect_undead
  name: Detect Undead
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    You can detect the aura that surrounds undead creatures. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of undead.

    _2nd Round:_ Number of undead auras in the area and the strength of the strongest undead aura present.

    _3rd Round:_ The strength and location of each undead aura. If an aura is outside your line of sight, then you discern its direction but not its exact location.

    Each round, you can turn to detect undead in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: divine_favor
  name: Divine Favor
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin: 1
  school: Evocation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 minute
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: Calling upon the strength and wisdom of a deity, you gain a +1 luck bonus on attack and weapon damage rolls for every three caster levels you have (at least +1, to a maximum of +3). The bonus doesn't apply to spell damage.
- id: doom
  name: Doom
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy [Fear, Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: This spell fills a single subject with a feeling of doom. An affected creature takes a -2 penalty on attack rolls, saving throws, ability checks, skill checks, and weapon damage rolls. A _doomed_ creature remains so for the duration of the spell or until the curse is removed.
- id: entropic_shield
  name: Entropic Shield
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: A magical field appears around you, glowing with a chaotic blast of multicolored hues. This field deflects incoming arrows, rays, and other ranged attacks. Each ranged attack directed at you for which the attacker must make an attack roll has a 20% miss chance (similar to the effects of concealment). Other attacks that simply work at a distance are not affected.
- id: hide_from_undead
  name: Hide from Undead
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One touched creature/level
  duration: 10 min./level (D)
  save: Will negates (harmless); see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: Undead cannot see, hear, or smell the warded creatures. Even extraordinary or supernatural sensory capabilities, such as blindsight, blindsense, scent, and tremorsense, cannot detect or locate warded creatures. Nonintelligent undead creatures are automatically affected and act as though the warded creatures are not present. An intelligent undead creature gets a single Will saving throw. If it fails, the subject can't see any of the warded creatures. However, if it has reason to believe unseen opponents are present, it can attempt to find or strike them. If a warded creature attempts to turn or command undead, touches an undead creature, or attacks any creature (even with a spell), the spell ends for all recipients.
- id: inflict_light_wounds
  name: Inflict Light Wounds
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    When laying your hand upon a creature, you channel negative energy that deals 1d8 points of damage +1 point per caster level (maximum +5).

    Since undead are powered by negative energy, this spell cures such a creature of a like amount of damage, rather than harming it.
- id: magic_weapon
  name: Magic Weapon
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Weapon touched
  duration: 1 min./level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, DF
  target_label: Target
  description: |-
    You give a weapon a +1 enhancement bonus on attack and damage rolls. An enhancement bonus does not stack with a masterwork weapon's +1 bonus on attack rolls.

    You can't cast this spell on a natural weapon, such as an unarmed strike. A monk's unarmed strike is considered a weapon, and thus it can be enhanced by this spell.
- id: protection_chaos
  name: Protection from Chaos
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Abjuration [Lawful]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: This spell functions like _protection from evil_, except that the deflection and resistance bonuses apply to attacks from chaotic creatures, and the warding blocks mental control and summoned chaotic creatures.
- id: protection_evil
  name: Protection from Evil
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Abjuration [Good]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell wards a creature from attacks by evil creatures, from mental control, and from summoned creatures. It creates a magical barrier around the subject at a distance of 1 foot. The barrier moves with the subject and has three major effects.

    First, the subject gains a +2 deflection bonus to AC and a +2 resistance bonus on saves. Both of these bonuses apply against attacks made or effects created by evil creatures.

    Second, the barrier blocks any attempt to possess the warded creature (by a _magic jar_ attack, for example) or to exercise mental control over it (including enchantment (charm) effects and enchantment (compulsion) effects). The protection does not prevent such effects from targeting the protected creature, but it suppresses the effect for the duration of the protection from evil effect.

    Third, the spell prevents bodily contact by summoned creatures. This causes the natural weapon attacks of such creatures to fail and the creatures to recoil if such attacks require touching the warded creature. Good summoned creatures are immune to this effect.
- id: protection_good
  name: Protection from Good
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Abjuration [Evil]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: This spell functions like _protection from evil_, except that the deflection and resistance bonuses apply to attacks from good creatures, and the warding blocks mental control and summoned good creatures.
- id: protection_law
  name: Protection from Law
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Abjuration [Chaotic]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: This spell functions like _protection from evil_, except that the deflection and resistance bonuses apply to attacks from lawful creatures, and the warding blocks mental control and summoned lawful creatures.
- id: remove_fear
  name: Remove Fear
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature plus one additional creature per four levels
  duration: 10 minutes; see text
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    You instill courage in the subject, granting it a +4 morale bonus against fear effects for 10 minutes. If the subject is under the influence of a fear effect when receiving the spell, that effect is suppressed for the duration of the spell.

    Multiple creatures targeted must be no more than 30 feet apart from each other. _Remove fear_ counters and dispels _cause fear_.
- id: shield_of_faith
  name: Shield of Faith
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: This spell creates a shimmering, magical field around the touched creature that averts attacks. The spell grants the subject a +2 deflection bonus to AC, with an additional +1 to the bonus for every six levels you have (maximum +5 deflection bonus at 18th level).
- id: summon_monster_i
  name: Summon Monster I
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One summoned creature
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell summons an extraplanar creature (typically an outsider, elemental, or magical beast native to another plane). It appears where you designate and acts immediately, on your turn. It attacks your opponents to the best of its ability. If you can communicate with the creature, you can direct it not to attack, to attack particular enemies, or to perform other actions.

    The spell conjures one of the creatures from the 1st-level list on the Summon Monster table. You choose which kind of creature to summon, and you can change that choice each time you cast the spell.

    A summoned monster cannot summon or otherwise conjure another creature, nor can it use any teleportation or planar travel abilities. Creatures cannot be summoned into an environment that cannot support them. The creature attacks your opponents to the best of its ability, and it remains for the duration unless dismissed.

    When you use a summoning spell to summon a chaotic, evil, good, or lawful creature, it is a spell of that type.
- id: cure_minor_wounds
  name: Cure Minor Wounds
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half (harmless); see text
  spell_resistance: Yes (harmless); see text
  components: V, S
  target_label: Target
  description: This spell functions like _cure light wounds_, except that it cures only 1 point of damage.
- id: cure_moderate_wounds
  name: Cure Moderate Wounds
  level_druid: 3
  level_cleric: 2
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half (harmless); see text
  spell_resistance: Yes (harmless); see text
  components: V, S
  target_label: Target
  description: This spell functions like _cure light wounds_, except that it cures 2d8 points of damage +1 point per caster level (maximum +10).
- id: dancing_lights
  name: Dancing Lights
  level_druid:
  level_cleric:
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to four lights, all within a 10- ft.-radius area
  duration: 1 minute (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    Depending on the version selected, you create up to four lights that resemble lanterns or torches (and cast that amount of light), or up to four glowing spheres of light (which look like will-o’-wisps), or one faintly glowing, vaguely humanoid shape. The _dancing lights_ must stay within a 10-foot-radius area in relation to each other but otherwise move as you desire (no concentration required): forward or back, up or down, straight or turning corners, or the like. The lights can move up to 100 feet per round. A light winks out if the distance between you and it exceeds the spell’s range.

    _Dancing lights_ can be made permanent with a _permanency_ spell.
- id: delay_poison
  name: Delay Poison
  level_druid: 2
  level_cleric: 2
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 hour/level
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: The subject becomes temporarily immune to poison. Any poison in its system or any poison to which it is exposed during the spell’s duration does not affect the subject until the spell’s duration has expired. _Delay poison_ does not cure any damage that poison may have already done.
- id: detect_animals_plants
  name: Detect Animals or Plants
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can detect a particular kind of animal or plant in a cone emanating out from you in whatever direction you face. You must think of a kind of animal or plant when using the spell, but you can change the animal or plant kind each round. The amount of information revealed depends on how long you search a particular area or focus on a specific kind of animal or plant.

    _1st Round:_ Presence or absence of that kind of animal or plant in the area.

    _2nd Round:_ Number of individuals of the specified kind in the area, and the condition of the healthiest specimen.

    _3rd Round:_ The condition (see below) and location of each individual present. If an animal or plant is outside your line of sight, then you discern its direction but not its exact location.

    _Conditions:_ For purposes of this spell, the categories of condition are as follows:

    Normal: Has at least 90% of full normal hit points, free of disease.

    Fair: 30% to 90% of full normal hit points remaining.

    Poor: Less than 30% of full normal hit points remaining, afflicted with a disease, or suffering from a debilitating injury.

    Weak: 0 or fewer hit points remaining, afflicted with a disease in the terminal stage, or crippled.

    If a creature falls into more than one category, the spell indicates the weaker of the two.

    Each round you can turn to detect a kind of animal or plant in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: detect_magic
  name: Detect Magic
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You detect magical auras. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of magical auras.

    _2nd Round:_ Number of different magical auras and the power of the most potent aura.

    _3rd Round:_ The strength and location of each aura. If the items or creatures bearing the auras are in line of sight, you can make Spellcraft skill checks to determine the school of magic involved in each. (Make one check per aura; DC 15 + spell level, or 15 + half caster level for a nonspell effect.)

    Magical areas, multiple types of magic, or strong local magical emanations may distort or conceal weaker auras.

    _Aura Strength:_ An aura’s power depends on a spell’s functioning spell level or an item’s caster level. If an aura falls into more than one category, _detect magic_ indicates the stronger of the two.

    Aura Power — Faint / Moderate / Strong / Overwhelming:
    - Functioning spell (spell level): 3rd or lower / 4th–6th / 7th–9th / 10th+ (deity-level)
    - Magic item (caster level): 5th or lower / 6th–11th / 12th–20th / 21st+ (artifact)

    _Lingering Aura:_ A magical aura lingers after its original source dissipates (in the case of a spell) or is destroyed (in the case of a magic item). If _detect magic_ is cast and directed at such a location, the spell indicates an aura strength of dim (even weaker than a faint aura). How long the aura lingers at this dim level depends on its original power:

    Lingering aura duration by original strength:
    - Faint: 1d6 rounds
    - Moderate: 1d6 minutes
    - Strong: 1d6×10 minutes
    - Overwhelming: 1d6 days

    Outsiders and elementals are not magical in themselves, but if they are summoned, the conjuration spell registers.

    Each round, you can turn to detect magic in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.

    _Detect magic_ can be made permanent with a _permanency_ spell.
- id: detect_poison
  name: Detect Poison
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S
  target_label:
  description: |-
    You determine whether a creature, object, or area has been poisoned or is poisonous. You can determine the exact type of poison with a DC 20 Wisdom check. A character with the Craft (alchemy) skill may try a DC 20 Craft (alchemy) check if the Wisdom check fails, or may try the Craft (alchemy) check prior to the Wisdom check.

    The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: detect_snares_pits
  name: Detect Snares and Pits
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can detect simple pits, deadfalls, and snares as well as mechanical traps constructed of natural materials. The spell does not detect complex traps, including trapdoor traps.

    _Detect snares and pits_ does detect certain natural hazards—quicksand (a snare), a sinkhole (a pit), or unsafe walls of natural rock (a deadfall). However, it does not reveal other potentially dangerous conditions. The spell does not detect magic traps (except those that operate by pit, deadfall, or snaring; see the spell _snare_), nor mechanically complex ones, nor those that have been rendered safe or inactive.

    The amount of information revealed depends on how long you study a particular area.

    _1st Round:_ Presence or absence of hazards.

    _2nd Round:_ Number of hazards and the location of each. If a hazard is outside your line of sight, then you discern its direction but not its exact location.

    _Each Additional Round:_ The general type and trigger for one particular hazard closely examined by you.

    Each round, you can turn to detect snares and pits in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: endure_elements
  name: Endure Elements
  level_druid: 1
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 24 hours
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    A creature protected by _endure elements_ suffers no harm from being in a hot or cold environment. It can exist comfortably in conditions between –50 and 140 degrees Fahrenheit without having to make Fortitude saves). The creature’s equipment is likewise protected.

    _Endure elements_ doesn’t provide any protection from fire or cold damage, nor does it protect against other environmental hazards such as smoke, lack of air, and so forth.
- id: entangle
  name: Entangle
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Plants in a 40-ft.-radius spread
  duration: 1 min./level (D)
  save: Reflex partial; see text
  spell_resistance: No
  components: V, S, DF
  target_label: Area
  description: |-
    Grasses, weeds, bushes, and even trees wrap, twist, and entwine about creatures in the area or those that enter the area, holding them fast and causing them to become entangled. The creature can break free and move half its normal speed by using a full-round action to make a DC 20 Strength check or a DC 20 Escape Artist check. A creature that succeeds on a Reflex save is not entangled but can still move at only half speed through the area. Each round on your turn, the plants once again attempt to entangle all creatures that have avoided or escaped entanglement.

    _Note:_ The effects of the spell may be altered somewhat, based on the nature of the entangling plants.
- id: faerie_fire
  name: Faerie Fire
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Creatures and objects within a 5-ft.-radius burst
  duration: 1 min./level (D)
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: A pale glow surrounds and outlines the subjects. Outlined subjects shed light as candles. Outlined creatures do not benefit from the concealment normally provided by darkness (though a 2nd-level or higher magical _darkness_ effect functions normally), _blur_, displacement, invisibility, or similar effects. The light is too dim to have any special effect on undead or dark-dwelling creatures vulnerable to light. The _faerie fire_ can be blue, green, or violet, according to your choice at the time of casting. The _faerie fire_ does not cause any harm to the objects or creatures thus outlined.
- id: fire_trap
  name: Fire Trap
  level_druid: 2
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Abjuration [Fire]
  cast_time: 10 minutes
  range: Touch
  target: Object touched
  duration: Permanent until discharged (D)
  save: Reflex half; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    _Fire trap_ creates a fiery explosion when an intruder opens the item that the trap protects. A _fire trap_ can ward any object that can be opened and closed.

    When casting _fire trap,_ you select a point on the object as the spell’s center. When someone other than you opens the object, a fiery explosion fills the area within a 5-foot radius around the spell’s center. The flames deal 1d4 points of fire damage +1 point per caster level (maximum +20). The item protected by the trap is not harmed by this explosion.

    A _fire trapped_ item cannot have a second closure or warding spell placed on it.

    A _knock_ spell does not bypass a _fire trap_. An unsuccessful _dispel magic_ spell does not detonate the spell.

    Underwater, this ward deals half damage and creates a large cloud of steam.

    You can use the _fire trapped_ object without discharging it, as can any individual to whom the object was specifically attuned when cast. Attuning a _fire trapped_ object to an individual usually involves setting a password that you can share with friends.

    _Note:_ Magic traps such as _fire trap_ are hard to detect and disable. A rogue (only) can use the Search skill to find a _fire trap_ and Disable Device to thwart it. The DC in each case is 25 + spell level (DC 27 for a druid’s _fire trap_ or DC 29 for the arcane version).

    _Material Component:_ A half-pound of gold dust (cost 25 gp) sprinkled on the warded object.
- id: flame_blade
  name: Flame Blade
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: 0 ft.
  target: Sword-like beam
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Effect
  description: |-
    A 3-foot-long, blazing beam of red-hot fire springs forth from your hand. You wield this bladelike beam as if it were a scimitar. Attacks with the _flame blade_ are melee touch attacks. The blade deals 1d8 points of fire damage +1 point per two caster levels (maximum +10). Since the blade is immaterial, your Strength modifier does not apply to the damage. A _flame blade_ can ignite combustible materials such as parchment, straw, dry sticks, and cloth.

    The spell does not function underwater.
- id: flame_strike
  name: Flame Strike
  level_druid: 4
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Cylinder (10-ft. radius, 40 ft. high)
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: A _flame strike_ produces a vertical column of divine fire roaring downward. The spell deals 1d6 points of damage per caster level (maximum 15d6). Half the damage is fire damage, but the other half results directly from divine power and is therefore not subject to being reduced by resistance to fire-based attacks.
- id: flaming_sphere
  name: Flaming Sphere
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: 5-ft.-diameter sphere
  duration: 1 round/level
  save: Reflex negates
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    A burning globe of fire rolls in whichever direction you point and burns those it strikes. It moves 30 feet per round. As part of this movement, it can ascend or jump up to 30 feet to strike a target. If it enters a space with a creature, it stops moving for the round and deals 2d6 points of fire damage to that creature, though a successful Reflex save negates that damage. A _flaming sphere_ rolls over barriers less than 4 feet tall. It ignites flammable substances it touches and illuminates the same area as a torch would.

    The sphere moves as long as you actively direct it (a move action for you); otherwise, it merely stays at rest and burns. It can be extinguished by any means that would put out a normal fire of its size. The surface of the sphere has a spongy, yielding consistency and so does not cause damage except by its flame. It cannot push aside unwilling creatures or batter down large obstacles. A _flaming sphere_ winks out if it exceeds the spell’s range.

    _Arcane Material Component:_ A bit of tallow, a pinch of brimstone, and a dusting of powdered iron.
- id: flare
  name: Flare
  level_druid: 0
  level_cleric:
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Burst of light
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V
  target_label: Effect
  description: This cantrip creates a burst of light. If you cause the light to burst directly in front of a single creature, that creature is dazzled for 1 minute unless it makes a successful Fortitude save. Sightless creatures, as well as creatures already dazzled, are not affected by _flare_.
- id: fog_cloud
  name: Fog Cloud
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft. level)
  target: Fog spreads in 20-ft. radius, 20 ft. high
  duration: 10 min./level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A bank of fog billows out from the point you designate. The fog obscures all sight, including darkvision, beyond 5 feet. A creature within 5 feet has concealment (attacks have a 20% miss chance). Creatures farther away have total concealment (50% miss chance, and the attacker can’t use sight to locate the target).

    A moderate wind (11+ mph) disperses the fog in 4 rounds; a strong wind (21+ mph) disperses the fog in 1 round.

    The spell does not function underwater.
- id: freedom_movement
  name: Freedom of Movement
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Personal or touch
  target: You or creature touched
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M, DF
  target_label: Target
  description: |-
    This spell enables you or a creature you touch to move and attack normally for the duration of the spell, even under the influence of magic that usually impedes movement, such as paralysis, _solid fog_, _slow_, and _web_. The subject automatically succeeds on any grapple check made to resist a grapple attempt, as well as on grapple checks or Escape Artist checks made to escape a grapple or a pin.

    The spell also allows the subject to move and attack normally while underwater, even with slashing weapons such as axes and swords or with bludgeoning weapons such as flails, hammers, and maces, provided that the weapon is wielded in the hand rather than hurled. The _freedom of movement_ spell does not, however, allow water breathing.

    _Material Component:_ A leather thong, bound around the arm or a similar appendage.
- id: ghost_sound
  name: Ghost Sound
  level_druid:
  level_cleric:
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Illusory sounds
  duration: 1 round/level (D)
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    _Ghost sound_ allows you to create a volume of sound that rises, recedes, approaches, or remains at a fixed place. You choose what type of sound _ghost sound_ creates when casting it and cannot thereafter change the sound’s basic character.

    The volume of sound created depends on your level. You can produce as much noise as four normal humans per caster level (maximum twenty humans). Thus, talking, singing, shouting, walking, marching, or running sounds can be created. The noise a _ghost sound_ spell produces can be virtually any type of sound within the volume limit. A horde of rats running and squeaking is about the same volume as eight humans running and shouting. A roaring lion is equal to the noise from sixteen humans, while a roaring dire tiger is equal to the noise from twenty humans.

    _Ghost sound_ can enhance the effectiveness of a _silent image_ spell.

    _Ghost sound_ can be made permanent with a _permanency_ spell.

    _Material Component:_ A bit of wool or a small lump of wax.
- id: goodberry
  name: Goodberry
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: 2d4 fresh berries touched
  duration: One day/level
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Targets
  description: Casting _goodberry_ upon a handful of freshly picked berries makes 2d4 of them magical. You (as well as any other druid of 3rd or higher level) can immediately discern which berries are affected. Each transmuted berry provides nourishment as if it were a normal meal for a Medium creature. The berry also cures 1 point of damage when eaten, subject to a maximum of 8 points of such curing in any 24-hour period.
- id: guidance
  name: Guidance
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 minute or until discharged
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: This spell imbues the subject with a touch of divine guidance. The creature gets a +1 competence bonus on a single attack roll, saving throw, or skill check. It must choose to use the bonus before making the roll to which it applies.
- id: gust_of_wind
  name: Gust of Wind
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Air]
  cast_time: 1 standard action
  range: 60 ft.
  target: Line-shaped gust of severe wind emanating out from you to the extreme of the range
  duration: 1 round
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    This spell creates a severe blast of air (approximately 50 mph) that originates from you, affecting all creatures in its path.

    A Tiny or smaller creature on the ground is knocked down and rolled 1d4x10 feet, taking 1d4 points of nonlethal damage per 10 feet. If flying, a Tiny or smaller creature is blown back 2d6x10 feet and takes 2d6 points of nonlethal damage due to battering and buffeting.

    Small creatures are knocked prone by the force of the wind, or if flying are blown back 1d6x10 feet.

    Medium creatures are unable to move forward against the force of the wind, or if flying are blown back 1d6x5 feet.

    Large or larger creatures may move normally within a _gust of wind_ effect.

    A _gust of wind_ can’t move a creature beyond the limit of its range.

    Any creature, regardless of size, takes a –4 penalty on ranged attacks and Listen checks in the area of a _gust of wind_.

    The force of the _gust_ automatically extinguishes candles, torches, and similar unprotected flames. It causes protected flames, such as those of lanterns, to dance wildly and has a 50% chance to extinguish those lights.

    In addition to the effects noted, a _gust of wind_ can do anything that a sudden blast of wind would be expected to do. It can create a stinging spray of sand or dust, fan a large fire, overturn delicate awnings or hangings, heel over a small boat, and blow gases or vapors to the edge of its range.

    _Gust of wind_ can be made permanent with a _permanency_ spell.
- id: heat_metal
  name: Heat Metal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Fire]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Metal equipment of one creature per two levels, no two of which can be more than 30 ft. apart; or 25 lb. of metal/level, all of which must be within a 30-ft. circle
  duration: 7 rounds
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: |-
    _Heat metal_ makes metal extremely warm. Unattended, nonmagical metal gets no saving throw. Magical metal is allowed a saving throw against the spell. An item in a creature’s possession uses the creature’s saving throw bonus unless its own is higher.

    A creature takes fire damage if its equipment is heated. It takes full damage if its armor is affected or if it is holding, touching, wearing, or carrying metal weighing one-fifth of its weight. The creature takes minimum damage (1 point or 2 points; see the table) if it’s not wearing metal armor and the metal that it’s carrying weighs less than one-fifth of its weight.

    On the first round of the spell, the metal becomes warm and uncomfortable to touch but deals no damage. The same effect also occurs on the last round of the spell’s duration. During the second (and also the next-to-last) round, intense heat causes pain and damage. In the third, fourth, and fifth rounds, the metal is searing hot, causing more damage, as shown on the table below.

    Metal temperature by round (damage):
    - Round 1: Warm — none
    - Round 2: Hot — 1d4 points
    - Rounds 3–5: Searing — 2d4 points
    - Round 6: Hot — 1d4 points
    - Round 7: Warm — none

    Any cold intense enough to damage the creature negates fire damage from the spell (and vice versa) on a point-for-point basis. If cast underwater, _heat metal_ deals half damage and boils the surrounding water.

    _Heat metal_ counters and dispels _chill metal_.
- id: hide_from_animals
  name: Hide from Animals
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One creature touched/level
  duration: 10 min./level (D)
  save: Will negates (harmless)
  spell_resistance: Yes
  components: S, DF
  target_label: Targets
  description: Animals cannot see, hear, or smell the warded creatures. Even extraordinary or supernatural sensory capabilities, such as blindsense, blindsight, scent, and tremorsense, cannot detect or locate warded creatures. Animals simply act as though the warded creatures are not there. If a warded character touches an animal or attacks any creature, even with a spell, the spell ends for all recipients.
- id: hold_animal
  name: Hold Animal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One animal
  duration: 1 round/level (D); see text
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: This spell functions like _hold person,_ except that it affects an animal instead of a humanoid.
- id: ice_storm
  name: Ice Storm
  level_druid: 4
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cylinder (20-ft. radius, 40 ft. high)
  duration: 1 full round
  save: None
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Area
  description: |-
    Great magical hailstones pound down for 1 full round, dealing 3d6 points of bludgeoning damage and 2d6 points of cold damage to every creature in the area. A –4 penalty applies to each Listen check made within the _ice storm_’s effect, and all land movement within its area is at half speed. At the end of the duration, the hail disappears, leaving no aftereffects (other than the damage dealt).

    _Arcane Material Component:_ A pinch of dust and a few drops of water.
- id: jump
  name: Jump
  level_druid: 1
  level_cleric:
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    The subject gets a +10 enhancement bonus on Jump checks. The enhancement bonus increases to +20 at caster level 5th, and to +30 (the maximum) at caster level 9th.

    _Material Component:_ A grasshopper’s hind leg, which you break when the spell is cast.
- id: know_direction
  name: Know Direction
  level_druid: 0
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: Instantaneous
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: You instantly know the direction of north from your current position. The spell is effective in any environment in which “north” exists, but it may not work in extraplanar settings. Your knowledge of north is correct at the moment of casting, but you can get lost again within moments if you don’t find some external reference point to help you keep track of direction.
- id: light
  name: Light
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, M/DF
  target_label: Target
  description: |-
    This spell causes an object to glow like a torch, shedding bright light in a 20-foot radius (and dim light for an additional 20 feet) from the point you touch. The effect is immobile, but it can be cast on a movable object. Light taken into an area of magical _darkness_ does not function.

    A light spell (one with the light descriptor) counters and dispels a darkness spell (one with the darkness descriptor) of an equal or lower level.

    _Arcane Material Component:_ A firefly or a piece of phosphorescent moss.
- id: longstrider
  name: Longstrider
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level (D)
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, M
  target_label: Target
  description: |-
    This spell increases your base land speed by 10 feet. (This adjustment counts as an enhancement bonus.) It has no effect on other modes of movement, such as burrow, climb, fly, or swim.

    _Material Component:_ A pinch of dirt.
- id: magic_fang
  name: Magic Fang
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    _Magic fang_ gives one natural weapon of the subject a +1 enhancement bonus on attack and damage rolls. The spell can affect a slam attack, fist, bite, or other natural weapon. (The spell does not change an unarmed strike’s damage from nonlethal damage to lethal damage.)

    _Magic fang_ can be made permanent with a _permanency_ spell.
- id: magic_stone
  name: Magic Stone
  level_druid: 1
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Up to three pebbles touched
  duration: 30 minutes or until discharged
  self_duration: 1
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, DF
  target_label: Targets
  description: You transmute as many as three pebbles, which can be no larger than sling bullets, so that they strike with great force when thrown or slung. If hurled, they have a range increment of 20 feet. If slung, treat them as sling bullets (range increment 50 feet). The spell gives them a +1 enhancement bonus on attack and damage rolls. The user of the stones makes a normal ranged attack. Each stone that hits deals 1d6+1 points of damage (including the spell’s enhancement bonus), or 2d6+2 points against undead.
- id: mending
  name: Mending
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: 10 ft.
  target: One object of up to 1 lb.
  duration: Instantaneous
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S
  target_label: Target
  description: |-
    _Mending_ repairs small breaks or tears in objects (but not warps, such as might be caused by a _warp wood_ spell). It will weld broken metallic objects such as a ring, a chain link, a medallion, or a slender dagger, providing but one break exists.

    Ceramic or wooden objects with multiple breaks can be invisibly rejoined to be as strong as new. A hole in a leather sack or a wineskin is completely healed over by _mending._ The spell can repair a magic item, but the item’s magical abilities are not restored. The spell cannot mend broken magic rods, staffs, or wands, nor does it affect creatures (including constructs).
- id: obscuring_mist
  name: Obscuring Mist
  level_druid: 1
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: 20 ft.
  target: Cloud spreads in 20-ft. radius from you, 20 ft. high
  duration: 1 min./level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A misty vapor arises around you. It is stationary once created. The vapor obscures all sight, including darkvision, beyond 5 feet. A creature 5 feet away has concealment (attacks have a 20% miss chance). Creatures farther away have total concealment (50% miss chance, and the attacker cannot use sight to locate the target).

    A moderate wind (11+ mph), such as from a _gust of wind_ spell, disperses the fog in 4 rounds. A strong wind (21+ mph) disperses the fog in 1 round. A _fireball, flame strike_, or similar spell burns away the fog in the explosive or fiery spell’s area. A _wall of fire_ burns away the fog in the area into which it deals damage.

    This spell does not function underwater.
- id: owl_wisdom
  name: Owl's Wisdom
  level_druid: 2
  level_cleric: 2
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creature becomes wiser. The spell grants a +4 enhancement bonus to Wisdom, adding the usual benefit to Wisdom-related skills. Clerics, druids, paladins, and rangers (and other Wisdom-based spellcasters) who receive _owl’s wisdom_ do not gain any additional bonus spells for the increased Wisdom, but the save DCs for their spells increase.

    _Arcane Material Component:_ A few feathers, or a pinch of droppings, from an owl.
- id: pass_without_trace
  name: Pass without Trace
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One creature/level touched
  duration: 1 hour/level (D)
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Targets
  description: The subject or subjects can move through any type of terrain and leave neither footprints nor scent. Tracking the subjects is impossible by nonmagical means.
- id: plant_growth
  name: Plant Growth
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: See text
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label:
  description: |-
    _Plant growth_ has different effects depending on the version chosen.

    _Overgrowth:_ This effect causes normal vegetation (grasses, briars, bushes, creepers, thistles, trees, vines) within long range (400 feet + 40 feet per caster level) to become thick and overgrown. The plants entwine to form a thicket or jungle that creatures must hack or force a way through. Speed drops to 5 feet, or 10 feet for Large or larger creatures. The area must have brush and trees in it for this spell to take effect.

    At your option, the area can be a 100-foot-radius circle, a 150-foot-radius semicircle, or a 200-foot-radius quarter circle.

    You may designate places within the area that are not affected.

    _Enrichment:_ This effect targets plants within a range of one-half mile, raising their potential productivity over the course of the next year to one-third above normal.

    _Plant growth_ counters _diminish plants_.

    This spell has no effect on plant creatures.
- id: poison
  name: Poison
  level_druid: 3
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: Instantaneous; see text
  save: Fortitude negates; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: Calling upon the venomous powers of natural predators, you infect the subject with a horrible poison by making a successful melee touch attack. The poison deals 1d10 points of temporary Constitution damage immediately and another 1d10 points of temporary Constitution damage 1 minute later. Each instance of damage can be negated by a Fortitude save (DC 10 + 1/2 your caster level + your Wis modifier).
- id: prestidigitation
  name: Prestidigitation
  level_druid:
  level_cleric:
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Universal
  cast_time: 1 standard action
  range: 10 ft.
  target:
  duration: 1 hour
  save: See text
  spell_resistance: No
  components: V, S
  target_label:
  description: Prestidigitations are minor tricks that novice spellcasters use for practice. Once cast, a _prestidigitation_ spell enables you to perform simple magical effects for 1 hour. The effects are minor and have severe limitations. A prestidigitation can slowly lift 1 pound of material. It can color, clean, or soil items in a 1-foot cube each round. It can chill, warm, or flavor 1 pound of nonliving material. It cannot deal damage or affect the concentration of spellcasters. _Prestidigitation_ can create small objects, but they look crude and artificial. The materials created by a _prestidigitation_ spell are extremely fragile, and they cannot be used as tools, weapons, or spell components. Finally, a _prestidigitation_ lacks the power to duplicate any other spell effects. Any actual change to an object (beyond just moving, cleaning, or soiling it) persists only 1 hour.
- id: produce_flame
  name: Produce Flame
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: 0 ft.
  target: Flame in your palm
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    Flames as bright as a torch appear in your open hand. The flames harm neither you nor your equipment.

    In addition to providing illumination, the flames can be hurled or used to touch enemies. You can strike an opponent with a melee touch attack, dealing fire damage equal to 1d6 +1 point per caster level (maximum +5). Alternatively, you can hurl the flames up to 120 feet as a thrown weapon. When doing so, you attack with a ranged touch attack (with no range penalty) and deal the same damage as with the melee attack. No sooner do you hurl the flames than a new set appears in your hand. Each attack you make reduces the remaining duration by 1 minute. If an attack reduces the remaining duration to 0 minutes or less, the spell ends after the attack resolves.

    This spell does not function underwater.
- id: protection_energy
  name: Protection from Energy
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level or until discharged
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    _Protection from energy_ grants temporary immunity to the type of energy you specify when you cast it (acid, cold, electricity, fire, or sonic). When the spell absorbs 12 points per caster level of energy damage (to a maximum of 120 points at 10th level), it is discharged.

    _Note: Protection from energy_ overlaps (and does not stack with) _resist energy._ If a character is warded by _protection from energy_ and _resist energy,_ the _protection_ spell absorbs damage until its power is exhausted.
- id: purify_food_drink
  name: Purify Food and Drink
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: 10 ft.
  target: 1 cu. ft./level of contaminated food and water
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: |-
    This spell makes spoiled, rotten, poisonous, or otherwise contaminated food and water pure and suitable for eating and drinking. This spell does not prevent subsequent natural decay or spoilage. Unholy water and similar food and drink of significance is spoiled by _purify food and drink,_ but the spell has no effect on creatures of any type nor upon magic potions.

    _Note:_ Water weighs about 8 pounds per gallon. One cubic foot of water contains roughly 8 gallons and weighs about 60 pounds.
- id: read_magic
  name: Read Magic
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, F
  target_label: Target
  description: |-
    By means of _read magic,_ you can decipher magical inscriptions on objects—books, scrolls, weapons, and the like—that would otherwise be unintelligible. This deciphering does not normally invoke the magic contained in the writing, although it may do so in the case of a cursed scroll. Furthermore, once the spell is cast and you have read the magical inscription, you are thereafter able to read that particular writing without recourse to the use of _read magic._ You can read at the rate of one page (250 words) per minute. The spell allows you to identify a _glyph of warding_ with a DC 13 Spellcraft check, a _greater glyph of warding_ with a DC 16 Spellcraft check, or any _symbol_ spell with a Spellcraft check (DC 10 + spell level).

    _Read magic_ can be made permanent with a _permanency_ spell.

    _Focus:_ A clear crystal or mineral prism.
- id: reduce_animal
  name: Reduce Animal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One willing animal of Small, Medium, Large, or Huge size
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: This spell functions like _reduce person,_ except that it affects a single willing animal. Reduce the damage dealt by the animal’s natural attacks as appropriate for its new size.
- id: reincarnate
  name: Reincarnate
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 10 minutes
  range: Touch
  target: Dead creature touched
  duration: Instantaneous
  save: None; see text
  spell_resistance: Yes (harmless)
  components: V, S, M, DF
  target_label: Target
  description: |-
    With this spell, you bring back a dead creature in another body, provided that its death occurred no more than one week before the casting of the spell and the subject’s soul is free and willing to return. If the subject’s soul is not willing to return, the spell does not work; therefore, a subject that wants to return receives no saving throw.

    Since the dead creature is returning in a new body, all physical ills and afflictions are repaired. The condition of the remains is not a factor. So long as some small portion of the creature’s body still exists, it can be reincarnated, but the portion receiving the spell must have been part of the creature’s body at the time of death. The magic of the spell creates an entirely new young adult body for the soul to inhabit from the natural elements at hand. This process takes 1 hour to complete. When the body is ready, the subject is reincarnated.

    A reincarnated creature recalls the majority of its former life and form. It retains any class abilities, feats, or skill ranks it formerly possessed. Its class, base attack bonus, base save bonuses, and hit points are unchanged. Strength, Dexterity, and Constitution scores depend partly on the new body. First eliminate the subject’s racial adjustments (since it is no longer of his previous race) and then apply the adjustments found below to its remaining ability scores. The subject’s level (or Hit Dice) is reduced by 1. If the subject was 1st level, its new Constitution score is reduced by 2. (If this reduction would put its Con at 0 or lower, it can’t be reincarnated). This level/HD loss or Constitution loss cannot be repaired by any means.

    It’s possible for the change in the subject’s ability scores to make it difficult for it to pursue its previous character class. If this is the case, the subject is well advised to become a multiclass character.

    For a humanoid creature, the new incarnation is determined using the following table. For nonhumanoid creatures, a similar table of creatures of the same type should be created.

    A creature that has been turned into an undead creature or killed by a death effect can’t be returned to life by this spell. Constructs, elementals, outsiders, and undead creatures can’t be reincarnated. The spell cannot bring back a creature who has died of old age.

    d% — incarnation (Str / Dex / Con):
    - 01: Bugbear (+4 / +2 / +2)
    - 02–13: Dwarf (+0 / +0 / +2)
    - 14–25: Elf (+0 / +2 / –2)
    - 26: Gnoll (+4 / +0 / +2)
    - 27–38: Gnome (–2 / +0 / +2)
    - 39–42: Goblin (–2 / +2 / +0)
    - 43–52: Half-elf (+0 / +0 / +0)
    - 53–62: Half-orc (+2 / +0 / +0)
    - 63–74: Halfling (–2 / +2 / +0)
    - 75–89: Human (+0 / +0 / +0)
    - 90–93: Kobold (–4 / +2 / –2)
    - 94: Lizardfolk (+2 / +0 / +2)
    - 95–98: Orc (+4 / +0 / +0)
    - 99: Troglodyte (+0 / –2 / +4)
    - 100: Other (? / ? / ?)

    The reincarnated creature gains all abilities associated with its new form, including forms of movement and speeds, natural armor, natural attacks, extraordinary abilities, and the like, but it doesn’t automatically speak the language of the new form.

    A _wish_ or a _miracle_ spell can restore a reincarnated character to his or her original form.

    _Material Component:_ Rare oils and unguents worth a total of least 1,000 gp, spread over the remains.
- id: resist_energy
  name: Resist Energy
  level_druid: 2
  level_cleric: 2
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    This abjuration grants a creature limited protection from damage of whichever one of five energy types you select: acid, cold, electricity, fire, or sonic. The subject gains energy resistance 10 against the energy type chosen, meaning that each time the creature is subjected to such damage (whether from a natural or magical source), that damage is reduced by 10 points before being applied to the creature’s hit points. The value of the energy resistance granted increases to 20 points at 7th level and to a maximum of 30 points at 11th level. The spell protects the recipient’s equipment as well.

    _Resist energy_ absorbs only damage. The subject could still suffer unfortunate side effects.

    _Note: Resist energy_ overlaps (and does not stack with) _protection from energy._ If a character is warded by _protection from energy_ and _resist energy,_ the _protection_ spell absorbs damage until its power is exhausted.
- id: resistance
  name: Resistance
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 minute
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M/DF
  target_label: Target
  description: |-
    You imbue the subject with magical energy that protects it from harm, granting it a +1 resistance bonus on saves.

    _Resistance_ can be made permanent with a _permanency_ spell.

    _Arcane Material Component:_ A miniature cloak.
- id: shillelagh
  name: Shillelagh
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched nonmagical oak club or quarterstaff
  duration: 1 min./level
  self_duration: 1
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: Your own nonmagical club or quarterstaff becomes a weapon with a +1 enhancement bonus on attack and damage rolls. (A quarterstaff gains this enhancement for both ends of the weapon.) It deals damage as if it were two size categories larger (a Small club or quarterstaff so transmuted deals 1d8 points of damage, a Medium 2d6, and a Large 3d6), +1 for its enhancement bonus. These effects only occur when the weapon is wielded by you. If you do not wield it, the weapon behaves as if unaffected by this spell.
- id: sleet_storm
  name: Sleet Storm
  level_druid: 3
  level_cleric:
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Cold]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cylinder (40-ft. radius, 20 ft. high)
  duration: 1 round/level
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    Driving sleet blocks all sight (even darkvision) within it and causes the ground in the area to be icy. A creature can walk within or through the area of sleet at half normal speed with a DC 10 Balance check. Failure means it can’t move in that round, while failure by 5 or more means it falls (see the Balance skill for details).

    The sleet extinguishes torches and small fires.

    _Arcane Material Component:_ A pinch of dust and a few drops of water.
- id: soften_earth_stone
  name: Soften Earth and Stone
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 10-ft. square/level; see text
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Area
  description: |-
    When this spell is cast, all natural, undressed earth or stone in the spell’s area is softened. Wet earth becomes thick mud, dry earth becomes loose sand or dirt, and stone becomes soft clay that is easily molded or chopped. You affect a 10-footsquare area to a depth of 1 to 4 feet, depending on the toughness or resilience of the ground at that spot. Magical, enchanted, dressed, or worked stone cannot be affected. Earth or stone creatures are not affected.

    A creature in mud must succeed on a Reflex save or be caught for 1d2 rounds and unable to move, attack, or cast spells. A creature that succeeds on its save can move through the mud at half speed, and it can’t run or charge.

    Loose dirt is not as troublesome as mud, but all creatures in the area can move at only half their normal speed and can’t run or charge over the surface.

    Stone softened into clay does not hinder movement, but it does allow characters to cut, shape, or excavate areas they may not have been able to affect before.

    While _soften earth and stone_ does not affect dressed or worked stone, cavern ceilings or vertical surfaces such as cliff faces can be affected. Usually, this causes a moderate collapse or landslide as the loosened material peels away from the face of the wall or roof and falls.

    A moderate amount of structural damage can be dealt to a manufactured structure by softening the ground beneath it, causing it to settle. However, most well-built structures will only be damaged by this spell, not destroyed.
- id: speak_with_animals
  name: Speak with Animals
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: You can comprehend and communicate with animals. You are able to ask questions of and receive answers from animals, although the spell doesn’t make them any more friendly or cooperative than normal. Furthermore, wary and cunning animals are likely to be terse and evasive, while the more stupid ones make inane comments. If an animal is friendly toward you, it may do some favor or service for you.
- id: spider_climb
  name: Spider Climb
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    The subject can climb and travel on vertical surfaces or even traverse ceilings as well as a spider does. The affected creature must have its hands free to climb in this manner. The subject gains a climb speed of 20 feet; furthermore, it need not make Climb checks to traverse a vertical or horizontal surface (even upside down). A _spider climbing_ creature retains its Dexterity bonus to Armor Class (if any) while climbing, and opponents get no special bonus to their attacks against it. It cannot, however, use the run action while climbing.

    _Material Component:_ A drop of bitumen and a live spider, both of which must be eaten by the subject.
- id: spike_growth
  name: Spike Growth
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One 20-ft. square/level
  duration: 1 hour/level (D)
  save: Reflex partial
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    Any ground-covering vegetation in the spell’s area becomes very hard and sharply pointed without changing its appearance.

    In areas of bare earth, roots and rootlets act in the same way. Typically, _spike growth_ can be cast in any outdoor setting except open water, ice, heavy snow, sandy desert, or bare stone. Any creature moving on foot into or through the spell’s area takes 1d4 points of piercing damage for each 5 feet of movement through the spiked area.

    Any creature that takes damage from this spell must also succeed on a Reflex save or suffer injuries to its feet and legs that slow its land speed by one-half. This speed penalty lasts for 24 hours or until the injured creature receives a _cure_ spell (which also restores lost hit points). Another character can remove the penalty by taking 10 minutes to dress the injuries and succeeding on a Heal check against the spell’s save DC.

    _Spike growth_ can’t be disabled with the Disable Device skill.

    _Note:_ Magic traps such as _spike growth_ are hard to detect. A rogue (only) can use the Search skill to find a _spike growth_. The DC is 25 + spell level, or DC 28 for _spike growth_ (or DC 27 for _spike growth_ cast by a ranger).
- id: stone_shape
  name: Stone Shape
  level_druid: 3
  level_cleric: 3
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Touch
  target: Stone or stone object touched, up to 10 cu. ft. + 1 cu. ft./level
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Target
  description: |-
    You can form an existing piece of stone into any shape that suits your purpose. While it’s possible to make crude coffers, doors, and so forth with _stone shape,_ fine detail isn’t possible. There is a 30% chance that any shape including moving parts simply doesn’t work.

    _Arcane Material Component:_ Soft clay, which must be worked into roughly the desired shape of the stone object and then touched to the stone while the verbal component is uttered.
- id: summon_natures_ally_i
  name: Summon Nature's Ally I
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One summoned creature
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell summons a natural creature. It appears where you designate and acts immediately, on your turn. It attacks your opponents to the best of its ability. If you can communicate with the creature, you can direct it not to attack, to attack particular enemies, or to perform other actions.

    A summoned monster cannot summon or otherwise conjure another creature, nor can it use any teleportation or planar travel abilities. Creatures cannot be summoned into an environment that cannot support them.

    The spell conjures one of the creatures from the 1st-level list on the accompanying Summon Nature’s Ally table. You choose which kind of creature to summon, and you can change that choice each time you cast the spell. All the creatures on the table are neutral unless otherwise noted.
- id: summon_natures_ally_ii
  name: Summon Nature's Ally II
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: This spell functions like _summon nature’s ally I,_ except that you can summon one 2nd-level creature or 1d3 1st-level creatures of the same kind.
- id: summon_natures_ally_iii
  name: Summon Nature's Ally III
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 3rd-level creature, 1d3 2nd-level creatures of the same kind, or 1d4+1 1st-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: summon_swarm
  name: Summon Swarm
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One swarm of bats, rats, or spiders
  duration: Concentration + 2 rounds
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Effect
  description: |-
    You summon a swarm of bats, rats, or spiders (your choice), which attacks all other creatures within its area. (You may summon the swarm so that it shares the area of other creatures.) If no living creatures are within its area, the swarm attacks or pursues the nearest creature as best it can. The caster has no control over its target or direction of travel.

    _Arcane Material Component:_ A square of red cloth.
- id: tree_shape
  name: Tree Shape
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level (D)
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    By means of this spell, you are able to assume the form of a Large living tree or shrub or a Large dead tree trunk with a small number of limbs. The closest inspection cannot reveal that the tree in question is actually a magically concealed creature. To all normal tests you are, in fact, a tree or shrub, although a _detect magic_ spell reveals a faint transmutation on the tree. While in tree form, you can observe all that transpires around you just as if you were in your normal form, and your hit points and save bonuses remain unaffected. You gain a +10 natural armor bonus to AC but have an effective Dexterity score of 0 and a speed of 0 feet. You are immune to critical hits while in tree form. All clothing and gear carried or worn changes with you.

    You can dismiss _tree shape_ as a free action (instead of as a standard action).
- id: virtue
  name: Virtue
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min.
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: The subject gains 1 temporary hit point.
- id: warp_wood
  name: Warp Wood
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 1 Small wooden object/level, all within a 20-ft. radius
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: |-
    You cause wood to bend and warp, permanently destroying its straightness, form, and strength. A warped door springs open (or becomes stuck, requiring a Strength check to open, at your option). A boat or ship springs a leak. Warped ranged weapons are useless. A warped melee weapon causes a –4 penalty on attack rolls.

    You may warp one Small or smaller object or its equivalent per caster level. A Medium object counts as two Small objects, a Large object as four, a Huge object as eight, a Gargantuan object as sixteen, and a Colossal object as thirty-two.

    Alternatively, you can unwarp wood (effectively warping it back to normal) with this spell, straightening wood that has been warped by this spell or by other means. _Make whole_, on the other hand, does no good in repairing a warped item.

    You can combine multiple consecutive _warp wood_ spells to warp (or unwarp) an object that is too large for you to warp with a single spell.

    Until the object is completely warped, it suffers no ill effects.
- id: water_breathing
  name: Water Breathing
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Living creatures touched
  duration: 2 hours/level; see text
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creatures can breathe water freely. Divide the duration evenly among all the creatures you touch.

    The spell does not make creatures unable to breathe air.

    _Arcane Material Component:_ A short reed or piece of straw.
- id: wind_wall
  name: Wind Wall
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Evocation [Air]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Wall up to 10 ft./level long and 5 ft./level high (S)
  duration: 1 round/level
  save: None; see text
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    An invisible vertical curtain of wind appears. It is 2 feet thick and of considerable strength. It is a roaring blast sufficient to blow away any bird smaller than an eagle, or tear papers and similar materials from unsuspecting hands. (A Reflex save allows a creature to maintain its grasp on an object.) Tiny and Small flying creatures cannot pass through the barrier. Loose materials and cloth garments fly upward when caught in a _wind wall._ Arrows and bolts are deflected upward and miss, while any other normal ranged weapon passing through the wall has a 30% miss chance. (A giant-thrown boulder, a siege engine projectile, and other massive ranged weapons are not affected.) Gases, most gaseous breath weapons, and creatures in gaseous form cannot pass through the wall (although it is no barrier to incorporeal creatures).

    While the wall must be vertical, you can shape it in any continuous path along the ground that you like. It is possible to create cylindrical or square wind walls to enclose specific points.

    _Arcane Material Component:_ A tiny fan and a feather of exotic origin.
- id: wood_shape
  name: Wood Shape
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched piece of wood no larger than 10 cu. ft. + 1 cu. ft./level
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: _Wood shape_ enables you to form one existing piece of wood into any shape that suits your purpose. While it is possible to make crude coffers, doors, and so forth, fine detail isn’t possible. There is a 30% chance that any shape that includes moving parts simply doesn’t work.

- id: restoration_lesser
  name: Restoration, Lesser
  level_druid: 2
  level_cleric: 2
  level_wizard:
  level_ranger:
  level_paladin: 1
  school: Conjuration (Healing)
  cast_time: 3 rounds
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    _Lesser restoration_ dispels any magical effects reducing one of the subject’s ability scores or cures 1d4 points of temporary ability damage to one of the subject’s ability scores. It also eliminates any fatigue suffered by the character, and improves an exhausted condition to fatigued. It does not restore permanent ability drain.
- id: contagion
  name: Contagion
  level_druid: 3
  level_cleric: 3
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    The subject contracts a disease selected from the table below, which strikes immediately (no incubation period). The DC noted is for the subsequent saves (use _contagion_’s normal save DC for the initial saving throw).

    Disease — DC / ability damage on a failed save:
    - Blinding sickness: DC 16, 1d4 Str¹
    - Cackle fever: DC 16, 1d6 Wis
    - Filth fever: DC 12, 1d3 Dex and 1d3 Con
    - Mindfire: DC 12, 1d4 Int
    - Red ache: DC 15, 1d6 Str
    - Shakes: DC 13, 1d8 Dex
    - Slimy doom: DC 14, 1d4 Con

    ¹ Each time a victim takes 2 or more points of Strength damage from blinding sickness, he or she must make another Fortitude save (using the disease's save DC) or be permanently blinded.
- id: daylight
  name: Daylight
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin: 3
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: |-
    The object touched sheds light as bright as full daylight in a 60-foot radius, and dim light for an additional 60 feet beyond that. Creatures that take penalties in bright light also take them while within the radius of this magical light. Despite its name, this spell is not the equivalent of daylight for the purposes of creatures that are damaged or destroyed by bright light.

    If _daylight_ is cast on a small object that is then placed inside or under a light- proof covering, the spell’s effects are blocked until the covering is removed.

    _Daylight_ brought into an area of magical darkness (or vice versa) is temporarily negated, so that the otherwise prevailing light conditions exist in the overlapping areas of effect.

    _Daylight_ counters or dispels any darkness spell of equal or lower level, such as _darkness._
- id: diminish_plants
  name: Diminish Plants
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: See text
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label:
  description: |-
    This spell has two versions.

    _Prune Growth:_ This version causes normal vegetation within long range (400 feet + 40 feet per level) to shrink to about one-third of their normal size, becoming untangled and less bushy. The affected vegetation appears to have been carefully pruned and trimmed.

    At your option, the area can be a 100- foot-radius circle, a 150-foot-radius semicircle, or a 200-foot-radius quarter-circle.

    You may also designate portions of the area that are not affected.

    _Stunt Growth:_ This version targets normal plants within a range of 1/2 mile, reducing their potential productivity over the course of the following year to one third below normal.

    _Diminish plants_ counters _plant growth_.

    This spell has no effect on plant creatures.
- id: dominate_animal
  name: Dominate Animal
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One animal
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You can enchant an animal and direct it with simple commands such as “Attack,” “Run,” and “Fetch.” Suicidal or self-destructive commands (including an order to attack a creature two or more size categories larger than the _dominated_ animal) are simply ignored.

    _Dominate animal_ establishes a mental link between you and the subject creature. The animal can be directed by silent mental command as long as it remains in range. You need not see the creature to control it. You do not receive direct sensory input from the creature, but you know what it is experiencing. Because you are directing the animal with your own intelligence, it may be able to undertake actions normally beyond its own comprehension. You need not concentrate exclusively on controlling the creature unless you are trying to direct it to do something it normally couldn’t do. Changing your instructions or giving a _dominated_ creature a new command is the equivalent of redirecting a spell, so it is a move action.
- id: magic_fang_greater
  name: Magic Fang, Greater
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 hour/level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    This spell functions like _magic fang_, except that the enhancement bonus on attack and damage rolls is +1 per four caster levels (maximum +5).

    Alternatively, you may imbue all of the creature’s natural weapons with a +1 enhancement bonus (regardless of your caster level).

    _Greater magic fang_ can be made permanent with a _permanency_ spell.
- id: meld_into_stone
  name: Meld Into Stone
  level_druid: 3
  level_cleric: 3
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    _Meld into stone_ enables you to meld your body and possessions into a single block of stone. The stone must be large enough to accommodate your body in all three dimensions. When the casting is complete, you and not more than 100 pounds of nonliving gear merge with the stone. If either condition is violated, the spell fails and is wasted.

    While in the stone, you remain in contact, however tenuous, with the face of the stone through which you melded. You remain aware of the passage of time and can cast spells on yourself while hiding in the stone. Nothing that goes on outside the stone can be seen, but you can still hear what happens around you. Minor physical damage to the stone does not harm you, but its partial destruction (to the extent that you no longer fit within it) expels you and deals you 5d6 points of damage. The stone’s complete destruction expels you and slays you instantly unless you make a DC 18 Fortitude save.

    Any time before the duration expires, you can step out of the stone through the surface that you entered. If the spell’s duration expires or the effect is dispelled before you voluntarily exit the stone, you are violently expelled and take 5d6 points of damage.

    The following spells harm you if cast upon the stone that you are occupying: _Stone to flesh_ expels you and deals you 5d6 points of damage. _Stone shape_ deals you 3d6 points of damage but does not expel you. _Transmute rock to mud_ expels you and then slays you instantly unless you make a DC 18 Fortitude save, in which case you are merely expelled. Finally, _passwall_ expels you without damage.
- id: neutralize_poison
  name: Neutralize Poison
  level_druid: 3
  level_cleric: 4
  level_wizard:
  level_ranger: 3
  level_paladin: 4
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature or object of up to 1 cu. ft./level touched
  duration: 10 min./level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    You detoxify any sort of venom in the creature or object touched. A poisoned creature suffers no additional effects from the poison, and any temporary effects are ended, but the spell does not reverse instantaneous effects, such as hit point damage, temporary ability damage, or effects that don’t go away on their own.

    The creature is immune to any poison it is exposed to during the duration of the spell. Unlike with _delay poison_, such effects aren’t postponed until after the duration —the creature need not make any saves against poison effects applied to it during the length of the spell.

    This spell can instead neutralize the poison in a poisonous creature or object for the duration of the spell, at the caster’s option.

    _Arcane Material Component:_ A bit of charcoal.
- id: quench
  name: Quench
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target:
  duration: Instantaneous
  save: None or Will negates (object)
  spell_resistance: No or Yes (object)
  components: V, S, DF
  target_label:
  description: |-
    _Quench_ is often used to put out forest fires and other conflagrations. It extinguishes all nonmagical fires in its area. The spell also dispels any fire spells in its area, though you must succeed on a dispel check (1d20 +1 per caster level, maximum +15) against each spell to dispel it. The DC to dispel such spells is 11 + the caster level of the fire spell.

    Each elemental (fire) creature within the area of a _quench_ spell takes 1d6 points of damage per caster level (maximum 15d6, no save allowed).

    Alternatively, you can target the spell on a single magic item that creates or controls flame. The item loses all its fire-based magical abilities for 1d4 hours unless it succeeds on a Will save. (Artifacts are immune to this effect.)
- id: remove_disease
  name: Remove Disease
  level_druid: 3
  level_cleric: 3
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    _Remove disease_ cures all diseases that the subject is suffering from. The spell also kills parasites, including green slime and others. Certain special diseases may not be countered by this spell or may be countered only by a caster of a certain level or higher.

    _Note:_ Since the spell’s duration is instantaneous, it does not prevent reinfection after a new exposure to the same disease at a later date.
- id: snare
  name: Snare
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 2
  level_paladin:
  school: Transmutation
  cast_time: 3 rounds
  range: Touch
  target: Touched nonmagical circle of vine, rope, or thong with a 2 ft. diameter + 2 ft./level
  duration: Until triggered or broken
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    This spell enables you to make a snare that functions as a magic trap. The snare can be made from any supple vine, a thong, or a rope. When you cast _snare_ upon it, the cordlike object blends with its surroundings (Search DC 23 for a character with the trapfinding ability to locate). One end of the snare is tied in a loop that contracts around one or more of the limbs of any creature stepping inside the circle.

    If a strong and supple tree is nearby, the snare can be fastened to it. The spell causes the tree to bend and then straighten when the loop is triggered, dealing 1d6 points of damage to the creature trapped and lifting it off the ground by the trapped limb or limbs. If no such tree is available, the cordlike object tightens around the creature, dealing no damage but causing it to be entangled.

    The snare is magical. To escape, a trapped creature must make a DC 23 Escape Artist check or a DC 23 Strength check that is a full-round action. The snare has AC 7 and 5 hit points. A successful escape from the snare breaks the loop and ends the spell.
- id: speak_with_plants
  name: Speak with Plants
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 2
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: |-
    You can comprehend and communicate with plants, including both normal plants and plant creatures. You are able to ask questions of and receive answers from plants. A regular plant’s sense of its surroundings is limited, so it won’t be able to give (or recognize) detailed descriptions of creatures or answer questions about events outside its immediate vicinity.

    The spell doesn’t make plant creatures any more friendly or cooperative than normal. Furthermore, wary and cunning plant creatures are likely to be terse and evasive, while the more stupid ones may make inane comments. If a plant creature is friendly toward you, it may do some favor or service for you.
- id: air_walk
  name: Air Walk
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Air]
  cast_time: 1 standard action
  range: Touch
  target: Creature (Gargantuan or smaller) touched
  duration: 10 min./level
  save: None
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    The subject can tread on air as if walking on solid ground. Moving upward is similar to walking up a hill. The maximum upward or downward angle possible is 45 degrees, at a rate equal to one-half the air walker’s normal speed.

    A strong wind (21+ mph) can push the subject along or hold it back. At the end of its turn each round, the wind blows the air walker 5 feet for each 5 miles per hour of wind speed. The creature may be subject to additional penalties in exceptionally strong or turbulent winds, such as loss of control over movement or physical damage from being buffeted about.

    Should the spell duration expire while the subject is still aloft, the magic fails slowly. The subject floats downward 60 feet per round for 1d6 rounds. If it reaches the ground in that amount of time, it lands safely. If not, it falls the rest of the distance, taking 1d6 points of damage per 10 feet of fall. Since dispelling a spell effectively ends it, the subject also descends in this way if the _air walk_ spell is dispelled, but not if it is negated by an _antimagic field_.

    You can cast _air walk_ on a specially trained mount so it can be ridden through the air. You can train a mount to move with the aid of _air walk_ (counts as a trick; see Handle Animal skill) with one week of work and a DC 25 Handle Animal check.
- id: antiplant_shell
  name: Antiplant Shell
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius emanation, centered on you
  duration: 10 min./level (D)
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    The _antiplant shell_ spell creates an invisible, mobile barrier that keeps all creatures within the shell protected from attacks by plant creatures or animated plants. As with many abjuration spells, forcing the barrier against creatures that the spell keeps at bay strains and collapses the field.
- id: blight
  name: Blight
  level_druid: 4
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target:
  duration: Instantaneous
  save: Fortitude half; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label:
  description: |-
    This spell withers a single plant of any size. An affected plant creature takes 1d6 points of damage per level (maximum 15d6) and may attempt a Fortitude saving throw for half damage. A plant that isn’t a creature doesn’t receive a save and immediately withers and dies.

    This spell has no effect on the soil or surrounding plant life.
- id: command_plants
  name: Command Plants
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to 2 HD/level of plant creatures, no two of which can be more than 30 ft. apart
  duration: One day/level
  save: Will negates
  spell_resistance: Yes
  components: V
  target_label: Targets
  description: |-
    This spell allows you some degree of control over one or more plant creatures. Affected plant creatures can understand you, and they perceive your words and actions in the most favorable way (treat their attitude as friendly). They will not attack you while the spell lasts. You can try to give a subject orders, but you must win an opposed Charisma check to convince it to do anything it wouldn’t ordinarily do. (Retries are not allowed.) A commanded plant never obeys suicidal or obviously harmful orders, but it might be convinced that something very dangerous is worth doing.

    You can affect a number of plant creatures whose combined level or HD do not exceed twice your level.
- id: control_water
  name: Control Water
  level_druid: 4
  level_cleric: 4
  level_wizard: 6
  level_ranger:
  level_paladin:
  school: Transmutation [Water]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Water in a volume of 10 ft./level by 10 ft./level by 2 ft./level (S)
  duration: 10 min./level (D)
  save: None; see text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    Depending on the version you choose, the _control water_ spell raises or lowers water.

    _Lower Water:_ This causes water or similar liquid to reduce its depth by as much as 2 feet per caster level (to a minimum depth of 1 inch). The water is lowered within a squarish depression whose sides are up to caster level x 10 feet long. In extremely large and deep bodies of water, such as a deep ocean, the spell creates a whirlpool that sweeps ships and similar craft downward, putting them at risk and rendering them unable to leave by normal movement for the duration of the spell. When cast on water elementals and other water-based creatures, this spell acts as a _slow_ spell (Will negates). The spell has no effect on other creatures.

    _Raise Water:_ This causes water or similar liquid to rise in height, just as the _lower water_ version causes it to lower. Boats raised in this way slide down the sides of the hump that the spell creates. If the area affected by the spell includes riverbanks, a beach, or other land nearby, the water can spill over onto dry land.

    With either version, you may reduce one horizontal dimension by half and double the other horizontal dimension.

    _Arcane Material Component:_ A drop of water (for _raise water_) or a pinch of dust (for _lower water_).
- id: cure_serious_wounds
  name: Cure Serious Wounds
  level_druid: 4
  level_cleric: 3
  level_wizard:
  level_ranger: 4
  level_paladin: 4
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half (harmless); see text
  spell_resistance: Yes (harmless); see text
  components: V, S
  target_label: Target
  description: |-
    This spell functions like _cure light wounds_, except that it cures 3d8 points of damage +1 point per caster level (maximum +15).
- id: dispel_magic
  name: Dispel Magic
  level_druid: 4
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin: 3
  school: Abjuration
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S
  target_label:
  description: |-
    You can use _dispel magic_ to end ongoing spells that have been cast on a creature or object, to temporarily suppress the magical abilities of a magic item, to end ongoing spells (or at least their effects) within an area, or to counter another spellcaster’s spell. A dispelled spell ends as if its duration had expired. Some spells, as detailed in their descriptions, can’t be defeated by _dispel magic_. _Dispel magic_ can dispel (but not counter) spell-like effects just as it does spells.

    _Note:_ The effect of a spell with an instantaneous duration can’t be dispelled, because the magical effect is already over before the _dispel magic_ can take effect.

    You choose to use _dispel magic_ in one of three ways: a targeted dispel, an area dispel, or a counterspell:

    _Targeted Dispel:_ One object, creature, or spell is the target of the _dispel magic_ spell. You make a dispel check (1d20 + your caster level, maximum +10) against the spell or against each ongoing spell currently in effect on the object or creature. The DC for this dispel check is 11 + the spell’s caster level. If you succeed on a particular check, that spell is dispelled; if you fail, that spell remains in effect.

    If you target an object or creature that is the effect of an ongoing spell (such as a monster summoned by _monster summoning_), you make a dispel check to end the spell that conjured the object or creature.

    If the object that you target is a magic item, you make a dispel check against the item’s caster level. If you succeed, all the item’s magical properties are suppressed for 1d4 rounds, after which the item recovers on its own. A suppressed item becomes nonmagical for the duration of the effect. An interdimensional interface (such as a _bag of holding_) is temporarily closed. A magic item’s physical properties are unchanged: A suppressed magic sword is still a sword (a masterwork sword, in fact). Artifacts and deities are unaffected by mortal magic such as this.

    You automatically succeed on your dispel check against any spell that you cast yourself.

    _Area Dispel:_ When _dispel magic_ is used in this way, the spell affects everything within a 20-foot radius.

    For each creature within the area that is the subject of one or more spells, you make a dispel check against the spell with the highest caster level. If that check fails, you make dispel checks against progressively weaker spells until you dispel one spell (which discharges the _dispel magic_ spell so far as that target is concerned) or until you fail all your checks. The creature’s magic items are not affected.

    For each object within the area that is the target of one or more spells, you make dispel checks as with creatures. Magic items are not affected by an area dispel.

    For each ongoing area or effect spell whose point of origin is within the area of the _dispel magic_ spell, you can make a dispel check to dispel the spell.

    For each ongoing spell whose area overlaps that of the _dispel magic_ spell, you can make a dispel check to end the effect, but only within the overlapping area.

    If an object or creature that is the effect of an ongoing spell (such as a monster summoned by _monster summoning_) is in the area, you can make a dispel check to end the spell that conjured that object or creature (returning it whence it came) in addition to attempting to dispel spells targeting the creature or object.

    You may choose to automatically succeed on dispel checks against any spell that you have cast.

    _Counterspell:_ When _dispel magic_ is used in this way, the spell targets a spellcaster and is cast as a counterspell. Unlike a true counterspell, however, _dispel magic_ may not work; you must make a dispel check to counter the other spellcaster’s spell.
- id: giant_vermin
  name: Giant Vermin
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to three vermin, no two of which can be more than 30 ft. apart
  duration: 1 min./level
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Targets
  description: |-
    You turn three normal-sized centipedes, two normal-sized spiders, or a single normal-sized scorpion into larger forms. Only one type of vermin can be transmuted (so a single casting cannot affect both a centipede and a spider), and all must be grown to the same size. The size to which the vermin can be grown depends on your level; see the table below.

    Any giant vermin created by this spell do not attempt to harm you, but your control of such creatures is limited to simple commands (“Attack,” “Defend,” “Stop,” and so forth). Orders to attack a certain creature when it appears or guard against a particular occurrence are too complex for the vermin to understand. Unless commanded to do otherwise, the giant vermin attack whoever or whatever is near them.

    Vermin size by caster level:
    - 9th or lower: Medium
    - 10th–13th: Large
    - 14th–17th: Huge
    - 18th–19th: Gargantuan
    - 20th or higher: Colossal
- id: repel_vermin
  name: Repel Vermin
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius emanation centered on you
  duration: 10 min./level (D)
  save: None or Will negates; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    An invisible barrier holds back vermin. A vermin with Hit Dice of less than one-third your level cannot penetrate the barrier.

    A vermin with Hit Dice of one-third your level or more can penetrate the barrier if it succeeds on a Will save. Even so, crossing the barrier deals the vermin 2d6 points of damage, and pressing against the barrier causes pain, which deters most vermin.
- id: rusting_grasp
  name: Rusting Grasp
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One nonmagical ferrous object (or the volume of the object within 3 ft. of the touched point) or one ferrous creature
  duration: See text
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    Any iron or iron alloy item you touch becomes instantaneously rusted, pitted, and worthless, effectively destroyed. If the item is so large that it cannot fit within a 3-foot radius a 3-foot-radius volume of the metal is rusted and destroyed. Magic items made of metal are immune to this spell.

    You may employ _rusting grasp_ in combat with a successful melee touch attack. _Rusting grasp_ used in this way instantaneously destroys 1d6 points of Armor Class gained from metal armor (to the maximum amount of protection the armor offered) through corrosion.

    Weapons in use by an opponent targeted by the spell are more difficult to grasp. You must succeed on a melee touch attack against the weapon. A metal weapon that is hit is destroyed.

    _Note:_ Striking at an opponent’s weapon provokes an attack of opportunity. Also, you must touch the weapon and not the other way around.

    Against a ferrous creature, _rusting grasp_ instantaneously deals 3d6 points of damage +1 per caster level (maximum +15) per successful attack. The spell lasts for 1 round per level, and you can make one melee touch attack per round.
- id: scrying
  name: Scrying
  level_druid: 4
  level_cleric: 5
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Divination (Scrying)
  cast_time: 1 hour
  range: See text
  target: Magical sensor
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M/DF, F
  target_label: Effect
  description: |-
    You can see and hear some creature, which may be at any distance. If the subject succeeds on a Will save, the scrying attempt simply fails. The difficulty of the save depends on how well you know the subject and what sort of physical connection (if any) you have to that creature. Furthermore, if the subject is on another plane, it gets a +5 bonus on its Will save.

    Will save modifier by your knowledge of the subject:
    - None¹: +10
    - Secondhand (you have heard of the subject): +5
    - Firsthand (you have met the subject): +0
    - Familiar (you know the subject well): –5

    ¹ You must have some sort of connection to a creature you have no knowledge of.

    Will save modifier by your connection to the subject:
    - Likeness or picture: –2
    - Possession or garment: –4
    - Body part, lock of hair, bit of nail, etc.: –10

    If the save fails, you can see and hear the subject and the subject’s immediate surroundings (approximately 10 feet in all directions of the subject). If the subject moves, the sensor follows at a speed of up to 150 feet.

    As with all divination (scrying) spells, the sensor has your full visual acuity, including any magical effects. In addition, the following spells have a 5% chance per caster level of operating through the sensor: _detect chaos_, _detect evil_, _detect good_, _detect law_, _detect magic_, and _message_.

    If the save succeeds, you can’t attempt to scry on that subject again for at least 24 hours.

    _Arcane Material Component:_ The eye of a hawk, an eagle, or a roc, plus nitric acid, copper, and zinc.

    _Wizard, Sorcerer, or Bard Focus:_ A mirror of finely wrought and highly polished silver costing not less than 1,000 gp. The mirror must be at least 2 feet by 4 feet.

    _Cleric Focus:_ A holy water font costing not less than 100 gp.

    _Druid Focus:_ A natural pool of water.
- id: spike_stones
  name: Spike Stones
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One 20-ft. square/level
  duration: 1 hour/level (D)
  save: Reflex partial
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    Rocky ground, stone floors, and similar surfaces shape themselves into long, sharp points that blend into the background.

    _Spike stones_ impede progress through an area and deal damage. Any creature moving on foot into or through the spell’s area moves at half speed.

    In addition, each creature moving through the area takes 1d8 points of piercing damage for each 5 feet of movement through the spiked area.

    Any creature that takes damage from this spell must also succeed on a Reflex save to avoid injuries to its feet and legs. A failed save causes the creature’s speed to be reduced to half normal for 24 hours or until the injured creature receives a _cure_ spell (which also restores lost hit points). Another character can remove the penalty by taking 10 minutes to dress the injuries and succeeding on a Heal check against the spell’s save DC.

    _Spike stones_ is a magic trap that can’t be disabled with the Disable Device skill.

    _Note:_ Magic traps such as _spike stones_ are hard to detect. A rogue (only) can use the Search skill to find _spike stones_. The DC is 25 + spell level, or DC 29 for _spike stones_.
- id: summon_natures_ally_iv
  name: Summon Nature’s Ally IV
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger: 4
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 4th-level creature, 1d3 3rd-level creatures of the same kind, or 1d4+1 lower-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: atonement
  name: Atonement
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 hour
  range: Touch
  target: Living creature touched
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S, M, F, DF, XP
  target_label: Target
  description: |-
    This spell removes the burden of evil acts or misdeeds from the subject. The creature seeking atonement must be truly repentant and desirous of setting right its misdeeds. If the atoning creature committed the evil act unwittingly or under some form of compulsion, _atonement_ operates normally at no cost to you. However, in the case of a creature atoning for deliberate misdeeds and acts of a knowing and willful nature, you must intercede with your deity (requiring you to expend 500 XP) in order to expunge the subject’s burden. Many casters first assign a subject of this sort a quest (see _geas/quest_) or similar penance to determine whether the creature is truly contrite before casting the _atonement_ spell on its behalf.

    _Atonement_ may be cast for one of several purposes, depending on the version selected.

    _Reverse Magical Alignment Change:_ If a creature has had its alignment magically changed, _atonement_ returns its alignment to its original status at no cost in experience points.

    _Restore Class:_ A paladin who has lost her class features due to committing an evil act may have her paladinhood restored to her by this spell.

    _Restore Cleric or Druid Spell Powers:_ A cleric or druid who has lost the ability to cast spells by incurring the anger of his or her deity may regain that ability by seeking _atonement_ from another cleric of the same deity or another druid. If the transgression was intentional, the casting cleric loses 500 XP for his intercession. If the transgression was unintentional, he does not lose XP.

    _Redemption or Temptation:_ You may cast this spell upon a creature of an opposing alignment in order to offer it a chance to change its alignment to match yours. The prospective subject must be present for the entire casting process. Upon completion of the spell, the subject freely chooses whether it retains its original alignment or acquiesces to your offer and changes to your alignment. No duress, compulsion, or magical influence can force the subject to take advantage of the opportunity offered if it is unwilling to abandon its old alignment. This use of the spell does not work on outsiders or any creature incapable of changing its alignment naturally.

    Though the spell description refers to evil acts, _atonement_ can also be used on any creature that has performed acts against its alignment, whether those acts are evil, good, chaotic, or lawful.

    _Note:_ Normally, changing alignment is up to the player. This use of _atonement_ simply offers a believable way for a character to change his or her alignment drastically, suddenly, and definitively.

    _Material Component:_ Burning incense.

    _Focus:_ In addition to your holy symbol or normal divine focus, you need a set of prayer beads (or other prayer device, such as a prayer wheel or prayer book) worth at least 500 gp.

    _XP Cost:_ When cast for the benefit of a creature whose guilt was the result of deliberate acts, the cost to you is 500 XP per casting (see above).
- id: baleful_polymorph
  name: Baleful Polymorph
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature
  duration: Permanent
  save: Fortitude negates, Will partial; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    As _polymorph,_ except that you change the subject into a Small or smaller animal of no more than 1 HD. If the new form would prove fatal to the creature the subject gets a +4 bonus on the save.

    If the spell succeeds, the subject must also make a Will save. If this second save fails, the creature loses its extraordinary, supernatural, and spell-like abilities, loses its ability to cast spells (if it had the ability), and gains the alignment, special abilities, and Intelligence, Wisdom, and Charisma scores of its new form in place of its own. It still retains its class and level (or HD), as well as all benefits deriving therefrom (such as base attack bonus, base save bonuses, and hit points). It retains any class features (other than spellcasting) that aren’t extraordinary, supernatural, or spell-like abilities.

    Incorporeal or gaseous creatures are immune to being _polymorphed_, and a creature with the shapechanger subtype can revert to its natural form as a standard action.
- id: call_lightning_storm
  name: Call Lightning Storm
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Electricity]
  cast_time: 1 round
  range: Long (400 ft. + 40 ft./level)
  target: One or more 30-ft.-long vertical lines of lightning
  duration: 1 min./level
  save: Reflex half
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    This spell functions like _call lightning_, except that each bolt deals 5d6 points of electricity damage (or 5d10 if created outdoors in a stormy area), and you may call a maximum of 15 bolts.
- id: control_winds
  name: Control Winds
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Air]
  cast_time: 1 standard action
  range: 40 ft./level
  target: 40 ft./level radius cylinder 40 ft. high
  duration: 10 min./level
  save: Fortitude negates
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You alter wind force in the area surrounding you. You can make the wind blow in a certain direction or manner, increase its strength, or decrease its strength. The new wind direction and strength persist until the spell ends or until you choose to alter your handiwork, which requires concentration. You may create an “eye” of calm air up to 80 feet in diameter at the center of the area if you so desire, and you may choose to limit the area to any cylindrical area less than your full limit.

    _Wind Direction:_ You may choose one of four basic wind patterns to function over the spell’s area.

    - A downdraft blows from the center outward in equal strength in all directions.
    - An updraft blows from the outer edges in toward the center in equal strength from all directions, veering upward before impinging on the eye in the center.
    - A rotation causes the winds to circle the center in clockwise or counterclockwise fashion.
    - A blast simply causes the winds to blow in one direction across the entire area from one side to the other.

    _Wind Strength:_ For every three caster levels, you can increase or decrease wind strength by one level. Each round on your turn, a creature in the wind must make a Fortitude save or suffer the effect of being in the windy area.

    Strong winds (21+ mph) make sailing difficult.

    A severe wind (31+ mph) causes minor ship and building damage.

    A windstorm (51+ mph) drives most flying creatures from the skies, uproots small trees, knocks down light wooden structures, tears off roofs, and endangers ships.

    Hurricane force winds (75+ mph) destroy wooden buildings, sometimes uproot even large trees, and cause most ships to founder.

    A tornado (175+ mph) destroys all nonfortified buildings and often uproots large trees.
- id: death_ward
  name: Death Ward
  level_druid: 5
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin: 4
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    The subject is immune to all death spells, magical death effects, energy drain, and any negative energy effects.

    This spell doesn’t remove negative levels that the subject has already gained, nor does it affect the saving throw necessary 24 hours after gaining a negative level.

    _Death ward_ does not protect against other sorts of attacks even if those attacks might be lethal.
- id: hallow
  name: Hallow
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Good]
  cast_time: 24 hours
  range: Touch
  target: 40-ft. radius emanating from the touched point
  duration: Instantaneous
  save: See text
  spell_resistance: See text
  components: V, S, M, DF
  target_label: Area
  description: |-
    _Hallow_ makes a particular site, building, or structure a holy site. This has four major effects.

    First, the site or structure is guarded by a _magic circle against evil_ effect.

    Second, all Charisma checks made to turn undead gain a +4 sacred bonus, and Charisma checks to command undead take a –4 penalty. Spell resistance does not apply to this effect. (This provision does not apply to the druid version of the spell.)

    Third, any dead body interred in a _hallowed_ site cannot be turned into an undead creature.

    Finally, you may choose to fix a single spell effect to the _hallowed_ site. The spell effect lasts for one year and functions throughout the entire site, regardless of the normal duration and area or effect. You may designate whether the effect applies to all creatures, creatures who share your faith or alignment, or creatures who adhere to another faith or alignment. At the end of the year, the chosen effect lapses, but it can be renewed or replaced simply by casting _hallow_ again.

    Spell effects that may be tied to a _hallowed_ site include _aid, bane, bless, cause fear, darkness, daylight, death ward, deeper darkness, detect evil, detect magic, dimensional anchor, discern lies, dispel magic, endure elements, freedom of movement, invisibility purge, protection from energy, remove fear, resist energy, silence, tongues,_ and _zone of truth_. Saving throws and spell resistance might apply to these spells’ effects. (See the individual spell descriptions for details.)

    An area can receive only one _hallow_ spell (and its associated spell effect) at a time. _Hallow_ counters but does not dispel _unhallow_.

    _Material Component:_ Herbs, oils, and incense worth at least 1,000 gp, plus 1,000 gp per level of the spell to be included in the _hallowed_ area.
- id: insect_plague
  name: Insect Plague
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Long (400 ft. + 40 ft./level)
  target: One swarm of locusts per three levels, each of which must be adjacent to at least one other swarm
  duration: 1 min./level
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    You summon a number of swarms of locusts (one per three levels, to a maximum of six swarms at 18th level). The swarms must be summoned so that each one is adjacent to at least one other swarm (that is, the swarms must fill one contiguous area). You may summon the locust swarms so that they share the area of other creatures. Each swarm attacks any creatures occupying its area. The swarms are stationary after being summoned, and won’t pursue creatures that flee.
- id: stoneskin
  name: Stoneskin
  level_druid: 5
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level or until discharged
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    The warded creature gains resistance to blows, cuts, stabs, and slashes. The subject gains damage reduction 10/adamantine. (It ignores the first 10 points of damage each time it takes damage from a weapon, though an adamantine weapon bypasses the reduction.) Once the spell has prevented a total of 10 points of damage per caster level (maximum 150 points), it is discharged.

    _Material Component:_ Granite and 250 gp worth of diamond dust sprinkled on the target’s skin.
- id: summon_natures_ally_v
  name: Summon Nature’s Ally V
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 5th-level creature, 1d3 4th-level creatures of the same kind, or 1d4+1 lower-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: transmute_mud_to_rock
  name: Transmute Mud to Rock
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to two 10-ft. cubes/level (S)
  duration: Permanent
  save: See text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    This spell transforms normal mud or quicksand of any depth into soft stone (sandstone or a similar mineral) permanently.

    Any creature in the mud is allowed a Reflex save to escape before the area is hardened to stone.

    _Transmute mud to rock_ counters and dispels _transmute rock to mud_.

    _Arcane Material Component:_ Sand, lime, and water.
- id: transmute_rock_to_mud
  name: Transmute Rock to Mud
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to two 10-ft. cubes/level (S)
  duration: Permanent; see text
  save: See text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    This spell turns natural, uncut or unworked rock of any sort into an equal volume of mud. Magical stone is not affected by the spell. The depth of the mud created cannot exceed 10 feet. A creature unable to levitate, fly, or otherwise free itself from the mud sinks until hip- or chest-deep, reducing its speed to 5 feet and causing a –2 penalty on attack rolls and AC. Brush thrown atop the mud can support creatures able to climb on top of it. Creatures large enough to walk on the bottom can wade through the area at a speed of 5 feet.

    If _transmute rock to mud_ is cast upon the ceiling of a cavern or tunnel, the mud falls to the floor and spreads out in a pool at a depth of 5 feet. The falling mud and the ensuing cave-in deal 8d6 points of bludgeoning damage to anyone caught directly beneath the area, or half damage to those who succeed on Reflex saves.

    Castles and large stone buildings are generally immune to the effect of the spell, since _transmute rock to mud_ can’t affect worked stone and doesn’t reach deep enough to undermine such buildings’ foundations. However, small buildings or structures often rest upon foundations shallow enough to be damaged or even partially toppled by this spell.

    The mud remains until a successful _dispel magic_ or _transmute mud to rock_ spell restores its substance—but not necessarily its form. Evaporation turns the mud to normal dirt over a period of days. The exact time depends on exposure to the sun, wind, and normal drainage.

    _Arcane Material Component:_ Clay and water.
- id: tree_stride
  name: Tree Stride
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger: 4
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level or until expended; see text
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    You gain the ability to enter trees and move from inside one tree to inside another tree. The first tree you enter and all others you enter must be of the same kind, must be living, and must have girth at least equal to yours. By moving into an oak tree (for example), you instantly know the location of all other oak trees within transport range (see below) and may choose whether you want to pass into one or simply step back out of the tree you moved into. You may choose to pass to any tree of the appropriate kind within the transport range as shown on the following table.

    Transport range by type of tree:
    - Oak, ash, yew: 3,000 feet
    - Elm, linden: 2,000 feet
    - Other deciduous: 1,500 feet
    - Any coniferous: 1,000 feet
    - All other trees: 500 feet

    You may move into a tree up to one time per caster level (passing from one tree to another counts only as moving into one tree). The spell lasts until the duration expires or you exit a tree. Each transport is a full-round action.

    You can, at your option, remain within a tree without transporting yourself, but you are forced out when the spell ends. If the tree in which you are concealed is chopped down or burned, you are slain if you do not exit before the process is complete.
- id: unhallow
  name: Unhallow
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Evil]
  cast_time: 24 hours
  range: Touch
  target: 40-ft. radius emanating from the touched point
  duration: Instantaneous
  save: See text
  spell_resistance: See text
  components: V, S, M
  target_label: Area
  description: |-
    _Unhallow_ makes a particular site, building, or structure an unholy site. This has three major effects.

    First, the site or structure is guarded by a _magic circle against good_ effect.

    Second, all turning checks made to turn undead take a –4 penalty, and turning checks to rebuke undead gain a +4 profane bonus. Spell resistance does not apply to this effect. (This provision does not apply to the druid version of the spell.)

    Finally, you may choose to fix a single spell effect to the _unhallowed_ site. The spell effect lasts for one year and functions throughout the entire site, regardless of its normal duration and area or effect. You may designate whether the effect applies to all creatures, creatures that share your faith or alignment, or creatures that adhere to another faith or alignment. At the end of the year, the chosen effect lapses, but it can be renewed or replaced simply by casting _unhallow_ again.

    Spell effects that may be tied to an _unhallowed_ site include _aid, bane, bless, cause fear, darkness, daylight, death ward, deeper darkness, detect magic, detect good, dimensional anchor, discern lies, dispel magic, endure elements, freedom of movement, invisibility purge, protection from energy, remove fear, resist energy, silence, tongues,_ and _zone of truth_.

    Saving throws and spell resistance might apply to these spells’ effects. (See the individual spell descriptions for details.)

    An area can receive only one _unhallow_ spell (and its associated spell effect) at a time.

    _Unhallow_ counters but does not dispel _hallow_.

    _Material Component:_ Herbs, oils, and incense worth at least 1,000 gp, plus 1,000 gp per level of the spell to be tied to the _unhallowed_ area.
- id: wall_of_fire
  name: Wall of Fire
  level_druid: 5
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Opaque sheet of flame up to 20 ft. long/level or a ring of fire with a radius of up to 5 ft. per two levels; either form 20 ft. high
  duration: Concentration + 1 round/level
  save: None
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    An immobile, blazing curtain of shimmering violet fire springs into existence. One side of the wall, selected by you, sends forth waves of heat, dealing 2d4 points of fire damage to creatures within 10 feet and 1d4 points of fire damage to those past 10 feet but within 20 feet. The wall deals this damage when it appears and on your turn each round to all creatures in the area. In addition, the wall deals 2d6 points of fire damage +1 point of fire damage per caster level (maximum +20) to any creature passing through it. The wall deals double damage to undead creatures.

    If you evoke the wall so that it appears where creatures are, each creature takes damage as if passing through the wall. If any 5-foot length of wall takes 20 points of cold damage or more in 1 round, that length goes out. (Do not divide cold damage by 4, as normal for objects.)

    _Wall of fire_ can be made permanent with a _permanency_ spell. A permanent _wall of fire_ that is extinguished by cold damage becomes inactive for 10 minutes, then reforms at normal strength.

    _Arcane Material Component:_ A small piece of phosphorus.
- id: wall_of_thorns
  name: Wall of Thorns
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Wall of thorny brush, up to one 10-ft. cube/level (S)
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A _wall of thorns_ spell creates a barrier of very tough, pliable, tangled brush bearing needle-sharp thorns as long as a human’s finger. Any creature forced into or attempting to move through a _wall of thorns_ takes slashing damage per round of movement equal to 25 minus the creature’s AC. Dexterity and dodge bonuses to AC do not count for this calculation. (Creatures with an Armor Class of 25 or higher, without considering Dexterity and dodge bonuses, take no damage from contact with the wall.)

    You can make the wall as thin as 5 feet thick, which allows you to shape the wall as a number of 10-by-10-by-5-foot blocks equal to twice your caster level. This has no effect on the damage dealt by the thorns, but any creature attempting to break through takes that much less time to force its way through the barrier.

    Creatures can force their way slowly through the wall by making a Strength check as a full-round action. For every 5 points by which the check exceeds 20, a creature moves 5 feet (up to a maximum distance equal to its normal land speed). Of course, moving or attempting to move through the thorns incurs damage as described above. A creature trapped in the thorns can choose to remain motionless in order to avoid taking any more damage.

    Any creature within the area of the spell when it is cast takes damage as if it had moved into the wall and is caught inside. In order to escape, it must attempt to push its way free, or it can wait until the spell ends. Creatures with the ability to pass through overgrown areas unhindered can pass through a _wall of thorns_ at normal speed without taking damage.

    A _wall of thorns_ can be breached by slow work with edged weapons. Chopping away at the wall creates a safe passage 1 foot deep for every 10 minutes of work. Normal fire cannot harm the barrier, but magical fire burns it away in 10 minutes.

    Despite its appearance, a _wall of thorns_ is not actually a living plant, and thus is unaffected by spells that affect plants.
