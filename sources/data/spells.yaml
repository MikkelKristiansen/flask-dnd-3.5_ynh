- id: detect_evil
  name: Detect Evil
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can sense the presence of evil. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of evil.

    _2nd Round:_ Number of evil auras (creatures, objects, or spells) in the area and the power of the most potent evil aura.

    _3rd Round:_ The strength and location of each aura. If an aura is outside your line of sight, then you discern its direction but not its exact location.

    The aura power of a creature depends on its type and Hit Dice; that of an undead or evil outsider can be overwhelming. If you are of good alignment and the strongest evil aura's power is overwhelming, and the HD or level of the aura's source is at least twice your character level, you are stunned for 1 round and the spell ends.

    Each round, you can turn to detect evil in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
