- id: sanctuary
  name: Sanctuary
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 round/level
  save: Will negates; see text
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    Any opponent attempting to strike or otherwise directly attack the warded creature, even with a targeted spell, must attempt a Will save. If the save succeeds, the opponent can attack normally and is unaffected by that casting of the spell. If the save fails, the opponent can't follow through with the attack, that part of its action is lost, and it can't directly attack the warded creature for the duration of the spell. Those not attempting to attack the subject remain unaffected.

    This spell does not prevent the warded creature from being attacked or affected by area or effect spells. The subject cannot attack without breaking the protection but may use nonattack spells or otherwise act. The warded creature can attack with impunity and still be protected from harm as long as it adheres to these restrictions.
