- id: detect_undead
  name: Detect Undead
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    You can detect the aura that surrounds undead creatures. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of undead.

    _2nd Round:_ Number of undead auras in the area and the strength of the strongest undead aura present.

    _3rd Round:_ The strength and location of each undead aura. If an aura is outside your line of sight, then you discern its direction but not its exact location.

    Each round, you can turn to detect undead in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: divine_favor
  name: Divine Favor
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin: 1
  school: Evocation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 minute
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: Calling upon the strength and wisdom of a deity, you gain a +1 
    luck bonus on attack and weapon damage rolls for every three caster levels 
    you have (at least +1, to a maximum of +3). The bonus doesn't apply to spell
    damage.
- id: doom
  name: Doom
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy [Fear, Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: This spell fills a single subject with a feeling of doom. An 
    affected creature takes a -2 penalty on attack rolls, saving throws, ability
    checks, skill checks, and weapon damage rolls. A _doomed_ creature remains 
    so for the duration of the spell or until the curse is removed.
- id: entropic_shield
  name: Entropic Shield
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: A magical field appears around you, glowing with a chaotic blast 
    of multicolored hues. This field deflects incoming arrows, rays, and other 
    ranged attacks. Each ranged attack directed at you for which the attacker 
    must make an attack roll has a 20% miss chance (similar to the effects of 
    concealment). Other attacks that simply work at a distance are not affected.
- id: hide_from_undead
  name: Hide from Undead
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One touched creature/level
  duration: 10 min./level (D)
  save: Will negates (harmless); see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: Undead cannot see, hear, or smell the warded creatures. Even 
    extraordinary or supernatural sensory capabilities, such as blindsight, 
    blindsense, scent, and tremorsense, cannot detect or locate warded 
    creatures. Nonintelligent undead creatures are automatically affected and 
    act as though the warded creatures are not present. An intelligent undead 
    creature gets a single Will saving throw. If it fails, the subject can't see
    any of the warded creatures. However, if it has reason to believe unseen 
    opponents are present, it can attempt to find or strike them. If a warded 
    creature attempts to turn or command undead, touches an undead creature, or 
    attacks any creature (even with a spell), the spell ends for all recipients.
- id: inflict_light_wounds
  name: Inflict Light Wounds
  level_druid:
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    When laying your hand upon a creature, you channel negative energy that deals 1d8 points of damage +1 point per caster level (maximum +5).

    Since undead are powered by negative energy, this spell cures such a creature of a like amount of damage, rather than harming it.
- id: magic_weapon
  name: Magic Weapon
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Weapon touched
  duration: 1 min./level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, DF
  target_label: Target
  description: |-
    You give a weapon a +1 enhancement bonus on attack and damage rolls. An enhancement bonus does not stack with a masterwork weapon's +1 bonus on attack rolls.

    You can't cast this spell on a natural weapon, such as an unarmed strike. A monk's unarmed strike is considered a weapon, and thus it can be enhanced by this spell.
- id: protection_chaos
  name: Protection from Chaos
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Abjuration [Lawful]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: This spell functions like _protection from evil_, except that the
    deflection and resistance bonuses apply to attacks from chaotic creatures, 
    and the warding blocks mental control and summoned chaotic creatures.
- id: protection_evil
  name: Protection from Evil
  level_druid:
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin: 1
  school: Abjuration [Good]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell wards a creature from attacks by evil creatures, from mental control, and from summoned creatures. It creates a magical barrier around the subject at a distance of 1 foot. The barrier moves with the subject and has three major effects.

    First, the subject gains a +2 deflection bonus to AC and a +2 resistance bonus on saves. Both of these bonuses apply against attacks made or effects created by evil creatures.

    Second, the barrier blocks any attempt to possess the warded creature (by a _magic jar_ attack, for example) or to exercise mental control over it (including enchantment (charm) effects and enchantment (compulsion) effects). The protection does not prevent such effects from targeting the protected creature, but it suppresses the effect for the duration of the protection from evil effect.

    Third, the spell prevents bodily contact by summoned creatures. This causes the natural weapon attacks of such creatures to fail and the creatures to recoil if such attacks require touching the warded creature. Good summoned creatures are immune to this effect.
- id: protection_good
  name: Protection from Good
  level_druid:
