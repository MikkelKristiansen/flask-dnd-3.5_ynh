- id: dancing_lights
  name: Dancing Lights
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to four lights, all within a 10- ft.-radius area
  duration: 1 minute (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    Depending on the version selected, you create up to four lights that resemble lanterns or torches (and cast that amount of light), or up to four glowing spheres of light (which look like will-o’-wisps), or one faintly glowing, vaguely humanoid shape. The _dancing lights_ must stay within a 10-foot-radius area in relation to each other but otherwise move as you desire (no concentration required): forward or back, up or down, straight or turning corners, or the like. The lights can move up to 100 feet per round. A light winks out if the distance between you and it exceeds the spell’s range.

    _Dancing lights_ can be made permanent with a _permanency_ spell.
- id: delay_poison
  name: Delay Poison
  level_druid: 2
  level_cleric: 2
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 hour/level
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: The subject becomes temporarily immune to poison. Any poison in 
    its system or any poison to which it is exposed during the spell’s duration 
    does not affect the subject until the spell’s duration has expired. _Delay 
    poison_ does not cure any damage that poison may have already done.
  level_bard: 2
- id: detect_animals_plants
  name: Detect Animals or Plants
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can detect a particular kind of animal or plant in a cone emanating out from you in whatever direction you face. You must think of a kind of animal or plant when using the spell, but you can change the animal or plant kind each round. The amount of information revealed depends on how long you search a particular area or focus on a specific kind of animal or plant.

    _1st Round:_ Presence or absence of that kind of animal or plant in the area.

    _2nd Round:_ Number of individuals of the specified kind in the area, and the condition of the healthiest specimen.

    _3rd Round:_ The condition (see below) and location of each individual present. If an animal or plant is outside your line of sight, then you discern its direction but not its exact location.

    _Conditions:_ For purposes of this spell, the categories of condition are as follows:

    Normal: Has at least 90% of full normal hit points, free of disease.

    Fair: 30% to 90% of full normal hit points remaining.

    Poor: Less than 30% of full normal hit points remaining, afflicted with a disease, or suffering from a debilitating injury.

    Weak: 0 or fewer hit points remaining, afflicted with a disease in the terminal stage, or crippled.

    If a creature falls into more than one category, the spell indicates the weaker of the two.

    Each round you can turn to detect a kind of animal or plant in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: detect_magic
  name: Detect Magic
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You detect magical auras. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of magical auras.

    _2nd Round:_ Number of different magical auras and the power of the most potent aura.

    _3rd Round:_ The strength and location of each aura. If the items or creatures bearing the auras are in line of sight, you can make Spellcraft skill checks to determine the school of magic involved in each. (Make one check per aura; DC 15 + spell level, or 15 + half caster level for a nonspell effect.)

    Magical areas, multiple types of magic, or strong local magical emanations may distort or conceal weaker auras.

    _Aura Strength:_ An aura’s power depends on a spell’s functioning spell level or an item’s caster level. If an aura falls into more than one category, _detect magic_ indicates the stronger of the two.

    Aura Power — Faint / Moderate / Strong / Overwhelming:
    - Functioning spell (spell level): 3rd or lower / 4th–6th / 7th–9th / 10th+ (deity-level)
    - Magic item (caster level): 5th or lower / 6th–11th / 12th–20th / 21st+ (artifact)

    _Lingering Aura:_ A magical aura lingers after its original source dissipates (in the case of a spell) or is destroyed (in the case of a magic item). If _detect magic_ is cast and directed at such a location, the spell indicates an aura strength of dim (even weaker than a faint aura). How long the aura lingers at this dim level depends on its original power:

    Lingering aura duration by original strength:
    - Faint: 1d6 rounds
    - Moderate: 1d6 minutes
    - Strong: 1d6×10 minutes
    - Overwhelming: 1d6 days

    Outsiders and elementals are not magical in themselves, but if they are summoned, the conjuration spell registers.

    Each round, you can turn to detect magic in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.

    _Detect magic_ can be made permanent with a _permanency_ spell.
- id: detect_poison
  name: Detect Poison
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S
  target_label:
  description: |-
    You determine whether a creature, object, or area has been poisoned or is poisonous. You can determine the exact type of poison with a DC 20 Wisdom check. A character with the Craft (alchemy) skill may try a DC 20 Craft (alchemy) check if the Wisdom check fails, or may try the Craft (alchemy) check prior to the Wisdom check.

    The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: detect_snares_pits
  name: Detect Snares and Pits
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can detect simple pits, deadfalls, and snares as well as mechanical traps constructed of natural materials. The spell does not detect complex traps, including trapdoor traps.

    _Detect snares and pits_ does detect certain natural hazards—quicksand (a snare), a sinkhole (a pit), or unsafe walls of natural rock (a deadfall). However, it does not reveal other potentially dangerous conditions. The spell does not detect magic traps (except those that operate by pit, deadfall, or snaring; see the spell _snare_), nor mechanically complex ones, nor those that have been rendered safe or inactive.

    The amount of information revealed depends on how long you study a particular area.

    _1st Round:_ Presence or absence of hazards.

    _2nd Round:_ Number of hazards and the location of each. If a hazard is outside your line of sight, then you discern its direction but not its exact location.

    _Each Additional Round:_ The general type and trigger for one particular hazard closely examined by you.

    Each round, you can turn to detect snares and pits in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: endure_elements
  name: Endure Elements
  level_druid: 1
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 24 hours
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    A creature protected by _endure elements_ suffers no harm from being in a hot or cold environment. It can exist comfortably in conditions between –50 and 140 degrees Fahrenheit without having to make Fortitude saves). The creature’s equipment is likewise protected.

    _Endure elements_ doesn’t provide any protection from fire or cold damage, nor does it protect against other environmental hazards such as smoke, lack of air, and so forth.
- id: entangle
  name: Entangle
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Plants in a 40-ft.-radius spread
  duration: 1 min./level (D)
  save: Reflex partial; see text
  spell_resistance: No
  components: V, S, DF
  target_label: Area
  description: |-
    Grasses, weeds, bushes, and even trees wrap, twist, and entwine about creatures in the area or those that enter the area, holding them fast and causing them to become entangled. The creature can break free and move half its normal speed by using a full-round action to make a DC 20 Strength check or a DC 20 Escape Artist check. A creature that succeeds on a Reflex save is not entangled but can still move at only half speed through the area. Each round on your turn, the plants once again attempt to entangle all creatures that have avoided or escaped entanglement.

    _Note:_ The effects of the spell may be altered somewhat, based on the nature of the entangling plants.
- id: faerie_fire
  name: Faerie Fire
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Creatures and objects within a 5-ft.-radius burst
  duration: 1 min./level (D)
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: A pale glow surrounds and outlines the subjects. Outlined 
    subjects shed light as candles. Outlined creatures do not benefit from the 
    concealment normally provided by darkness (though a 2nd-level or higher 
    magical _darkness_ effect functions normally), _blur_, displacement, 
    invisibility, or similar effects. The light is too dim to have any special 
    effect on undead or dark-dwelling creatures vulnerable to light. The _faerie
    fire_ can be blue, green, or violet, according to your choice at the time of
    casting. The _faerie fire_ does not cause any harm to the objects or 
    creatures thus outlined.
- id: fire_trap
  name: Fire Trap
  level_druid: 2
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Abjuration [Fire]
  cast_time: 10 minutes
  range: Touch
  target: Object touched
  duration: Permanent until discharged (D)
  save: Reflex half; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    _Fire trap_ creates a fiery explosion when an intruder opens the item that the trap protects. A _fire trap_ can ward any object that can be opened and closed.

    When casting _fire trap,_ you select a point on the object as the spell’s center. When someone other than you opens the object, a fiery explosion fills the area within a 5-foot radius around the spell’s center. The flames deal 1d4 points of fire damage +1 point per caster level (maximum +20). The item protected by the trap is not harmed by this explosion.

    A _fire trapped_ item cannot have a second closure or warding spell placed on it.

    A _knock_ spell does not bypass a _fire trap_. An unsuccessful _dispel magic_ spell does not detonate the spell.

    Underwater, this ward deals half damage and creates a large cloud of steam.

    You can use the _fire trapped_ object without discharging it, as can any individual to whom the object was specifically attuned when cast. Attuning a _fire trapped_ object to an individual usually involves setting a password that you can share with friends.

    _Note:_ Magic traps such as _fire trap_ are hard to detect and disable. A rogue (only) can use the Search skill to find a _fire trap_ and Disable Device to thwart it. The DC in each case is 25 + spell level (DC 27 for a druid’s _fire trap_ or DC 29 for the arcane version).

    _Material Component:_ A half-pound of gold dust (cost 25 gp) sprinkled on the warded object.
- id: flame_blade
  name: Flame Blade
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: 0 ft.
  target: Sword-like beam
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Effect
  description: |-
    A 3-foot-long, blazing beam of red-hot fire springs forth from your hand. You wield this bladelike beam as if it were a scimitar. Attacks with the _flame blade_ are melee touch attacks. The blade deals 1d8 points of fire damage +1 point per two caster levels (maximum +10). Since the blade is immaterial, your Strength modifier does not apply to the damage. A _flame blade_ can ignite combustible materials such as parchment, straw, dry sticks, and cloth.

    The spell does not function underwater.
- id: flame_strike
  name: Flame Strike
  level_druid: 4
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Cylinder (10-ft. radius, 40 ft. high)
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: A _flame strike_ produces a vertical column of divine fire 
    roaring downward. The spell deals 1d6 points of damage per caster level 
    (maximum 15d6). Half the damage is fire damage, but the other half results 
    directly from divine power and is therefore not subject to being reduced by 
    resistance to fire-based attacks.
- id: flaming_sphere
  name: Flaming Sphere
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: 5-ft.-diameter sphere
  duration: 1 round/level
  save: Reflex negates
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    A burning globe of fire rolls in whichever direction you point and burns those it strikes. It moves 30 feet per round. As part of this movement, it can ascend or jump up to 30 feet to strike a target. If it enters a space with a creature, it stops moving for the round and deals 2d6 points of fire damage to that creature, though a successful Reflex save negates that damage. A _flaming sphere_ rolls over barriers less than 4 feet tall. It ignites flammable substances it touches and illuminates the same area as a torch would.

    The sphere moves as long as you actively direct it (a move action for you); otherwise, it merely stays at rest and burns. It can be extinguished by any means that would put out a normal fire of its size. The surface of the sphere has a spongy, yielding consistency and so does not cause damage except by its flame. It cannot push aside unwilling creatures or batter down large obstacles. A _flaming sphere_ winks out if it exceeds the spell’s range.

    _Arcane Material Component:_ A bit of tallow, a pinch of brimstone, and a dusting of powdered iron.
- id: flare
  name: Flare
  level_druid: 0
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Burst of light
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V
  target_label: Effect
  description: This cantrip creates a burst of light. If you cause the light to 
    burst directly in front of a single creature, that creature is dazzled for 1
    minute unless it makes a successful Fortitude save. Sightless creatures, as 
    well as creatures already dazzled, are not affected by _flare_.
- id: fog_cloud
  name: Fog Cloud
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft. level)
  target: Fog spreads in 20-ft. radius, 20 ft. high
  duration: 10 min./level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A bank of fog billows out from the point you designate. The fog obscures all sight, including darkvision, beyond 5 feet. A creature within 5 feet has concealment (attacks have a 20% miss chance). Creatures farther away have total concealment (50% miss chance, and the attacker can’t use sight to locate the target).

    A moderate wind (11+ mph) disperses the fog in 4 rounds; a strong wind (21+ mph) disperses the fog in 1 round.

    The spell does not function underwater.
- id: freedom_movement
  name: Freedom of Movement
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Personal or touch
  target: You or creature touched
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M, DF
  target_label: Target
  description: |-
    This spell enables you or a creature you touch to move and attack normally for the duration of the spell, even under the influence of magic that usually impedes movement, such as paralysis, _solid fog_, _slow_, and _web_. The subject automatically succeeds on any grapple check made to resist a grapple attempt, as well as on grapple checks or Escape Artist checks made to escape a grapple or a pin.

    The spell also allows the subject to move and attack normally while underwater, even with slashing weapons such as axes and swords or with bludgeoning weapons such as flails, hammers, and maces, provided that the weapon is wielded in the hand rather than hurled. The _freedom of movement_ spell does not, however, allow water breathing.

    _Material Component:_ A leather thong, bound around the arm or a similar appendage.
  level_bard: 4
- id: ghost_sound
  name: Ghost Sound
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Illusory sounds
  duration: 1 round/level (D)
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    _Ghost sound_ allows you to create a volume of sound that rises, recedes, approaches, or remains at a fixed place. You choose what type of sound _ghost sound_ creates when casting it and cannot thereafter change the sound’s basic character.

    The volume of sound created depends on your level. You can produce as much noise as four normal humans per caster level (maximum twenty humans). Thus, talking, singing, shouting, walking, marching, or running sounds can be created. The noise a _ghost sound_ spell produces can be virtually any type of sound within the volume limit. A horde of rats running and squeaking is about the same volume as eight humans running and shouting. A roaring lion is equal to the noise from sixteen humans, while a roaring dire tiger is equal to the noise from twenty humans.

    _Ghost sound_ can enhance the effectiveness of a _silent image_ spell.

    _Ghost sound_ can be made permanent with a _permanency_ spell.

    _Material Component:_ A bit of wool or a small lump of wax.
- id: goodberry
  name: Goodberry
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: 2d4 fresh berries touched
  duration: One day/level
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Targets
  description: Casting _goodberry_ upon a handful of freshly picked berries 
    makes 2d4 of them magical. You (as well as any other druid of 3rd or higher 
    level) can immediately discern which berries are affected. Each transmuted 
    berry provides nourishment as if it were a normal meal for a Medium 
    creature. The berry also cures 1 point of damage when eaten, subject to a 
    maximum of 8 points of such curing in any 24-hour period.
- id: guidance
  name: Guidance
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 minute or until discharged
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: This spell imbues the subject with a touch of divine guidance. 
    The creature gets a +1 competence bonus on a single attack roll, saving 
    throw, or skill check. It must choose to use the bonus before making the 
    roll to which it applies.
- id: gust_of_wind
  name: Gust of Wind
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Air]
  cast_time: 1 standard action
  range: 60 ft.
  target: Line-shaped gust of severe wind emanating out from you to the extreme 
    of the range
  duration: 1 round
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    This spell creates a severe blast of air (approximately 50 mph) that originates from you, affecting all creatures in its path.

    A Tiny or smaller creature on the ground is knocked down and rolled 1d4x10 feet, taking 1d4 points of nonlethal damage per 10 feet. If flying, a Tiny or smaller creature is blown back 2d6x10 feet and takes 2d6 points of nonlethal damage due to battering and buffeting.

    Small creatures are knocked prone by the force of the wind, or if flying are blown back 1d6x10 feet.

    Medium creatures are unable to move forward against the force of the wind, or if flying are blown back 1d6x5 feet.

    Large or larger creatures may move normally within a _gust of wind_ effect.

    A _gust of wind_ can’t move a creature beyond the limit of its range.

    Any creature, regardless of size, takes a –4 penalty on ranged attacks and Listen checks in the area of a _gust of wind_.

    The force of the _gust_ automatically extinguishes candles, torches, and similar unprotected flames. It causes protected flames, such as those of lanterns, to dance wildly and has a 50% chance to extinguish those lights.

    In addition to the effects noted, a _gust of wind_ can do anything that a sudden blast of wind would be expected to do. It can create a stinging spray of sand or dust, fan a large fire, overturn delicate awnings or hangings, heel over a small boat, and blow gases or vapors to the edge of its range.

    _Gust of wind_ can be made permanent with a _permanency_ spell.
- id: heat_metal
  name: Heat Metal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Fire]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Metal equipment of one creature per two levels, no two of which can be
    more than 30 ft. apart; or 25 lb. of metal/level, all of which must be 
    within a 30-ft. circle
  duration: 7 rounds
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: |-
    _Heat metal_ makes metal extremely warm. Unattended, nonmagical metal gets no saving throw. Magical metal is allowed a saving throw against the spell. An item in a creature’s possession uses the creature’s saving throw bonus unless its own is higher.

    A creature takes fire damage if its equipment is heated. It takes full damage if its armor is affected or if it is holding, touching, wearing, or carrying metal weighing one-fifth of its weight. The creature takes minimum damage (1 point or 2 points; see the table) if it’s not wearing metal armor and the metal that it’s carrying weighs less than one-fifth of its weight.

    On the first round of the spell, the metal becomes warm and uncomfortable to touch but deals no damage. The same effect also occurs on the last round of the spell’s duration. During the second (and also the next-to-last) round, intense heat causes pain and damage. In the third, fourth, and fifth rounds, the metal is searing hot, causing more damage, as shown on the table below.

    Metal temperature by round (damage):
    - Round 1: Warm — none
    - Round 2: Hot — 1d4 points
    - Rounds 3–5: Searing — 2d4 points
    - Round 6: Hot — 1d4 points
    - Round 7: Warm — none

    Any cold intense enough to damage the creature negates fire damage from the spell (and vice versa) on a point-for-point basis. If cast underwater, _heat metal_ deals half damage and boils the surrounding water.

    _Heat metal_ counters and dispels _chill metal_.
- id: hide_from_animals
  name: Hide from Animals
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One creature touched/level
  duration: 10 min./level (D)
  save: Will negates (harmless)
  spell_resistance: Yes
  components: S, DF
  target_label: Targets
  description: Animals cannot see, hear, or smell the warded creatures. Even 
    extraordinary or supernatural sensory capabilities, such as blindsense, 
    blindsight, scent, and tremorsense, cannot detect or locate warded 
    creatures. Animals simply act as though the warded creatures are not there. 
    If a warded character touches an animal or attacks any creature, even with a
    spell, the spell ends for all recipients.
- id: hold_animal
  name: Hold Animal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One animal
  duration: 1 round/level (D); see text
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: This spell functions like _hold person,_ except that it affects 
    an animal instead of a humanoid.
- id: ice_storm
  name: Ice Storm
  level_druid: 4
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cylinder (20-ft. radius, 40 ft. high)
  duration: 1 full round
  save: None
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Area
  description: |-
    Great magical hailstones pound down for 1 full round, dealing 3d6 points of bludgeoning damage and 2d6 points of cold damage to every creature in the area. A –4 penalty applies to each Listen check made within the _ice storm_’s effect, and all land movement within its area is at half speed. At the end of the duration, the hail disappears, leaving no aftereffects (other than the damage dealt).

    _Arcane Material Component:_ A pinch of dust and a few drops of water.
- id: jump
  name: Jump
  level_druid: 1
  level_cleric:
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    The subject gets a +10 enhancement bonus on Jump checks. The enhancement bonus increases to +20 at caster level 5th, and to +30 (the maximum) at caster level 9th.

    _Material Component:_ A grasshopper’s hind leg, which you break when the spell is cast.
- id: know_direction
  name: Know Direction
  level_druid: 0
  level_cleric:
  level_wizard:
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: Instantaneous
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: You instantly know the direction of north from your current 
    position. The spell is effective in any environment in which “north” exists,
    but it may not work in extraplanar settings. Your knowledge of north is 
    correct at the moment of casting, but you can get lost again within moments 
    if you don’t find some external reference point to help you keep track of 
    direction.
- id: light
  name: Light
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, M/DF
  target_label: Target
  description: |-
    This spell causes an object to glow like a torch, shedding bright light in a 20-foot radius (and dim light for an additional 20 feet) from the point you touch. The effect is immobile, but it can be cast on a movable object. Light taken into an area of magical _darkness_ does not function.

    A light spell (one with the light descriptor) counters and dispels a darkness spell (one with the darkness descriptor) of an equal or lower level.

    _Arcane Material Component:_ A firefly or a piece of phosphorescent moss.
- id: longstrider
  name: Longstrider
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level (D)
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, M
  target_label: Target
  description: |-
    This spell increases your base land speed by 10 feet. (This adjustment counts as an enhancement bonus.) It has no effect on other modes of movement, such as burrow, climb, fly, or swim.

    _Material Component:_ A pinch of dirt.
- id: magic_fang
  name: Magic Fang
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    _Magic fang_ gives one natural weapon of the subject a +1 enhancement bonus on attack and damage rolls. The spell can affect a slam attack, fist, bite, or other natural weapon. (The spell does not change an unarmed strike’s damage from nonlethal damage to lethal damage.)

    _Magic fang_ can be made permanent with a _permanency_ spell.
- id: magic_stone
  name: Magic Stone
  level_druid: 1
  level_cleric: 1
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Up to three pebbles touched
  duration: 30 minutes or until discharged
  self_duration: 1
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, DF
  target_label: Targets
  description: You transmute as many as three pebbles, which can be no larger 
    than sling bullets, so that they strike with great force when thrown or 
    slung. If hurled, they have a range increment of 20 feet. If slung, treat 
    them as sling bullets (range increment 50 feet). The spell gives them a +1 
    enhancement bonus on attack and damage rolls. The user of the stones makes a
    normal ranged attack. Each stone that hits deals 1d6+1 points of damage 
    (including the spell’s enhancement bonus), or 2d6+2 points against undead.
- id: mending
  name: Mending
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: 10 ft.
  target: One object of up to 1 lb.
  duration: Instantaneous
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S
  target_label: Target
  description: |-
    _Mending_ repairs small breaks or tears in objects (but not warps, such as might be caused by a _warp wood_ spell). It will weld broken metallic objects such as a ring, a chain link, a medallion, or a slender dagger, providing but one break exists.

    Ceramic or wooden objects with multiple breaks can be invisibly rejoined to be as strong as new. A hole in a leather sack or a wineskin is completely healed over by _mending._ The spell can repair a magic item, but the item’s magical abilities are not restored. The spell cannot mend broken magic rods, staffs, or wands, nor does it affect creatures (including constructs).
- id: obscuring_mist
  name: Obscuring Mist
  level_druid: 1
  level_cleric: 1
  level_wizard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: 20 ft.
  target: Cloud spreads in 20-ft. radius from you, 20 ft. high
  duration: 1 min./level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A misty vapor arises around you. It is stationary once created. The vapor obscures all sight, including darkvision, beyond 5 feet. A creature 5 feet away has concealment (attacks have a 20% miss chance). Creatures farther away have total concealment (50% miss chance, and the attacker cannot use sight to locate the target).

    A moderate wind (11+ mph), such as from a _gust of wind_ spell, disperses the fog in 4 rounds. A strong wind (21+ mph) disperses the fog in 1 round. A _fireball, flame strike_, or similar spell burns away the fog in the explosive or fiery spell’s area. A _wall of fire_ burns away the fog in the area into which it deals damage.

    This spell does not function underwater.
- id: owl_wisdom
  name: Owl's Wisdom
  level_druid: 2
  level_cleric: 2
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creature becomes wiser. The spell grants a +4 enhancement bonus to Wisdom, adding the usual benefit to Wisdom-related skills. Clerics, druids, paladins, and rangers (and other Wisdom-based spellcasters) who receive _owl’s wisdom_ do not gain any additional bonus spells for the increased Wisdom, but the save DCs for their spells increase.

    _Arcane Material Component:_ A few feathers, or a pinch of droppings, from an owl.
- id: pass_without_trace
  name: Pass without Trace
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One creature/level touched
  duration: 1 hour/level (D)
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Targets
  description: The subject or subjects can move through any type of terrain and 
    leave neither footprints nor scent. Tracking the subjects is impossible by 
    nonmagical means.
- id: plant_growth
  name: Plant Growth
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: See text
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label:
  description: |-
    _Plant growth_ has different effects depending on the version chosen.

    _Overgrowth:_ This effect causes normal vegetation (grasses, briars, bushes, creepers, thistles, trees, vines) within long range (400 feet + 40 feet per caster level) to become thick and overgrown. The plants entwine to form a thicket or jungle that creatures must hack or force a way through. Speed drops to 5 feet, or 10 feet for Large or larger creatures. The area must have brush and trees in it for this spell to take effect.

    At your option, the area can be a 100-foot-radius circle, a 150-foot-radius semicircle, or a 200-foot-radius quarter circle.

    You may designate places within the area that are not affected.

    _Enrichment:_ This effect targets plants within a range of one-half mile, raising their potential productivity over the course of the next year to one-third above normal.

    _Plant growth_ counters _diminish plants_.

    This spell has no effect on plant creatures.
- id: poison
  name: Poison
  level_druid: 3
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: Instantaneous; see text
  save: Fortitude negates; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: Calling upon the venomous powers of natural predators, you infect
    the subject with a horrible poison by making a successful melee touch 
    attack. The poison deals 1d10 points of temporary Constitution damage 
    immediately and another 1d10 points of temporary Constitution damage 1 
    minute later. Each instance of damage can be negated by a Fortitude save (DC
    10 + 1/2 your caster level + your Wis modifier).
- id: prestidigitation
  name: Prestidigitation
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Universal
  cast_time: 1 standard action
  range: 10 ft.
  target:
  duration: 1 hour
  save: See text
  spell_resistance: No
  components: V, S
  target_label:
  description: Prestidigitations are minor tricks that novice spellcasters use 
    for practice. Once cast, a _prestidigitation_ spell enables you to perform 
    simple magical effects for 1 hour. The effects are minor and have severe 
    limitations. A prestidigitation can slowly lift 1 pound of material. It can 
    color, clean, or soil items in a 1-foot cube each round. It can chill, warm,
    or flavor 1 pound of nonliving material. It cannot deal damage or affect the
    concentration of spellcasters. _Prestidigitation_ can create small objects, 
    but they look crude and artificial. The materials created by a 
    _prestidigitation_ spell are extremely fragile, and they cannot be used as 
    tools, weapons, or spell components. Finally, a _prestidigitation_ lacks the
    power to duplicate any other spell effects. Any actual change to an object 
    (beyond just moving, cleaning, or soiling it) persists only 1 hour.
- id: produce_flame
  name: Produce Flame
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: 0 ft.
  target: Flame in your palm
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    Flames as bright as a torch appear in your open hand. The flames harm neither you nor your equipment.

    In addition to providing illumination, the flames can be hurled or used to touch enemies. You can strike an opponent with a melee touch attack, dealing fire damage equal to 1d6 +1 point per caster level (maximum +5). Alternatively, you can hurl the flames up to 120 feet as a thrown weapon. When doing so, you attack with a ranged touch attack (with no range penalty) and deal the same damage as with the melee attack. No sooner do you hurl the flames than a new set appears in your hand. Each attack you make reduces the remaining duration by 1 minute. If an attack reduces the remaining duration to 0 minutes or less, the spell ends after the attack resolves.

    This spell does not function underwater.
- id: protection_energy
  name: Protection from Energy
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level or until discharged
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    _Protection from energy_ grants temporary immunity to the type of energy you specify when you cast it (acid, cold, electricity, fire, or sonic). When the spell absorbs 12 points per caster level of energy damage (to a maximum of 120 points at 10th level), it is discharged.

    _Note: Protection from energy_ overlaps (and does not stack with) _resist energy._ If a character is warded by _protection from energy_ and _resist energy,_ the _protection_ spell absorbs damage until its power is exhausted.
- id: purify_food_drink
  name: Purify Food and Drink
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: 10 ft.
  target: 1 cu. ft./level of contaminated food and water
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: |-
    This spell makes spoiled, rotten, poisonous, or otherwise contaminated food and water pure and suitable for eating and drinking. This spell does not prevent subsequent natural decay or spoilage. Unholy water and similar food and drink of significance is spoiled by _purify food and drink,_ but the spell has no effect on creatures of any type nor upon magic potions.

    _Note:_ Water weighs about 8 pounds per gallon. One cubic foot of water contains roughly 8 gallons and weighs about 60 pounds.
- id: read_magic
  name: Read Magic
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, F
  target_label: Target
  description: |-
    By means of _read magic,_ you can decipher magical inscriptions on objects—books, scrolls, weapons, and the like—that would otherwise be unintelligible. This deciphering does not normally invoke the magic contained in the writing, although it may do so in the case of a cursed scroll. Furthermore, once the spell is cast and you have read the magical inscription, you are thereafter able to read that particular writing without recourse to the use of _read magic._ You can read at the rate of one page (250 words) per minute. The spell allows you to identify a _glyph of warding_ with a DC 13 Spellcraft check, a _greater glyph of warding_ with a DC 16 Spellcraft check, or any _symbol_ spell with a Spellcraft check (DC 10 + spell level).

    _Read magic_ can be made permanent with a _permanency_ spell.

    _Focus:_ A clear crystal or mineral prism.
- id: reduce_animal
  name: Reduce Animal
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One willing animal of Small, Medium, Large, or Huge size
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: This spell functions like _reduce person,_ except that it affects
    a single willing animal. Reduce the damage dealt by the animal’s natural 
    attacks as appropriate for its new size.
- id: reincarnate
  name: Reincarnate
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 10 minutes
  range: Touch
  target: Dead creature touched
  duration: Instantaneous
  save: None; see text
  spell_resistance: Yes (harmless)
  components: V, S, M, DF
  target_label: Target
  description: |-
    With this spell, you bring back a dead creature in another body, provided that its death occurred no more than one week before the casting of the spell and the subject’s soul is free and willing to return. If the subject’s soul is not willing to return, the spell does not work; therefore, a subject that wants to return receives no saving throw.

    Since the dead creature is returning in a new body, all physical ills and afflictions are repaired. The condition of the remains is not a factor. So long as some small portion of the creature’s body still exists, it can be reincarnated, but the portion receiving the spell must have been part of the creature’s body at the time of death. The magic of the spell creates an entirely new young adult body for the soul to inhabit from the natural elements at hand. This process takes 1 hour to complete. When the body is ready, the subject is reincarnated.

    A reincarnated creature recalls the majority of its former life and form. It retains any class abilities, feats, or skill ranks it formerly possessed. Its class, base attack bonus, base save bonuses, and hit points are unchanged. Strength, Dexterity, and Constitution scores depend partly on the new body. First eliminate the subject’s racial adjustments (since it is no longer of his previous race) and then apply the adjustments found below to its remaining ability scores. The subject’s level (or Hit Dice) is reduced by 1. If the subject was 1st level, its new Constitution score is reduced by 2. (If this reduction would put its Con at 0 or lower, it can’t be reincarnated). This level/HD loss or Constitution loss cannot be repaired by any means.

    It’s possible for the change in the subject’s ability scores to make it difficult for it to pursue its previous character class. If this is the case, the subject is well advised to become a multiclass character.

    For a humanoid creature, the new incarnation is determined using the following table. For nonhumanoid creatures, a similar table of creatures of the same type should be created.

    A creature that has been turned into an undead creature or killed by a death effect can’t be returned to life by this spell. Constructs, elementals, outsiders, and undead creatures can’t be reincarnated. The spell cannot bring back a creature who has died of old age.

    d% — incarnation (Str / Dex / Con):
    - 01: Bugbear (+4 / +2 / +2)
    - 02–13: Dwarf (+0 / +0 / +2)
    - 14–25: Elf (+0 / +2 / –2)
    - 26: Gnoll (+4 / +0 / +2)
    - 27–38: Gnome (–2 / +0 / +2)
    - 39–42: Goblin (–2 / +2 / +0)
    - 43–52: Half-elf (+0 / +0 / +0)
    - 53–62: Half-orc (+2 / +0 / +0)
    - 63–74: Halfling (–2 / +2 / +0)
    - 75–89: Human (+0 / +0 / +0)
    - 90–93: Kobold (–4 / +2 / –2)
    - 94: Lizardfolk (+2 / +0 / +2)
    - 95–98: Orc (+4 / +0 / +0)
    - 99: Troglodyte (+0 / –2 / +4)
    - 100: Other (? / ? / ?)

    The reincarnated creature gains all abilities associated with its new form, including forms of movement and speeds, natural armor, natural attacks, extraordinary abilities, and the like, but it doesn’t automatically speak the language of the new form.

    A _wish_ or a _miracle_ spell can restore a reincarnated character to his or her original form.

    _Material Component:_ Rare oils and unguents worth a total of least 1,000 gp, spread over the remains.
- id: resist_energy
  name: Resist Energy
  level_druid: 2
  level_cleric: 2
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    This abjuration grants a creature limited protection from damage of whichever one of five energy types you select: acid, cold, electricity, fire, or sonic. The subject gains energy resistance 10 against the energy type chosen, meaning that each time the creature is subjected to such damage (whether from a natural or magical source), that damage is reduced by 10 points before being applied to the creature’s hit points. The value of the energy resistance granted increases to 20 points at 7th level and to a maximum of 30 points at 11th level. The spell protects the recipient’s equipment as well.

    _Resist energy_ absorbs only damage. The subject could still suffer unfortunate side effects.

    _Note: Resist energy_ overlaps (and does not stack with) _protection from energy._ If a character is warded by _protection from energy_ and _resist energy,_ the _protection_ spell absorbs damage until its power is exhausted.
- id: resistance
  name: Resistance
  level_druid: 0
  level_cleric: 0
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 minute
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M/DF
  target_label: Target
  description: |-
    You imbue the subject with magical energy that protects it from harm, granting it a +1 resistance bonus on saves.

    _Resistance_ can be made permanent with a _permanency_ spell.

    _Arcane Material Component:_ A miniature cloak.
- id: shillelagh
  name: Shillelagh
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched nonmagical oak club or quarterstaff
  duration: 1 min./level
  self_duration: 1
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: Your own nonmagical club or quarterstaff becomes a weapon with a 
    +1 enhancement bonus on attack and damage rolls. (A quarterstaff gains this 
    enhancement for both ends of the weapon.) It deals damage as if it were two 
    size categories larger (a Small club or quarterstaff so transmuted deals 1d8
    points of damage, a Medium 2d6, and a Large 3d6), +1 for its enhancement 
    bonus. These effects only occur when the weapon is wielded by you. If you do
    not wield it, the weapon behaves as if unaffected by this spell.
- id: sleet_storm
  name: Sleet Storm
  level_druid: 3
  level_cleric:
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Cold]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Cylinder (40-ft. radius, 20 ft. high)
  duration: 1 round/level
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    Driving sleet blocks all sight (even darkvision) within it and causes the ground in the area to be icy. A creature can walk within or through the area of sleet at half normal speed with a DC 10 Balance check. Failure means it can’t move in that round, while failure by 5 or more means it falls (see the Balance skill for details).

    The sleet extinguishes torches and small fires.

    _Arcane Material Component:_ A pinch of dust and a few drops of water.
- id: soften_earth_stone
  name: Soften Earth and Stone
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 10-ft. square/level; see text
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Area
  description: |-
    When this spell is cast, all natural, undressed earth or stone in the spell’s area is softened. Wet earth becomes thick mud, dry earth becomes loose sand or dirt, and stone becomes soft clay that is easily molded or chopped. You affect a 10-footsquare area to a depth of 1 to 4 feet, depending on the toughness or resilience of the ground at that spot. Magical, enchanted, dressed, or worked stone cannot be affected. Earth or stone creatures are not affected.

    A creature in mud must succeed on a Reflex save or be caught for 1d2 rounds and unable to move, attack, or cast spells. A creature that succeeds on its save can move through the mud at half speed, and it can’t run or charge.

    Loose dirt is not as troublesome as mud, but all creatures in the area can move at only half their normal speed and can’t run or charge over the surface.

    Stone softened into clay does not hinder movement, but it does allow characters to cut, shape, or excavate areas they may not have been able to affect before.

    While _soften earth and stone_ does not affect dressed or worked stone, cavern ceilings or vertical surfaces such as cliff faces can be affected. Usually, this causes a moderate collapse or landslide as the loosened material peels away from the face of the wall or roof and falls.

    A moderate amount of structural damage can be dealt to a manufactured structure by softening the ground beneath it, causing it to settle. However, most well-built structures will only be damaged by this spell, not destroyed.
- id: speak_with_animals
  name: Speak with Animals
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: You can comprehend and communicate with animals. You are able to 
    ask questions of and receive answers from animals, although the spell 
    doesn’t make them any more friendly or cooperative than normal. Furthermore,
    wary and cunning animals are likely to be terse and evasive, while the more 
    stupid ones make inane comments. If an animal is friendly toward you, it may
    do some favor or service for you.
  level_bard: 3
- id: spider_climb
  name: Spider Climb
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    The subject can climb and travel on vertical surfaces or even traverse ceilings as well as a spider does. The affected creature must have its hands free to climb in this manner. The subject gains a climb speed of 20 feet; furthermore, it need not make Climb checks to traverse a vertical or horizontal surface (even upside down). A _spider climbing_ creature retains its Dexterity bonus to Armor Class (if any) while climbing, and opponents get no special bonus to their attacks against it. It cannot, however, use the run action while climbing.

    _Material Component:_ A drop of bitumen and a live spider, both of which must be eaten by the subject.
- id: spike_growth
  name: Spike Growth
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One 20-ft. square/level
  duration: 1 hour/level (D)
  save: Reflex partial
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    Any ground-covering vegetation in the spell’s area becomes very hard and sharply pointed without changing its appearance.

    In areas of bare earth, roots and rootlets act in the same way. Typically, _spike growth_ can be cast in any outdoor setting except open water, ice, heavy snow, sandy desert, or bare stone. Any creature moving on foot into or through the spell’s area takes 1d4 points of piercing damage for each 5 feet of movement through the spiked area.

    Any creature that takes damage from this spell must also succeed on a Reflex save or suffer injuries to its feet and legs that slow its land speed by one-half. This speed penalty lasts for 24 hours or until the injured creature receives a _cure_ spell (which also restores lost hit points). Another character can remove the penalty by taking 10 minutes to dress the injuries and succeeding on a Heal check against the spell’s save DC.

    _Spike growth_ can’t be disabled with the Disable Device skill.

    _Note:_ Magic traps such as _spike growth_ are hard to detect. A rogue (only) can use the Search skill to find a _spike growth_. The DC is 25 + spell level, or DC 28 for _spike growth_ (or DC 27 for _spike growth_ cast by a ranger).
- id: stone_shape
  name: Stone Shape
  level_druid: 3
  level_cleric: 3
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Touch
  target: Stone or stone object touched, up to 10 cu. ft. + 1 cu. ft./level
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Target
  description: |-
    You can form an existing piece of stone into any shape that suits your purpose. While it’s possible to make crude coffers, doors, and so forth with _stone shape,_ fine detail isn’t possible. There is a 30% chance that any shape including moving parts simply doesn’t work.

    _Arcane Material Component:_ Soft clay, which must be worked into roughly the desired shape of the stone object and then touched to the stone while the verbal component is uttered.
- id: summon_natures_ally_i
  name: Summon Nature's Ally I
  level_druid: 1
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One summoned creature
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell summons a natural creature. It appears where you designate and acts immediately, on your turn. It attacks your opponents to the best of its ability. If you can communicate with the creature, you can direct it not to attack, to attack particular enemies, or to perform other actions.

    A summoned monster cannot summon or otherwise conjure another creature, nor can it use any teleportation or planar travel abilities. Creatures cannot be summoned into an environment that cannot support them.

    The spell conjures one of the creatures from the 1st-level list on the accompanying Summon Nature’s Ally table. You choose which kind of creature to summon, and you can change that choice each time you cast the spell. All the creatures on the table are neutral unless otherwise noted.
- id: summon_natures_ally_ii
  name: Summon Nature's Ally II
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: This spell functions like _summon nature’s ally I,_ except that 
    you can summon one 2nd-level creature or 1d3 1st-level creatures of the same
    kind.
- id: summon_natures_ally_iii
  name: Summon Nature's Ally III
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 3rd-level creature, 1d3 2nd-level creatures of the same kind, or 1d4+1 1st-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: summon_swarm
  name: Summon Swarm
  level_druid: 2
  level_cleric:
  level_wizard: 2
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One swarm of bats, rats, or spiders
  duration: Concentration + 2 rounds
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Effect
  description: |-
    You summon a swarm of bats, rats, or spiders (your choice), which attacks all other creatures within its area. (You may summon the swarm so that it shares the area of other creatures.) If no living creatures are within its area, the swarm attacks or pursues the nearest creature as best it can. The caster has no control over its target or direction of travel.

    _Arcane Material Component:_ A square of red cloth.
  level_bard: 2
- id: tree_shape
  name: Tree Shape
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level (D)
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    By means of this spell, you are able to assume the form of a Large living tree or shrub or a Large dead tree trunk with a small number of limbs. The closest inspection cannot reveal that the tree in question is actually a magically concealed creature. To all normal tests you are, in fact, a tree or shrub, although a _detect magic_ spell reveals a faint transmutation on the tree. While in tree form, you can observe all that transpires around you just as if you were in your normal form, and your hit points and save bonuses remain unaffected. You gain a +10 natural armor bonus to AC but have an effective Dexterity score of 0 and a speed of 0 feet. You are immune to critical hits while in tree form. All clothing and gear carried or worn changes with you.

    You can dismiss _tree shape_ as a free action (instead of as a standard action).
- id: virtue
  name: Virtue
  level_druid: 0
  level_cleric: 0
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min.
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: The subject gains 1 temporary hit point.
- id: warp_wood
  name: Warp Wood
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 1 Small wooden object/level, all within a 20-ft. radius
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: |-
    You cause wood to bend and warp, permanently destroying its straightness, form, and strength. A warped door springs open (or becomes stuck, requiring a Strength check to open, at your option). A boat or ship springs a leak. Warped ranged weapons are useless. A warped melee weapon causes a –4 penalty on attack rolls.

    You may warp one Small or smaller object or its equivalent per caster level. A Medium object counts as two Small objects, a Large object as four, a Huge object as eight, a Gargantuan object as sixteen, and a Colossal object as thirty-two.

    Alternatively, you can unwarp wood (effectively warping it back to normal) with this spell, straightening wood that has been warped by this spell or by other means. _Make whole_, on the other hand, does no good in repairing a warped item.

    You can combine multiple consecutive _warp wood_ spells to warp (or unwarp) an object that is too large for you to warp with a single spell.

    Until the object is completely warped, it suffers no ill effects.
- id: water_breathing
  name: Water Breathing
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Living creatures touched
  duration: 2 hours/level; see text
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creatures can breathe water freely. Divide the duration evenly among all the creatures you touch.

    The spell does not make creatures unable to breathe air.

    _Arcane Material Component:_ A short reed or piece of straw.
- id: wind_wall
  name: Wind Wall
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin:
  school: Evocation [Air]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Wall up to 10 ft./level long and 5 ft./level high (S)
  duration: 1 round/level
  save: None; see text
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    An invisible vertical curtain of wind appears. It is 2 feet thick and of considerable strength. It is a roaring blast sufficient to blow away any bird smaller than an eagle, or tear papers and similar materials from unsuspecting hands. (A Reflex save allows a creature to maintain its grasp on an object.) Tiny and Small flying creatures cannot pass through the barrier. Loose materials and cloth garments fly upward when caught in a _wind wall._ Arrows and bolts are deflected upward and miss, while any other normal ranged weapon passing through the wall has a 30% miss chance. (A giant-thrown boulder, a siege engine projectile, and other massive ranged weapons are not affected.) Gases, most gaseous breath weapons, and creatures in gaseous form cannot pass through the wall (although it is no barrier to incorporeal creatures).

    While the wall must be vertical, you can shape it in any continuous path along the ground that you like. It is possible to create cylindrical or square wind walls to enclose specific points.

    _Arcane Material Component:_ A tiny fan and a feather of exotic origin.
- id: wood_shape
  name: Wood Shape
  level_druid: 2
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched piece of wood no larger than 10 cu. ft. + 1 cu. ft./level
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, DF
  target_label: Target
  description: _Wood shape_ enables you to form one existing piece of wood into 
    any shape that suits your purpose. While it is possible to make crude 
    coffers, doors, and so forth, fine detail isn’t possible. There is a 30% 
    chance that any shape that includes moving parts simply doesn’t work.

- id: restoration_lesser
  name: Restoration, Lesser
  level_druid: 2
  level_cleric: 2
  level_wizard:
  level_ranger:
  level_paladin: 1
  school: Conjuration (Healing)
  cast_time: 3 rounds
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    _Lesser restoration_ dispels any magical effects reducing one of the subject’s ability scores or cures 1d4 points of temporary ability damage to one of the subject’s ability scores. It also eliminates any fatigue suffered by the character, and improves an exhausted condition to fatigued. It does not restore permanent ability drain.
- id: contagion
  name: Contagion
  level_druid: 3
  level_cleric: 3
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    The subject contracts a disease selected from the table below, which strikes immediately (no incubation period). The DC noted is for the subsequent saves (use _contagion_’s normal save DC for the initial saving throw).

    Disease — DC / ability damage on a failed save:
    - Blinding sickness: DC 16, 1d4 Str¹
    - Cackle fever: DC 16, 1d6 Wis
    - Filth fever: DC 12, 1d3 Dex and 1d3 Con
    - Mindfire: DC 12, 1d4 Int
    - Red ache: DC 15, 1d6 Str
    - Shakes: DC 13, 1d8 Dex
    - Slimy doom: DC 14, 1d4 Con

    ¹ Each time a victim takes 2 or more points of Strength damage from blinding sickness, he or she must make another Fortitude save (using the disease's save DC) or be permanently blinded.
- id: daylight
  name: Daylight
  level_druid: 3
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin: 3
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: |-
    The object touched sheds light as bright as full daylight in a 60-foot radius, and dim light for an additional 60 feet beyond that. Creatures that take penalties in bright light also take them while within the radius of this magical light. Despite its name, this spell is not the equivalent of daylight for the purposes of creatures that are damaged or destroyed by bright light.

    If _daylight_ is cast on a small object that is then placed inside or under a light- proof covering, the spell’s effects are blocked until the covering is removed.

    _Daylight_ brought into an area of magical darkness (or vice versa) is temporarily negated, so that the otherwise prevailing light conditions exist in the overlapping areas of effect.

    _Daylight_ counters or dispels any darkness spell of equal or lower level, such as _darkness._
  level_bard: 3
- id: diminish_plants
  name: Diminish Plants
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: See text
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label:
  description: |-
    This spell has two versions.

    _Prune Growth:_ This version causes normal vegetation within long range (400 feet + 40 feet per level) to shrink to about one-third of their normal size, becoming untangled and less bushy. The affected vegetation appears to have been carefully pruned and trimmed.

    At your option, the area can be a 100- foot-radius circle, a 150-foot-radius semicircle, or a 200-foot-radius quarter-circle.

    You may also designate portions of the area that are not affected.

    _Stunt Growth:_ This version targets normal plants within a range of 1/2 mile, reducing their potential productivity over the course of the following year to one third below normal.

    _Diminish plants_ counters _plant growth_.

    This spell has no effect on plant creatures.
- id: dominate_animal
  name: Dominate Animal
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One animal
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You can enchant an animal and direct it with simple commands such as “Attack,” “Run,” and “Fetch.” Suicidal or self-destructive commands (including an order to attack a creature two or more size categories larger than the _dominated_ animal) are simply ignored.

    _Dominate animal_ establishes a mental link between you and the subject creature. The animal can be directed by silent mental command as long as it remains in range. You need not see the creature to control it. You do not receive direct sensory input from the creature, but you know what it is experiencing. Because you are directing the animal with your own intelligence, it may be able to undertake actions normally beyond its own comprehension. You need not concentrate exclusively on controlling the creature unless you are trying to direct it to do something it normally couldn’t do. Changing your instructions or giving a _dominated_ creature a new command is the equivalent of redirecting a spell, so it is a move action.
- id: magic_fang_greater
  name: Magic Fang, Greater
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 hour/level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    This spell functions like _magic fang_, except that the enhancement bonus on attack and damage rolls is +1 per four caster levels (maximum +5).

    Alternatively, you may imbue all of the creature’s natural weapons with a +1 enhancement bonus (regardless of your caster level).

    _Greater magic fang_ can be made permanent with a _permanency_ spell.
- id: meld_into_stone
  name: Meld Into Stone
  level_druid: 3
  level_cleric: 3
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    _Meld into stone_ enables you to meld your body and possessions into a single block of stone. The stone must be large enough to accommodate your body in all three dimensions. When the casting is complete, you and not more than 100 pounds of nonliving gear merge with the stone. If either condition is violated, the spell fails and is wasted.

    While in the stone, you remain in contact, however tenuous, with the face of the stone through which you melded. You remain aware of the passage of time and can cast spells on yourself while hiding in the stone. Nothing that goes on outside the stone can be seen, but you can still hear what happens around you. Minor physical damage to the stone does not harm you, but its partial destruction (to the extent that you no longer fit within it) expels you and deals you 5d6 points of damage. The stone’s complete destruction expels you and slays you instantly unless you make a DC 18 Fortitude save.

    Any time before the duration expires, you can step out of the stone through the surface that you entered. If the spell’s duration expires or the effect is dispelled before you voluntarily exit the stone, you are violently expelled and take 5d6 points of damage.

    The following spells harm you if cast upon the stone that you are occupying: _Stone to flesh_ expels you and deals you 5d6 points of damage. _Stone shape_ deals you 3d6 points of damage but does not expel you. _Transmute rock to mud_ expels you and then slays you instantly unless you make a DC 18 Fortitude save, in which case you are merely expelled. Finally, _passwall_ expels you without damage.
- id: neutralize_poison
  name: Neutralize Poison
  level_druid: 3
  level_cleric: 4
  level_wizard:
  level_ranger: 3
  level_paladin: 4
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature or object of up to 1 cu. ft./level touched
  duration: 10 min./level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    You detoxify any sort of venom in the creature or object touched. A poisoned creature suffers no additional effects from the poison, and any temporary effects are ended, but the spell does not reverse instantaneous effects, such as hit point damage, temporary ability damage, or effects that don’t go away on their own.

    The creature is immune to any poison it is exposed to during the duration of the spell. Unlike with _delay poison_, such effects aren’t postponed until after the duration —the creature need not make any saves against poison effects applied to it during the length of the spell.

    This spell can instead neutralize the poison in a poisonous creature or object for the duration of the spell, at the caster’s option.

    _Arcane Material Component:_ A bit of charcoal.
  level_bard: 4
- id: quench
  name: Quench
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target:
  duration: Instantaneous
  save: None or Will negates (object)
  spell_resistance: No or Yes (object)
  components: V, S, DF
  target_label:
  description: |-
    _Quench_ is often used to put out forest fires and other conflagrations. It extinguishes all nonmagical fires in its area. The spell also dispels any fire spells in its area, though you must succeed on a dispel check (1d20 +1 per caster level, maximum +15) against each spell to dispel it. The DC to dispel such spells is 11 + the caster level of the fire spell.

    Each elemental (fire) creature within the area of a _quench_ spell takes 1d6 points of damage per caster level (maximum 15d6, no save allowed).

    Alternatively, you can target the spell on a single magic item that creates or controls flame. The item loses all its fire-based magical abilities for 1d4 hours unless it succeeds on a Will save. (Artifacts are immune to this effect.)
- id: remove_disease
  name: Remove Disease
  level_druid: 3
  level_cleric: 3
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    _Remove disease_ cures all diseases that the subject is suffering from. The spell also kills parasites, including green slime and others. Certain special diseases may not be countered by this spell or may be countered only by a caster of a certain level or higher.

    _Note:_ Since the spell’s duration is instantaneous, it does not prevent reinfection after a new exposure to the same disease at a later date.
- id: snare
  name: Snare
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 2
  level_paladin:
  school: Transmutation
  cast_time: 3 rounds
  range: Touch
  target: Touched nonmagical circle of vine, rope, or thong with a 2 ft. 
    diameter + 2 ft./level
  duration: Until triggered or broken
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    This spell enables you to make a snare that functions as a magic trap. The snare can be made from any supple vine, a thong, or a rope. When you cast _snare_ upon it, the cordlike object blends with its surroundings (Search DC 23 for a character with the trapfinding ability to locate). One end of the snare is tied in a loop that contracts around one or more of the limbs of any creature stepping inside the circle.

    If a strong and supple tree is nearby, the snare can be fastened to it. The spell causes the tree to bend and then straighten when the loop is triggered, dealing 1d6 points of damage to the creature trapped and lifting it off the ground by the trapped limb or limbs. If no such tree is available, the cordlike object tightens around the creature, dealing no damage but causing it to be entangled.

    The snare is magical. To escape, a trapped creature must make a DC 23 Escape Artist check or a DC 23 Strength check that is a full-round action. The snare has AC 7 and 5 hit points. A successful escape from the snare breaks the loop and ends the spell.
- id: speak_with_plants
  name: Speak with Plants
  level_druid: 3
  level_cleric:
  level_wizard:
  level_ranger: 2
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level
  self_duration: 1
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  description: |-
    You can comprehend and communicate with plants, including both normal plants and plant creatures. You are able to ask questions of and receive answers from plants. A regular plant’s sense of its surroundings is limited, so it won’t be able to give (or recognize) detailed descriptions of creatures or answer questions about events outside its immediate vicinity.

    The spell doesn’t make plant creatures any more friendly or cooperative than normal. Furthermore, wary and cunning plant creatures are likely to be terse and evasive, while the more stupid ones may make inane comments. If a plant creature is friendly toward you, it may do some favor or service for you.
  level_bard: 4
- id: air_walk
  name: Air Walk
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Air]
  cast_time: 1 standard action
  range: Touch
  target: Creature (Gargantuan or smaller) touched
  duration: 10 min./level
  save: None
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    The subject can tread on air as if walking on solid ground. Moving upward is similar to walking up a hill. The maximum upward or downward angle possible is 45 degrees, at a rate equal to one-half the air walker’s normal speed.

    A strong wind (21+ mph) can push the subject along or hold it back. At the end of its turn each round, the wind blows the air walker 5 feet for each 5 miles per hour of wind speed. The creature may be subject to additional penalties in exceptionally strong or turbulent winds, such as loss of control over movement or physical damage from being buffeted about.

    Should the spell duration expire while the subject is still aloft, the magic fails slowly. The subject floats downward 60 feet per round for 1d6 rounds. If it reaches the ground in that amount of time, it lands safely. If not, it falls the rest of the distance, taking 1d6 points of damage per 10 feet of fall. Since dispelling a spell effectively ends it, the subject also descends in this way if the _air walk_ spell is dispelled, but not if it is negated by an _antimagic field_.

    You can cast _air walk_ on a specially trained mount so it can be ridden through the air. You can train a mount to move with the aid of _air walk_ (counts as a trick; see Handle Animal skill) with one week of work and a DC 25 Handle Animal check.
- id: antiplant_shell
  name: Antiplant Shell
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius emanation, centered on you
  duration: 10 min./level (D)
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    The _antiplant shell_ spell creates an invisible, mobile barrier that keeps all creatures within the shell protected from attacks by plant creatures or animated plants. As with many abjuration spells, forcing the barrier against creatures that the spell keeps at bay strains and collapses the field.
- id: blight
  name: Blight
  level_druid: 4
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target:
  duration: Instantaneous
  save: Fortitude half; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label:
  description: |-
    This spell withers a single plant of any size. An affected plant creature takes 1d6 points of damage per level (maximum 15d6) and may attempt a Fortitude saving throw for half damage. A plant that isn’t a creature doesn’t receive a save and immediately withers and dies.

    This spell has no effect on the soil or surrounding plant life.
- id: command_plants
  name: Command Plants
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to 2 HD/level of plant creatures, no two of which can be more than 
    30 ft. apart
  duration: One day/level
  save: Will negates
  spell_resistance: Yes
  components: V
  target_label: Targets
  description: |-
    This spell allows you some degree of control over one or more plant creatures. Affected plant creatures can understand you, and they perceive your words and actions in the most favorable way (treat their attitude as friendly). They will not attack you while the spell lasts. You can try to give a subject orders, but you must win an opposed Charisma check to convince it to do anything it wouldn’t ordinarily do. (Retries are not allowed.) A commanded plant never obeys suicidal or obviously harmful orders, but it might be convinced that something very dangerous is worth doing.

    You can affect a number of plant creatures whose combined level or HD do not exceed twice your level.
- id: control_water
  name: Control Water
  level_druid: 4
  level_cleric: 4
  level_wizard: 6
  level_ranger:
  level_paladin:
  school: Transmutation [Water]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Water in a volume of 10 ft./level by 10 ft./level by 2 ft./level (S)
  duration: 10 min./level (D)
  save: None; see text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    Depending on the version you choose, the _control water_ spell raises or lowers water.

    _Lower Water:_ This causes water or similar liquid to reduce its depth by as much as 2 feet per caster level (to a minimum depth of 1 inch). The water is lowered within a squarish depression whose sides are up to caster level x 10 feet long. In extremely large and deep bodies of water, such as a deep ocean, the spell creates a whirlpool that sweeps ships and similar craft downward, putting them at risk and rendering them unable to leave by normal movement for the duration of the spell. When cast on water elementals and other water-based creatures, this spell acts as a _slow_ spell (Will negates). The spell has no effect on other creatures.

    _Raise Water:_ This causes water or similar liquid to rise in height, just as the _lower water_ version causes it to lower. Boats raised in this way slide down the sides of the hump that the spell creates. If the area affected by the spell includes riverbanks, a beach, or other land nearby, the water can spill over onto dry land.

    With either version, you may reduce one horizontal dimension by half and double the other horizontal dimension.

    _Arcane Material Component:_ A drop of water (for _raise water_) or a pinch of dust (for _lower water_).
- id: cure_serious_wounds
  name: Cure Serious Wounds
  level_druid: 4
  level_cleric: 3
  level_wizard:
  level_ranger: 4
  level_paladin: 4
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will half (harmless); see text
  spell_resistance: Yes (harmless); see text
  components: V, S
  target_label: Target
  description: |-
    This spell functions like _cure light wounds_, except that it cures 3d8 points of damage +1 point per caster level (maximum +15).
  level_bard: 3
- id: dispel_magic
  name: Dispel Magic
  level_druid: 4
  level_cleric: 3
  level_wizard: 3
  level_ranger:
  level_paladin: 3
  school: Abjuration
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target:
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S
  target_label:
  description: |-
    You can use _dispel magic_ to end ongoing spells that have been cast on a creature or object, to temporarily suppress the magical abilities of a magic item, to end ongoing spells (or at least their effects) within an area, or to counter another spellcaster’s spell. A dispelled spell ends as if its duration had expired. Some spells, as detailed in their descriptions, can’t be defeated by _dispel magic_. _Dispel magic_ can dispel (but not counter) spell-like effects just as it does spells.

    _Note:_ The effect of a spell with an instantaneous duration can’t be dispelled, because the magical effect is already over before the _dispel magic_ can take effect.

    You choose to use _dispel magic_ in one of three ways: a targeted dispel, an area dispel, or a counterspell:

    _Targeted Dispel:_ One object, creature, or spell is the target of the _dispel magic_ spell. You make a dispel check (1d20 + your caster level, maximum +10) against the spell or against each ongoing spell currently in effect on the object or creature. The DC for this dispel check is 11 + the spell’s caster level. If you succeed on a particular check, that spell is dispelled; if you fail, that spell remains in effect.

    If you target an object or creature that is the effect of an ongoing spell (such as a monster summoned by _monster summoning_), you make a dispel check to end the spell that conjured the object or creature.

    If the object that you target is a magic item, you make a dispel check against the item’s caster level. If you succeed, all the item’s magical properties are suppressed for 1d4 rounds, after which the item recovers on its own. A suppressed item becomes nonmagical for the duration of the effect. An interdimensional interface (such as a _bag of holding_) is temporarily closed. A magic item’s physical properties are unchanged: A suppressed magic sword is still a sword (a masterwork sword, in fact). Artifacts and deities are unaffected by mortal magic such as this.

    You automatically succeed on your dispel check against any spell that you cast yourself.

    _Area Dispel:_ When _dispel magic_ is used in this way, the spell affects everything within a 20-foot radius.

    For each creature within the area that is the subject of one or more spells, you make a dispel check against the spell with the highest caster level. If that check fails, you make dispel checks against progressively weaker spells until you dispel one spell (which discharges the _dispel magic_ spell so far as that target is concerned) or until you fail all your checks. The creature’s magic items are not affected.

    For each object within the area that is the target of one or more spells, you make dispel checks as with creatures. Magic items are not affected by an area dispel.

    For each ongoing area or effect spell whose point of origin is within the area of the _dispel magic_ spell, you can make a dispel check to dispel the spell.

    For each ongoing spell whose area overlaps that of the _dispel magic_ spell, you can make a dispel check to end the effect, but only within the overlapping area.

    If an object or creature that is the effect of an ongoing spell (such as a monster summoned by _monster summoning_) is in the area, you can make a dispel check to end the spell that conjured that object or creature (returning it whence it came) in addition to attempting to dispel spells targeting the creature or object.

    You may choose to automatically succeed on dispel checks against any spell that you have cast.

    _Counterspell:_ When _dispel magic_ is used in this way, the spell targets a spellcaster and is cast as a counterspell. Unlike a true counterspell, however, _dispel magic_ may not work; you must make a dispel check to counter the other spellcaster’s spell.
  level_bard: 3
- id: giant_vermin
  name: Giant Vermin
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to three vermin, no two of which can be more than 30 ft. apart
  duration: 1 min./level
  save: None
  spell_resistance: Yes
  components: V, S, DF
  target_label: Targets
  description: |-
    You turn three normal-sized centipedes, two normal-sized spiders, or a single normal-sized scorpion into larger forms. Only one type of vermin can be transmuted (so a single casting cannot affect both a centipede and a spider), and all must be grown to the same size. The size to which the vermin can be grown depends on your level; see the table below.

    Any giant vermin created by this spell do not attempt to harm you, but your control of such creatures is limited to simple commands (“Attack,” “Defend,” “Stop,” and so forth). Orders to attack a certain creature when it appears or guard against a particular occurrence are too complex for the vermin to understand. Unless commanded to do otherwise, the giant vermin attack whoever or whatever is near them.

    Vermin size by caster level:
    - 9th or lower: Medium
    - 10th–13th: Large
    - 14th–17th: Huge
    - 18th–19th: Gargantuan
    - 20th or higher: Colossal
- id: repel_vermin
  name: Repel Vermin
  level_druid: 4
  level_cleric: 4
  level_wizard:
  level_ranger: 3
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius emanation centered on you
  duration: 10 min./level (D)
  save: None or Will negates; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    An invisible barrier holds back vermin. A vermin with Hit Dice of less than one-third your level cannot penetrate the barrier.

    A vermin with Hit Dice of one-third your level or more can penetrate the barrier if it succeeds on a Will save. Even so, crossing the barrier deals the vermin 2d6 points of damage, and pressing against the barrier causes pain, which deters most vermin.
  level_bard: 4
- id: rusting_grasp
  name: Rusting Grasp
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One nonmagical ferrous object (or the volume of the object within 3 
    ft. of the touched point) or one ferrous creature
  duration: See text
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    Any iron or iron alloy item you touch becomes instantaneously rusted, pitted, and worthless, effectively destroyed. If the item is so large that it cannot fit within a 3-foot radius a 3-foot-radius volume of the metal is rusted and destroyed. Magic items made of metal are immune to this spell.

    You may employ _rusting grasp_ in combat with a successful melee touch attack. _Rusting grasp_ used in this way instantaneously destroys 1d6 points of Armor Class gained from metal armor (to the maximum amount of protection the armor offered) through corrosion.

    Weapons in use by an opponent targeted by the spell are more difficult to grasp. You must succeed on a melee touch attack against the weapon. A metal weapon that is hit is destroyed.

    _Note:_ Striking at an opponent’s weapon provokes an attack of opportunity. Also, you must touch the weapon and not the other way around.

    Against a ferrous creature, _rusting grasp_ instantaneously deals 3d6 points of damage +1 per caster level (maximum +15) per successful attack. The spell lasts for 1 round per level, and you can make one melee touch attack per round.
- id: scrying
  name: Scrying
  level_druid: 4
  level_cleric: 5
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Divination (Scrying)
  cast_time: 1 hour
  range: See text
  target: Magical sensor
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M/DF, F
  target_label: Effect
  description: |-
    You can see and hear some creature, which may be at any distance. If the subject succeeds on a Will save, the scrying attempt simply fails. The difficulty of the save depends on how well you know the subject and what sort of physical connection (if any) you have to that creature. Furthermore, if the subject is on another plane, it gets a +5 bonus on its Will save.

    Will save modifier by your knowledge of the subject:
    - None¹: +10
    - Secondhand (you have heard of the subject): +5
    - Firsthand (you have met the subject): +0
    - Familiar (you know the subject well): –5

    ¹ You must have some sort of connection to a creature you have no knowledge of.

    Will save modifier by your connection to the subject:
    - Likeness or picture: –2
    - Possession or garment: –4
    - Body part, lock of hair, bit of nail, etc.: –10

    If the save fails, you can see and hear the subject and the subject’s immediate surroundings (approximately 10 feet in all directions of the subject). If the subject moves, the sensor follows at a speed of up to 150 feet.

    As with all divination (scrying) spells, the sensor has your full visual acuity, including any magical effects. In addition, the following spells have a 5% chance per caster level of operating through the sensor: _detect chaos_, _detect evil_, _detect good_, _detect law_, _detect magic_, and _message_.

    If the save succeeds, you can’t attempt to scry on that subject again for at least 24 hours.

    _Arcane Material Component:_ The eye of a hawk, an eagle, or a roc, plus nitric acid, copper, and zinc.

    _Wizard, Sorcerer, or Bard Focus:_ A mirror of finely wrought and highly polished silver costing not less than 1,000 gp. The mirror must be at least 2 feet by 4 feet.

    _Cleric Focus:_ A holy water font costing not less than 100 gp.

    _Druid Focus:_ A natural pool of water.
  level_bard: 3
- id: spike_stones
  name: Spike Stones
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One 20-ft. square/level
  duration: 1 hour/level (D)
  save: Reflex partial
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    Rocky ground, stone floors, and similar surfaces shape themselves into long, sharp points that blend into the background.

    _Spike stones_ impede progress through an area and deal damage. Any creature moving on foot into or through the spell’s area moves at half speed.

    In addition, each creature moving through the area takes 1d8 points of piercing damage for each 5 feet of movement through the spiked area.

    Any creature that takes damage from this spell must also succeed on a Reflex save to avoid injuries to its feet and legs. A failed save causes the creature’s speed to be reduced to half normal for 24 hours or until the injured creature receives a _cure_ spell (which also restores lost hit points). Another character can remove the penalty by taking 10 minutes to dress the injuries and succeeding on a Heal check against the spell’s save DC.

    _Spike stones_ is a magic trap that can’t be disabled with the Disable Device skill.

    _Note:_ Magic traps such as _spike stones_ are hard to detect. A rogue (only) can use the Search skill to find _spike stones_. The DC is 25 + spell level, or DC 29 for _spike stones_.
- id: summon_natures_ally_iv
  name: Summon Nature’s Ally IV
  level_druid: 4
  level_cleric:
  level_wizard:
  level_ranger: 4
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 4th-level creature, 1d3 3rd-level creatures of the same kind, or 1d4+1 lower-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: atonement
  name: Atonement
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 hour
  range: Touch
  target: Living creature touched
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S, M, F, DF, XP
  target_label: Target
  description: |-
    This spell removes the burden of evil acts or misdeeds from the subject. The creature seeking atonement must be truly repentant and desirous of setting right its misdeeds. If the atoning creature committed the evil act unwittingly or under some form of compulsion, _atonement_ operates normally at no cost to you. However, in the case of a creature atoning for deliberate misdeeds and acts of a knowing and willful nature, you must intercede with your deity (requiring you to expend 500 XP) in order to expunge the subject’s burden. Many casters first assign a subject of this sort a quest (see _geas/quest_) or similar penance to determine whether the creature is truly contrite before casting the _atonement_ spell on its behalf.

    _Atonement_ may be cast for one of several purposes, depending on the version selected.

    _Reverse Magical Alignment Change:_ If a creature has had its alignment magically changed, _atonement_ returns its alignment to its original status at no cost in experience points.

    _Restore Class:_ A paladin who has lost her class features due to committing an evil act may have her paladinhood restored to her by this spell.

    _Restore Cleric or Druid Spell Powers:_ A cleric or druid who has lost the ability to cast spells by incurring the anger of his or her deity may regain that ability by seeking _atonement_ from another cleric of the same deity or another druid. If the transgression was intentional, the casting cleric loses 500 XP for his intercession. If the transgression was unintentional, he does not lose XP.

    _Redemption or Temptation:_ You may cast this spell upon a creature of an opposing alignment in order to offer it a chance to change its alignment to match yours. The prospective subject must be present for the entire casting process. Upon completion of the spell, the subject freely chooses whether it retains its original alignment or acquiesces to your offer and changes to your alignment. No duress, compulsion, or magical influence can force the subject to take advantage of the opportunity offered if it is unwilling to abandon its old alignment. This use of the spell does not work on outsiders or any creature incapable of changing its alignment naturally.

    Though the spell description refers to evil acts, _atonement_ can also be used on any creature that has performed acts against its alignment, whether those acts are evil, good, chaotic, or lawful.

    _Note:_ Normally, changing alignment is up to the player. This use of _atonement_ simply offers a believable way for a character to change his or her alignment drastically, suddenly, and definitively.

    _Material Component:_ Burning incense.

    _Focus:_ In addition to your holy symbol or normal divine focus, you need a set of prayer beads (or other prayer device, such as a prayer wheel or prayer book) worth at least 500 gp.

    _XP Cost:_ When cast for the benefit of a creature whose guilt was the result of deliberate acts, the cost to you is 500 XP per casting (see above).
- id: baleful_polymorph
  name: Baleful Polymorph
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature
  duration: Permanent
  save: Fortitude negates, Will partial; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    As _polymorph,_ except that you change the subject into a Small or smaller animal of no more than 1 HD. If the new form would prove fatal to the creature the subject gets a +4 bonus on the save.

    If the spell succeeds, the subject must also make a Will save. If this second save fails, the creature loses its extraordinary, supernatural, and spell-like abilities, loses its ability to cast spells (if it had the ability), and gains the alignment, special abilities, and Intelligence, Wisdom, and Charisma scores of its new form in place of its own. It still retains its class and level (or HD), as well as all benefits deriving therefrom (such as base attack bonus, base save bonuses, and hit points). It retains any class features (other than spellcasting) that aren’t extraordinary, supernatural, or spell-like abilities.

    Incorporeal or gaseous creatures are immune to being _polymorphed_, and a creature with the shapechanger subtype can revert to its natural form as a standard action.
- id: call_lightning_storm
  name: Call Lightning Storm
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Electricity]
  cast_time: 1 round
  range: Long (400 ft. + 40 ft./level)
  target: One or more 30-ft.-long vertical lines of lightning
  duration: 1 min./level
  save: Reflex half
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    This spell functions like _call lightning_, except that each bolt deals 5d6 points of electricity damage (or 5d10 if created outdoors in a stormy area), and you may call a maximum of 15 bolts.
- id: control_winds
  name: Control Winds
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Transmutation [Air]
  cast_time: 1 standard action
  range: 40 ft./level
  target: 40 ft./level radius cylinder 40 ft. high
  duration: 10 min./level
  save: Fortitude negates
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You alter wind force in the area surrounding you. You can make the wind blow in a certain direction or manner, increase its strength, or decrease its strength. The new wind direction and strength persist until the spell ends or until you choose to alter your handiwork, which requires concentration. You may create an “eye” of calm air up to 80 feet in diameter at the center of the area if you so desire, and you may choose to limit the area to any cylindrical area less than your full limit.

    _Wind Direction:_ You may choose one of four basic wind patterns to function over the spell’s area.

    - A downdraft blows from the center outward in equal strength in all directions.
    - An updraft blows from the outer edges in toward the center in equal strength from all directions, veering upward before impinging on the eye in the center.
    - A rotation causes the winds to circle the center in clockwise or counterclockwise fashion.
    - A blast simply causes the winds to blow in one direction across the entire area from one side to the other.

    _Wind Strength:_ For every three caster levels, you can increase or decrease wind strength by one level. Each round on your turn, a creature in the wind must make a Fortitude save or suffer the effect of being in the windy area.

    Strong winds (21+ mph) make sailing difficult.

    A severe wind (31+ mph) causes minor ship and building damage.

    A windstorm (51+ mph) drives most flying creatures from the skies, uproots small trees, knocks down light wooden structures, tears off roofs, and endangers ships.

    Hurricane force winds (75+ mph) destroy wooden buildings, sometimes uproot even large trees, and cause most ships to founder.

    A tornado (175+ mph) destroys all nonfortified buildings and often uproots large trees.
- id: death_ward
  name: Death Ward
  level_druid: 5
  level_cleric: 4
  level_wizard:
  level_ranger:
  level_paladin: 4
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, DF
  target_label: Target
  description: |-
    The subject is immune to all death spells, magical death effects, energy drain, and any negative energy effects.

    This spell doesn’t remove negative levels that the subject has already gained, nor does it affect the saving throw necessary 24 hours after gaining a negative level.

    _Death ward_ does not protect against other sorts of attacks even if those attacks might be lethal.
- id: hallow
  name: Hallow
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Good]
  cast_time: 24 hours
  range: Touch
  target: 40-ft. radius emanating from the touched point
  duration: Instantaneous
  save: See text
  spell_resistance: See text
  components: V, S, M, DF
  target_label: Area
  description: |-
    _Hallow_ makes a particular site, building, or structure a holy site. This has four major effects.

    First, the site or structure is guarded by a _magic circle against evil_ effect.

    Second, all Charisma checks made to turn undead gain a +4 sacred bonus, and Charisma checks to command undead take a –4 penalty. Spell resistance does not apply to this effect. (This provision does not apply to the druid version of the spell.)

    Third, any dead body interred in a _hallowed_ site cannot be turned into an undead creature.

    Finally, you may choose to fix a single spell effect to the _hallowed_ site. The spell effect lasts for one year and functions throughout the entire site, regardless of the normal duration and area or effect. You may designate whether the effect applies to all creatures, creatures who share your faith or alignment, or creatures who adhere to another faith or alignment. At the end of the year, the chosen effect lapses, but it can be renewed or replaced simply by casting _hallow_ again.

    Spell effects that may be tied to a _hallowed_ site include _aid, bane, bless, cause fear, darkness, daylight, death ward, deeper darkness, detect evil, detect magic, dimensional anchor, discern lies, dispel magic, endure elements, freedom of movement, invisibility purge, protection from energy, remove fear, resist energy, silence, tongues,_ and _zone of truth_. Saving throws and spell resistance might apply to these spells’ effects. (See the individual spell descriptions for details.)

    An area can receive only one _hallow_ spell (and its associated spell effect) at a time. _Hallow_ counters but does not dispel _unhallow_.

    _Material Component:_ Herbs, oils, and incense worth at least 1,000 gp, plus 1,000 gp per level of the spell to be included in the _hallowed_ area.
- id: insect_plague
  name: Insect Plague
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Long (400 ft. + 40 ft./level)
  target: One swarm of locusts per three levels, each of which must be adjacent 
    to at least one other swarm
  duration: 1 min./level
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    You summon a number of swarms of locusts (one per three levels, to a maximum of six swarms at 18th level). The swarms must be summoned so that each one is adjacent to at least one other swarm (that is, the swarms must fill one contiguous area). You may summon the locust swarms so that they share the area of other creatures. Each swarm attacks any creatures occupying its area. The swarms are stationary after being summoned, and won’t pursue creatures that flee.
- id: stoneskin
  name: Stoneskin
  level_druid: 5
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level or until discharged
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    The warded creature gains resistance to blows, cuts, stabs, and slashes. The subject gains damage reduction 10/adamantine. (It ignores the first 10 points of damage each time it takes damage from a weapon, though an adamantine weapon bypasses the reduction.) Once the spell has prevented a total of 10 points of damage per caster level (maximum 150 points), it is discharged.

    _Material Component:_ Granite and 250 gp worth of diamond dust sprinkled on the target’s skin.
- id: summon_natures_ally_v
  name: Summon Nature’s Ally V
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning) [see text]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    This spell functions like _summon nature’s ally I,_ except that you can summon one 5th-level creature, 1d3 4th-level creatures of the same kind, or 1d4+1 lower-level creatures of the same kind.

    When you use a summoning spell to summon an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: transmute_mud_to_rock
  name: Transmute Mud to Rock
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to two 10-ft. cubes/level (S)
  duration: Permanent
  save: See text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    This spell transforms normal mud or quicksand of any depth into soft stone (sandstone or a similar mineral) permanently.

    Any creature in the mud is allowed a Reflex save to escape before the area is hardened to stone.

    _Transmute mud to rock_ counters and dispels _transmute rock to mud_.

    _Arcane Material Component:_ Sand, lime, and water.
- id: transmute_rock_to_mud
  name: Transmute Rock to Mud
  level_druid: 5
  level_cleric:
  level_wizard: 5
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to two 10-ft. cubes/level (S)
  duration: Permanent; see text
  save: See text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    This spell turns natural, uncut or unworked rock of any sort into an equal volume of mud. Magical stone is not affected by the spell. The depth of the mud created cannot exceed 10 feet. A creature unable to levitate, fly, or otherwise free itself from the mud sinks until hip- or chest-deep, reducing its speed to 5 feet and causing a –2 penalty on attack rolls and AC. Brush thrown atop the mud can support creatures able to climb on top of it. Creatures large enough to walk on the bottom can wade through the area at a speed of 5 feet.

    If _transmute rock to mud_ is cast upon the ceiling of a cavern or tunnel, the mud falls to the floor and spreads out in a pool at a depth of 5 feet. The falling mud and the ensuing cave-in deal 8d6 points of bludgeoning damage to anyone caught directly beneath the area, or half damage to those who succeed on Reflex saves.

    Castles and large stone buildings are generally immune to the effect of the spell, since _transmute rock to mud_ can’t affect worked stone and doesn’t reach deep enough to undermine such buildings’ foundations. However, small buildings or structures often rest upon foundations shallow enough to be damaged or even partially toppled by this spell.

    The mud remains until a successful _dispel magic_ or _transmute mud to rock_ spell restores its substance—but not necessarily its form. Evaporation turns the mud to normal dirt over a period of days. The exact time depends on exposure to the sun, wind, and normal drainage.

    _Arcane Material Component:_ Clay and water.
- id: tree_stride
  name: Tree Stride
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger: 4
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level or until expended; see text
  self_duration: 1
  save:
  spell_resistance:
  components: V, S, DF
  target_label: Target
  description: |-
    You gain the ability to enter trees and move from inside one tree to inside another tree. The first tree you enter and all others you enter must be of the same kind, must be living, and must have girth at least equal to yours. By moving into an oak tree (for example), you instantly know the location of all other oak trees within transport range (see below) and may choose whether you want to pass into one or simply step back out of the tree you moved into. You may choose to pass to any tree of the appropriate kind within the transport range as shown on the following table.

    Transport range by type of tree:
    - Oak, ash, yew: 3,000 feet
    - Elm, linden: 2,000 feet
    - Other deciduous: 1,500 feet
    - Any coniferous: 1,000 feet
    - All other trees: 500 feet

    You may move into a tree up to one time per caster level (passing from one tree to another counts only as moving into one tree). The spell lasts until the duration expires or you exit a tree. Each transport is a full-round action.

    You can, at your option, remain within a tree without transporting yourself, but you are forced out when the spell ends. If the tree in which you are concealed is chopped down or burned, you are slain if you do not exit before the process is complete.
- id: unhallow
  name: Unhallow
  level_druid: 5
  level_cleric: 5
  level_wizard:
  level_ranger:
  level_paladin:
  school: Evocation [Evil]
  cast_time: 24 hours
  range: Touch
  target: 40-ft. radius emanating from the touched point
  duration: Instantaneous
  save: See text
  spell_resistance: See text
  components: V, S, M
  target_label: Area
  description: |-
    _Unhallow_ makes a particular site, building, or structure an unholy site. This has three major effects.

    First, the site or structure is guarded by a _magic circle against good_ effect.

    Second, all turning checks made to turn undead take a –4 penalty, and turning checks to rebuke undead gain a +4 profane bonus. Spell resistance does not apply to this effect. (This provision does not apply to the druid version of the spell.)

    Finally, you may choose to fix a single spell effect to the _unhallowed_ site. The spell effect lasts for one year and functions throughout the entire site, regardless of its normal duration and area or effect. You may designate whether the effect applies to all creatures, creatures that share your faith or alignment, or creatures that adhere to another faith or alignment. At the end of the year, the chosen effect lapses, but it can be renewed or replaced simply by casting _unhallow_ again.

    Spell effects that may be tied to an _unhallowed_ site include _aid, bane, bless, cause fear, darkness, daylight, death ward, deeper darkness, detect magic, detect good, dimensional anchor, discern lies, dispel magic, endure elements, freedom of movement, invisibility purge, protection from energy, remove fear, resist energy, silence, tongues,_ and _zone of truth_.

    Saving throws and spell resistance might apply to these spells’ effects. (See the individual spell descriptions for details.)

    An area can receive only one _unhallow_ spell (and its associated spell effect) at a time.

    _Unhallow_ counters but does not dispel _hallow_.

    _Material Component:_ Herbs, oils, and incense worth at least 1,000 gp, plus 1,000 gp per level of the spell to be tied to the _unhallowed_ area.
- id: wall_of_fire
  name: Wall of Fire
  level_druid: 5
  level_cleric:
  level_wizard: 4
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Opaque sheet of flame up to 20 ft. long/level or a ring of fire with a
    radius of up to 5 ft. per two levels; either form 20 ft. high
  duration: Concentration + 1 round/level
  save: None
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    An immobile, blazing curtain of shimmering violet fire springs into existence. One side of the wall, selected by you, sends forth waves of heat, dealing 2d4 points of fire damage to creatures within 10 feet and 1d4 points of fire damage to those past 10 feet but within 20 feet. The wall deals this damage when it appears and on your turn each round to all creatures in the area. In addition, the wall deals 2d6 points of fire damage +1 point of fire damage per caster level (maximum +20) to any creature passing through it. The wall deals double damage to undead creatures.

    If you evoke the wall so that it appears where creatures are, each creature takes damage as if passing through the wall. If any 5-foot length of wall takes 20 points of cold damage or more in 1 round, that length goes out. (Do not divide cold damage by 4, as normal for objects.)

    _Wall of fire_ can be made permanent with a _permanency_ spell. A permanent _wall of fire_ that is extinguished by cold damage becomes inactive for 10 minutes, then reforms at normal strength.

    _Arcane Material Component:_ A small piece of phosphorus.
- id: wall_of_thorns
  name: Wall of Thorns
  level_druid: 5
  level_cleric:
  level_wizard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Wall of thorny brush, up to one 10-ft. cube/level (S)
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A _wall of thorns_ spell creates a barrier of very tough, pliable, tangled brush bearing needle-sharp thorns as long as a human’s finger. Any creature forced into or attempting to move through a _wall of thorns_ takes slashing damage per round of movement equal to 25 minus the creature’s AC. Dexterity and dodge bonuses to AC do not count for this calculation. (Creatures with an Armor Class of 25 or higher, without considering Dexterity and dodge bonuses, take no damage from contact with the wall.)

    You can make the wall as thin as 5 feet thick, which allows you to shape the wall as a number of 10-by-10-by-5-foot blocks equal to twice your caster level. This has no effect on the damage dealt by the thorns, but any creature attempting to break through takes that much less time to force its way through the barrier.

    Creatures can force their way slowly through the wall by making a Strength check as a full-round action. For every 5 points by which the check exceeds 20, a creature moves 5 feet (up to a maximum distance equal to its normal land speed). Of course, moving or attempting to move through the thorns incurs damage as described above. A creature trapped in the thorns can choose to remain motionless in order to avoid taking any more damage.

    Any creature within the area of the spell when it is cast takes damage as if it had moved into the wall and is caught inside. In order to escape, it must attempt to push its way free, or it can wait until the spell ends. Creatures with the ability to pass through overgrown areas unhindered can pass through a _wall of thorns_ at normal speed without taking damage.

    A _wall of thorns_ can be breached by slow work with edged weapons. Chopping away at the wall creates a safe passage 1 foot deep for every 10 minutes of work. Normal fire cannot harm the barrier, but magical fire burns it away in 10 minutes.

    Despite its appearance, a _wall of thorns_ is not actually a living plant, and thus is unaffected by spells that affect plants.

- id: acid_splash
  name: Acid Splash
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Acid]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One missile of acid
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: You fire a small orb of acid at the target. You must succeed on a
    ranged touch attack to hit your target. The orb deals 1d3 points of acid 
    damage.
- id: alarm
  name: Alarm
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger: 1
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 20-ft.-radius emanation centered on a point in space
  duration: 2 hours/level (D)
  save: None
  spell_resistance: No
  components: V, S, F/DF
  target_label: Area
  description: |-
    Alarm sounds a mental or audible alarm each time a creature of Tiny or larger size enters the warded area or touches it. A creature that speaks the password (determined by you at the time of casting) does not set off the alarm. You decide at the time of casting whether the alarm will be mental or audible.

    Mental Alarm: A mental alarm alerts you (and only you) so long as you remain within 1 mile of the warded area. You note a single mental "ping" that awakens you from normal sleep but does not otherwise disturb concentration. A silence spell has no effect on a mental alarm.

    Audible Alarm: An audible alarm produces the sound of a hand bell, and anyone within 60 feet of the warded area can hear it clearly. Reduce the distance by 10 feet for each interposing closed door and by 20 feet for each substantial interposing wall. In quiet conditions, the ringing can be heard faintly as far as 180 feet away. The sound lasts for 1 round. Creatures within a silence spell cannot hear the ringing.

    Ethereal or astral creatures do not trigger the alarm. Alarm can be made permanent with a permanency spell.

    Arcane Focus: A tiny bell and a piece of very fine silver wire.
- id: animate_rope
  name: Animate Rope
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One ropelike object, length up to 50 ft. + 5 ft./level; see text
  duration: 1 round/level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: |-
    You can animate a nonliving ropelike object. The maximum length assumes a rope with a 1-inch diameter. Reduce the maximum length by 50% for every additional inch of thickness, and increase it by 50% for each reduction of the rope's diameter by half.

    The possible commands are "coil" (form a neat, coiled stack), "coil and knot," "loop," "loop and knot," "tie and knot," and the opposites of all of the above ("uncoil," and so forth). You can give one command each round as a move action, as if directing an active spell.

    The rope can enwrap only a creature or an object within 1 foot of it—it does not snake outward—so it must be thrown near the intended target. Doing so requires a successful ranged touch attack roll (range increment 10 feet). A typical 1-inch-diameter hempen rope has 2 hit points, AC 10, and requires a DC 23 Strength check to burst it. The rope does not deal damage, but it can be used as a trip line or to cause a single opponent that fails a Reflex saving throw to become entangled. A creature capable of spellcasting that is bound by this spell must make a DC 15 Concentration check to cast a spell. An entangled creature can slip free with a DC 20 Escape Artist check.

    The rope itself and any knots tied in it are not magical. This spell grants a +2 bonus on any Use Rope checks you make when using the transmuted rope. The spell cannot animate objects carried or worn by a creature.
- id: arcane_mark
  name: Arcane Mark
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard:
  level_ranger:
  level_paladin:
  school: Universal
  cast_time: 1 standard action
  range: 0 ft.
  target: One personal rune or mark, all of which must fit within 1 sq. ft.
  duration: Permanent
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    This spell allows you to inscribe your personal rune or mark, which can consist of no more than six characters. The writing can be visible or invisible. An arcane mark spell enables you to etch the rune upon any substance without harm to the material upon which it is placed. If an invisible mark is made, a detect magic spell causes it to glow and be visible, though not necessarily understandable.

    See invisibility, true seeing, a gem of seeing, or a robe of eyes likewise allows the user to see an invisible arcane mark. A read magic spell reveals the words, if any. The mark cannot be dispelled, but it can be removed by the caster or by an erase spell.

    If an arcane mark is placed on a living being, normal wear gradually causes the effect to fade in about a month.

    Arcane mark must be cast on an object prior to casting instant summons on the same object (see that spell description for details).
- id: burning_hands
  name: Burning Hands
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: 15 ft.
  target: Cone-shaped burst
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: A cone of searing flame shoots from your fingertips. Any creature
    in the area of the flames takes 1d4 points of fire damage per caster level 
    (maximum 5d4). Flammable materials burn if the flames touch them. A 
    character can extinguish burning items as a full-round action.
- id: charm_person
  name: Charm Person
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Enchantment (Charm) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One humanoid creature
  duration: 1 hour/level
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    This charm makes a humanoid creature regard you as its trusted friend and ally (treat the target's attitude as friendly). If the creature is currently being threatened or attacked by you or your allies, however, it receives a +5 bonus on its saving throw.

    The spell does not enable you to control the charmed person as if it were an automaton, but it perceives your words and actions in the most favorable way. You can try to give the subject orders, but you must win an opposed Charisma check to convince it to do anything it wouldn't ordinarily do. (Retries are not allowed.) An affected creature never obeys suicidal or obviously harmful orders, but it might be convinced that something very dangerous is worth doing. Any act by you or your apparent allies that threatens the charmed person breaks the spell. You must speak the person's language to communicate your commands, or else be good at pantomiming.
- id: chill_touch
  name: Chill Touch
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Creature or creatures touched (up to one/level)
  duration: Instantaneous
  save: Fortitude partial or Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Targets
  description: |-
    A touch from your hand, which glows with blue energy, disrupts the life force of living creatures. Each touch channels negative energy that deals 1d6 points of damage. The touched creature also takes 1 point of Strength damage unless it makes a successful Fortitude saving throw. You can use this melee touch attack up to one time per level.

    An undead creature you touch takes no damage of either sort, but it must make a successful Will saving throw or flee as if panicked for 1d4 rounds +1 round per caster level.
- id: color_spray
  name: Color Spray
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Pattern) [Mind-Affecting]
  cast_time: 1 standard action
  range: 15 ft.
  target: Cone-shaped burst
  duration: Instantaneous; see text
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    A vivid cone of clashing colors springs forth from your hand, causing creatures to become stunned, perhaps also blinded, and possibly knocking them unconscious.

    Each creature within the cone is affected according to its Hit Dice.

    2 HD or less: The creature is unconscious, blinded, and stunned for 2d4 rounds, then blinded and stunned for 1d4 rounds, and then stunned for 1 round. (Only living creatures are knocked unconscious.)

    3 or 4 HD: The creature is blinded and stunned for 1d4 rounds, then stunned for 1 round.

    5 or more HD: The creature is stunned for 1 round.

    Sightless creatures are not affected by color spray.

    Material Component: A pinch each of powder or sand that is colored red, yellow, and blue.
- id: daze
  name: Daze
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One humanoid creature of 4 HD or less
  duration: 1 round
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    This enchantment clouds the mind of a humanoid creature with 4 or fewer Hit Dice so that it takes no actions. Humanoids of 5 or more HD are not affected. A dazed subject is not stunned, so attackers get no special advantage against it.

    Material Component: A pinch of wool or similar substance.
- id: detect_secret_doors
  name: Detect Secret Doors
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You can detect secret doors, compartments, caches, and so forth. Only passages, doors, or openings that have been specifically constructed to escape detection are detected by this spell. The amount of information revealed depends on how long you study a particular area or subject.

    1st Round: Presence or absence of secret doors.

    2nd Round: Number of secret doors and the location of each. If an aura is outside your line of sight, then you discern its direction but not its exact location.

    Each Additional Round: The mechanism or trigger for one particular secret portal closely examined by you. Each round, you can turn to detect secret doors in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.
- id: disguise_self
  name: Disguise Self
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level (D)
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  self_duration: 1
  description: |-
    You make yourself—including clothing, armor, weapons, and equipment—look different. You can seem 1 foot shorter or taller, thin, fat, or in between. You cannot change your body type. Otherwise, the extent of the apparent change is up to you. You could add or obscure a minor feature or look like an entirely different person.

    The spell does not provide the abilities or mannerisms of the chosen form, nor does it alter the perceived tactile (touch) or audible (sound) properties of you or your equipment.

    If you use this spell to create a disguise, you get a +10 bonus on the Disguise check.

    A creature that interacts with the glamer gets a Will save to recognize it as an illusion.
- id: disrupt_undead
  name: Disrupt Undead
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: You direct a ray of positive energy. You must make a ranged touch
    attack to hit, and if the ray hits an undead creature, it deals 1d6 points 
    of damage to it.
- id: enlarge_person
  name: Enlarge Person
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One humanoid creature
  duration: 1 min./level (D)
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    This spell causes instant growth of a humanoid creature, doubling its height and multiplying its weight by 8. This increase changes the creature's size category to the next larger one. The target gains a +2 size bonus to Strength, a -2 size penalty to Dexterity (to a minimum of 1), and a -1 penalty on attack rolls and AC due to its increased size.

    A humanoid creature whose size increases to Large has a space of 10 feet and a natural reach of 10 feet. This spell does not change the target's speed.

    If insufficient room is available for the desired growth, the creature attains the maximum possible size and may make a Strength check (using its increased Strength) to burst any enclosures in the process. If it fails, it is constrained without harm by the materials enclosing it—the spell cannot be used to crush a creature by increasing its size.

    All equipment worn or carried by a creature is similarly enlarged by the spell. Melee and projectile weapons affected by this spell deal more damage. Any enlarged item that leaves an enlarged creature's possession (including a projectile or thrown weapon) instantly returns to its normal size. Magical properties of enlarged items are not increased by this spell.

    Multiple magical effects that increase size do not stack. Enlarge person counters and dispels reduce person.

    Material Component: A pinch of powdered iron.
- id: erase
  name: Erase
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One scroll or two pages
  duration: Instantaneous
  save: See text
  spell_resistance: No
  components: V, S
  target_label: Target
  description: |-
    Erase removes writings of either magical or mundane nature from a scroll or from one or two pages of paper, parchment, or similar surfaces. With this spell, you can remove explosive runes, a glyph of warding, a sepia snake sigil, or an arcane mark, but not illusory script or a symbol spell. Nonmagical writing is automatically erased if you touch it and no one else is holding it. Otherwise, the chance of erasing nonmagical writing is 90%.

    Magic writing must be touched to be erased, and you also must succeed on a caster level check (1d20 + caster level) against DC 15. (A natural 1 or 2 is always a failure on this check.) If you fail to erase explosive runes, a glyph of warding, or a sepia snake sigil, you accidentally activate that writing instead.
- id: expeditious_retreat
  name: Expeditious Retreat
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  self_duration: 1
  description: This spell increases your base land speed by 30 feet. (This 
    adjustment is treated as an enhancement bonus.) There is no effect on other 
    modes of movement, such as burrow, climb, fly, or swim. As with any effect 
    that increases your speed, this spell affects your jumping distance (see the
    Jump skill).
- id: feather_fall
  name: Feather Fall
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 free action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One Medium or smaller freefalling object or creature/level, no two of 
    which may be more than 20 ft. apart
  duration: Until landing or 1 round/level
  save: Will negates (harmless) or Will negates (object)
  spell_resistance: Yes (object)
  components: V
  target_label: Targets
  description: |-
    The affected creatures or objects fall slowly. Feather fall instantly changes the rate at which the targets fall to a mere 60 feet per round (equivalent to the end of a fall from a few feet), and the subjects take no damage upon landing while the spell is in effect. However, when the spell duration expires, a normal rate of falling resumes.

    The spell affects one or more Medium or smaller creatures (including gear and carried objects up to each creature's maximum load) or objects, or the equivalent in larger creatures: A Large creature or object counts as two Medium creatures or objects, a Huge creature or object counts as two Large creatures or objects, and so forth.

    You can cast this spell with an instant utterance, quickly enough to save yourself if you unexpectedly fall. Casting the spell is a free action, like casting a quickened spell, and it counts toward the normal limit of one quickened spell per round. You may even cast this spell when it isn't your turn.

    Feather fall works only upon free-falling objects. It does not affect a sword blow or a charging or flying creature.
- id: floating_disk
  name: Floating Disk
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 3-ft.-diameter disk of force
  duration: 1 hour/level
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You create a slightly concave, circular plane of force that follows you about and carries loads for you. The disk is 3 feet in diameter and 1 inch deep at its center. It can hold 100 pounds of weight per caster level. (If used to transport a liquid, its capacity is 2 gallons.) The disk floats approximately 3 feet above the ground at all times and remains level. It floats along horizontally within spell range and will accompany you at a rate of no more than your normal speed each round. If not otherwise directed, it maintains a constant interval of 5 feet between itself and you. The disk winks out of existence when the spell duration expires. The disk also winks out if you move beyond range or try to take the disk more than 3 feet away from the surface beneath it. When the disk winks out, whatever it was supporting falls to the surface beneath it.

    Material Component: A drop of mercury.
- id: grease
  name: Grease
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One object or a 10-ft. square
  duration: 1 round/level (D)
  save: See text
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    A grease spell covers a solid surface with a layer of slippery grease. Any creature in the area when the spell is cast must make a successful Reflex save or fall. This save is repeated on your turn each round that the creature remains within the area. A creature can walk within or through the area of grease at half normal speed with a DC 10 Balance check. Failure means it can't move that round (and must then make a Reflex save or fall), while failure by 5 or more means it falls (see the Balance skill for details).

    The spell can also be used to create a greasy coating on an item. Material objects not in use are always affected by this spell, while an object wielded or employed by a creature receives a Reflex saving throw to avoid the effect. If the initial saving throw fails, the creature immediately drops the item. A saving throw must be made in each round that the creature attempts to pick up or use the greased item. A creature wearing greased armor or clothing gains a +10 circumstance bonus on Escape Artist checks and on grapple checks made to resist or escape a grapple or to escape a pin.

    Material Component: A bit of pork rind or butter.
- id: hideous_laughter
  name: Hideous Laughter
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature; see text
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    This spell afflicts the subject with uncontrollable laughter. It collapses into gales of manic laughter, falling prone. The subject can take no actions while laughing, but is not considered helpless. After the spell ends, it can act normally.

    A creature with an Intelligence score of 2 or lower is not affected. A creature whose type is different from the caster's receives a +4 bonus on its saving throw, because humor doesn't "translate" well.

    Material Component: Tiny tarts that are thrown at the target and a feather that is waved in the air.
- id: hold_portal
  name: Hold Portal
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One portal, up to 20 sq. ft./level
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V
  target_label: Target
  description: This spell magically holds shut a door, gate, window, or shutter 
    of wood, metal, or stone. The magic affects the portal just as if it were 
    securely closed and normally locked. A knock spell or a successful dispel 
    magic spell can negate a hold portal spell. For a portal affected by this 
    spell, add 5 to the normal DC for forcing open the portal.
- id: hypnotism
  name: Hypnotism
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: Several living creatures, no two of which may be more than 30 ft. 
    apart
  duration: 2d4 rounds (D)
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: |-
    Your gestures and droning incantation fascinate nearby creatures, causing them to stop and stare blankly at you. In addition, you can use their rapt attention to make your suggestions and requests seem more plausible. Roll 2d4 to see how many total Hit Dice of creatures you affect. Creatures with fewer HD are affected before creatures with more HD. Only creatures that can see or hear you are affected, but they do not need to understand you to be fascinated.

    If you use this spell in combat, each target gains a +2 bonus on its saving throw. If the spell affects only a single creature not in combat at the time, the saving throw has a penalty of -2.

    While the subject is fascinated by this spell, it reacts as though it were two steps more friendly in attitude. This allows you to make a single request of the affected creature (provided you can communicate with it). The request must be brief and reasonable. Even after the spell ends, the creature retains its new attitude toward you, but only with respect to that particular request.

    A creature that fails its saving throw does not remember that you enspelled it.
- id: identify
  name: Identify
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 hour
  range: Touch
  target: One touched object
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Targets
  description: |-
    The spell determines all magic properties of a single magic item, including how to activate those functions (if appropriate), and how many charges are left (if any).

    Identify does not function when used on an artifact.

    Arcane Material Component: A pearl of at least 100 gp value, crushed and stirred into wine with an owl feather; the infusion must be drunk prior to spellcasting.
- id: lesser_confusion
  name: Lesser Confusion
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 round
  save: Will negates
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: This spell causes a single creature to become confused for 1 
    round. See the confusion spell to determine the exact effect on the subject.
- id: lullaby
  name: Lullaby
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Living creatures within a 10-ft.-radius burst
  duration: Concentration + 1 round/level (D)
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: "Any creature within the area that fails a Will save becomes drowsy
    and inattentive, taking a –5 penalty on Listen and Spot checks and a –2 penalty
    on Will saves against sleep effects while the lullaby is in effect. Lullaby lasts
    for as long as the caster concentrates, plus up to 1 round per caster level thereafter."
- id: mage_armor
  name: Mage Armor
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Force]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 hour/level (D)
  save: Will negates (harmless)
  spell_resistance: No
  components: V, S, F
  target_label: Target
  description: |-
    An invisible but tangible field of force surrounds the subject of a mage armor spell, providing a +4 armor bonus to AC.

    Unlike mundane armor, mage armor entails no armor check penalty, arcane spell failure chance, or speed reduction. Since mage armor is made of force, incorporeal creatures can't bypass it the way they do normal armor.

    Focus: A piece of cured leather.
- id: mage_hand
  name: Mage Hand
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One nonmagical, unattended object weighing up to 5 lb.
  duration: Concentration
  save: None
  spell_resistance: No
  components: V, S
  target_label: Target
  description: You point your finger at an object and can lift it and move it at
    will from a distance. As a move action, you can propel the object as far as 
    15 feet in any direction, though the spell ends if the distance between you 
    and the object ever exceeds the spell's range.
- id: magic_aura
  name: Magic Aura
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Touch
  target: One touched object weighing up to 5 lb./level
  duration: One day/level (D)
  save: None; see text
  spell_resistance: No
  components: V, S, F
  target_label: Target
  description: |-
    You alter an item's aura so that it registers to detect spells (and spells with similar capabilities) as though it were nonmagical, or a magic item of a kind you specify, or the subject of a spell you specify.

    If the object bearing magic aura has identify cast on it or is similarly examined, the examiner recognizes that the aura is false and detects the object's actual qualities if he succeeds on a Will save. Otherwise, he believes the aura and no amount of testing reveals what the true magic is.

    If the targeted item's own aura is exceptionally powerful (if it is an artifact, for instance), magic aura doesn't work.

    Note: A magic weapon, shield, or suit of armor must be a masterwork item, so a sword of average make, for example, looks suspicious if it has a magical aura.

    Focus: A small square of silk that must be passed over the object that receives the aura.
- id: magic_missile
  name: Magic Missile
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to five creatures, no two of which can be more than 15 ft. apart
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Targets
  description: |-
    A missile of magical energy darts forth from your fingertip and strikes its target, dealing 1d4+1 points of force damage.

    The missile strikes unerringly, even if the target is in melee combat or has less than total cover or total concealment. Specific parts of a creature can't be singled out. Inanimate objects are not damaged by the spell.

    For every two caster levels beyond 1st, you gain an additional missile—two at 3rd level, three at 5th, four at 7th, and the maximum of five missiles at 9th level or higher. If you shoot multiple missiles, you can have them strike a single creature or several creatures. A single missile can strike only one creature. You must designate targets before you check for spell resistance or roll damage.
- id: magic_mouth
  name: Magic Mouth
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature or object
  duration: Permanent until discharged
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, M
  target_label: Target
  description: |-
    This spell imbues the chosen object or creature with an enchanted mouth that suddenly appears and speaks its message the next time a specified event occurs. The message, which must be twenty-five or fewer words long, can be in any language known by you and can be delivered over a period of 10 minutes. The mouth cannot utter verbal components, use command words, or activate magical effects. It does, however, move according to the words articulated; if it were placed upon a statue, the mouth of the statue would move and appear to speak.

    The spell functions when specific conditions are fulfilled according to your command as set in the spell. Commands can be as general or as detailed as desired, although only visual and audible triggers can be used. Triggers react to what appears to be the case. Disguises and illusions can fool them. Normal darkness does not defeat a visual trigger, but magical darkness or invisibility does. Silent movement or magical silence defeats audible triggers. Audible triggers can be keyed to general types of noises or to a specific noise or spoken word. Actions can serve as triggers if they are visible or audible. A magic mouth cannot distinguish alignment, level, Hit Dice, or class except by external garb.

    The range limit of a trigger is 15 feet per caster level. Regardless of range, the mouth can respond only to visible or audible triggers and actions in line of sight or within hearing distance.

    Magic mouth can be made permanent with a permanency spell.

    Material Component: A small bit of honeycomb and jade dust worth 10 gp.
- id: message
  name: Message
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Transmutation [Language-Dependent]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One creature/level
  duration: 10 min./level
  save: None
  spell_resistance: No
  components: V, S, F
  target_label: Targets
  description: |-
    You can whisper messages and receive whispered replies with little chance of being overheard. You point your finger at each creature you want to receive the message. When you whisper, the whispered message is audible to all targeted creatures within range. Magical silence, 1 foot of stone, 1 inch of common metal (or a thin sheet of lead), or 3 feet of wood or dirt blocks the spell. The message does not have to travel in a straight line. It can circumvent a barrier if there is an open path between you and the subject, and the path's entire length lies within the spell's range. The creatures that receive the message can whisper a reply that you hear. The spell transmits sound, not meaning. It doesn't transcend language barriers.

    Note: To speak a message, you must mouth the words and whisper, possibly allowing observers the opportunity to read your lips.

    Focus: A short piece of copper wire.
- id: mount
  name: Mount
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One mount
  duration: 2 hours/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You summon a light horse or a pony (your choice) to serve you as a mount. The steed serves willingly and well. The mount comes with a bit and bridle and a riding saddle.

    Material Component: A bit of horse hair.
- id: obscure_object
  name: Obscure Object
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One object touched of up to 100 lb./level
  duration: 8 hours (D)
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell hides an object from location by divination (scrying) effects, such as the scrying spell or a crystal ball. Such an attempt automatically fails (if the divination is targeted on the object) or fails to perceive the object (if the divination is targeted on a nearby location, object, or person).

    Arcane Material Component: A piece of chameleon skin.
- id: open_close
  name: Open/Close
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Object weighing up to 30 lb. or portal that can be opened or closed
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, F
  target_label: Target
  description: |-
    You can open or close (your choice) a door, chest, box, window, bag, pouch, bottle, barrel, or other container. If anything resists this activity (such as a bar on a door or a lock on a chest), the spell fails. In addition, the spell can only open and close things weighing 30 pounds or less. Thus, doors, chests, and similar objects sized for enormous creatures may be beyond this spell's ability to affect.

    Focus: A brass key.
- id: ray_of_enfeeblement
  name: Ray of Enfeeblement
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray
  duration: 1 min./level
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: A coruscating ray springs from your hand. You must succeed on a 
    ranged touch attack to strike a target. The subject takes a penalty to 
    Strength equal to 1d6+1 per two caster levels (maximum 1d6+5). The subject's
    Strength score cannot drop below 1.
- id: ray_of_frost
  name: Ray of Frost
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: A ray of freezing air and ice projects from your pointing finger.
    You must succeed on a ranged touch attack with the ray to deal damage to a 
    target. The ray deals 1d3 points of cold damage.
- id: reduce_person
  name: Reduce Person
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One humanoid creature
  duration: 1 min./level (D)
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    This spell causes instant diminution of a humanoid creature, halving its height, length, and width and dividing its weight by 8. This decrease changes the creature's size category to the next smaller one. The target gains a +2 size bonus to Dexterity, a -2 size penalty to Strength (to a minimum of 1), and a +1 bonus on attack rolls and AC due to its reduced size.

    A Small humanoid creature whose size decreases to Tiny has a space of 2-1/2 feet and a natural reach of 0 feet (meaning that it must enter an opponent's square to attack). A Large humanoid creature whose size decreases to Medium has a space of 5 feet and a natural reach of 5 feet. This spell doesn't change the target's speed.

    All equipment worn or carried by a creature is similarly reduced by the spell. Melee and projectile weapons deal less damage. Any reduced item that leaves the reduced creature's possession instantly returns to its normal size.

    Multiple magical effects that reduce size do not stack. Reduce person counters and dispels enlarge person.

    Material Component: A pinch of powdered iron.
- id: shield
  name: Shield
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration [Force]
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  save:
  spell_resistance:
  components: V, S
  target_label: Target
  self_duration: 1
  description: Shield creates an invisible, tower shield-sized mobile disk of 
    force that hovers in front of you. It negates magic missile attacks directed
    at you. The disk also provides a +4 shield bonus to AC. This bonus applies 
    against incorporeal touch attacks, since it is a force effect. The shield 
    has no armor check penalty or arcane spell failure chance. Unlike with a 
    normal tower shield, you can't use the shield spell for cover.
- id: shocking_grasp
  name: Shocking Grasp
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Electricity]
  cast_time: 1 standard action
  range: Touch
  target: Creature or object touched
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: Your successful melee touch attack deals 1d6 points of 
    electricity damage per caster level (maximum 5d6). When delivering the jolt,
    you gain a +3 bonus on attack rolls if the opponent is wearing metal armor 
    (or made out of metal, carrying a lot of metal, or the like).
- id: silent_image
  name: Silent Image
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Visual figment that cannot extend beyond four 10-ft. cubes + one 
    10-ft. cube/level (S)
  duration: Concentration
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S, F
  target_label: Effect
  description: |-
    This spell creates the visual illusion of an object, creature, or force, as visualized by you. The illusion does not create sound, smell, texture, or temperature. You can move the image within the limits of the size of the effect.

    Focus: A bit of fleece.
- id: sleep
  name: Sleep
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round
  range: Medium (100 ft. + 10 ft./level)
  target: One or more living creatures within a 10-ft.-radius burst
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    A sleep spell causes a magical slumber to come upon 4 Hit Dice of creatures. Creatures with the fewest HD are affected first.

    Among creatures with equal HD, those who are closest to the spell's point of origin are affected first. Hit Dice that are not sufficient to affect a creature are wasted.

    Sleeping creatures are helpless. Slapping or wounding awakens an affected creature, but normal noise does not. Awakening a creature is a standard action (an application of the aid another action).

    Sleep does not target unconscious creatures, constructs, or undead creatures.

    Material Component: A pinch of fine sand, rose petals, or a live cricket.
- id: summon_instrument
  name: Summon Instrument
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 0
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 round
  range: 0 ft.
  target: One summoned handheld musical instrument
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: This spell summons one handheld musical instrument of your 
    choice. This instrument appears in your hands or at your feet (your choice).
    The instrument is typical for its type. Only one instrument appears per 
    casting, and it will play only for you. You can't summon an instrument too 
    large to be held in two hands.
- id: touch_of_fatigue
  name: Touch of Fatigue
  level_druid:
  level_cleric:
  level_wizard: 0
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 round/level
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    You channel negative energy through your touch, fatiguing the target. You must succeed on a touch attack to strike a target.

    The subject is immediately fatigued for the spell's duration. This spell has no effect on a creature that is already fatigued. Unlike with normal fatigue, the effect ends as soon as the spell's duration expires.

    Material Component: A drop of sweat.
- id: true_strike
  name: True Strike
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: See text
  save:
  spell_resistance:
  components: V, F
  target_label: Target
  self_duration: 1
  description: |-
    You gain temporary, intuitive insight into the immediate future during your next attack. Your next single attack roll (if it is made before the end of the next round) gains a +20 insight bonus. Additionally, you are not affected by the miss chance that applies to attackers trying to strike a concealed target.

    Focus: A small wooden replica of an archery target.
- id: undetectable_alignment
  name: Undetectable Alignment
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature or object
  duration: 24 hours
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: An undetectable alignment spell conceals the alignment of an 
    object or a creature from all forms of divination.
- id: unseen_servant
  name: Unseen Servant
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One invisible, mindless, shapeless servant
  duration: 1 hour/level
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    An unseen servant is an invisible, mindless, shapeless force that performs simple tasks at your command. It can run and fetch things, open unstuck doors, and hold chairs, as well as clean and mend. The servant can perform only one activity at a time, but it repeats the same activity over and over again if told to do so as long as you remain within range. It can open only normal doors, drawers, lids, and the like. It has an effective Strength score of 2 (so it can lift 20 pounds or drag 100 pounds). It can trigger traps and such, but it can exert only 20 pounds of force, which is not enough to activate certain pressure plates and other devices. It can't perform any task that requires a skill check with a DC higher than 10 or that requires a check using a skill that can't be used untrained. Its speed is 15 feet.

    The servant cannot attack in any way; it is never allowed an attack roll. It cannot be killed, but it dissipates if it takes 6 points of damage from area attacks. (It gets no saves against attacks.) If you attempt to send it beyond the spell's range (measured from your current position), the servant ceases to exist.

    Material Component: A piece of string and a bit of wood.
- id: ventriloquism
  name: Ventriloquism
  level_druid:
  level_cleric:
  level_wizard: 1
  level_bard: 1
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Intelligible sound, usually speech
  duration: 1 min./level (D)
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, F
  target_label: Effect
  description: |-
    You can make your voice (or any sound that you can normally make vocally) seem to issue from someplace else. You can speak in any language you know. With respect to such voices and sounds, anyone who hears the sound and rolls a successful save recognizes it as illusory (but still hears it).

    Focus: A parchment rolled up into a small cone.
- id: acid_arrow
  name: Acid Arrow
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Acid]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: One arrow of acid
  duration: 1 round + 1 round per three levels
  save: None
  spell_resistance: No
  components: V, S, M, F
  target_label: Effect
  description: |-
    A magical arrow of acid springs from your hand and speeds to its target. You must succeed on a ranged touch attack to hit your target. The arrow deals 2d4 points of acid damage with no splash damage. For every three caster levels (to a maximum of 18th), the acid, unless somehow neutralized, lasts for another round, dealing another 2d4 points of damage in that round.

    _Material Component:_ Powdered rhubarb leaf and an adder’s stomach.

    _Focus:_ A dart.
- id: acid_fog
  name: Acid Fog
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Acid]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Fog spreads in 20-ft. radius, 20 ft. high
  duration: 1 round/level
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Effect
  description: |-
    _Acid fog_ creates a billowing mass of misty vapors similar to that produced by a _solid fog_ spell. In addition to slowing creatures down and obscuring sight, this spell’s vapors are highly acidic. Each round on your turn, starting when you cast the spell, the fog deals 2d6 points of acid damage to each creature and object within it.

    _Arcane Material Component:_ A pinch of dried, powdered peas combined with powdered animal hoof.
- id: alter_self
  name: Alter Self
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    You assume the form of a creature of the same type as your normal form. The new form must be within one size category of your normal size. The maximum HD of an assumed form is equal to your caster level, to a maximum of 5 HD at 5th level. You can change into a member of your own kind or even into yourself.

    You retain your own ability scores. Your class and level, hit points, alignment, base attack bonus, and base save bonuses all remain the same. You retain all supernatural and spell-like special attacks and qualities of your normal form, except for those requiring a body part that the new form does not have (such as a mouth for a breath weapon or eyes for a gaze attack).

    You keep all extraordinary special attacks and qualities derived from class levels, but you lose any from your normal form that are not derived from class levels.

    If the new form is capable of speech, you can communicate normally. You retain any spellcasting ability you had in your original form, but the new form must be able to speak intelligibly (that is, speak a language) to use verbal components and must have limbs capable of fine manipulation to use somatic or material components.

    You acquire the physical qualities of the new form while retaining your own mind. Physical qualities include natural size, mundane movement capabilities (such as burrowing, climbing, walking, swimming, and flight with wings, to a maximum speed of 120 feet for flying or 60 feet for nonflying movement), natural armor bonus, natural weapons (such as claws, bite, and so on), racial skill bonuses, racial bonus feats, and any gross physical qualities (presence or absence of wings, number of extremities, and so forth). A body with extra limbs does not allow you to make more attacks (or more advantageous two-weapon attacks) than normal.

    You do not gain any extraordinary special attacks or special qualities not noted above under physical qualities, such as darkvision, low-light vision, blindsense, blindsight, fast healing, regeneration, scent, and so forth.

    You do not gain any supernatural special attacks, special qualities, or spell-like abilities of the new form. Your creature type and subtype (if any) remain the same regardless of your new form. You cannot take the form of any creature with a template, even if that template doesn’t change the creature type or subtype.

    You can freely designate the new form’s minor physical qualities (such as hair color, hair texture, and skin color) within the normal ranges for a creature of that kind. The new form’s significant physical qualities (such as height, weight, and gender) are also under your control, but they must fall within the norms for the new form’s kind. You are effectively disguised as an average member of the new form’s race. If you use this spell to create a disguise, you get a +10 bonus on your Disguise check.

    When the change occurs, your equipment, if any, either remains worn or held by the new form (if it is capable of wearing or holding the item), or melds into the new form and becomes nonfunctional. When you revert to your true form, any objects previously melded into the new form reappear in the same location on your body they previously occupied and are once again functional. Any new items you wore in the assumed form and can’t wear in your normal form fall off and land at your feet; any that you could wear in either form or carry in a body part common to both forms at the time of reversion are still held in the same way. Any part of the body or piece of equipment that is separated from the whole reverts to its true form.
- id: analyze_dweomer
  name: Analyze Dweomer
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One object or creature per caster level
  duration: 1 round/level (D)
  save: None or Will negates; see text
  spell_resistance: No
  components: V, S, F
  target_label: Targets
  description: |-
    You discern all spells and magical properties present in a number of creatures or objects. Each round, you may examine a single creature or object that you can see as a free action. In the case of a magic item, you learn its functions, how to activate its functions (if appropriate), and how many charges are left (if it uses charges). In the case of an object or creature with active spells cast upon it, you learn each spell, its effect, and its caster level.

    An attended object may attempt a Will save to resist this effect if its holder so desires. If the save succeeds, you learn nothing about the object except what you can discern by looking at it. An object that makes its save cannot be affected by any other _analyze dweomer_ spells for 24 hours.

    _Analyze dweomer_ does not function when used on an artifact.

    _Focus:_ A tiny lens of ruby or sapphire set in a small golden loop. The gemstone must be worth at least 1,500 gp.
- id: animate_dead
  name: Animate Dead
  level_druid:
  level_cleric: 3
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: 1 standard action
  range: Touch
  target: One or more corpses touched
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Targets
  description: |-
    This spell turns the bones or bodies of dead creatures into undead skeletons or zombies that follow your spoken commands.

    The undead can follow you, or they can remain in an area and attack any creature (or just a specific kind of creature) entering the place. They remain animated until they are destroyed. (A destroyed skeleton or zombie can’t be animated again.)

    Regardless of the type of undead you create with this spell, you can’t create more HD of undead than twice your caster level with a single casting of _animate dead_. (The _desecrate_ spell doubles this limit)

    The undead you create remain under your control indefinitely. No matter how many times you use this spell, however, you can control only 4 HD worth of undead creatures per caster level. If you exceed this number, all the newly created creatures fall under your control, and any excess undead from previous castings become uncontrolled. (You choose which creatures are released.) If you are a cleric, any undead you might command by virtue of your power to command or rebuke undead do not count toward the limit.

    _Skeletons:_ A skeleton can be created only from a mostly intact corpse or skeleton. The corpse must have bones. If a skeleton is made from a corpse, the flesh falls off the bones.

    _Zombies:_ A zombie can be created only from a mostly intact corpse. The corpse must be that of a creature with a true anatomy.

    _Material Component:_ You must place a black onyx gem worth at least 25 gp per Hit Die of the undead into the mouth or eye socket of each corpse you intend to animate. The magic of the spell turns these gems into worthless, burned-out shells.
- id: animate_objects
  name: Animate Objects
  level_druid:
  level_cleric: 6
  level_wizard:
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One Small object per caster level; see text
  duration: 1 round/level
  save: None
  spell_resistance: No
  components: V, S
  target_label: Targets
  description: |-
    You imbue inanimate objects with mobility and a semblance of life. Each such animated object then immediately attacks whomever or whatever you initially designate.

    An animated object can be of any nonmagical material. You may animate one Small or smaller object or an equivalent number of larger objects per caster level. A Medium object counts as two Small or smaller objects, a Large object as four, a Huge object as eight, a Gargantuan object as sixteen, and a Colossal object as thirty-two. You can change the designated target or targets as a move action, as if directing an active spell.

    This spell cannot animate objects carried or worn by a creature.

    _Animate objects_ can be made permanent with a _permanency_ spell.
- id: antimagic_field
  name: Antimagic Field
  level_druid:
  level_cleric: 8
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius emanation, centered on you
  duration: 10 min./level (D)
  save: None
  spell_resistance: See text
  components: V, S, M/DF
  target_label: Area
  description: |-
    An invisible barrier surrounds you and moves with you. The space within this barrier is impervious to most magical effects, including spells, spell-like abilities, and supernatural abilities. Likewise, it prevents the functioning of any magic items or spells within its confines.

    An _antimagic field_ suppresses any spell or magical effect used within, brought into, or cast into the area, but does not dispel it. Time spent within an _antimagic field_ counts against the suppressed spell’s duration.

    Summoned creatures of any type and incorporeal undead wink out if they enter an _antimagic field._ They reappear in the same spot once the field goes away. Time spent winked out counts normally against the duration of the conjuration that is maintaining the creature. If you cast _antimagic field_ in an area occupied by a summoned creature that has spell resistance, you must make a caster level check (1d20 + caster level) against the creature’s spell resistance to make it wink out. (The effects of instantaneous conjurationsare not affected by an _antimagic field_ because the conjuration itself is no longer in effect, only its result.)

    A normal creature can enter the area, as can normal missiles. Furthermore, while a magic sword does not function magically within the area, it is still a sword (and a masterwork sword at that). The spell has no effect on golems and other constructs that are imbued with magic during their creation process and are thereafter self-supporting (unless they have been summoned, in which case they are treated like any other summoned creatures). Elementals, corporeal undead, and outsiders are likewise unaffected unless summoned. These creatures’ spell-like or supernatural abilities, however, may be temporarily nullified by the field. _Dispel magic_ does not remove the field.

    Two or more _antimagic fields_ sharing any of the same space have no effect on each other. Certain spells, such as _wall of force, prismatic sphere_, and _prismatic wall,_ remain unaffected by _antimagic field_ (see the individual spell descriptions). Artifacts and deities are unaffected by mortal magic such as this.

    Should a creature be larger than the area enclosed by the barrier, any part of it that lies outside the barrier is unaffected by the field.

    _Arcane Material Component:_ A pinch of powdered iron or iron filings.
- id: antipathy
  name: Antipathy
  level_druid: 9
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 hour
  range: Close (25 ft. + 5 ft./2 levels)
  target: One location (up to a 10-ft. cube/level) or one object
  duration: 2 hours/level (D)
  save: Will partial
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Target
  description: |-
    You cause an object or location to emanate magical vibrations that repel either a specific kind of intelligent creature or creatures of a particular alignment, as defined by you. The kind of creature to be affected must be named specifically. A creature subtype is not specific enough. Likewise, the specific alignment to be repelled must be named.

    Creatures of the designated kind or alignment feel an overpowering urge to leave the area or to avoid the affected item.

    A compulsion forces them to abandon the area or item, shunning it and never willingly returning to it while the spell is in effect. A creature that makes a successful saving throw can stay in the area or touch the item but feels uncomfortable doing so. This distracting discomfort reduces the creature’s Dexterity score by 4 points.

    _Antipathy_ counters and dispels _sympathy_.

    _Arcane Material Component:_ A lump of alum soaked in vinegar.
- id: arcane_eye
  name: Arcane Eye
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination (Scrying)
  cast_time: 10 minutes
  range: Unlimited
  target: Magical sensor
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You create an invisible magical sensor that sends you visual information. You can create the _arcane eye_ at any point you can see, but it can then travel outside your line of sight without hindrance. An _arcane eye_ travels at 30 feet per round (300 feet per minute) if viewing an area ahead as a human would (primarily looking at the floor) or 10 feet per round (100 feet per minute) if examining the ceiling and walls as well as the floor ahead. It sees exactly as you would see if you were there.

    The eye can travel in any direction as long as the spell lasts. Solid barriers block its passage, but it can pass through a hole or space as small as 1 inch in diameter. The eye can’t enter another plane of existence, even through a _gate_ or similar magical portal.

    You must concentrate to use an _arcane eye._ If you do not concentrate, the eye is inert until you again concentrate.

    _Material Component:_ A bit of bat fur.
- id: arcane_lock
  name: Arcane Lock
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: The door, chest, or portal touched, up to 30 sq. ft./level in size
  duration: Permanent
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    An _arcane lock_ spell cast upon a door, chest, or portal magically locks it. You can freely pass your own _arcane lock_ without affecting it; otherwise, a door or object secured with this spell can be opened only by breaking in or with a successful _dispel magic_ or _knock_ spell. Add 10 to the normal DC to break open a door or portal affected by this spell. (A _knock_ spell does not remove an _arcane lock;_ it only suppresses the effect for 10 minutes.)

    _Material Component:_ Gold dust worth 25 gp.
- id: arcane_sight
  name: Arcane Sight
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    This spell makes your eyes glow blue and allows you to see magical auras within 120 feet of you. The effect is similar to that of a _detect magic_ spell, but _arcane sight_ does not require concentration and discerns aura location and power more quickly.

    You know the location and power of all magical auras within your sight. An aura’s power depends on a spell’s functioning level or an item’s caster level, as noted in the description of the _detect magic_ spell. If the items or creatures bearing the auras are in line of sight, you can make Spellcraft skill checks to determine the school of magic involved in each. (Make one check per aura; DC 15 + spell level, or 15 + one-half caster level for a nonspell effect.)

    If you concentrate on a specific creature within 120 feet of you as a standard action, you can determine whether it has any spellcasting or spell-like abilities, whether these are arcane or divine (spell-like abilities register as arcane), and the strength of the most powerful spell or spell-like ability the creature currently has available for use.

    _Arcane sight_ can be made permanent with a _permanency_ spell.
- id: arcane_sight_greater
  name: Arcane Sight, Greater
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _arcane sight,_ except that you automatically know which spells or magical effects are active upon any individual or object you see.

    _Greater arcane sight_ doesn’t let you identify magic items.

    Unlike _arcane sight_, this spell cannot be made permanent with a _permanency_ spell.
- id: astral_projection
  name: Astral Projection
  level_druid:
  level_cleric: 9
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 30 minutes
  range: Touch
  target: You plus one additional willing creature touched per two caster levels
  duration: See text
  save: None
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    By freeing your spirit from your physical body, this spell allows you to project an astral body onto another plane altogether.

    You can bring the astral forms of other willing creatures with you, provided that these subjects are linked in a circle with you at the time of the casting. These fellow travelers are dependent upon you and must accompany you at all times. If something happens to you during the journey, your companions are stranded wherever you left them.

    You project your astral self onto the Astral Plane, leaving your physical body behind on the Material Plane in a state of suspended animation. The spell projects an astral copy of you and all you wear or carry onto the Astral Plane. Since the Astral Plane touches upon other planes, you can travel astrally to any of these other planes as you will. To enter one, you leave the Astral Plane, forming a new physical body (and equipment) on the plane of existence you have chosen to enter.

    While you are on the Astral Plane, your astral body is connected at all times to your physical body by a silvery cord. If the cord is broken, you are killed, astrally and physically. Luckily, very few things can destroy a silver cord. When a second body is formed on a different plane, the incorporeal silvery cord remains invisibly attached to the new body. If the second body or the astral form is slain, the cord simply returns to your body where it rests on the Material Plane, thereby reviving it from its state of suspended animation. Although astral projections are able to function on the Astral Plane, their actions affect only creatures existing on the Astral Plane; a physical body must be materialized on other planes.

    You and your companions may travel through the Astral Plane indefinitely. Your bodies simply wait behind in a state of suspended animation until you choose to return your spirits to them. The spell lasts until you desire to end it, or until it is terminated by some outside means, such as _dispel magic_ cast upon either the physical body or the astral form, the breaking of the silver cord, or the destruction of your body back on the Material Plane (which kills you).

    _Material Component:_ A jacinth worth at least 1,000 gp, plus a silver bar worth 5 gp for each person to be affected.
- id: banishment
  name: Banishment
  level_druid:
  level_cleric: 6
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more extraplanar creatures, no two of which can be more than 30
    ft. apart
  duration: Instantaneous
  save: Will negates
  spell_resistance: Yes
  components: V, S, F
  target_label: Targets
  description: |-
    A _banishment_ spell is a more powerful version of the _dismissal_ spell. It enables you to force extraplanar creatures out of your home plane. As many as 2 Hit Dice of creatures per caster level can be banished.

    You can improve the spell’s chance of success by presenting at least one object or substance that the target hates, fears, or otherwise opposes. For each such object or substance, you gain a +1 bonus on your caster level check to overcome the target’s spell resistance (if any), the saving throw DC increases by 2.

    Certain rare items might work twice as well as a normal item for the purpose of the bonuses (each providing a +2 bonus on the caster level check against spell resistance and increasing the save DC by 4).

    _Arcane Focus:_ Any item that is distasteful to the subject (optional, see above).
- id: bears_endurance_mass
  name: Bear’s Endurance, Mass
  level_druid: 6
  level_cleric: 6
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Targets
  description: _Mass bear ’s endurance_ works like _bear ’s endurance_, except 
    that it affects multiple creatures.
- id: bestow_curse
  name: Bestow Curse
  level_druid:
  level_cleric: 3
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Permanent
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You place a curse on the subject. Choose one of the following three effects.

    - –6 decrease to an ability score (minimum 1).
    - –4 penalty on attack rolls, saves, ability checks, and skill checks.
    - Each turn, the target has a 50% chance to act normally; otherwise, it takes no action.

    You may also invent your own curse, but it should be no more powerful than those described above.

    The _curse_ bestowed by this spell cannot be dispelled, but it can be removed with a _break enchantment_, _limited wish_, _miracle_, _remove curse_, or _wish_ spell.

    _Bestow curse_ counters _remove curse_.
- id: binding
  name: Binding
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: One minute
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: See text (D)
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    A _binding_ spell creates a magical restraint to hold a creature. The target gets an initial saving throw only if its Hit Dice equal at least one-half your caster level.

    You may have as many as six assistants help you with the spell. For each assistant who casts _suggestion_, your caster level for this casting of _binding_ increases by 1. For each assistant who casts _dominate animal, dominate person,_ or _dominate monster,_ your caster level for this casting of _binding_ increases by a number equal to one-third of that assistant’s level, provided that the spell’s target is appropriate for a _binding_ spell. Since the assistants’ spells are cast simply to improve your caster level for the purpose of the _binding_ spell, saving throws and spell resistance against the assistants’ spells are irrelevant. Your caster level determines whether the target gets an initial Will saving throw and how long the _binding_ lasts. All _binding_ spells are dismissible.

    Regardless of the version of _binding_ you cast, you can specify triggering conditions that end the spell and release the creature whenever they occur. These triggers can be as simple or elaborate as you desire, but the condition must be reasonable and have a likelihood of coming to pass. The conditions can be based on a creature’s name, identity, or alignment but otherwise must be based on observable actions or qualities. Intangibles such as level, class, Hit Dice, or hit points don’t qualify. Once the spell is cast, its triggering conditions cannot be changed. Setting a release condition increases the save DC (assuming a saving throw is allowed) by 2.

    If you are casting any of the first three versions of _binding_ (those with limited durations), you may cast additional _binding_ spells to prolong the effect, since the durations overlap. If you do so, the target gets a saving throw at the end of the first spell’s duration, even if your caster level was high enough to disallow an initial saving throw. If the creature succeeds on this save, all the _binding_ spells it has received are broken.

    The _binding_ spell has six versions. Choose one of the following versions when you cast the spell.

    _Chaining:_ The subject is confined by restraints that generate an _antipathy_ spell affecting all creatures who approach the subject, except you. The duration is one year per caster level. The subject of this form of _binding_ is confined to the spot it occupied when it received the spell.

    _Slumber:_ This version causes the subject to become comatose for as long as one year per caster level. The subject does not need to eat or drink while _slumbering_, nor does it age. This form of _binding_ is more difficult to cast than _chaining_, making it slightly easier to resist. Reduce the spell’s save DC by 1.

    _Bound Slumber:_ This combination of _chaining_ and _slumber_ lasts for as long as one month per caster level. Reduce the save DC by 2.

    _Hedged Prison:_ The subject is transported to or otherwise brought within a confined area from which it cannot wander by any means. The effect is permanent. Reduce the save DC by 3.

    _Metamorphosis:_ The subject assumes gaseous form, except for its head or face. It is held harmless in a jar or other container, which may be transparent if you so choose. The creature remains aware of its surroundings and can speak, but it cannot leave the container, attack, or use any of its powers or abilities. The _binding_ is permanent. The subject does not need to breathe, eat, or drink while _metamorphosed_, nor does it age. Reduce the save DC by 4.

    _Minimus Containment:_ The subject is shrunk to a height of 1 inch or even less and held within some gem, jar, or similar object. The _binding_ is permanent. The subject does not need to breathe, eat, or drink while _contained_, nor does it age. Reduce the save DC by 4.

    You can’t dispel a _binding_ spell with _dispel magic_ or a similar effect, though an _antimagic field_ or _Mage’s disjunction_ affects it normally. A bound extraplanar creature cannot be sent back to its home plane due to _dismissal, banishment,_ or a similar effect.

    _Components:_ The components for a _binding_ spell vary according to the version of the spell, but they always include a continuous chanting utterance read from the scroll or spellbook page containing the spell, somatic gestures, and materials appropriate to the form of _binding_ used. These components can include such items as miniature chains of special metals, soporific herbs of the rarest sort (for _slumber_ bindings), a bell jar of the finest crystal, and the like.

    In addition to the specially made props suited to the specific type of _binding_ (cost 500 gp), the spell requires opals worth at least 500 gp for each HD of the target and a vellum depiction or carved statuette of the subject to be captured.
- id: black_tentacles
  name: Black Tentacles
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: 20-ft.-radius spread
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    This spell conjures a field of rubbery black tentacles, each 10 feet long. These waving members seem to spring forth from the earth, floor, or whatever surface is underfoot—including water. They grasp and entwine around creatures that enter the area, holding them fast and crushing them with great strength.

    Every creature within the area of the spell must make a grapple check, opposed by the grapple check of the tentacles. Treat the tentacles attacking a particular target as a Large creature with a base attack bonus equal to your caster level and a Strength score of 19. Thus, its grapple check modifier is equal to your caster level +8. The tentacles are immune to all types of damage.

    Once the tentacles grapple an opponent, they may make a grapple check each round on your turn to deal 1d6+4 points of bludgeoning damage. The tentacles continue to crush the opponent until the spell ends or the opponent escapes.

    Any creature that enters the area of the spell is immediately attacked by the tentacles. Even creatures who aren’t grappling with the tentacles may move through the area at only half normal speed.

    _Material Component:_ A piece of tentacle from a giant octopus or a giant squid.
- id: blindness_deafness
  name: Blindness/Deafness
  level_druid:
  level_cleric: 3
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature
  duration: Permanent (D)
  save: Fortitude negates
  spell_resistance: Yes
  components: V
  target_label: Target
  description: You call upon the powers of unlife to render the subject blinded 
    or deafened, as you choose.
- id: blink
  name: Blink
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 round/level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    You “blink” back and forth between the Material Plane and the Ethereal Plane. You look as though you’re winking in and out of reality very quickly and at random.

    _Blinking_ has several effects, as follows.

    Physical attacks against you have a 50% miss chance, and the Blind-Fight feat doesn’t help opponents, since you’re ethereal and not merely invisible. If the attack is capable of striking ethereal creatures, the miss chance is only 20% (for concealment).

    If the attacker can see invisible creatures, the miss chance is also only 20%. (For an attacker who can both see and strike ethereal creatures, there is no miss chance.) Likewise, your own attacks have a 20% miss chance, since you sometimes go ethereal just as you are about to strike.

    Any individually targeted spell has a 50% chance to fail against you while you’re _blinking_ unless your attacker can target invisible, ethereal creatures. Your own spells have a 20% chance to activate just as you go ethereal, in which case they typically do not affect the Material Plane.

    While _blinking_, you take only half damage from area attacks (but full damage from those that extend onto the Ethereal Plane). You strike as an invisible creature (with a +2 bonus on attack rolls), denying your target any Dexterity bonus to AC.

    You take only half damage from falling, since you fall only while you are material.

    While _blinking_, you can step through (but not see through) solid objects. For each 5 feet of solid material you walk through, there is a 50% chance that you become material. If this occurs, you are shunted off to the nearest open space and take 1d6 points of damage per 5 feet so traveled. You can move at only three-quarters speed (because movement on the Ethereal Plane is at half speed, and you spend about half your time there and half your time material.)

    Since you spend about half your time on the Ethereal Plane, you can see and even attack ethereal creatures. You interact with ethereal creatures roughly the same way you interact with material ones.

    An ethereal creature is invisible, incorporeal, and capable of moving in any direction, even up or down. As an incorporeal creature, you can move through solid objects, including living creatures.

    An ethereal creature can see and hear the Material Plane, but everything looks gray and insubstantial. Sight and hearing on the Material Plane are limited to 60 feet.

    Force effects and abjurations affect you normally. Their effects extend onto the Ethereal Plane from the Material Plane, but not vice versa. An ethereal creature can’t attack material creatures, and spells you cast while ethereal affect only other ethereal things. Certain material creatures or objects have attacks or effects that work on the Ethereal Plane. Treat other ethereal creatures and objects as material.
- id: blur
  name: Blur
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level (D)
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V
  target_label: Target
  description: |-
    The subject’s outline appears blurred, shifting and wavering. This distortion grants the subject concealment (20% miss chance).

    A _see invisibility_ spell does not counteract the _blur_ effect, but a _true seeing_ spell does.

    Opponents that cannot see the subject ignore the spell’s effect (though fighting an unseen opponent carries penalties of its own).
- id: break_enchantment
  name: Break Enchantment
  level_druid:
  level_cleric: 5
  level_wizard: 5
  level_bard: 4
  level_ranger:
  level_paladin: 4
  school: Abjuration
  cast_time: 1 minute
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to one creature per level, all within 30 ft. of each other
  duration: Instantaneous
  save: See text
  spell_resistance: No
  components: V, S
  target_label: Targets
  description: |-
    This spell frees victims from enchantments, transmutations, and curses. _Break enchantment_ can reverse even an instantaneous effect. For each such effect, you make a caster level check (1d20 + caster level, maximum +15) against a DC of 11 + caster level of the effect. Success means that the creature is free of the spell, curse, or effect. For a cursed magic item, the DC is 25.

    If the spell is one that cannot be dispelled by _dispel magic_, _break enchantment_ works only if that spell is 5th level or lower.

    If the effect comes from some permanent magic item _break enchantment_ does not remove the curse from the item, but it does frees the victim from the item’s effects.
- id: bulls_strength_mass
  name: Bull’s Strength, Mass
  level_druid: 6
  level_cleric: 6
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Targets
  description: This spell functions like _bull’s strength_, except that it 
    affects multiple creatures.
- id: calm_emotions
  name: Calm Emotions
  level_druid:
  level_cleric: 2
  level_wizard:
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Creatures in a 20-ft.-radius spread
  duration: Concentration, up to 1 round/level (D)
  save: Will negates
  spell_resistance: Yes
  components: V, S, DF
  target_label: Area
  description: |-
    This spell calms agitated creatures. You have no control over the affected creatures, but _calm emotions_ can stop raging creatures from fighting or joyous ones from reveling. Creatures so affected cannot take violent actions (although they can defend themselves) or do anything destructive. Any aggressive action against or damage dealt to a calmed creature immediately breaks the spell on all calmed creatures.

    This spell automatically suppresses (but does not dispel) any morale bonuses granted by spells such as _bless, good hope,_ and _rage,_ as well as negating a bard’s ability to inspire courage or a barbarian’s rage ability. It also suppresses any fear effects and removes the _confused_ condition from all targets. While the spell lasts, a suppressed spell or effect has no effect. When the _calm emotions_ spell ends, the original spell or effect takes hold of the creature again, provided that its duration has not expired in the meantime.
- id: cats_grace_mass
  name: Cat’s Grace, Mass
  level_druid: 6
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Targets
  description: This spell functions like _cat’s grace_, except that it affects 
    multiple creatures.
- id: chain_lightning
  name: Chain Lightning
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Electricity]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: One primary target, plus one secondary target/level (each of which 
    must be within 30 ft. of the primary target)
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, F
  target_label: Targets
  description: |-
    This spell creates an electrical discharge that begins as a single stroke commencing from your fingertips. Unlike _lightning bolt_, _chain lightning_ strikes one object or creature initially, then arcs to other targets.

    The bolt deals 1d6 points of electricity damage per caster level (maximum 20d6) to the primary target. After it strikes, lightning can arc to a number of secondary targets equal to your caster level (maximum 20). The secondary bolts each strike one target and deal half as much damage as the primary one did (rounded down).

    Each target can attempt a Reflex saving throw for half damage. You choose secondary targets as you like, but they must all be within 30 feet of the primary target, and no target can be struck more than once. You can choose to affect fewer secondary targets than the maximum.

    _Focus:_ A bit of fur; a piece of amber, glass, or a crystal rod; plus one silver pin for each of your caster levels.
- id: charm_monster
  name: Charm Monster
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Enchantment (Charm) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One living creature
  duration: One day/level
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _charm person_, except that the effect 
    is not restricted by creature type or size.
- id: charm_monster_mass
  name: Charm Monster, Mass
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Enchantment (Charm) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: One day/level
  save: ''
  spell_resistance: ''
  components: V
  target_label: Targets
  description: This spell functions like _charm monster,_ except that _mass 
    charm monster_ affects a number of creatures whose combined HD do not exceed
    twice your level, or at least one creature regardless of HD. If there are 
    more potential targets than you can affect, you choose them one at a time 
    until you choose a creature with too many HD.
- id: circle_of_death
  name: Circle of Death
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy [Death]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Several living creatures within a 40-ft.-radius burst
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    A _circle of death_ snuffs out the life force of living creatures, killing them instantly.

    The spell slays 1d4 HD worth of living creatures per caster level (maximum 20d4). Creatures with the fewest HD are affected first; among creatures with equal HD, those who are closest to the burst’s point of origin are affected first. No creature of 9 or more HD can be affected, and Hit Dice that are not sufficient to affect a creature are wasted.

    _Material Component:_ The powder of a crushed black pearl with a minimum value of 500 gp.
- id: clairaudience_clairvoyance
  name: Clairaudience/Clairvoyance
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Divination (Scrying)
  cast_time: 10 minutes
  range: Long (400 ft. + 40 ft./level)
  target: Magical sensor
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S, F/DF
  target_label: Effect
  description: |-
    _Clairaudience/clairvoyance_ creates an invisible magical sensor at a specific location that enables you to hear or see (your choice) almost as if you were there. You don’t need line of sight or line of effect, but the locale must be known—a place familiar to you or an obvious one. Once you have selected the locale, the sensor doesn’t move, but you can rotate it in all directions to view the area as desired. Unlike other scrying spells, this spell does not allow magically or supernaturally enhanced senses to work through it. If the chosen locale is magically dark, you see nothing. If it is naturally pitch black, you can see in a 10- foot radius around the center of the spell’s effect. _Clairaudience/clairvoyance_ functions only on the plane of existence you are currently occupying.

    _Arcane Focus:_ A small horn (for hearing) or a glass eye (for seeing).
- id: clenched_fist
  name: Clenched Fist
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, F/DF
  target_label: ''
  description: |-
    This spell functions like _interposing hand,_ except that the hand can interpose itself, push, or strike one opponent that you select. The floating hand can move as far as 60 feet and can attack in the same round. Since this hand is directed by you, its ability to notice or attack invisible or concealed creatures is no better than yours.

    The hand attacks once per round, and its attack bonus equals your caster level + your Intelligence, Wisdom, or Charisma modifier (for a wizard, cleric, or sorcerer, respectively), +11 for the hand’s Strength score (33), –1 for being Large. The hand deals 1d8+11 points of damage on each attack, and any creature struck must make a Fortitude save (against this spell’s save DC) or be stunned for 1 round. Directing the spell to a new target is a move action.

    The _clenched fist_ can also interpose itself as _interposing hand_ does, or it can bull rush an opponent as _forceful hand_ does, but at a +15 bonus on the Strength check.

    Clerics who cast this spell name it for their deities.

    _Arcane Focus:_ A leather glove.
- id: clone
  name: Clone
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 10 minutes
  range: 0 ft.
  target: One clone
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M, F
  target_label: Effect
  description: |-
    This spell makes an inert duplicate of a creature. If the original individual has been slain, its soul immediately transfers to the clone, creating a replacement (provided that the soul is free and willing to return). The original’s physical remains, should they still exist, become inert and cannot thereafter be restored to life. If the original creature has reached the end of its natural life span (that is, it has died of natural causes), any cloning attempt fails.

    To create the duplicate, you must have a piece of flesh (not hair, nails, scales, or the like) with a volume of at least 1 cubic inch that was taken from the original creature’s living body. The piece of flesh need not be fresh, but it must be kept from rotting. Once the spell is cast, the duplicate must be grown in a laboratory for 2d4 months.

    When the clone is completed, the original’s soul enters it immediately, if that creature is already dead. The clone is physically identical with the original and possesses the same personality and memories as the original. In other respects, treat the clone as if it were the original character raised from the dead, including the loss of one level or 2 points of Constitution (if the original was a 1st-level character). If this Constitution adjustment would give the clone a Constitution score of 0, the spell fails. If the original creature has lost levels since the flesh sample was taken and died at a lower level than the clone would otherwise be, the clone is one level below the level at which the original died.

    The spell duplicates only the original’s body and mind, not its equipment.

    A duplicate can be grown while the original still lives, or when the original soul is unavailable, but the resulting body is merely a soulless bit of inert flesh, which rots if not preserved.

    _Material Component:_ The piece of flesh and various laboratory supplies (cost 1,000 gp).

    _Focus:_ Special laboratory equipment (cost 500 gp).
- id: cloudkill
  name: Cloudkill
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Cloud spreads in 20-ft. radius, 20 ft. high
  duration: 1 min./level
  save: Fortitude partial; see text
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    This spell generates a bank of fog, similar to a _fog cloud,_ except that its vapors are yellowish green and poisonous. These vapors automatically kill any living creature with 3 or fewer HD (no save). A living creature with 4 to 6 HD is slain unless it succeeds on a Fortitude save (in which case it takes 1d4 points of Constitution damage on your turn each round while in the cloud).

    A living creature with 6 or more HD takes 1d4 points of Constitution damage on your turn each round while in the cloud (a successful Fortitude save halves this damage). Holding one’s breath doesn’t help, but creatures immune to poison are unaffected by the spell.

    Unlike a _fog cloud_, the _cloudkill_ moves away from you at 10 feet per round, rolling along the surface of the ground.

    Figure out the cloud’s new spread each round based on its new point of origin, which is 10 feet farther away from the point of origin where you cast the spell.

    Because the vapors are heavier than air, they sink to the lowest level of the land, even pouring down den or sinkhole openings. It cannot penetrate liquids, nor can it be cast underwater.
- id: command_undead
  name: Command Undead
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One undead creature
  duration: One day/level
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    This spell allows you some degree of control over an undead creature. Assuming the subject is intelligent, it perceives your words and actions in the most favorable way (treat its attitude as friendly). It will not attack you while the spell lasts. You can try to give the subject orders, but you must win an opposed Charisma check to convince it to do anything it wouldn’t ordinarily do. (Retries are not allowed.) An intelligent commanded undead never obeys suicidal or obviously harmful orders, but it might be convinced that something very dangerous is worth doing.

    A nonintelligent undead creature gets no saving throw against this spell. When you control a mindless being, you can communicate only basic commands, such as “come here,” “go there,” “fight,” “stand still,” and so on. Nonintelligent undead won’t resist suicidal or obviously harmful orders.

    Any act by you or your apparent allies that threatens the commanded undead (regardless of its Intelligence) breaks the spell.

    Your commands are not telepathic. The undead creature must be able to hear you.

    _Material Component:_ A shred of raw meat and a splinter of bone.
- id: cone_of_cold
  name: Cone of Cold
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped burst
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Area
  description: |-
    _Cone of cold_ creates an area of extreme cold, originating at your hand and extending outward in a cone. It drains heat, dealing 1d6 points of cold damage per caster level (maximum 15d6).

    _Arcane Material Component:_ A very small crystal or glass cone.
- id: confusion
  name: Confusion
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: All creatures in a 15-ft. radius burst
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Targets
  description: |-
    This spell causes the targets to become _confused,_ making them unable to independently determine what they will do.

    Roll on the following table at the beginning of each subject’s turn each round to see what the subject does in that round.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>d%</th><th>Behavior</th></tr><tr><td>01–10</td><td>Attack caster with melee or ranged weapons (or close with caster if attack is not possible).</td></tr><tr><td>11–20</td><td>Act normally.</td></tr><tr><td>21–50</td><td>Do nothing but babble incoherently.</td></tr><tr><td>51–70</td><td>Flee away from caster at top possible speed.</td></tr><tr><td>71–100</td><td>Attack nearest creature (for this purpose, a familiar counts as part of the subject’s self).</td></tr></tbody></table>

    A _confused_ character who can’t carry out the indicated action does nothing but babble incoherently. Attackers are not at any special advantage when attacking a _confused_ character. Any _confused_ character who is attacked automatically attacks its attackers on its next turn, as long as it is still _confused_ when its turn comes. Note that a _confused_ character will not make attacks of opportunity against any creature that it is not already devoted to attacking (either because of its most recent action or because it has just been attacked).

    _Arcane Material Component:_ A set of three nut shells.
- id: contact_other_plane
  name: Contact Other Plane
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 10 minutes
  range: Personal
  target: You
  duration: Concentration
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V
  target_label: Target
  description: |-
    You send your mind to another plane of existence (an Elemental Plane or some plane farther removed) in order to receive advice and information from powers there. (See the accompanying table for possible consequences and results of the attempt.) The powers reply in a language you understand, but they resent such contact and give only brief answers to your questions. (All questions are answered with “yes,” “no,” “maybe,” “never,” “irrelevant,” or some other one-word answer.)

    You must concentrate on maintaining the spell (a standard action) in order to ask questions at the rate of one per round. A question is answered by the power during the same round. For every two caster levels, you may ask one question.

    Contact with minds far removed from your home plane increases the probability that you will incur a decrease to Intelligence and Charisma, but the chance of the power knowing the answer, as well as the probability of the entity answering correctly, are likewise increased by moving to distant planes.

    Once the Outer Planes are reached, the power of the deity contacted determines the effects. (Random results obtained from the table are subject to the personalities of individual deities.)

    On rare occasions, this divination may be blocked by an act of certain deities or forces.

    <table data-debug="no-caption" class="full-width-table"><tbody><tr><th>Plane Contacted</th><th>Avoid Int/Cha Decrease</th><th>True Answer</th><th>Don’t Know</th><th>Lie</th><th>Random Answer</th></tr><tr><td>Elemental Plane</td><td>DC 7/1 week</td><td>01–34</td><td>35–62</td><td>63–83</td><td>84–100</td></tr><tr><td>&nbsp;&nbsp;&nbsp;&nbsp;(appropriate)</td><td>(DC 7/1 week)</td><td>(01–68)</td><td>(69–75)</td><td>(76–98)</td><td>(99–100)</td></tr><tr><td>Positive/Negative Energy Plane</td><td>DC 8/1 week</td><td>01–39</td><td>40–65</td><td>66–86</td><td>87–100</td></tr><tr><td>Astral Plane</td><td>DC 9/1 week</td><td>01–44</td><td>45–67</td><td>68–88</td><td>89–100</td></tr><tr><td>Outer Plane, demideity</td><td>DC 10/2 weeks</td><td>01–49</td><td>50–70</td><td>71–91</td><td>92–100</td></tr><tr><td>Outer Plane, lesser deity</td><td>DC 12/3 weeks</td><td>01–60</td><td>61–75</td><td>76–95</td><td>96–100</td></tr><tr><td>Outer Plane, intermediate deity</td><td>DC 14/4 weeks</td><td>01–73</td><td>74–81</td><td>82–98</td><td>99–100</td></tr><tr><td>Outer Plane, greater deity</td><td>DC 16/5 weeks</td><td>01–88</td><td>89–90</td><td>91–99</td><td>100</td></tr></tbody></table>

    _Avoid Int/Cha Decrease:_ You must succeed on an Intelligence check against this DC to avoid a decrease in Intelligence and Charisma. If the check fails, your Intelligence and Charisma scores each fall to 8 for the stated duration, and you become unable to cast arcane spells. If you lose Intelligence and Charisma, the effect strikes as soon as the first question is asked, and no answer is received. (The entries in parentheses are for questions that pertain to the appropriate Elemental Plane.)

    **Results of a Successful Contact:** d% is rolled for the result shown on the table:

    _True Answer:_ You get a true, one-word answer. Questions that cannot be answered in this way are answered randomly.

    _Don’t Know:_ The entity tells you that it doesn’t know.

    _Lie:_ The entity intentionally lies to you.

    _Random Answer:_ The entity tries to lie but doesn’t know the answer, so it makes one up.
- id: contingency
  name: Contingency
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation
  cast_time: At least 10 minutes; see text
  range: Personal
  target: You
  duration: One day/level (D) or until discharged
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M, F
  target_label: Target
  description: |-
    You can place another spell upon your person so that it comes into effect under some condition you dictate when casting _contingency_. The _contingency_ spell and the companion spell are cast at the same time. The 10-minute casting time is the minimum total for both castings; if the companion spell has a casting time longer than 10 minutes, use that instead.

    The spell to be brought into effect by the _contingency_ must be one that affects your person and be of a spell level no higher than one-third your caster level (rounded down, maximum 6th level).

    The conditions needed to bring the spell into effect must be clear, although they can be general. In all cases, the _contingency_ immediately brings into effect the companion spell, the latter being “cast” instantaneously when the prescribed circumstances occur. If complicated or convoluted conditions are prescribed, the whole spell combination (_contingency_ and the companion magic) may fail when called on. The companion spell occurs based solely on the stated conditions, regardless of whether you want it to.

    You can use only one _contingency_ spell at a time; if a second is cast, the first one (if still active) is dispelled.

    _Material Component:_ That of the companion spell, plus quicksilver and an eyelash of an ogre mage, rakshasa, or similar spell-using creature.

    _Focus:_ A statuette of you carved from elephant ivory and decorated with gems (worth at least 1,500 gp). You must carry the focus for the _contingency_ to work.
- id: continual_flame
  name: Continual Flame
  level_druid:
  level_cleric: 3
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Light]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: Permanent
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    A flame, equivalent in brightness to a torch, springs forth from an object that you touch. The effect looks like a regular flame, but it creates no heat and doesn’t use oxygen. A _continual flame_ can be covered and hidden but not smothered or quenched.

    Light spells counter and dispel darkness spells of an equal or lower level.

    _Material Component:_ You sprinkle ruby dust (worth 50 gp) on the item that is to carry the flame.
- id: control_undead
  name: Control Undead
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to 2 HD/level of undead creatures, no two of which can be more than
    30 ft. apart
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    This spell enables you to command undead creatures for a short period of time. You command them by voice and they understand you, no matter what language you speak. Even if vocal communication is impossible the controlled undead do not attack you. At the end of the spell, the subjects revert to their normal behavior.

    Intelligent undead creatures remember that you controlled them.

    _Material Component:_ A small piece of bone and a small piece of raw meat.
- id: control_weather
  name: Control Weather
  level_druid: 7
  level_cleric: 7
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 10 minutes; see text
  range: 2 miles
  target: 2-mile-radius circle, centered on you; see text
  duration: 4d12 hours; see text
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    You change the weather in the local area. It takes 10 minutes to cast the spell and an additional 10 minutes for the effects to manifest.You can call forth weather appropriate to the climate and season of the area you are in.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Season</th><th>Possible Weather</th></tr><tr><td>Spring</td><td>Tornado, thunderstorm, sleet storm, or hot weather</td></tr><tr><td>Summer</td><td>Torrential rain, heat wave, or hailstorm</td></tr><tr><td>Autumn</td><td>Hot or cold weather, fog, or sleet</td></tr><tr><td>Winter</td><td>Frigid cold, blizzard, or thaw</td></tr><tr><td>Late winter</td><td>Hurricane-force winds or early spring (coastal area)</td></tr></tbody></table>

    You control the general tendencies of the weather, such as the direction and intensity of the wind. You cannot control specific applications of the weather—where lightning strikes, for example, or the exact path of a tornado. When you select a certain weather condition to occur, the weather assumes that condition 10 minutes later (changing gradually, not abruptly). The weather continues as you left it for the duration, or until you use a standard action to designate a new kind of weather (which fully manifests itself 10 minutes later). Contradictory conditions are not possible simultaneously.

    _Control weather_ can do away with atmospheric phenomena (naturally occurring or otherwise) as well as create them.

    A druid casting this spell doubles the duration and affects a circle with a 3-mile radius.
- id: create_greater_undead
  name: Create Greater Undead
  level_druid:
  level_cleric: 8
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like create undead, except that you can create more powerful and intelligent sorts of undead: shadows, wraiths, spectres, and devourers. The type or types of undead you can create is based on your caster level, as shown on the table below.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Caster Level</th><th>Undead Created</th></tr><tr><td>15th or lower</td><td>Shadow</td></tr><tr><td>16th–17th</td><td>Wraith</td></tr><tr><td>18th–19th</td><td>Spectre</td></tr><tr><td>20th or higher</td><td>Devourer</td></tr></tbody></table>
- id: create_undead
  name: Create Undead
  level_druid:
  level_cleric: 6
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: 1 hour
  range: Close (25 ft. + 5 ft./2 levels)
  target: One corpse
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    A much more potent spell than _animate dead,_ this evil spell allows you to create more powerful sorts of undead: ghouls, ghasts, mummies, and mohrgs. The type or types of undead you can create is based on your caster level, as shown on the table below.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Caster Level</th><th>Undead Created</th></tr><tr><td>11th or lower</td><td>Ghoul</td></tr><tr><td>12th–14th</td><td>Ghast</td></tr><tr><td>15th–17th</td><td>Mummy</td></tr><tr><td>18th or higher</td><td>Mohrg</td></tr></tbody></table>

    You may create less powerful undead than your level would allow if you choose. Created undead are not automatically under the control of their animator. If you are capable of commanding undead, you may attempt to command the undead creature as it forms.

    This spell must be cast at night.

    _Material Component:_ A clay pot filled with grave dirt and another filled with brackish water. The spell must be cast on a dead body. You must place a black onyx gem worth at least 50 gp per HD of the undead to be created into the mouth or eye socket of each corpse. The magic of the spell turns these gems into worthless shells.
- id: crushing_despair
  name: Crushing Despair
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: 30 ft.
  target: Cone-shaped burst
  duration: 1 min./level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    An invisible cone of despair causes great sadness in the subjects. Each affected creature takes a –2 penalty on attack rolls, saving throws, ability checks, skill checks, and weapon damage rolls.

    _Crushing despair_ counters and dispels _good hope_.

    _Material Component:_ A vial of tears.
- id: crushing_hand
  name: Crushing Hand
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, M, F/DF
  target_label: ''
  description: |-
    This spell functions like _interposing hand,_ except that the hand can interpose itself, push, or crush one opponent that you select.

    The _crushing hand_ can grapple an opponent like _grasping hand_ does. Its grapple bonus equals your caster level + your Intelligence, Wisdom, or Charisma modifier (for a wizard, cleric, or sorcerer, respectively), +12 for the hand’s Strength score (35), +4 for being Large. The hand deals 2d6+12 points of damage (lethal, not nonlethal) on each successful grapple check against an opponent.

    The _crushing hand_ can also interpose itself as _interposing hand_ does, or it can bull rush an opponent as _forceful hand_ does, but at a +18 bonus.

    Directing the spell to a new target is a move action.

    Clerics who cast this spell name it for their deities.

    _Arcane Material Component:_ The shell of an egg.

    _Arcane Focus:_ A glove of snakeskin.
- id: cure_light_wounds_mass
  name: Cure Light Wounds, Mass
  level_druid: 6
  level_cleric: 5
  level_wizard:
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: Instantaneous
  save: Will half (harmless) or Will half; see text
  spell_resistance: Yes (harmless) or Yes; see text
  components: V, S
  target_label: Target
  description: |-
    You channel positive energy to cure 1d8 points of damage +1 point per caster level (maximum +25) in each selected creature.

    Like other _cure_ spells, _mass cure light wounds_ deals damage to undead in its area rather than curing them. Each affected undead may attempt a Will save for half damage.
- id: cure_moderate_wounds_mass
  name: Cure Moderate Wounds, Mass
  level_druid: 7
  level_cleric: 6
  level_wizard:
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Conjuration (Healing)
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _mass cure light wounds_, except that 
    it cures 2d8 points of damage +1 point per caster level (maximum +30).
- id: darkness
  name: Darkness
  level_druid:
  level_cleric: 2
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Darkness]
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, M/DF
  target_label: Target
  description: |-
    This spell causes an object to radiate shadowy illumination out to a 20-foot radius. All creatures in the area gain concealment (20% miss chance). Even creatures that can normally see in such conditions (such as with darkvision or low-light vision) have the miss chance in an area shrouded in magical _darkness_.

    Normal lights (torches, candles, lanterns, and so forth) are incapable of brightening the area, as are light spells of lower level. Higher level light spells are not affected by _darkness._

    If _darkness_ is cast on a small object that is then placed inside or under a lightproof covering, the spell’s effect is blocked until the covering is removed.

    _Darkness_ counters or dispels any light spell of equal or lower spell level.

    _Arcane Material Component:_ A bit of bat fur and either a drop of pitch or a piece of coal.
- id: darkvision
  name: Darkvision
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger: 3
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 hour/level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    The subject gains the ability to see 60 feet even in total darkness. Darkvision is black and white only but otherwise like normal sight. _Darkvision_ does not grant one the ability to see in magical darkness.

    _Darkvision_ can be made permanent with a _permanency_ spell.

    _Material Component:_ Either a pinch of dried carrot or an agate.
- id: daze_monster
  name: Daze Monster
