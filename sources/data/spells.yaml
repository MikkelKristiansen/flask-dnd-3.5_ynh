- id: delayed_blast_fireball
  name: Delayed Blast Fireball
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: ''
  range: ''
  target: ''
  duration: 5 rounds or less; see text
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _fireball,_ except that it is more powerful and can detonate up to 5 rounds after the spell is cast. The burst of flame deals 1d6 points of fire damage per caster level (maximum 20d6).

    The glowing bead created by _delayed blast fireball_ can detonate immediately if you desire, or you can choose to delay the burst for as many as 5 rounds. You select the amount of delay upon completing the spell, and that time cannot change once it has been set unless someone touches the bead (see below). If you choose a delay, the glowing bead sits at its destination until it detonates. A creature can pick up and hurl the bead as a thrown weapon (range increment 10 feet). If a creature handles and moves the bead within 1 round of its detonation, there is a 25% chance that the bead detonates while being handled.
- id: demand
  name: Demand
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: Will partial
  spell_resistance: Yes
  components: ''
  target_label: ''
  description: |-
    This spell functions like _sending,_ but the message can also contain a _suggestion_ (see the _suggestion_ spell), which the subject does its best to carry out. A successful Will save negates the _suggestion_ effect but not the contact itself. The _demand,_ if received, is understood even if the subject’s Intelligence score is as low as 1. If the message is impossible or meaningless according to the circumstances that exist for the subject at the time the _demand_ is issued, the message is understood but the _suggestion_ is ineffective.

    The _demand_’s message to the creature must be twenty-five words or less, including the _suggestion._ The creature can also give a short reply immediately.

    _Material Component:_ A short piece of copper wire and some small part of the subject—a hair, a bit of nail, or the like.
- id: detect_scrying
  name: Detect Scrying
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: 40 ft.
  target: 40-ft.-radius emanation centered on you
  duration: 24 hours
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    You immediately become aware of any attempt to observe you by means of a divination (scrying) spell or effect. The spell’s area radiates from you and moves as you move. You know the location of every magical sensor within the spell’s area.

    If the scrying attempt originates within the area, you also know its location; otherwise, you and the scrier immediately make opposed caster level checks (1d20 + caster level). If you at least match the scrier’s result, you get a visual image of the scrier and an accurate sense of his or her direction and distance from you.

    _Material Component:_ A small piece of mirror and a miniature brass hearing trumpet.
- id: detect_thoughts
  name: Detect Thoughts
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Divination [Mind-Affecting]
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped emanation
  duration: Concentration, up to 1 min./level (D)
  save: Will negates; see text
  spell_resistance: No
  components: V, S, F/DF
  target_label: Area
  description: |-
    You detect surface thoughts. The amount of information revealed depends on how long you study a particular area or subject.

    _1st Round:_ Presence or absence of thoughts (from conscious creatures with Intelligence scores of 1 or higher).

    _2nd Round:_ Number of thinking minds and the Intelligence score of each. If the highest Intelligence is 26 or higher (and at least 10 points higher than your own Intelligence score), you are stunned for 1 round and the spell ends. This spell does not let you determine the location of the thinking minds if you can’t see the creatures whose thoughts you are detecting.

    _3rd Round:_ Surface thoughts of any mind in the area. A target’s Will save prevents you from reading its thoughts, and you must cast _detect thoughts_ again to have another chance. Creatures of animal intelligence (Int 1 or 2) have simple, instinctual thoughts that you can pick up.

    Each round, you can turn to detect thoughts in a new area. The spell can penetrate barriers, but 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt blocks it.

    _Arcane Focus:_ A copper piece.
- id: dimension_door
  name: Dimension Door
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: You and touched objects or other touched willing creatures
  duration: Instantaneous
  save: None and Will negates (object)
  spell_resistance: No and Yes (object)
  components: V
  target_label: Target
  description: |-
    You instantly transfer yourself from your current location to any other spot within range. You always arrive at exactly the spot desired—whether by simply visualizing the area or by stating direction. After using this spell, you can’t take any other actions until your next turn. You can bring along objects as long as their weight doesn’t exceed your maximum load. You may also bring one additional willing Medium or smaller creature (carrying gear or objects up to its maximum load) or its equivalent per three caster levels. A Large creature counts as two Medium creatures, a Huge creature counts as two Large creatures, and so forth. All creatures to be transported must be in contact with one another, and at least one of those creatures must be in contact with you.

    If you arrive in a place that is already occupied by a solid body, you and each creature traveling with you take 1d6 points of damage and are shunted to a random open space on a suitable surface within 100 feet of the intended location.

    If there is no free space within 100 feet, you and each creature traveling with you take an additional 2d6 points of damage and are shunted to a free space within 1,000 feet. If there is no free space within 1,000 feet, you and each creature travelling with you take an additional 4d6 points of damage and the spell simply fails.
- id: dimensional_anchor
  name: Dimensional Anchor
  level_druid:
  level_cleric: 4
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Ray
  duration: 1 min./level
  save: None
  spell_resistance: Yes (object)
  components: V, S
  target_label: Effect
  description: |-
    A green ray springs from your outstretched hand. You must make a ranged touch attack to hit the target. Any creature or object struck by the ray is covered with a shimmering emerald field that completely blocks extradimensional travel. Forms of movement barred by a _dimensional anchor_ include _astral projection, blink, dimension door, ethereal jaunt, etherealness, gate, maze, plane shift, shadow walk, teleport,_ and similar spell-like or psionic abilities. The spell also prevents the use of a _gate_ or _teleportation circle_ for the duration of the spell.

    A _dimensional anchor_ does not interfere with the movement of creatures already in ethereal or astral form when the spell is cast, nor does it block extradimensional perception or attack forms. Also, _dimensional anchor_ does not prevent summoned creatures from disappearing at the end of a summoning spell.
- id: dimensional_lock
  name: Dimensional Lock
  level_druid:
  level_cleric: 8
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: 20-ft.-radius emanation centered on a point in space
  duration: One day/level
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: |-
    You create a shimmering emerald barrier that completely blocks extradimensional travel. Forms of movement barred include _astral projection, blink, dimension door, ethereal jaunt, etherealness, gate, maze, plane shift, shadow walk, teleport,_ and similar spell-like or psionic abilities. Once _dimensional lock_ is in place, extradimensional travel into or out of the area is not possible.

    A _dimensional lock_ does not interfere with the movement of creatures already in ethereal or astral form when the spell is cast, nor does it block extradimensional perception or attack forms. Also, the spell does not prevent summoned creatures from disappearing at the end of a summoning spell.
- id: discern_location
  name: Discern Location
  level_druid:
  level_cleric: 8
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 10 minutes
  range: Unlimited
  target: One creature or object
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Target
  description: |-
    A _discern location_ spell is among the most powerful means of locating creatures or objects. Nothing short of a _mind blank_ spell or the direct intervention of a deity keeps you from learning the exact location of a single individual or object. _Discern location_ circumvents normal means of protection from scrying or location. The spell reveals the name of the creature or object’s location (place, name, business name, building name, or the like), community, county (or similar political division), country, continent, and the plane of existence where the target lies.

    To find a creature with the spell, you must have seen the creature or have some item that once belonged to it. To find an object, you must have touched it at least once.
- id: disintegrate
  name: Disintegrate
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Ray
  duration: Instantaneous
  save: Fortitude partial (object)
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Effect
  description: |-
    A thin, green ray springs from your pointing finger. You must make a successful ranged touch attack to hit. Any creature struck by the ray takes 2d6 points of damage per caster level (to a maximum of 40d6). Any creature reduced to 0 or fewer hit points by this spell is entirely disintegrated, leaving behind only a trace of fine dust. A disintegrated creature’s equipment is unaffected.

    When used against an object, the ray simply disintegrates as much as one 10- foot cube of nonliving matter. Thus, the spell disintegrates only part of any very large object or structure targeted. The ray affects even objects constructed entirely of force, such as _forceful hand_ or a _wall of force_, but not magical effects such as a _globe of invulnerability_ or an _antimagic field._

    A creature or object that makes a successful Fortitude save is partially affected, taking only 5d6 points of damage. If this damage reduces the creature or object to 0 or fewer hit points, it is entirely disintegrated.

    Only the first creature or object struck can be affected; that is, the ray affects only one target per casting.

    _Arcane Material Component:_ A lodestone and a pinch of dust.
- id: dismissal
  name: Dismissal
  level_druid:
  level_cleric: 4
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One extraplanar creature
  duration: Instantaneous
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, DF
  target_label: Target
  description: This spell forces an extraplanar creature back to its proper 
    plane if it fails a special Will save (DC = spell’s save DC – creature’s HD 
    + your caster level). If the spell is successful, the creature is instantly 
    whisked away, but there is a 20% chance of actually sending the subject to a
    plane other than its own.
- id: dispel_magic_greater
  name: Dispel Magic, Greater
  level_druid: 6
  level_cleric: 6
  level_wizard: 6
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _dispel magic_, except that the maximum caster level on your dispel check is +20 instead of +10.

    Additionally, _greater dispel magic_ has a chance to dispel any effect that _remove curse_ can remove, even if _dispel magic_ can’t dispel that effect.
- id: displacement
  name: Displacement
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 round/level (D)
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, M
  target_label: Target
  description: |-
    The subject of this spell appears to be about 2 feet away from its true location. The creature benefits from a 50% miss chance as if it had total concealment. However, unlike actual total concealment, _displacement_ does not prevent enemies from targeting the creature normally. _True seeing_ reveals its true location.

    _Material Component:_ A small strip of leather twisted into a loop.
- id: dominate_monster
  name: Dominate Monster
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One creature
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _dominate person,_ except that the 
    spell is not restricted by creature type.
- id: dominate_person
  name: Dominate Person
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One humanoid
  duration: One day/level
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You can control the actions of any humanoid creature through a telepathic link that you establish with the subject’s mind.

    If you and the subject have a common language, you can generally force the subject to perform as you desire, within the limits of its abilities. If no common language exists, you can communicate only basic commands, such as “Come here,” “Go there,” “Fight,” and “Stand still.” You know what the subject is experiencing, but you do not receive direct sensory input from it, nor can it communicate with you telepathically.

    Once you have given a _dominated_ creature a command, it continues to attempt to carry out that command to the exclusion of all other activities except those necessary for day-to-day survival (such as sleeping, eating, and so forth). Because of this limited range of activity, a Sense Motive check against DC 15 (rather than DC 25) can determine that the subject’s behavior is being influenced by an enchantment effect (see the Sense Motive skill description).

    Changing your instructions or giving a _dominated_ creature a new command is the equivalent of redirecting a spell, so it is a move action.

    By concentrating fully on the spell (a standard action), you can receive full sensory input as interpreted by the mind of the subject, though it still can’t communicate with you. You can’t actually see through the subject’s eyes, so it’s not as good as being there yourself, but you still get a good idea of what’s going on.

    Subjects resist this control, and any subject forced to take actions against its nature receives a new saving throw with a +2 bonus. Obviously self-destructive orders are not carried out. Once control is established, the range at which it can be exercised is unlimited, as long as you and the subject are on the same plane. You need not see the subject to control it.

    If you don’t spend at least 1 round concentrating on the spell each day, the subject receives a new saving throw to throw off the domination.

    _Protection from evil_ or a similar spell can prevent you from exercising control or using the telepathic link while the subject is so warded, but such an effect neither prevents the establishment of domination nor dispels it.
- id: dream
  name: Dream
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Phantasm) [Mind-Affecting]
  cast_time: 1 minute
  range: Unlimited
  target: One living creature touched
  duration: See text
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You, or a messenger touched by you, sends a phantasmal message to others in the form of a dream. At the beginning of the spell, you must name the recipient or identify him or her by some title that leaves no doubt as to identity. The messenger then enters a trance, appears in the intended recipient’s dream, and delivers the message. The message can be of any length, and the recipient remembers it perfectly upon waking. The communication is one-way. The recipient cannot ask questions or offer information, nor can the messenger gain any information by observing the dreams of the recipient.

    Once the message is delivered, the messenger’s mind returns instantly to its body. The duration of the spell is the time required for the messenger to enter the recipient’s dream and deliver the message.

    If the recipient is awake when the spell begins, the messenger can choose to wake up (ending the spell) or remain in the trance. The messenger can remain in the trance until the recipient goes to sleep, then enter the recipient’s dream and deliver the message as normal. A messenger that is disturbed during the trance comes awake, ending the spell.

    Creatures who don’t sleep (such as elves, but not half-elves) or don’t dream cannot be contacted by this spell.

    The messenger is unaware of its own surroundings or of the activities around it while in the trance. It is defenseless both physically and mentally (always fails any saving throw) while in the trance.
- id: eagles_splendor
  name: Eagle’s Splendor
  level_druid:
  level_cleric: 2
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin: 2
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creature becomes more poised, articulate, and personally forceful. The spell grants a +4 enhancement bonus to Charisma, adding the usual benefits to Charisma-based skill checks and other uses of the Charisma modifier. Sorcerers and bards (and other spellcasters who rely on Charisma) affected by this spell do not gain any additional bonus spells for the increased Charisma, but the save DCs for spells they cast while under this spell’s effect do increase.

    _Arcane Material Component:_ A few feathers or a pinch of droppings from an eagle.
- id: eagles_splendor_mass
  name: Eagle’s Splendor, Mass
  level_druid:
  level_cleric: 6
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _eagle’s splendor_, except that it 
    affects multiple creatures.
- id: energy_drain
  name: Energy Drain
  level_druid:
  level_cleric: 9
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: Fortitude partial; see text for _enervation_
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _enervation,_ except that the creature struck gains 2d4 negative levels, and the negative levels last longer.

    There is no saving throw to avoid gaining the negative levels, but 24 hours after gaining them, the subject must make a Fortitude saving throw (DC = _energy drain_ spell’s save DC) for each negative level. If the save succeeds, that negative level is removed. If it fails, the negative level also goes away, but one of the subject’s character levels is permanently drained.

    An undead creature struck by the ray gains 2d4x5 temporary hit points for 1 hour.
- id: enervation
  name: Enervation
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray of negative energy
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    You point your finger and utter the incantation, releasing a black ray of crackling negative energy that suppresses the life force of any living creature it strikes. You must make a ranged touch attack to hit. If the attack succeeds, the subject gains 1d4 negative levels.

    If the subject has at least as many negative levels as HD, it dies. Each negative level gives a creature a –1 penalty on attack rolls, saving throws, skill checks, ability checks, and effective level (for determining the power, duration, DC, and other details of spells or special abilities).

    Additionally, a spellcaster loses one spell or spell slot from his or her highest available level. Negative levels stack.

    Assuming the subject survives, it regains lost levels after a number of hours equal to your caster level (maximum 15 hours). Usually, negative levels have a chance of permanently draining the victim’s levels, but the negative levels from _enervation_ don’t last long enough to do so.

    An undead creature struck by the ray gains 1d4x5 temporary hit points for 1 hour.
- id: enlarge_person_mass
  name: Enlarge Person, Mass
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: ''
  target: One humanoid creature/level, no two of which can be more than 30 ft. 
    apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _enlarge person_, except that it 
    affects multiple creatures.
- id: enthrall
  name: Enthrall
  level_druid:
  level_cleric: 2
  level_wizard:
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Charm) [Language Dependent, Mind-Affecting, Sonic]
  cast_time: 1 round
  range: Medium (100 ft. + 10 ft./level)
  target: Any number of creatures
  duration: 1 hour or less
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Targets
  description: |-
    If you have the attention of a group of creatures, you can use this spell to hold them spellbound. To cast the spell, you must speak or sing without interruption for 1 full round. Thereafter, those affected give you their undivided attention, ignoring their surroundings. They are considered to have an attitude of friendly while under the effect of the spell. Any potentially affected creature of a race or religion unfriendly to yours gets a +4 bonus on the saving throw.

    A creature with 4 or more HD or with a Wisdom score of 16 or higher remains aware of its surroundings and has an attitude of indifferent. It gains a new saving throw if it witnesses actions that it opposes.

    The effect lasts as long as you speak or sing, to a maximum of 1 hour. Those _enthralled_ by your words take no action while you speak or sing and for 1d3 rounds thereafter while they discuss the topic or performance. Those entering the area during the performance must also successfully save or become _enthralled._ The speech ends (but the 1d3-round delay still applies) if you lose concentration or do anything other than speak or sing.

    If those not _enthralled_ have unfriendly or hostile attitudes toward you, they can collectively make a Charisma check to try to end the spell by jeering and heckling. For this check, use the Charisma bonus of the creature with the highest Charisma in the group; others may make Charisma checks to assist. The heckling ends the spell if this check result beats your Charisma check result. Only one such challenge is allowed per use of the spell.

    If any member of the audience is attacked or subjected to some other overtly hostile act, the spell ends and the previously _enthralled_ members become immediately unfriendly toward you. Each creature with 4 or more HD or with a Wisdom score of 16 or higher becomes hostile.
- id: ethereal_jaunt
  name: Ethereal Jaunt
  level_druid:
  level_cleric: 7
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 round/level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    You become ethereal, along with your equipment. For the duration of the spell, you are in a place called the Ethereal Plane, which overlaps the normal, physical, Material Plane. When the spell expires, you return to material existence.

    An ethereal creature is invisible, insubstantial, and capable of moving in any direction, even up or down, albeit at half normal speed. As an insubstantial creature, you can move through solid objects, including living creatures. An ethereal creature can see and hear on the Material Plane, but everything looks gray and ephemeral. Sight and hearing onto the Material Plane are limited to 60 feet.

    Force effects and abjurations affect an ethereal creature normally. Their effects extend onto the Ethereal Plane from the Material Plane, but not vice versa. An ethereal creature can’t attack material creatures, and spells you cast while ethereal affect only other ethereal things. Certain material creatures or objects have attacks or effects that work on the Ethereal Plane.

    Treat other ethereal creatures and ethereal objects as if they were material.

    If you end the spell and become material while inside a material object (such as a solid wall), you are shunted off to the nearest open space and take 1d6 points of damage per 5 feet that you so travel.
- id: etherealness
  name: Etherealness
  level_druid:
  level_cleric: 9
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Touch; see text
  target: You and one other touched creature per three levels
  duration: 1 min./level (D)
  save: ''
  spell_resistance: Yes
  components: ''
  target_label: Targets
  description: |-
    This spell functions like _ethereal jaunt,_ except that you and other willing creatures joined by linked hands (along with their equipment) become ethereal. Besides yourself, you can bring one creature per three caster levels to the Ethereal Plane. Once ethereal, the subjects need not stay together.

    When the spell expires, all affected creatures on the Ethereal Plane return to material existence.
- id: explosive_runes
  name: Explosive Runes
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration [Force]
  cast_time: 1 standard action
  range: Touch
  target: One touched object weighing no more than 10 lb.
  duration: Permanent until discharged (D)
  save: See text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You trace these mystic runes upon a book, map, scroll, or similar object bearing written information. The _runes_ detonate when read, dealing 6d6 points of force damage. Anyone next to the _runes_ (close enough to read them) takes the full damage with no saving throw; any other creature within 10 feet of the _runes_ is entitled to a Reflex save for half damage. The object on which the _runes_ were written also takes full damage (no saving throw).

    You and any characters you specifically instruct can read the protected writing without triggering the _runes._ Likewise, you can remove the _runes_ whenever desired. Another creature can remove them with a successful _dispel magic_ or _erase_ spell, but attempting to dispel or erase the _runes_ and failing to do so triggers the explosion.

    _Note:_ Magic traps such as _explosive runes_ are hard to detect and disable. A rogue (only) can use the Search skill to find the _runes_ and Disable Device to thwart them. The DC in each case is 25 + spell level, or 28 for _explosive runes_.
- id: eyebite
  name: Eyebite
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Necromancy [Evil]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 round per three levels; see text
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    Each round, you may target a single living creature, striking it with waves of evil power. Depending on the target’s HD, this attack has as many as three effects.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>HD</th><th>Effect</th></tr><tr><td>10 or more</td><td>Sickened</td></tr><tr><td>5–9</td><td>Panicked, sickened</td></tr><tr><td>4 or less</td><td>Comatose, panicked, sickened</td></tr></tbody></table>

    The effects are cumulative and concurrent.

    _Sickened:_ Sudden pain and fever sweeps over the subject’s body. A sickened creature takes a –2 penalty on attack rolls, weapon damage rolls, saving throws, skill checks, and ability checks. A creature affected by this spell remains sickened for 10 minutes per caster level. The effects cannot be negated by a _remove disease_ or _heal_ spell, but a _remove curse_ is effective.

    _Panicked:_ The subject becomes panicked for 1d4 rounds. Even after the panic ends, the creature remains shaken for 10 minutes per caster level, and it automatically becomes panicked again if it comes within sight of you during that time. This is a fear effect.

    _Comatose:_ The subject falls into a catatonic coma for 10 minutes per caster level. During this time, it cannot be awakened by any means short of dispelling the effect. This is not a _sleep_ effect, and thus elves are not immune to it.

    The spell lasts for 1 round per three caster levels. You must spend a move action each round after the first to target a foe.
- id: fabricate
  name: Fabricate
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: See text
  range: Close (25 ft. + 5 ft./2 levels)
  target: Up to 10 cu. ft./level; see text
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    You convert material of one sort into a product that is of the same material. Creatures or magic items cannot be created or transmuted by the _fabricate_ spell. The quality of items made by this spell is commensurate with the quality of material used as the basis for the new fabrication. If you work with a mineral, the target is reduced to 1 cubic foot per level instead of 10 cubic feet.

    You must make an appropriate Craft check to fabricate articles requiring a high degree of craftsmanship.

    Casting requires 1 round per 10 cubic feet (or 1 cubic foot) of material to be affected by the spell.

    _Material Component:_ The original material, which costs the same amount as the raw materials required to craft the item to be created.
- id: false_life
  name: False Life
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level or until discharged; see text
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M
  target_label: Target
  description: |-
    You harness the power of unlife to grant yourself a limited ability to avoid death. While this spell is in effect, you gain temporary hit points equal to 1d10 +1 per caster level (maximum +10).

    _Material Component:_ A small amount of alcohol or distilled spirits, which you use to trace certain sigils on your body during casting. These sigils cannot be seen once the alcohol or spirits evaporate.
- id: false_vision
  name: False Vision
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Touch
  target: 40-ft.-radius emanation
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    Any divination (scrying) spell used to view anything within the area of this spell instead receives a false image (as the _major image_ spell), as defined by you at the time of casting. As long as the duration lasts, you can concentrate to change the image as desired. While you aren’t concentrating, the image remains static.

    _Arcane Material Component:_ The ground dust of a piece of jade worth at least 250 gp, which is sprinkled into the air when the spell is cast.
- id: fear
  name: Fear
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Necromancy [Fear, Mind-Affecting]
  cast_time: 1 standard action
  range: 30 ft.
  target: Cone-shaped burst
  duration: 1 round/level or 1 round; see text
  save: Will partial
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    An invisible cone of terror causes each living creature in the area to become panicked unless it succeeds on a Will save. If cornered, a panicked creature begins cowering. If the Will save succeeds, the creature is shaken for 1 round.

    _Material Component:_ Either the heart of a hen or a white feather.
- id: feeblemind
  name: Feeblemind
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One creature
  duration: Instantaneous
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    If the target creature fails a Will saving throw, its Intelligence and Charisma scores each drop to 1. The affected creature is unable to use Intelligence- or Charisma-based skills, cast spells, understand language, or communicate coherently. Still, it knows who its friends are and can follow them and even protect them. The subject remains in this state until a _heal_, _limited wish_, _miracle_, or _wish_ spell is used to cancel the effect of the _feeblemind_. A creature that can cast arcane spells, such as a sorcerer or a wizard, takes a –4 penalty on its saving throw.

    _Material Component:_ A handful of clay, crystal, glass, or mineral spheres.
- id: find_the_path
  name: Find the Path
  level_druid: 6
  level_cleric: 6
  level_wizard:
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 3 rounds
  range: Personal or touch
  target: You or creature touched
  duration: 10 min./level
  self_duration: 1
  save: None or Will negates (harmless)
  spell_resistance: No or Yes (harmless)
  components: V, S, F
  target_label: Target
  description: |-
    The recipient of this spell can find the shortest, most direct physical route to a specified destination, be it the way into or out of a locale. The locale can be outdoors, underground, or even inside a _maze_ spell. _Find the path_ works with respect to locations, not objects or creatures at a locale. The location must be on the same plane as you are at the time of casting.

    The spell enables the subject to sense the correct direction that will eventually lead it to its destination, indicating at appropriate times the exact path to follow or physical actions to take. For example, the spell enables the subject to sense trip wires or the proper word to bypass a _glyph of warding._ The spell ends when the destination is reached or the duration expires, whichever comes first. _Find the path_ can be used to remove the subject and its companions from the effect of a _maze_ spell in a single round.

    This divination is keyed to the recipient, not its companions, and its effect does not predict or allow for the actions of creatures (including guardians).

    _Focus:_ A set of divination counters of the sort you favor.
- id: finger_of_death
  name: Finger of Death
  level_druid: 8
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy [Death]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: Instantaneous
  save: Fortitude partial
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You can slay any one living creature within range. The target is entitled to a Fortitude saving throw to survive the attack. If the save is successful, the creature instead takes 3d6 points of damage +1 point per caster level (maximum +25).

    The subject might die from damage even if it succeeds on its saving throw.
- id: fire_shield
  name: Fire Shield
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire or Cold]
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 round/level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell wreathes you in flame and causes damage to each creature that attacks you in melee. The flames also protect you from either cold-based or fire-based attacks (your choice).

    Any creature striking you with its body or a handheld weapon deals normal damage, but at the same time the attacker takes 1d6 points of damage +1 point per caster level (maximum +15). This damage is either cold damage (if the _shield_ protects against fire-based attacks) or fire damage (if the _shield_ protects against cold-based attacks). If the attacker has spell resistance, it applies to this effect. Creatures wielding weapons with exceptional reach are not subject to this damage if they attack you.

    When casting this spell, you appear to immolate yourself, but the flames are thin and wispy, giving off light equal to only half the illumination of a normal torch (10 feet). The color of the flames is determined randomly (50% chance of either color)—blue or green if the _chill shield_ is cast, violet or blue if the _warm shield_ is employed. The special powers of each version are as follows.

    _Warm Shield:_ The flames are warm to the touch. You take only half damage from cold-based attacks. If such an attack allows a Reflex save for half damage, you take no damage on a successful save.

    _Chill Shield:_ The flames are cool to the touch. You take only half damage from fire-based attacks. If such an attack allows a Reflex save for half damage, you take no damage on a successful save.

    _Arcane Material Component:_ A bit of phosphorus for the _warm shield;_ a live firefly or glowworm or the tail portions of four dead ones for the _chill shield_.
- id: fireball
  name: Fireball
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: 20-ft.-radius spread
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    A _fireball_ spell is an explosion of flame that detonates with a low roar and deals 1d6 points of fire damage per caster level (maximum 10d6) to every creature within the area. Unattended objects also take this damage. The explosion creates almost no pressure.

    You point your finger and determine the range (distance and height) at which the _fireball_ is to burst. A glowing, pea-sized bead streaks from the pointing digit and, unless it impacts upon a material body or solid barrier prior to attaining the prescribed range, blossoms into the _fireball_ at that point. (An early impact results in an early detonation.) If you attempt to send the bead through a narrow passage, such as through an arrow slit, you must “hit” the opening with a ranged touch attack, or else the bead strikes the barrier and detonates prematurely.

    The _fireball_ sets fire to combustibles and damages objects in the area. It can melt metals with low melting points, such as lead, gold, copper, silver, and bronze. If the damage caused to an interposing barrier shatters or breaks through it, the _fireball_ may continue beyond the barrier if the area permits; otherwise it stops at the barrier just as any other spell effect does.

    _Material Component:_ A tiny ball of bat guano and sulfur.
- id: flame_arrow
  name: Flame Arrow
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation [Fire]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Fifty projectiles, all of which must be in contact with each other at 
    the time of casting
  duration: 10 min./level
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    You turn ammunition (such as arrows, bolts, shuriken, and stones) into fiery projectiles. Each piece of ammunition deals an extra 1d6 points of fire damage to any target it hits. A flaming projectile can easily ignite a flammable object or structure, but it won’t ignite a creature it strikes.

    _Material Component:_ A drop of oil and a small piece of flint.
- id: flesh_to_stone
  name: Flesh to Stone
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One creature
  duration: Instantaneous
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    The subject, along with all its carried gear, turns into a mindless, inert statue. If the statue resulting from this spell is broken or damaged, the subject (if ever returned to its original state) has similar damage or deformities. The creature is not dead, but it does not seem to be alive either when viewed with spells such as _deathwatch_.

    Only creatures made of flesh are affected by this spell.

    _Material Component:_ Lime, water, and earth.
- id: fly
  name: Fly
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, F/DF
  target_label: Target
  description: |-
    The subject can fly at a speed of 60 feet (or 40 feet if it wears medium or heavy armor, or if it carries a medium or heavy load). It can ascend at half speed and descend at double speed, and its maneuverability is good. Using a _fly_ spell requires only as much concentration as walking, so the subject can attack or cast spells normally. The subject of a _fly_ spell can charge but not run, and it cannot carry aloft more weight than its maximum load, plus any armor it wears.

    Should the spell duration expire while the subject is still aloft, the magic fails slowly. The subject floats downward 60 feet per round for 1d6 rounds. If it reaches the ground in that amount of time, it lands safely. If not, it falls the rest of the distance, taking 1d6 points of damage per 10 feet of fall. Since dispelling a spell effectively ends it, the subject also descends in this way if the _fly_ spell is dispelled, but not if it is negated by an _antimagic field_.

    _Arcane Focus:_ A wing feather from any bird.
- id: forcecage
  name: Forcecage
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Barred cage (20-ft. cube) or windowless cell (10-ft. cube)
  duration: 2 hours/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    This powerful spell brings into being an immobile, invisible cubical prison composed of either bars of force or solid walls of force (your choice).

    Creatures within the area are caught and contained unless they are too big to fit inside, in which case the spell automatically fails. Teleportation and other forms of astral travel provide a means of escape, but the force walls or bars extend into the Ethereal Plane, blocking ethereal travel.

    Like a _wall of force_ spell, a _forcecage_ resists _dispel magic,_ but it is vulnerable to a _disintegrate_ spell, and it can be destroyed by a _sphere of annihilation_ or a _rod of cancellation._

    _Barred Cage:_ This version of the spell produces a 20-foot cube made of bands of force (similar to a _wall of force_ spell) for bars. The bands are a half-inch wide, with half-inch gaps between them. Any creature capable of passing through such a small space can escape; others are confined. You can’t attack a creature in a barred cage with a weapon unless the weapon can fit between the gaps. Even against such weapons (including arrows and similar ranged attacks), a creature in the barred cage has cover. All spells and breath weapons can pass through the gaps in the bars.

    _Windowless Cell:_ This version of the spell produces a 10-foot cube with no way in and no way out. Solid walls of force form its six sides.

    _Material Component:_ Ruby dust worth 1,500 gp, which is tossed into the air and disappears when you cast the spell.
- id: forceful_hand
  name: Forceful Hand
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, F
  target_label: ''
  description: |-
    This spell functions like _interposing hand,_ except that the _forceful hand_ pursues and pushes away the opponent that you designate. Treat this attack as a bull rush with a +14 bonus on the Strength check (+8 for Strength 27, +4 for being Large, and a +2 bonus for charging, which it always gets). The hand always moves with the opponent to push that target back the full distance allowed, and it has no speed limit. Directing the spell to a new target is a move action.

    A very strong creature could not push the hand out of its way because the latter would instantly reposition itself between the creature and you, but an opponent could push the hand up against you by successfully bull rushing it.

    _Focus:_ A sturdy glove made of leather or heavy cloth.
- id: foresight
  name: Foresight
  level_druid: 9
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal or touch
  target: See text
  duration: 10 min./level
  self_duration: 1
  save: None or Will negates (harmless)
  spell_resistance: No or Yes (harmless)
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell grants you a powerful sixth sense in relation to yourself or another. Once _foresight_ is cast, you receive instantaneous warnings of impending danger or harm to the subject of the spell. You are never surprised or flat-footed. In addition, the spell gives you a general idea of what action you might take to best protect yourself and gives you a +2 insight bonus to AC and Reflex saves. This insight bonus is lost whenever you would lose a Dexterity bonus to AC.

    When another creature is the subject of the spell, you receive warnings about that creature. You must communicate what you learn to the other creature for the warning to be useful, and the creature can be caught unprepared in the absence of such a warning. Shouting a warning, yanking a person back, and even telepathically communicating (via an appropriate spell) can all be accomplished before some danger befalls the subject, provided you act on the warning without delay. The subject, however, does not gain the insight bonus to AC and Reflex saves.

    _Arcane Material Component:_ A hummingbird’s feather.
- id: foxs_cunning
  name: Fox’s Cunning
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Target
  description: |-
    The transmuted creature becomes smarter. The spell grants a +4 enhancement bonus to Intelligence, adding the usual benefits to Intelligence-based skill checks and other uses of the Intelligence modifier. Wizards (and other spellcasters who rely on Intelligence) affected by this spell do not gain any additional bonus spells for the increased Intelligence, but the save DCs for spells they cast while under this spell’s effect do increase. This spell doesn’t grant extra skill points.

    _Arcane Material Component:_ A few hairs, or a pinch of dung, from a fox.
- id: foxs_cunning_mass
  name: Fox’s Cunning, Mass
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _fox’s cunning_, except that it affects
    multiple creatures.
- id: freedom
  name: Freedom
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels) or see text
  target: One creature
  duration: Instantaneous
  save: Will negates (harmless)
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: The subject is freed from spells and effects that restrict its 
    movement, including _binding_, _entangle_, grappling, _imprisonment_, 
    _maze_, paralysis, _petrification_, pinning, _sleep_, _slow_, stunning, 
    _temporal stasis_, and _web_. To free a creature from _imprisonment_ or 
    _maze,_ you must know its name and background, and you must cast this spell 
    at the spot where it was entombed or banished into the _maze_.
- id: freezing_sphere
  name: Freezing Sphere
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: ''
  duration: Instantaneous or 1 round/level; see text
  save: Reflex half; see text
  spell_resistance: Yes
  components: V, S, F
  target_label: ''
  description: |-
    _Freezing sphere_ creates a frigid globe of cold energy that streaks from your fingertips to the location you select, where it explodes in a 10-foot-radius burst, dealing 1d6 points of cold damage per caster level (maximum 15d6) to each creature in the area. An elemental (water) creature instead takes 1d8 points of cold damage per caster level (maximum 15d8).

    If the _freezing sphere_ strikes a body of water or a liquid that is principally water (not including water-based creatures), it freezes the liquid to a depth of 6 inches over an area equal to 100 square feet (a 10- foot square) per caster level (maximum 1,500 square feet). This ice lasts for 1 round per caster level. Creatures that were swimming on the surface of frozen water become trapped in the ice. Attempting to break free is a full-round action. A trapped creature must make a DC 25 Strength check or a DC 25 Escape Artist check to do so.

    You can refrain from firing the globe after completing the spell, if you wish. Treat this as a touch spell for which you are holding the charge. You can hold the charge for as long as 1 round per level, at the end of which time the _freezing sphere_ bursts centered on you (and you receive no saving throw to resist its effect). Firing the globe in a later round is a standard action.

    _Focus:_ A small crystal sphere.
- id: gaseous_form
  name: Gaseous Form
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Willing corporeal creature touched
  duration: 2 min./level (D)
  save: None
  spell_resistance: No
  components: S, M/DF
  target_label: Target
  description: |-
    The subject and all its gear become insubstantial, misty, and translucent. Its material armor (including natural armor) becomes worthless, though its size, Dexterity, deflection bonuses, and armor bonuses from force effects still apply. The subject gains damage reduction 10/magic and becomes immune to poison and critical hits. It can’t attack or cast spells with verbal, somatic, material, or focus components while in gaseous form. (This does not rule out the use of certain spells that the subject may have prepared using the feats Silent Spell, Still Spell, and Eschew Materials.) The subject also loses supernatural abilities while in gaseous form. If it has a touch spell ready to use, that spell is discharged harmlessly when the _gaseous form_ spell takes effect.

    A gaseous creature can’t run, but it can fly at a speed of 10 feet (maneuverability perfect). It can pass through small holes or narrow openings, even mere cracks, with all it was wearing or holding in its hands, as long as the spell persists. The creature is subject to the effects of wind, and it can’t enter water or other liquid. It also can’t manipulate objects or activate items, even those carried along with its gaseous form. Continuously active items remain active, though in some cases their effects may be moot.

    _Arcane Material Component:_ A bit of gauze and a wisp of smoke.
- id: gate
  name: Gate
  level_druid:
  level_cleric: 9
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation or Calling)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: See text
  duration: Instantaneous or concentration (up to 1 round/level); see text
  save: None
  spell_resistance: No
  components: V, S, XP; see text
  target_label: Effect
  description: |-
    Casting a _gate_ spell has two effects. First, it creates an interdimensional connection between your plane of existence and a plane you specify, allowing travel between those two planes in either direction.

    Second, you may then call a particular individual or kind of being through the _gate._

    The _gate_ itself is a circular hoop or disk from 5 to 20 feet in diameter (caster’s choice), oriented in the direction you desire when it comes into existence (typically vertical and facing you). It is a two-dimensional window looking into the plane you specified when casting the spell, and anyone or anything that moves through is shunted instantly to the other side.

    A _gate_ has a front and a back. Creatures moving through the _gate_ from the front are transported to the other plane; creatures moving through it from the back are not.

    _Planar Travel:_ As a mode of planar travel, a _gate_ spell functions much like a _plane shift_ spell, except that the _gate_ opens precisely at the point you desire (a creation effect). Deities and other beings who rule a planar realm can prevent a _gate_ from opening in their presence or personal demesnes if they so desire. Travelers need not join hands with you—anyone who chooses to step through the portal is transported. A _gate_ cannot be opened to another point on the same plane; the spell works only for interplanar travel.

    You may hold the _gate_ open only for a brief time (no more than 1 round per caster level), and you must concentrate on doing so, or else the interplanar connection is severed.

    _Calling Creatures:_ The second effect of the _gate_ spell is to call an extraplanar creature to your aid (a calling effect). By naming a particular being or kind of being as you cast the spell, you cause the _gate_ to open in the immediate vicinity of the desired creature and pull the subject through, willing or unwilling. Deities and unique beings are under no compulsion to come through the _gate,_ although they may choose to do so of their own accord. This use of the spell creates a _gate_ that remains open just long enough to transport the called creatures. This use of the spell has an XP cost (see below).

    If you choose to call a kind of creature instead of a known individual you may call either a single creature (of any HD) or several creatures. You can call and control several creatures as long as their HD total does not exceed your caster level. In the case of a single creature, you can control it if its HD do not exceed twice your caster level. A single creature with more HD than twice your caster level can’t be controlled. Deities and unique beings cannot be controlled in any event. An uncontrolled being acts as it pleases, making the calling of such creatures rather dangerous. An uncontrolled being may return to its home plane at any time.

    A controlled creature can be commanded to perform a service for you. Such services fall into two categories: immediate tasks and contractual service. Fighting for you in a single battle or taking any other actions that can be accomplished within 1 round per caster level counts as an immediate task; you need not make any agreement or pay any reward for the creature’s help. The creature departs at the end of the spell.

    If you choose to exact a longer or more involved form of service from a called creature, you must offer some fair trade in return for that service. The service exacted must be reasonable with respect to the promised favor or reward; see the _lesser planar ally_ spell for appropriate rewards. (Some creatures may want their payment in “livestock” rather than in coin, which could involve complications.) Immediately upon completion of the service, the being is transported to your vicinity, and you must then and there turn over the promised reward. After this is done, the creature is instantly freed to return to its own plane.

    Failure to fulfill the promise to the letter results in your being subjected to service by the creature or by its liege and master, at the very least. At worst, the creature or its kin may attack you.

    _Note:_ When you use a calling spell such as _gate_ to call an air, chaotic, earth, evil, fire, good, lawful, or water creature, it becomes a spell of that type.

    _XP Cost:_ 1,000 XP (only for the _calling creatures_ function).
- id: geas_quest
  name: Geas/Quest
  level_druid:
  level_cleric: 6
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Language-Dependent, Mind-Affecting]
  cast_time: 10 minutes
  range: ''
  target: One living creature
  duration: ''
  save: None
  spell_resistance: ''
  components: ''
  target_label: Target
  description: |-
    This spell functions similarly to _lesser geas,_ except that it affects a creature of any HD and allows no saving throw.

    Instead of taking penalties to ability scores (as with _lesser geas_), the subject takes 3d6 points of damage each day it does not attempt to follow the _geas/quest_. Additionally, each day it must make a Fortitude saving throw or become sickened. These effects end 24 hours after the creature attempts to resume the _geas/ quest_.

    A _remove curse_ spell ends a _geas/quest_ spell only if its caster level is at least two higher than your caster level. _Break enchantment_ does not end a _geas/quest_, but _limited wish_, _miracle_, and _wish_ do.

    Bards, sorcerers, and wizards usually refer to this spell as _geas,_ while clerics call the same spell _quest_.
- id: geas_lesser
  name: Geas, Lesser
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Language-Dependent, Mind-Affecting]
  cast_time: 1 round
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature with 7 HD or less
  duration: One day/level or until discharged (D)
  save: Will negates
  spell_resistance: Yes
  components: V
  target_label: Target
  description: |-
    A _lesser geas_ places a magical command on a creature to carry out some service or to refrain from some action or course of activity, as desired by you. The creature must have 7 or fewer Hit Dice and be able to understand you. While a _geas_ cannot compel a creature to kill itself or perform acts that would result in certain death, it can cause almost any other course of activity.

    The _geased_ creature must follow the given instructions until the _geas_ is completed, no matter how long it takes.

    If the instructions involve some open-ended task that the recipient cannot complete through his own actions the spell remains in effect for a maximum of one day per caster level. A clever recipient can subvert some instructions:

    If the subject is prevented from obeying the _lesser geas_ for 24 hours, it takes a –2 penalty to each of its ability scores. Each day, another –2 penalty accumulates, up to a total of –8. No ability score can be reduced to less than 1 by this effect. The ability score penalties are removed 24 hours after the subject resumes obeying the _lesser geas._

    A _lesser geas_ (and all ability score penalties) can be ended by _break enchantment_, _limited wish_, _remove curse_, _miracle_, or _wish_. _Dispel magic_ does not affect a _lesser geas_.
- id: gentle_repose
  name: Gentle Repose
  level_druid:
  level_cleric: 2
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Corpse touched
  duration: One day/level
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    You preserve the remains of a dead creature so that they do not decay. Doing so effectively extends the time limit on raising that creature from the dead (see _raise dead_). Days spent under the influence of this spell don’t count against the time limit. Additionally, this spell makes transporting a fallen comrade more pleasant.

    The spell also works on severed body parts and the like.

    _Arcane Material Component:_ A pinch of salt, and a copper piece for each eye the corpse has (or had).
- id: ghoul_touch
  name: Ghoul Touch
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Touch
  target: Living humanoid touched
  duration: 1d6+2 rounds
  save: Fortitude negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    Imbuing you with negative energy, this spell allows you to paralyze a single living humanoid for the duration of the spell with a successful melee touch attack.

    Additionally, the paralyzed subject exudes a carrion stench that causes all living creatures (except you) in a 10-foot-radius spread to become sickened (Fortitude negates). A _neutralize poison_ spell removes the effect from a sickened creature, and creatures immune to poison are unaffected by the stench.

    _Material Component:_ A small scrap of cloth taken from clothing worn by a ghoul, or a pinch of earth from a ghoul’s lair.
- id: glibness
  name: Glibness
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: S
  target_label: Target
  description: |-
    Your speech becomes fluent and more believable. You gain a +30 bonus on Bluff checks made to convince another of the truth of your words. (This bonus doesn’t apply to other uses of the Bluff skill, such as feinting in combat, creating a diversion to hide, or communicating a hidden message via innuendo.)

    If a magical effect is used against you that would detect your lies or force you to speak the truth the user of the effect must succeed on a caster level check (1d20 + caster level) against a DC of 15 + your caster level to succeed. Failure means the effect does not detect your lies or force you to speak only the truth.
- id: glitterdust
  name: Glitterdust
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Creatures and objects within 10-ft.-radius spread
  duration: 1 round/level
  save: Will negates (blinding only)
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    A cloud of golden particles covers everyone and everything in the area, causing creatures to become blinded and visibly outlining invisible things for the duration of the spell. All within the area are covered by the dust, which cannot be removed and continues to sparkle until it fades.

    Any creature covered by the dust takes a –40 penalty on Hide checks.

    _Material Component:_ Ground mica.
- id: globe_of_invulnerability
  name: Globe of Invulnerability
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _lesser globe of invulnerability,_ 
    except that it also excludes 4th-level spells and spell-like effects.
- id: globe_of_invulnerability_lesser
  name: Globe of Invulnerability, Lesser
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: 10 ft.
  target: 10-ft.-radius spherical emanation, centered on you
  duration: 1 round/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    An immobile, faintly shimmering magical sphere surrounds you and excludes all spell effects of 3rd level or lower. The area or effect of any such spells does not include the area of the _lesser globe of invulnerability_. Such spells fail to affect any target located within the globe. Excluded effects include spell-like abilities and spells or spell-like effects from items. However, any type of spell can be cast through or out of the magical globe. Spells of 4th level and higher are not affected by the globe, nor are spells already in effect when the globe is cast. The globe can be brought down by a targeted _dispel magic_ spell, but not by an area _dispel magic._ You can leave and return to the globe without penalty.

    Note that spell effects are not disrupted unless their effects enter the globe, and even then they are merely suppressed, not dispelled.

    If a given spell has more than one level depending on which character class is casting it, use the level appropriate to the caster to determine whether _lesser globe of invulnerability_ stops it.

    _Material Component:_ A glass or crystal bead that shatters at the expiration of the spell.
- id: good_hope
  name: Good Hope
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature/level, no two of which may be more than 30 ft. 
    apart
  duration: 1 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Targets
  description: |-
    This spell instills powerful hope in the subjects. Each affected creature gains a +2 morale bonus on saving throws, attack rolls, ability checks, skill checks, and weapon damage rolls.

    _Good hope_ counters and dispels _crushing despair_.
- id: grasping_hand
  name: Grasping Hand
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, F/DF
  target_label: ''
  description: |-
    This spell functions like _interposing hand,_ except the hand can also grapple one opponent that you select. The _grasping hand_ gets one grapple attack per round.

    Its attack bonus to make contact equals your caster level + your Intelligence, Wisdom, or Charisma modifier (for wizards, clerics, and sorcerers, respectively), +10 for the hand’s Strength score (31), –1 for being Large. Its grapple bonus is this same figure, except with a +4 modifier for being Large instead of –1. The hand holds but does not harm creatures it grapples.

    Directing the spell to a new target is a move action.

    The _grasping hand_ can also bull rush an opponent as _forceful hand_ does, but at a +16 bonus on the Strength check (+10 for Strength 35, +4 for being Large, and a +2 bonus for charging, which it always gets), or interpose itself as _interposing hand_ does.

    Clerics who cast this spell name it for their deities.

    _Arcane Focus:_ A leather glove.
- id: guards_and_wards
  name: Guards and Wards
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 30 minutes
  range: Anywhere within the area to be warded
  target: Up to 200 sq. ft./level (S)
  duration: 2 hours/level (D)
  save: See text
  spell_resistance: See text
  components: V, S, M, F
  target_label: Area
  description: |-
    This powerful spell is primarily used to defend your stronghold. The ward protects 200 square feet per caster level. The warded area can be as much as 20 feet high, and shaped as you desire. You can ward several stories of a stronghold by dividing the area among them; you must be somewhere within the area to be warded to cast the spell. The spell creates the following magical effects within the warded area.

    _Fog:_ Fog fills all corridors, obscuring all sight, including darkvision, beyond 5 feet. A creature within 5 feet has concealment (attacks have a 20% miss chance). Creatures farther away have total concealment (50% miss chance, and the attacker cannot use sight to locate the target). Saving Throw: None. Spell Resistance: No.

    _Arcane Locks:_ All doors in the warded area are _arcane locked._ Saving Throw: None. Spell Resistance: No.

    _Webs:_ Webs fill all stairs from top to bottom. These strands are identical with those created by the _web_ spell, except that they regrow in 10 minutes if they are burned or torn away while the _guards and wards_ spell lasts. Saving Throw: Reflex negates; see text for _web_. Spell Resistance: No.

    _Confusion:_ Where there are choices in direction—such as a corridor intersection or side passage—a minor _confusion_\-type effect functions so as to make it 50% probable that intruders believe they are going in the opposite direction from the one they actually chose. This is an enchantment, mind-affecting effect. Saving Throw: None. Spell Resistance: Yes.

    _Lost Doors:_ One door per caster level is covered by a _silent image_ to appear as if it were a plain wall. Saving Throw: Will disbelief (if interacted with). Spell Resistance: No.

    In addition, you can place your choice of one of the following five magical effects.

    1\. _Dancing lights_ in four corridors. You can designate a simple program that causes the lights to repeat as long as the _guards and wards_ spell lasts. Saving Throw: None. Spell Resistance: No.

    2\. A _magic mouth_ in two places. Saving Throw: None. Spell Resistance: No.

    3\. A _stinking cloud_ in two places. The vapors appear in the places you designate; they return within 10 minutes if dispersed by wind while the _guards and wards_ spell lasts. Saving Throw: Fortitude negates; see text for _stinking cloud._ Spell Resistance: No.

    4\. A _gust of wind_ in one corridor or room. Saving Throw: Fortitude negates. Spell Resistance: Yes.

    5\. A _suggestion_ in one place. You select an area of up to 5 feet square, and any creature who enters or passes through the area receives the _suggestion_ mentally. Saving Throw: Will negates. Spell Resistance: Yes.

    The whole warded area radiates strong magic of the abjuration school. A _dispel magic_ cast on a specific effect, if successful, removes only that effect. A successful _Mage’s disjunction_ destroys the entire _guards and wards_ effect.

    _Material Component:_ Burning incense, a small measure of brimstone and oil, a knotted string, and a small amount of blood.

    _Focus:_ A small silver rod.
- id: hallucinatory_terrain
  name: Hallucinatory Terrain
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 10 minutes
  range: Long (400 ft. + 40 ft./level)
  target: One 30-ft. cube/level (S)
  duration: 2 hours/level (D)
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    You make natural terrain look, sound, and smell like some other sort of natural terrain. Structures, equipment, and creatures within the area are not hidden or changed in appearance.

    _Material Component:_ A stone, a twig, and a bit of green plant.
- id: halt_undead
  name: Halt Undead
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to three undead creatures, no two of which can be more than 30 ft. 
    apart
  duration: 1 round/level
  save: Will negates (see text)
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    This spell renders as many as three undead creatures immobile. A nonintelligent undead creature gets no saving throw; an intelligent undead creature does. If the spell is successful, it renders the undead creature immobile for the duration of the spell (similar to the effect of _hold person_ on a living creature). The effect is broken if the _halted_ creatures are attacked or take damage.

    _Material Component:_ A pinch of sulfur and powdered garlic.
- id: haste
  name: Haste
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: 1 round/level
  save: Fortitude negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Targets
  description: |-
    The transmuted creatures move and act more quickly than normal. This extra speed has several effects.

    When making a full attack action, a hasted creature may make one extra attack with any weapon he is holding. The attack is made using the creature’s full base attack bonus, plus any modifiers appropriate to the situation. (This effect is not cumulative with similar effects, such as that provided by a weapon of speed, nor does it actually grant an extra action, so you can’t use it to cast a second spell or otherwise take an extra action in the round.)

    A _hasted_ creature gains a +1 bonus on attack rolls and a +1 dodge bonus to AC and Reflex saves. Any condition that makes you lose your Dexterity bonus to Armor Class (if any) also makes you lose dodge bonuses.

    All of the _hasted_ creature’s modes of movement (including land movement, burrow, climb, fly, and swim) increase by 30 feet, to a maximum of twice the subject’s normal speed using that form of movement. This increase counts as an enhancement bonus, and it affects the creature’s jumping distance as normal for increased speed.

    Multiple _haste_ effects don’t stack. _Haste_ dispels and counters _slow._

    _Material Component:_ A shaving of licorice root.
- id: heroes_feast
  name: Heroes’ Feast
  level_druid:
  level_cleric: 6
  level_wizard:
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Conjuration [Creation]
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels)
  target: Feast for one creature/level
  duration: 1 hour plus 12 hours; see text
  save: None
  spell_resistance: No
  components: V, S, DF
  target_label: Effect
  description: |-
    You bring forth a great feast, including a magnificent table, chairs, service, and food and drink. The feast takes 1 hour to consume, and the beneficial effects do not set in until this hour is over. Every creature partaking of the feast is cured of all diseases, sickness, and nausea; becomes immune to poison for 12 hours; and gains 1d8 temporary hit points +1 point per two caster levels (maximum +10) after imbibing the nectar-like beverage that is part of the feast. The ambrosial food that is consumed grants each creature that partakes a +1 morale bonus on attack rolls and Will saves and immunity to fear effects for 12 hours.

    If the feast is interrupted for any reason, the spell is ruined and all effects of the spell are negated.
- id: heroism
  name: Heroism
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: This spell imbues a single creature with great bravery and morale
    in battle. The target gains a +2 morale bonus on attack rolls, saves, and 
    skill checks.
- id: heroism_greater
  name: Heroism, Greater
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: ''
  duration: 1 min./level
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _heroism,_ except the creature gains a 
    +4 morale bonus on attack rolls, saves, and skill checks, immunity to fear 
    effects, and temporary hit points equal to your caster level (maximum 20).
- id: hold_monster
  name: Hold Monster
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One living creature
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell functions like _hold person,_ except that it affects any living creature that fails its Will save.

    _Arcane Material Component:_ One hard metal bar or rod, which can be as small as a three-penny nail.
- id: hold_monster_mass
  name: Hold Monster, Mass
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One or more creatures, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Targets
  description: This spell functions like _hold person,_ except that it affects 
    multiple creatures and holds any living creature that fails its Will save.
- id: hold_person
  name: Hold Person
  level_druid:
  level_cleric: 2
  level_wizard: 3
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One humanoid creature
  duration: 1 round/level (D); see text
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, F/DF
  target_label: Target
  description: |-
    The subject becomes paralyzed and freezes in place. It is aware and breathes normally but cannot take any actions, even speech. Each round on its turn, the subject may attempt a new saving throw to end the effect. (This is a full-round action that does not provoke attacks of opportunity.)

    A winged creature who is paralyzed cannot flap its wings and falls. A swimmer can’t swim and may drown.

    _Arcane Focus:_ A small, straight piece of iron.
- id: hold_person_mass
  name: Hold Person, Mass
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: ''
  range: ''
  target: One or more humanoid creatures, no two of which can be more than 30 
    ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Targets
  description: This spell functions like _hold person,_ except as noted above.
- id: horrid_wilting
  name: Horrid Wilting
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Living creatures, no two of which can be more than 60 ft. apart
  duration: Instantaneous
  save: Fortitude half
  spell_resistance: Yes
  components: V, S, M/DF
  target_label: Targets
  description: |-
    This spell evaporates moisture from the body of each subject living creature, dealing 1d6 points of damage per caster level (maximum 20d6). This spell is especially devastating to water elementals and plant creatures, which instead take 1d8 points of damage per caster level (maximum 20d8).

    _Arcane Material Component:_ A bit of sponge.
- id: hypnotic_pattern
  name: Hypnotic Pattern
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Pattern) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Colorful lights in a 10-ft.-radius spread
  duration: Concentration + 2 rounds
  save: Will negates
  spell_resistance: Yes
  components: V (Brd only), S, M; see text
  target_label: Effect
  description: |-
    A twisting pattern of subtle, shifting colors weaves through the air, fascinating creatures within it. Roll 2d4 and add your caster level (maximum 10) to determine the total number of Hit Dice of creatures affected. Creatures with the fewest HD are affected first; and, among creatures with equal HD, those who are closest to the spell’s point of origin are affected first. Hit Dice that are not sufficient to affect a creature are wasted. Affected creatures become fascinated by the pattern of colors. Sightless creatures are not affected.

    A wizard or sorcerer need not utter a sound to cast this spell, but a bard must sing, play music, or recite a rhyme as a verbal component.

    _Material Component:_ A glowing stick of incense or a crystal rod filled with phosphorescent material.
- id: illusory_script
  name: Illusory Script
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Illusion (Phantasm) [Mind-Affecting]
  cast_time: 1 minute or longer; see text
  range: Touch
  target: One touched object weighing no more than 10 lb.
  duration: One day/level (D)
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    You write instructions or other information on parchment, paper, or any suitable writing material. The _illusory script_ appears to be some form of foreign or magical writing. Only the person (or people) designated by you at the time of the casting are able to read the writing; it’s unintelligible to any other character, although an illusionist recognizes it as _illusory script._

    Any unauthorized creature attempting to read the script triggers a potent illusory effect and must make a saving throw. A successful saving throw means the creature can look away with only a mild sense of disorientation. Failure means the creature is subject to a suggestion implanted in the script by you at the time the illusory script spell was cast. The suggestion lasts only 30 minutes. Typical suggestions include “Close the book and leave,” “Forget the existence of the book,” and so forth. If successfully dispelled by _dispel magic,_ the _illusory script_ and its secret message disappear. The hidden message can be read by a combination of the _true seeing_ spell with the _read magic_ or _comprehend languages_ spell.

    The casting time depends on how long a message you wish to write, but it is always at least 1 minute.

    _Material Component:_ A lead-based ink (cost of not less than 50 gp).
- id: illusory_wall
  name: Illusory Wall
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Image 1 ft. by 10 ft. by 10 ft.
  duration: Permanent
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: This spell creates the illusion of a wall, floor, ceiling, or 
    similar surface. It appears absolutely real when viewed, but physical 
    objects can pass through it without difficulty. When the spell is used to 
    hide pits, traps, or normal doors, any detection abilities that do not 
    require sight work normally. Touch or a probing search reveals the true 
    nature of the surface, though such measures do not cause the illusion to 
    disappear.
- id: imprisonment
  name: Imprisonment
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: Instantaneous
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: When you cast _imprisonment_ and touch a creature, it is entombed
    in a state of suspended animation (see the _temporal stasis_ spell) in a 
    small sphere far beneath the surface of the earth. The subject remains there
    unless a _freedom_ spell is cast at the locale where the imprisonment took 
    place. Magical search by a _crystal ball,_ a _locate object_ spell, or some 
    other similar divination does not reveal the fact that a creature is 
    imprisoned, but _discern location_ does. A _wish_ or _miracle_ spell will 
    not free the recipient, but will reveal where it is entombed. If you know 
    the target’s name and some facts about its life, the target takes a –4 
    penalty on its save.
- id: incendiary_cloud
  name: Incendiary Cloud
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Fire]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Cloud spreads in 20-ft. radius, 20 ft. high
  duration: 1 round/level
  save: Reflex half; see text
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    An _incendiary cloud_ spell creates a cloud of roiling smoke shot through with white-hot embers. The smoke obscures all sight as a _fog cloud_ does. In addition, the white-hot embers within the cloud deal 4d6 points of fire damage to everything within the cloud on your turn each round. All targets can make Reflex saves each round to take half damage.

    As with a _cloudkill_ spell, the smoke moves away from you at 10 feet per round. Figure out the smoke’s new spread each round based on its new point of origin, which is 10 feet farther away from where you were when you cast the spell. By concentrating, you can make the cloud (actually its point of origin) move as much as 60 feet each round. Any portion of the cloud that would extend beyond your maximum range dissipates harmlessly, reducing the remainder’s spread thereafter.

    As with _fog cloud_, wind disperses the smoke, and the spell can’t be cast underwater.
- id: insanity
  name: Insanity
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature
  duration: Instantaneous
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    The affected creature suffers from a continuous _confusion_ effect, as the spell.

    _Remove curse_ does not remove _insanity_. _Greater restoration_, _heal_, _limited wish_, _miracle_, or _wish_ can restore the creature.
- id: instant_summons
  name: Instant Summons
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 1 standard action
  range: See text
  target: One object weighing 10 lb. or less whose longest dimension is 6 ft. or
    less
  duration: Permanent until discharged
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    You call some nonliving item from virtually any location directly to your hand.

    First, you must place your _arcane mark_ on the item. Then you cast this spell, which magically and invisibly inscribes the name of the item on a sapphire worth at least 1,000 gp. Thereafter, you can summon the item by speaking a special word (set by you when the spell is cast) and crushing the gem. The item appears instantly in your hand. Only you can use the gem in this way.

    If the item is in the possession of another creature, the spell does not work, but you know who the possessor is and roughly where that creature is located when the summons occurs.

    The inscription on the gem is invisible. It is also unreadable, except by means of a _read magic_ spell, to anyone but you.

    The item can be summoned from another plane, but only if no other creature has claimed ownership of it.

    _Material Component:_ A sapphire worth at least 1,000 gp.
- id: interposing_hand
  name: Interposing Hand
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: 10-ft. hand
  duration: 1 round/level (D)
  save: None
  spell_resistance: Yes
  components: V, S, F
  target_label: Effect
  description: |-
    _Interposing hand_ creates a Large magic hand that appears between you and one opponent. This floating, disembodied hand then moves to remain between the two of you, regardless of where you move or how the opponent tries to get around it, providing cover (+4 AC) for you against that opponent. Nothing can fool the hand—it sticks with the selected opponent in spite of darkness, invisibility, polymorphing, or any other attempt at hiding or disguise. The hand does not pursue an opponent, however.

    An _interposing hand_ is 10 feet long and about that wide with its fingers outstretched. It has as many hit points as you do when you’re undamaged, and its AC is 20 (–1 size, +11 natural). It takes damage as a normal creature, but most magical effects that don’t cause damage do not affect it.

    The hand never provokes attacks of opportunity from opponents. It cannot push through a _wall of force_ or enter an _antimagic field_, but it suffers the full effect of a _prismatic wall_ or _prismatic sphere._ The hand makes saving throws as its caster.

    _Disintegrate_ or a successful _dispel magic_ destroys it.

    Any creature weighing 2,000 pounds or less that tries to push past the hand is slowed to half its normal speed. The hand cannot reduce the speed of a creature weighing more than 2,000 pounds, but it still affects the creature’s attacks.

    Directing the spell to a new target is a move action.

    _Focus:_ A soft glove.
- id: invisibility
  name: Invisibility
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Personal or touch
  target: You or a creature or object weighing no more than 100 lb./level
  duration: 1 min./level (D)
  self_duration: 1
  save: Will negates (harmless) or Will negates (harmless, object)
  spell_resistance: Yes (harmless) or Yes (harmless, object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    The creature or object touched becomes invisible, vanishing from sight, even from darkvision. If the recipient is a creature carrying gear, that vanishes, too. If you cast the spell on someone else, neither you nor your allies can see the subject, unless you can normally see invisible things or you employ magic to do so.

    Items dropped or put down by an invisible creature become visible; items picked up disappear if tucked into the clothing or pouches worn by the creature. Light, however, never becomes invisible, although a source of light can become so (thus, the effect is that of a light with no visible source). Any part of an item that the subject carries but that extends more than 10 feet from it becomes visible.

    Of course, the subject is not magically _silenced,_ and certain other conditions can render the recipient detectable (such as stepping in a puddle). The spell ends if the subject attacks any creature. For purposes of this spell, an attack includes any spell targeting a foe or whose area or effect includes a foe. (Exactly who is a foe depends on the invisible character’s perceptions.) Actions directed at unattended objects do not break the spell. Causing harm indirectly is not an attack. Thus, an invisible being can open doors, talk, eat, climb stairs, summon monsters and have them attack, cut the ropes holding a rope bridge while enemies are on the bridge, remotely trigger traps, open a portcullis to release attack dogs, and so forth. If the subject attacks directly, however, it immediately becomes visible along with all its gear. Spells such as _bless_ that specifically affect allies but not foes are not attacks for this purpose, even when they include foes in their area.

    _Invisibility_ can be made permanent (on objects only) with a _permanency_ spell.

    _Arcane Material Component:_ An eyelash encased in a bit of gum arabic.
- id: invisibility_greater
  name: Invisibility, Greater
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: ''
  range: ''
  target: You or creature touched
  duration: 1 round/level (D)
  save: Will negates (harmless)
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: This spell functions like _invisibility_, except that it doesn’t 
    end if the subject attacks.
- id: invisibility_mass
  name: Invisibility, Mass
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: ''
  range: Long (400 ft. + 40 ft./level)
  target: Any number of creatures, no two of which can be more than 180 ft. 
    apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, M
  target_label: Targets
  description: |-
    This spell functions like _invisibility,_ except that the effect is mobile with the group and is broken when anyone in the group attacks. Individuals in the group cannot see each other. The spell is broken for any individual who moves more than 180 feet from the nearest member of the group. (If only two individuals are affected, the one moving away from the other one loses its invisibility. If both are moving away from each other, they both become visible when the distance between them exceeds 180 feet.)

    _Material Component:_ An eyelash encased in a bit of gum arabic.
- id: invisibility_sphere
  name: Invisibility Sphere
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: ''
  range: ''
  target: 10-ft.-radius emanation around the creature or object touched
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S, M
  target_label: Area
  description: |-
    This spell functions like _invisibility,_ except that this spell confers invisibility upon all creatures within 10 feet of the recipient. The center of the effect is mobile with the recipient.

    Those affected by this spell can see each other and themselves as if unaffected by the spell. Any affected creature moving out of the area becomes visible, but creatures moving into the area after the spell is cast do not become invisible. Affected creatures (other than the recipient) who attack negate the invisibility only for themselves. If the spell recipient attacks, the _invisibility sphere_ ends.
- id: iron_body
  name: Iron Body
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell transforms your body into living iron, which grants you several powerful resistances and abilities.

    You gain damage reduction 15/adamantine. You are immune to blindness, critical hits, ability score damage, deafness, disease, drowning, electricity, poison, stunning, and all spells or attacks that affect your physiology or respiration, because you have no physiology or respiration while this spell is in effect. You take only half damage from acid and fire of all kinds. However, you also become vulnerable to all special attacks that affect iron golems.

    You gain a +6 enhancement bonus to your Strength score, but you take a –6 penalty to Dexterity as well (to a minimum Dexterity score of 1), and your speed is reduced to half normal. You have an arcane spell failure chance of 50% and a –8 armor check penalty, just as if you were clad in full plate armor. You cannot drink (and thus can’t use potions) or play wind instruments.

    Your unarmed attacks deal damage equal to a club sized for you (1d4 for Small characters or 1d6 for Medium characters), and you are considered armed when making unarmed attacks.

    Your weight increases by a factor of ten, causing you to sink in water like a stone. However, you could survive the crushing pressure and lack of air at the bottom of the ocean—at least until the spell duration expires.

    _Arcane Material Component:_ A small piece of iron that was once part of either an iron golem, a hero’s armor, or a war machine.
- id: irresistible_dance
  name: Irresistible Dance
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Touch
  target: Living creature touched
  duration: 1d4+1 rounds
  save: None
  spell_resistance: Yes
  components: V
  target_label: Target
  description: The subject feels an undeniable urge to dance and begins doing 
    so, complete with foot shuffling and tapping. The spell effect makes it 
    impossible for the subject to do anything other than caper and prance in 
    place. The effect imposes a –4 penalty to Armor Class and a –10 penalty on 
    Reflex saves, and it negates any AC bonus granted by a shield the target 
    holds. The dancing subject provokes attacks of opportunity each round on its
    turn.
- id: keen_edge
  name: Keen Edge
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One weapon or fifty projectiles, all of which must be in contact with 
    each other at the time of casting
  duration: 10 min./level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S
  target_label: Targets
  description: |-
    This spell makes a weapon magically keen, improving its ability to deal telling blows. This transmutation doubles the threat range of the weapon. A threat range of 20 becomes 19–20, a threat range of 19–20 becomes 17–20, and a threat range of 18–20 becomes 15–20. The spell can be cast only on piercing or slashing weapons. If cast on arrows or crossbow bolts, the _keen edge_ on a particular projectile ends after one use, whether or not the missile strikes its intended target. (Treat shuriken as arrows, rather than as thrown weapons, for the purpose of this spell.)

    Multiple effects that increase a weapon’s threat range (such as the _keen edge_ spell and the Improved Critical feat) don’t stack. You can’t cast this spell on a natural weapon, such as a claw.
- id: knock
  name: Knock
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One door, box, or chest with an area of up to 10 sq. ft./level
  duration: Instantaneous; see text
  save: None
  spell_resistance: No
  components: V
  target_label: Target
  description: The _knock_ spell opens stuck, barred, locked, _held,_ or _arcane
    locked_ doors. It opens secret doors, as well as locked or trick-opening 
    boxes or chests. It also loosens welds, shackles, or chains (provided they 
    serve to hold closures shut). If used to open a _arcane locked_ door, the 
    spell does not remove the _arcane lock_ but simply suspends its functioning 
    for 10 minutes. In all other cases, the door does not relock itself or 
    become stuck again on its own. _Knock_ does not raise barred gates or 
    similar impediments (such as a portcullis), nor does it affect ropes, vines,
    and the like. The effect is limited by the area. Each spell can undo as many
    as two means of preventing egress.
- id: legend_lore
  name: Legend Lore
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: See text
  range: Personal
  target: You
  duration: See text
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M, F
  target_label: Target
  description: |-
    _Legend lore_ brings to your mind legends about an important person, place, or thing. If the person or thing is at hand, or if you are in the place in question, the casting time is only 1d4x10 minutes. If you have only detailed information on the person, place, or thing, the casting time is 1d10 days, and the resulting lore is less complete and specific (though it often provides enough information to help you find the person, place, or thing, thus allowing a better _legend lore_ result next time). If you know only rumors, the casting time is 2d6 weeks, and the resulting lore is vague and incomplete (though it often directs you to more detailed information, thus allowing a better _legend lore_ result next time).

    During the casting, you cannot engage in other than routine activities: eating, sleeping, and so forth. When completed, the divination brings legends (if any) about the person, place, or things to your mind. These may be legends that are still current, legends that have been forgotten, or even information that has never been generally known. If the person, place, or thing is not of legendary importance, you gain no information. As a rule of thumb, characters who are 11th level and higher are “legendary,” as are the sorts of creatures they contend with, the major magic items they wield, and the places where they perform their key deeds.

    _Material Component:_ Incense worth at least 250 gp.

    _Focus:_ Four strips of ivory (worth 50 gp each) formed into a rectangle.
- id: levitate
  name: Levitate
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal or close (25 ft. + 5 ft./2 levels)
  target: You or one willing creature or one object (total weight up to 100 
    lb./level)
  duration: 1 min./level (D)
  self_duration: 1
  save: None
  spell_resistance: No
  components: V, S, F
  target_label: Target
  description: |-
    _Levitate_ allows you to move yourself, another creature, or an object up and down as you wish. A creature must be willing to be _levitated,_ and an object must be unattended or possessed by a willing creature. You can mentally direct the recipient to move up or down as much as 20 feet each round; doing so is a move action. You cannot move the recipient horizontally, but the recipient could clamber along the face of a cliff, for example, or push against a ceiling to move laterally (generally at half its base land speed).

    A _levitating_ creature that attacks with a melee or ranged weapon finds itself increasingly unstable; the first attack has a –1 penalty on attack rolls, the second –2, and so on, to a maximum penalty of –5. A full round spent stabilizing allows the creature to begin again at –1.

    _Focus:_ Either a small leather loop or a piece of golden wire bent into a cup shape with a long shank on one end.
- id: lightning_bolt
  name: Lightning Bolt
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Electricity]
  cast_time: 1 standard action
  range: 120 ft.
  target: 120-ft. line
  duration: Instantaneous
  save: Reflex half
  spell_resistance: Yes
  components: V, S, M
  target_label: Area
  description: |-
    You release a powerful stroke of electrical energy that deals 1d6 points of electricity damage per caster level (maximum 10d6) to each creature within its area. The bolt begins at your fingertips.

    The _lightning bolt_ sets fire to combustibles and damages objects in its path. It can melt metals with a low melting point, such as lead, gold, copper, silver, or bronze. If the damage caused to an interposing barrier shatters or breaks through it, the bolt may continue beyond the barrier if the spell’s range permits; otherwise, it stops at the barrier just as any other spell effect does.

    _Material Component:_ A bit of fur and an amber, crystal, or glass rod.
- id: limited_wish
  name: Limited Wish
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Universal
  cast_time: 1 standard action
  range: See text
  target: ''
  duration: See text
  save: None; see text
  spell_resistance: Yes
  components: V, S, XP
  target_label: ''
  description: |-
    A _limited wish_ lets you create nearly any type of effect. For example, a _limited wish_ can do any of the following things.

    - Duplicate any sorcerer/wizard spell of 6th level or lower, provided the spell is not of a school prohibited to you.
    - Duplicate any other spell of 5th level or lower, provided the spell is not of a school prohibited to you.
    - Duplicate any sorcerer/wizard spell of 5th level or lower, even if it’s of a prohibited school.
    - Duplicate any other spell of 4th level or lower, even if it’s of a prohibited school.
    - Undo the harmful effects of many spells, such as _geas/quest_ or _insanity_.
    - Produce any other effect whose power level is in line with the above effects, such as a single creature automatically hitting on its next attack or taking a –7 penalty on its next saving throw.

    A duplicated spell allows saving throws and spell resistance as normal (but the save DC is for a 7th-level spell). When a _limited wish_ duplicates a spell that has an XP cost, you must pay that cost or 300 XP, whichever is more. When a _limited wish_ spell duplicates a spell with a material component that costs more than 1,000 gp, you must provide that component.

    _XP Cost:_ 300 XP or more (see above).
- id: locate_creature
  name: Locate Creature
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: ''
  range: ''
  target: ''
  duration: 10 min./level
  save: ''
  spell_resistance: ''
  components: V, S, M
  target_label: ''
  description: |-
    This spell functions like _locate object,_ except this spell locates a known or familiar creature.

    You slowly turn and sense when you are facing in the direction of the creature to be located, provided it is within range. You also know in which direction the creature is moving, if any.

    The spell can locate a creature of a specific kind or a specific creature known to you. It cannot find a creature of a certain type. To find a kind of creature, you must have seen such a creature up close (within 30 feet) at least once.

    Running water blocks the spell. It cannot detect objects. It can be fooled by _mislead_, _nondetection_, and _polymorph_ spells.

    _Material Component:_ A bit of fur from a bloodhound.
- id: locate_object
  name: Locate Object
  level_druid:
  level_cleric: 3
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Circle, centered on you, with a radius of 400 ft. + 40 ft./level
  duration: 1 min./level
  save: None
  spell_resistance: No
  components: V, S, F/DF
  target_label: Area
  description: |-
    You sense the direction of a well-known or clearly visualized object. You can search for general items, in which case you locate the nearest one of its kind if more than one is within range. Attempting to find a certain item requires a specific and accurate mental image; if the image is not close enough to the actual object, the spell fails. You cannot specify a unique item unless you have observed that particular item firsthand (not through divination).

    The spell is blocked by even a thin sheet of lead. Creatures cannot be found by this spell. _Polymorph any object_ fools it.

    _Arcane Focus:_ A forked twig.
- id: mages_disjunction
  name: Mage’s Disjunction
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: All magical effects and magic items within a 40-ft.-radius burst
  duration: Instantaneous
  save: Will negates (object)
  spell_resistance: No
  components: V
  target_label: Area
  description: |-
    All magical effects and magic items within the radius of the spell, except for those that you carry or touch, are disjoined. That is, spells and spell-like effects are separated into their individual components (ending the effect as a _dispel magic_ spell does), and each permanent magic item must make a successful Will save or be turned into a normal item. An item in a creature’s possession uses its own Will save bonus or its possessor’s Will save bonus, whichever is higher.

    You also have a 1% chance per caster level of destroying an _antimagic field._ If the _antimagic field_ survives the _disjunction,_ no items within it are disjoined.

    Even artifacts are subject to _disjunction,_ though there is only a 1% chance per caster level of actually affecting such powerful items. Additionally, if an artifact is destroyed, you must make a DC 25 Will save or permanently lose all spellcasting abilities. (These abilities cannot be recovered by mortal magic, not even _miracle_ or _wish_.)

    _Note:_ Destroying artifacts is a dangerous business, and it is 95% likely to attract the attention of some powerful being who has an interest in or connection with the device.
- id: mages_faithful_hound
  name: Mage’s Faithful Hound
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Phantom watchdog
  duration: 1 hour/caster level or until discharged, then 1 round/caster level; 
    see text
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You conjure up a phantom watchdog that is invisible to everyone but yourself. It then guards the area where it was conjured (it does not move). The hound immediately starts barking loudly if any Small or larger creature approaches within 30 feet of it. (Those within 30 feet of the hound when it is conjured may move about in the area, but if they leave and return, they activate the barking.) The hound sees invisible and ethereal creatures. It does not react to figments, but it does react to shadow illusions.

    If an intruder approaches to within 5 feet of the hound, the dog stops barking and delivers a vicious bite (+10 attack bonus, 2d6+3 points of piercing damage) once per round. The dog also gets the bonuses appropriate to an invisible creature.

    The dog is considered ready to bite intruders, so it delivers its first bite on the intruder’s turn. Its bite is the equivalent of a magic weapon for the purpose of damage reduction. The hound cannot be attacked, but it can be dispelled.

    The spell lasts for 1 hour per caster level, but once the hound begins barking, it lasts only 1 round per caster level. If you are ever more than 100 feet distant from the hound, the spell ends.

    _Material Component:_ A tiny silver whistle, a piece of bone, and a thread.
- id: mages_lucubration
  name: Mage’s Lucubration
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: Instantaneous
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    You instantly recall any one spell of 5th level or lower that you have used during the past 24 hours. The spell must have been actually cast during that period. The recalled spell is stored in your mind as through prepared in the normal fashion.

    If the recalled spell requires material components, you must provide them. The recovered spell is not usable until the material components are available.
- id: mages_magnificent_mansion
  name: Mage’s Magnificent Mansion
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Extradimensional mansion, up to three 10-ft. cubes/level (S)
  duration: 2 hours/level (D)
  save: None
  spell_resistance: No
  components: V, S, F
  target_label: Effect
  description: |-
    You conjure up an extradimensional dwelling that has a single entrance on the plane from which the spell was cast. The entry point looks like a faint shimmering in the air that is 4 feet wide and 8 feet high. Only those you designate may enter the mansion, and the portal is shut and made invisible behind you when you enter. You may open it again from your own side at will. Once observers have passed beyond the entrance, they are in a magnificent foyer with numerous chambers beyond. The atmosphere is clean, fresh, and warm.

    You can create any floor plan you desire to the limit of the spell’s effect. The place is furnished and contains sufficient foodstuffs to serve a nine-course banquet to a dozen people per caster level. A staff of near-transparent servants (as many as two per caster level), liveried and obedient, wait upon all who enter. The servants function as _unseen servant_ spells except that they are visible and can go anywhere in the mansion.

    Since the place can be entered only through its special portal, outside conditions do not affect the mansion, nor do conditions inside it pass to the plane beyond.

    _Focus:_ A miniature portal carved from ivory, a small piece of polished marble, and a tiny silver spoon (each item worth 5 gp).
- id: mages_private_sanctum
  name: Mage’s Private Sanctum
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels)
  target: 30-ft. cube/level (S)
  duration: 24 hours (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    This spell ensures privacy. Anyone looking into the area from outside sees only a dark, foggy mass. Darkvision cannot penetrate it. No sounds, no matter how loud, can escape the area, so nobody can eavesdrop from outside. Those inside can see out normally.

    Divination (scrying) spells cannot perceive anything within the area, and those within are immune to _detect thoughts_. The ward prevents speech between those inside and those outside (because it blocks sound), but it does not prevent other communication, such as a _sending_ or _message_ spell, or telepathic communication, such as that between a wizard and her familiar.

    The spell does not prevent creatures or objects from moving into and out of the area.

    _Mage’s private sanctum_ can be made permanent with a _permanency_ spell.

    _Material Component:_ A thin sheet of lead, a piece of opaque glass, a wad of cotton or cloth, and powdered chrysolite.
- id: mages_sword
  name: Mage’s Sword
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One sword
  duration: 1 round/level (D)
  save: None
  spell_resistance: Yes
  components: V, S, F
  target_label: Effect
  description: |-
    This spell brings into being a shimmering, swordlike plane of force. The sword strikes at any opponent within its range, as you desire, starting in the round that you cast the spell. The sword attacks its designated target once each round on your turn. Its attack bonus is equal to your caster level + your Int bonus or your Cha bonus (for wizards or sorcerers, respectively) with an additional +3 enhancement bonus. As a force effect, it can strike ethereal and incorporeal creatures. It deals 4d6+3 points of force damage, with a threat range of 19–20 and a critical multiplier of x2.

    The sword always strikes from your direction. It does not get a bonus for flanking or help a combatant get one. If the sword goes beyond the spell range from you, if it goes out of your sight, or if you are not directing it, the sword returns to you and hovers.

    Each round after the first, you can use a standard action to switch the sword to a new target. If you do not, the sword continues to attack the previous round’s target.

    The sword cannot be attacked or harmed by physical attacks, but _dispel magic_, _disintegrate_, a _sphere of annihilation_, or a _rod of cancellation_ affects it. The sword’s AC is 13 (10, +0 size bonus for Medium object, +3 deflection bonus).

    If an attacked creature has spell resistance, the resistance is checked the first time _Mage’s sword_ strikes it. If the sword is successfully resisted, the spell is dispelled. If not, the sword has its normal full effect on that creature for the duration of the spell.

    _Focus:_ A miniature platinum sword with a grip and pommel of copper and zinc. It costs 250 gp to construct.
- id: magic_circle_against_chaos
  name: Magic Circle Against Chaos
  level_druid:
  level_cleric: 3
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin: 3
  school: Abjuration [Lawful]
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _magic circle against evil,_ except 
    that it is similar to _protection from chaos_ instead of _protection from 
    evil_, and it can imprison a nonlawful called creature.
- id: magic_circle_against_evil
  name: Magic Circle Against Evil
  level_druid:
  level_cleric: 3
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin: 3
  school: Abjuration [Good]
  cast_time: 1 standard action
  range: Touch
  target: 10-ft.-radius emanation from touched creature
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: No; see text
  components: V, S, M/DF
  target_label: Area
  description: |-
    All creatures within the area gain the effects of a _protection from evil_ spell, and no nongood summoned creatures can enter the area either. You must overcome a creature’s spell resistance in order to keep it at bay (as in the third function of _protection from evil_), but the deflection and resistance bonuses and the protection from mental control apply regardless of enemies’ spell resistance.

    This spell has an alternative version that you may choose when casting it. A _magic circle against evil_ can be focused inward rather than outward. When focused inward, the spell binds a nongood called creature (such as those called by the _lesser planar binding, planar binding,_ and _greater planar binding_ spells) for a maximum of 24 hours per caster level, provided that you cast the spell that calls the creature within 1 round of casting the _magic circle_. The creature cannot cross the circle’s boundaries. If a creature too large to fit into the spell’s area is the subject of the spell, the spell acts as a normal _protection from evil_ spell for that creature only.

    A _magic circle_ leaves much to be desired as a trap. If the circle of powdered silver laid down in the process of spellcasting is broken, the effect immediately ends. The trapped creature can do nothing that disturbs the circle, directly or indirectly, but other creatures can. If the called creature has spell resistance, it can test the trap once a day. If you fail to overcome its spell resistance, the creature breaks free, destroying the circle. A creature capable of any form of dimensional travel (_astral projection, blink, dimension door, etherealness, gate, plane shift, shadow walk, teleport,_ and similar abilities) can simply leave the circle through that means. You can prevent the creature’s extradimensional escape by casting a _dimensional anchor_ spell on it, but you must cast the spell before the creature acts. If you are successful, the _anchor_ effect lasts as long as the _magic circle_ does. The creature cannot reach across the _magic circle,_ but its ranged attacks (ranged weapons, spells, magical abilities, and the like) can. The creature can attack any target it can reach with its ranged attacks except for the circle itself.

    You can add a special diagram (a two-dimensional bounded figure with no gaps along its circumference, augmented with various magical sigils) to make the _magic circle_ more secure. Drawing the diagram by hand takes 10 minutes and requires a DC 20 Spellcraft check. You do not know the result of this check. If the check fails, the diagram is ineffective. You can take 10 when drawing the diagram if you are under no particular time pressure to complete the task. This task also takes 10 full minutes. If time is no factor at all, and you devote 3 hours and 20 minutes to the task, you can take 20.

    A successful diagram allows you to cast a _dimensional anchor_ spell on the _magic circle_ during the round before casting any summoning spell. The _anchor_ holds any called creatures in the _magic circle_ for 24 hours per caster level. A creature cannot use its spell resistance against a _magic circle_ prepared with a diagram, and none of its abilities or attacks can cross the diagram. If the creature tries a Charisma check to break free of the trap (see the _lesser planar binding_ spell), the DC increases by 5. The creature is immediately released if anything disturbs the diagram—even a straw laid across it. However, the creature itself cannot disturb the diagram either directly or indirectly, as noted above.

    This spell is not cumulative with _protection from evil_ and vice versa.

    _Arcane Material Component:_ A little powdered silver with which you trace a 3-footdiameter circle on the floor (or ground) around the creature to be warded.
- id: magic_circle_against_good
  name: Magic Circle Against Good
  level_druid:
