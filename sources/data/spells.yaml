- id: magic_jar
  name: Magic Jar
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One creature
  duration: 1 hour/level or until you return to your body
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S, F
  target_label: Target
  description: |-
    By casting _magic jar,_ you place your soul in a gem or large crystal (known as the _magic jar_), leaving your body lifeless. Then you can attempt to take control of a nearby body, forcing its soul into the _magic jar._ You may move back to the jar (thereby returning the trapped soul to its body) and attempt to possess another body. The spell ends when you send your soul back to your own body, leaving the receptacle empty.

    To cast the spell, the _magic jar_ must be within spell range and you must know where it is, though you do not need line of sight or line of effect to it. When you transfer your soul upon casting, your body is, as near as anyone can tell, dead.

    While in the _magic jar,_ you can sense and attack any life force within 10 feet per caster level (and on the same plane of existence). You do need line of effect from the jar to the creatures. You cannot determine the exact creature types or positions of these creatures. In a group of life forces, you can sense a difference of 4 or more Hit Dice between one creature and another and can determine whether a life force is powered by positive or negative energy. (Undead creatures are powered by negative energy. Only sentient undead creatures have, or are, souls.)

    You could choose to take over either a stronger or a weaker creature, but which particular stronger or weaker creature you attempt to possess is determined randomly.

    Attempting to possess a body is a full-round action. It is blocked by _protection from evil_ or a similar ward. You possess the body and force the creature’s soul into the _magic jar_ unless the subject succeeds on a Will save. Failure to take over the host leaves your life force in the _magic jar,_ and the target automatically succeeds on further saving throws if you attempt to possess its body again.

    If you are successful, your life force occupies the host body, and the host’s life force is imprisoned in the _magic jar._ You keep your Intelligence, Wisdom, Charisma, level, class, base attack bonus, base save bonuses, alignment, and mental abilities. The body retains its Strength, Dexterity, Constitution, hit points, natural abilities, and automatic abilities. A body with extra limbs does not allow you to make more attacks (or more advantageous two-weapon attacks) than normal. You can’t choose to activate the body’s extraordinary or supernatural abilities. The creature’s spells and spell-like abilities do not stay with the body.

    As a standard action, you can shift freely from a host to the _magic jar_ if within range, sending the trapped soul back to its body. The spell ends when you shift from the jar to your own body.

    If the host body is slain, you return to the _magic jar,_ if within range, and the life force of the host departs (it is dead). If the host body is slain beyond the range of the spell, both you and the host die. Any life force with nowhere to go is treated as slain.

    If the spell ends while you are in the _magic jar,_ you return to your body (or die if your body is out of range or destroyed). If the spell ends while you are in a host, you return to your body (or die, if it is out of range of your current position), and the soul in the _magic jar_ returns to its body (or dies if it is out of range). Destroying the receptacle ends the spell, and the spell can be dispelled at either the _magic jar_ or at the host’s location.

    _Focus:_ A gem or crystal worth at least 100 gp.
- id: magic_weapon_greater
  name: Magic Weapon, Greater
  level_druid:
  level_cleric: 4
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin: 3
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One weapon or fifty projectiles (all of which must be in contact with 
    each other at the time of casting)
  duration: 1 hour/level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell functions like _magic weapon,_ except that it gives a weapon an enhancement bonus on attack and damage rolls of +1 per four caster levels (maximum +5).

    Alternatively, you can affect as many as fifty arrows, bolts, or bullets. The projectiles must be of the same kind, and they have to be together (in the same quiver or other container). Projectiles, but not thrown weapons, lose their transmutation when used. (Treat shuriken as projectiles, rather than as thrown weapons, for the purpose of this spell.)

    _Arcane Material Component:_ Powdered lime and carbon.
- id: major_creation
  name: Major Creation
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels)
  target: ''
  duration: See text
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _minor creation,_ except that you can also create an object of mineral nature: stone, crystal, metal, or the like. The duration of the created item varies with its relative hardness and rarity, as indicated on the following table.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Hardness and Rarity Examples</th><th>Duration</th></tr><tr><td>Vegetable matter</td><td>2 hr./level</td></tr><tr><td>Stone, crystal, base metals</td><td>1 hr./level</td></tr><tr><td>Precious metals</td><td>20 min./level</td></tr><tr><td>Gems</td><td>10 min./level</td></tr><tr><td>Rare metal<sup>1</sup></td><td>1 round/level</td></tr><tr><td colspan="2">1 Includes adamantine, alchemical silver, and mithral. You can’t use major creation to create a cold iron item.</td></tr></tbody></table>
- id: major_image
  name: Major Image
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: ''
  range: ''
  target: ''
  duration: Concentration + 3 rounds
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _silent image,_ except that sound, smell, and thermal illusions are included in the spell effect. While concentrating, you can move the image within the range.

    The image disappears when struck by an opponent unless you cause the illusion to react appropriately.
- id: maze
  name: Maze
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature
  duration: See text
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You banish the subject into an extradimensional labyrinth of force planes. Each round on its turn, it may attempt a DC 20 Intelligence check to escape the labyrinth as a full-round action. If the subject doesn’t escape, the maze disappears after 10 minutes, forcing the subject to leave.

    On escaping or leaving the maze, the subject reappears where it had been when the _maze_ spell was cast. If this location is filled with a solid object, the subject appears in the nearest open space. Spells and abilities that move a creature within a plane, such as _teleport_ and _dimension door,_ do not help a creature escape a _maze_ spell, although a _plane shift_ spell allows it to exit to whatever plane is designated in that spell. Minotaurs are not affected by this spell.
- id: meteor_swarm
  name: Meteor Swarm
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: Four 40-ft.-radius spreads; see text
  duration: Instantaneous
  save: None or Reflex half; see text
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: |-
    _Meteor swarm_ is a very powerful and spectacular spell that is similar to _fireball_ in many aspects. When you cast it, four 2- foot-diameter spheres spring from your outstretched hand and streak in straight lines to the spots you select. The meteor spheres leave a fiery trail of sparks.

    If you aim a sphere at a specific creature, you may make a ranged touch attack to strike the target with the meteor. Any creature struck by one of these spheres takes 2d6 points of bludgeoning damage (no save) and receives no saving throw against the sphere’s fire damage (see below). If a targeted sphere misses its target, it simply explodes at the nearest corner of the target’s space. You may aim more than one meteor at the same target.

    Once a sphere reaches its destination, it explodes in a 40-foot-radius spread, dealing 6d6 points of fire damage to each creature in the area. If a creature is within the area of more than one sphere, it must save separately against each. (Fire resistance applies to each sphere’s damage individually.)
- id: mind_blank
  name: Mind Blank
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature
  duration: 24 hours
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: The subject is protected from all devices and spells that detect,
    influence, or read emotions or thoughts. This spell protects against all 
    mind-affecting spells and effects as well as information gathering by 
    divination spells or effects. _Mind blank_ even foils _limited wish_, 
    _miracle_, and _wish_ spells when they are used in such a way as to affect 
    the subject’s mind or to gain information about it. In the case of scrying 
    that scans an area the creature is in, such as _arcane eye,_ the spell works
    but the creature simply isn’t detected. Scrying attempts that are targeted 
    specifically at the subject do not work at all.
- id: mind_fog
  name: Mind Fog
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Fog spreads in 20-ft. radius, 20 ft. high
  duration: 30 minutes and 2d6 rounds; see text
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    _Mind fog_ produces a bank of thin mist that weakens the mental resistance of those caught in it. Creatures in the _mind fog_ take a –10 competence penalty on Wisdom checks and Will saves. (A creature that successfully saves against the fog is not affected and need not make further saves even if it remains in the fog.) Affected creatures take the penalty as long as they remain in the fog and for 2d6 rounds thereafter. The fog is stationary and lasts for 30 minutes (or until dispersed by wind).

    A moderate wind (11+ mph) disperses the fog in four rounds; a strong wind (21+ mph) disperses the fog in 1 round.

    The fog is thin and does not significantly hamper vision.
- id: minor_creation
  name: Minor Creation
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 minute
  range: 0 ft.
  target: Unattended, nonmagical object of nonliving plant matter, up to 1 cu. 
    ft./level
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You create a nonmagical, unattended object of nonliving, vegetable matter. The volume of the item created cannot exceed 1 cubic foot per caster level. You must succeed on an appropriate skill check to make a complex item.

    Attempting to use any created object as a material component causes the spell to fail.

    _Material Component:_ A tiny piece of matter of the same sort of item you plan to create with _minor creation_.
- id: minor_image
  name: Minor Image
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: ''
  range: ''
  target: ''
  duration: Concentration +2 rounds
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _silent image_, except that _minor 
    image_ includes some minor sounds but not understandable speech.
- id: mirage_arcana
  name: Mirage Arcana
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: ''
  target: One 20-ft. cube/level (S)
  duration: Concentration +1 hour/ level (D)
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Area
  description: This spell functions like _hallucinatory terrain_, except that it
    enables you to make any area appear to be something other than it is. The 
    illusion includes audible, visual, tactile, and olfactory elements. Unlike 
    _hallucinatory terrain,_ the spell can alter the appearance of structures 
    (or add them where none are present). Still, it can’t disguise, conceal, or 
    add creatures (though creatures within the area might hide themselves within
    the illusion just as they can hide themselves within a real location).
- id: mirror_image
  name: Mirror Image
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: 1 standard action
  range: Personal; see text
  target: You
  duration: 1 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    Several illusory duplicates of you pop into being, making it difficult for enemies to know which target to attack. The figments stay near you and disappear when struck.

    _Mirror image_ creates 1d4 images plus one image per three caster levels (maximum eight images total). These figments separate from you and remain in a cluster, each within 5 feet of at least one other figment or you. You can move into and through a _mirror image._ When you and the _mirror image_ separate, observers can’t use vision or hearing to tell which one is you and which the image. The figments may also move through each other. The figments mimic your actions, pretending to cast spells when you cast a spell, drink potions when you drink a potion, levitate when you levitate, and so on.

    Enemies attempting to attack you or cast spells at you must select from among indistinguishable targets. Generally, roll randomly to see whether the selected target is real or a figment. Any successful attack against an image destroys it. An image’s AC is 10 + your size modifier + your Dex modifier. Figments seem to react normally to area spells (such as looking like they’re burned or dead after being hit by a _fireball_).

    While moving, you can merge with and split off from figments so that enemies who have learned which image is real are again confounded.

    An attacker must be able to see the images to be fooled. If you are invisible or an attacker shuts his or her eyes, the spell has no effect. (Being unable to see carries the same penalties as being blinded.)
- id: misdirection
  name: Misdirection
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature or object, up to a 10-ft. cube in size
  duration: 1 hour/level
  save: None or Will negates; see text
  spell_resistance: No
  components: V, S
  target_label: Target
  description: 'By means of this spell, you misdirect the information from divination
    spells that reveal auras (_detect evil, detect magic, discern lies,_ and the like).
    On casting the spell, you choose another object within range. For the duration
    of the spell, the subject of _misdirection_ is detected as if it were the other
    object. (Neither the subject nor the other object gets a saving throw against
    this effect.) Detection spells provide information based on the second object
    rather than on the actual target of the detection unless the caster of the detection
    succeeds on a Will save. For instance, you could make yourself detect as a tree
    if one were within range at casting: not evil, not lying, not magical, neutral
    in alignment, and so forth. This spell does not affect other types of divination
    magic (_augury, detect thoughts, clairaudience/clairvoyance,_ and the like).'
- id: mislead
  name: Mislead
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Figment, Glamer)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: ''
  duration: 1 round/level (D) and concentration + 3 rounds; see text
  save: None or Will disbelief (if interacted with); see text
  spell_resistance: No
  components: S
  target_label: ''
  description: |-
    You become invisible (as _improved invisibility_, a glamer), and at the same time, an illusory double of you (as _major image,_ a figment) appears. You are then free to go elsewhere while your double moves away. The double appears within range but thereafter moves as you direct it (which requires concentration beginning on the first round after the casting). You can make the figment appear superimposed perfectly over your own body so that observers don’t notice an image appearing and you turning invisible. You and the figment can then move in different directions. The double moves at your speed and can talk and gesture as if it were real, but it cannot attack or cast spells, though it can pretend to do so.

    The illusory double lasts as long as you concentrate upon it, plus 3 additional rounds. After you cease concentration, the illusory double continues to carry out the same activity until the duration expires. The _improved invisibility_ lasts for 1 round per level, regardless of concentration.
- id: mnemonic_enhancer
  name: Mnemonic Enhancer
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 10 minutes
  range: Personal
  target: You
  duration: Instantaneous
  save: ''
  spell_resistance: ''
  components: V, S, M, F
  target_label: Target
  description: |-
    Casting this spell allows you to prepare additional spells or retain spells recently cast. Pick one of these two versions when the spell is cast.

    _Prepare:_ You prepare up to three additional levels of spells. A cantrip counts as 1/2 level for this purpose. You prepare and cast these spells normally.

    _Retain:_ You retain any spell of 3rd level or lower that you had cast up to 1 round before you started casting the _mnemonic enhancer_. This restores the previously cast spell to your mind.

    In either event, the spell or spells prepared or retained fade after 24 hours (if not cast).

    _Material Component:_ A piece of string, and ink consisting of squid secretion with black dragon’s blood.

    _Focus:_ An ivory plaque of at least 50 gp value.
- id: modify_memory
  name: Modify Memory
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 round; see text
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: Permanent
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You reach into the subject’s mind and modify as many as 5 minutes of its memories in one of the following ways.

    - Eliminate all memory of an event the subject actually experienced. This spell cannot negate _charm, geas/quest, suggestion,_ or similar spells.
    - Allow the subject to recall with perfect clarity an event it actually experienced.
    - Change the details of an event the subject actually experienced.
    - Implant a memory of an event the subject never experienced.

    Casting the spell takes 1 round. If the subject fails to save, you proceed with the spell by spending as much as 5 minutes (a period of time equal to the amount of memory time you want to modify) visualizing the memory you wish to modify in the subject. If your concentration is disturbed before the visualization is complete, or if the subject is ever beyond the spell’s range during this time, the spell is lost.

    A modified memory does not necessarily affect the subject’s actions, particularly if it contradicts the creature’s natural inclinations. An illogical modified memory is dismissed by the creature as a bad dream or a memory muddied by too much wine.
- id: moment_of_prescience
  name: Moment of Prescience
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 1 hour/level or until discharged
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: |-
    This spell grants you a powerful sixth sense in relation to yourself. Once during the spell’s duration, you may choose to use its effect. This spell grants you an insight bonus equal to your caster level (maximum +25) on any single attack roll, opposed ability or skill check, or saving throw. Alternatively, you can apply the insight bonus to your AC against a single attack (even if flatfooted). Activating the effect doesn’t take an action; you can even activate it on another character’s turn if needed. You must choose to use the _moment of prescience_ before you make the roll it is to modify. Once used, the spell ends.

    You can’t have more than one _moment of prescience_ active on you at the same time.
- id: move_earth
  name: Move Earth
  level_druid: 6
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation [Earth]
  cast_time: See text
  range: Long (400 ft. + 40 ft./level)
  target: Dirt in an area up to 750 ft. square and up to 10 ft. deep (S)
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Area
  description: |-
    _Move earth_ moves dirt (clay, loam, sand), possibly collapsing embankments, moving hillocks, shifting dunes, and so forth.

    However, in no event can rock formations be collapsed or moved. The area to be affected determines the casting time. For every 150-foot square (up to 10 feet deep), casting takes 10 minutes. The maximum area, 750 feet by 750 feet, takes 4 hours and 10 minutes to move.

    This spell does not violently break the surface of the ground. Instead, it creates wavelike crests and troughs, with the earth reacting with glacierlike fluidity until the desired result is achieved. Trees, structures, rock formations, and such are mostly unaffected except for changes in elevation and relative topography.

    The spell cannot be used for tunneling and is generally too slow to trap or bury creatures. Its primary use is for digging or filling moats or for adjusting terrain contours before a battle.

    This spell has no effect on earth creatures.

    _Material Component:_ A mixture of soils (clay, loam, and sand) in a small bag, and an iron blade.
- id: nightmare
  name: Nightmare
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Phantasm) [Mind-Affecting, Evil]
  cast_time: 10 minutes
  range: Unlimited
  target: One living creature
  duration: Instantaneous
  save: Will negates; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You send a hideous and unsettling phantasmal vision to a specific creature that you name or otherwise specifically designate.

    The _nightmare_ prevents restful sleep and causes 1d10 points of damage. The _nightmare_ leaves the subject fatigued and unable to regain arcane spells for the next 24 hours.

    The difficulty of the save depends on how well you know the subject and what sort of physical connection (if any) you have to that creature.

    <table data-debug="no-caption" class="full-width-table"><tbody><tr><th>Knowledge</th><th>Will Save Modifier</th></tr><tr><td>None<sup>1</sup></td><td>+10</td></tr><tr><td>Secondhand (you have heard of the subject)</td><td>+5</td></tr><tr><td>Firsthand (you have met the subject)</td><td>+0</td></tr><tr><td>Familiar (you know the subject well)</td><td>–5</td></tr><tr><td colspan="2">1 You must have some sort of connection to a creature you have no knowledge of.</td></tr></tbody></table>

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Connection</th><th>Will Save Modifier</th></tr><tr><td>Likeness or picture</td><td>–2</td></tr><tr><td>Possession or garment</td><td>–4</td></tr><tr><td>Body part, lock of hair, bit of nail, etc.</td><td>–10</td></tr></tbody></table>

    _Dispel evil_ cast on the subject while you are casting the spell dispels the _nightmare_ and causes you to be stunned for 10 minutes per caster level of the _dispel evil_.

    If the recipient is awake when the spell begins, you can choose to cease casting (ending the spell) or to enter a trance until the recipient goes to sleep, whereupon you become alert again and complete the casting. If you are disturbed during the trance, you must succeed on a Concentration check as if you were in the midst of casting a spell or the spell ends.

    If you choose to enter a trance, you are not aware of your surroundings or the activities around you while in the trance.

    You are defenseless, both physically and mentally, while in the trance. (You always fail any saving throw, for example.)

    Creatures who don’t sleep (such as elves, but not half-elves) or dream are immune to this spell.
- id: nondetection
  name: Nondetection
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger: 4
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature or object touched
  duration: 1 hour/level
  save: Will negates (harmless, object)
  spell_resistance: Yes (harmless, object)
  components: V, S, M
  target_label: Target
  description: |-
    The warded creature or object becomes difficult to detect by divination spells such as _clairaudience/clairvoyance, locate object,_ and _detect_ spells. _Nondetection_ also prevents location by such magic items as _crystal balls.\_If a divination is attempted against the warded creature or item, the caster of the divination must succeed on a caster level check (1d20 + caster level) against a DC of 11 + the caster level of the spellcaster who cast \_nondetection_. If you cast _nondetection_ on yourself or on an item currently in your possession, the DC is 15 + your caster level.

    If cast on a creature, _nondetection_ wards the creature’s gear as well as the creature itself.

    _Material Component:_ A pinch of diamond dust worth 50 gp.
- id: overland_flight
  name: Overland Flight
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Personal
  target: You
  duration: 1 hour/level
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Target
  description: This spell functions like a _fly_ spell, except you can fly at a 
    speed of 40 feet (30 feet if wearing medium or heavy armor, or if carrying a
    medium or heavy load) with average maneuverability. When using this spell 
    for long-distance movement, you can hustle without taking nonlethal damage 
    (a forced march still requires Constitution checks). This means you can 
    cover 64 miles in an eight-hour period of flight (or 48 miles at a speed of 
    30 feet).
- id: owls_wisdom_mass
  name: Owl’s Wisdom, Mass
  level_druid: 6
  level_cleric: 6
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _owl’s wisdom_, except that it affects 
    multiple creatures.
- id: passwall
  name: Passwall
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: 5 ft. by 8 ft. opening, 10 ft. deep plus 5 ft. deep per three 
    additional levels
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You create a passage through wooden, plaster, or stone walls, but not through metal or other harder materials. The passage is 10 feet deep plus an additional 5 feet deep per three caster levels above 9th (15 feet at 12th, 20 feet at 15th, and a maximum of 25 feet deep at 18th level). If the wall’s thickness is more than the depth of the passage created, then a single _passwall_ simply makes a niche or short tunnel. Several _passwall_ spells can then form a continuing passage to breach very thick walls. When _passwall_ ends, creatures within the passage are ejected out the nearest exit. If someone dispels the _passwall_ or you dismiss it, creatures in the passage are ejected out the far exit, if there is one, or out the sole exit if there is only one.

    _Material Component:_ A pinch of sesame seeds.
- id: permanency
  name: Permanency
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Universal
  cast_time: 2 rounds
  range: See text
  target: ''
  duration: Permanent; see text
  save: None
  spell_resistance: No
  components: V, S, XP
  target_label: ''
  description: |-
    This spell makes certain other spells permanent.

    Depending on the spell, you must be of a minimum caster level and must expend a number of XP.

    You can make the following spells permanent in regard to yourself.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Spell</th><th>Minimum Caster Level</th><th>XP Cost</th></tr><tr><td><i>Arcane sight</i></td><td>11th</td><td>1,500 XP</td></tr><tr><td><i>Comprehend languages</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Darkvision</i></td><td>10th</td><td>1,000 XP</td></tr><tr><td><i>Detect magic</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Read magic</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>See invisibility</i></td><td>10th</td><td>1,000 XP</td></tr><tr><td><i>Tongues</i></td><td>11th</td><td>1,500 XP</td></tr></tbody></table>

    You cast the desired spell and then follow it with the _permanency_ spell. You cannot cast these spells on other creatures. This application of _permanency_ can be dispelled only by a caster of higher level than you were when you cast the spell.

    In addition to personal use, _permanency_ can be used to make the following spells permanent on yourself, another creature, or an object (as appropriate).

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Spell</th><th>Minimum Caster Level</th><th>XP Cost</th></tr><tr><td><i>Enlarge person</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Magic fang</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Magic fang, greater</i></td><td>11th</td><td>1,500 XP</td></tr><tr><td><i>Reduce person</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Resistance</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Telepathic bond</i><sup>1</sup></td><td>13th</td><td>2,500 XP</td></tr><tr><td colspan="3">1 Only bonds two creatures per casting of <i>permanency</i>.</td></tr></tbody></table>

    Additionally, the following spells can be cast upon objects or areas only and rendered permanent.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Spell</th><th>Minimum Caster Level</th><th>XP Cost</th></tr><tr><td><i>Alarm</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Animate objects</i></td><td>14th</td><td>3,000 XP</td></tr><tr><td><i>Dancing lights</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Ghost sound</i></td><td>9th</td><td>500 XP</td></tr><tr><td><i>Gust of wind</i></td><td>11th</td><td>1,500 XP</td></tr><tr><td><i>Invisibility</i></td><td>10th</td><td>1,000 XP</td></tr><tr><td><i>Mage’s private sanctum</i></td><td>13th</td><td>2,500 XP</td></tr><tr><td><i>Magic mouth</i></td><td>10th</td><td>1,000 XP</td></tr><tr><td><i>Phase door</i></td><td>15th</td><td>3,500 XP</td></tr><tr><td><i>Prismatic sphere</i></td><td>17th</td><td>4,500 XP</td></tr><tr><td><i>Prismatic wall</i></td><td>16th</td><td>4,000 XP</td></tr><tr><td><i>Shrink item</i></td><td>11th</td><td>1,500 XP</td></tr><tr><td><i>Solid fog</i></td><td>12th</td><td>2,000 XP</td></tr><tr><td><i>Stinking cloud</i></td><td>11th</td><td>1,500 XP</td></tr><tr><td><i>Symbol of death</i></td><td>16th</td><td>4,000 XP</td></tr><tr><td><i>Symbol of fear</i></td><td>14th</td><td>3,000 XP</td></tr><tr><td><i>Symbol of insanity</i></td><td>16th</td><td>4,000 XP</td></tr><tr><td><i>Symbol of pain</i></td><td>13th</td><td>2,500 XP</td></tr><tr><td><i>Symbol of persuasion</i></td><td>14th</td><td>3,000 XP</td></tr><tr><td><i>Symbol of sleep</i></td><td>16th</td><td>4,000 XP</td></tr><tr><td><i>Symbol of stunning</i></td><td>15th</td><td>3,500 XP</td></tr><tr><td><i>Symbol of weakness</i></td><td>15th</td><td>3,500 XP</td></tr><tr><td><i>Teleportation circle</i></td><td>17th</td><td>4,500 XP</td></tr><tr><td><i>Wall of fire</i></td><td>12th</td><td>2,000 XP</td></tr><tr><td><i>Wall of force</i></td><td>13th</td><td>2,500 XP</td></tr><tr><td><i>Web</i></td><td>10th</td><td>1,000 XP</td></tr></tbody></table>

    Spells cast on other creatures, objects, or locations (not on you) are vulnerable to _dispel magic_ as normal.

    _XP Cost:_ See tables above.
- id: permanent_image
  name: Permanent Image
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: ''
  range: ''
  target: Figment that cannot extend beyond a 20-ft. cube + one 10-ft. 
    cube/level (S)
  duration: Permanent (D)
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Effect
  description: |-
    This spell functions like _silent image,_ except that the figment includes visual, auditory, olfactory, and thermal elements, and the spell is permanent. By concentrating, you can move the image within the limits of the range, but it is static while you are not concentrating.

    _Material Component:_ A bit of fleece plus powdered jade worth 100 gp.
- id: persistent_image
  name: Persistent Image
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: ''
  range: ''
  target: ''
  duration: 1 min./level (D)
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: |-
    This spell functions like _silent image,_ except that the figment includes visual, auditory, olfactory, and thermal components, and the figment follows a script determined by you. The figment follows that script without your having to concentrate on it. The illusion can include intelligible speech if you wish.

    _Material Component:_ A bit of fleece and several grains of sand.
- id: phantasmal_killer
  name: Phantasmal Killer
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Phantasm) [Fear, Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature
  duration: Instantaneous
  save: Will disbelief (if interacted with), then Fortitude partial; see text
  spell_resistance: Yes
  components: V, S
  target_label: Target
  description: |-
    You create a phantasmal image of the most fearsome creature imaginable to the subject simply by forming the fears of the subject’s subconscious mind into something that its conscious mind can visualize: this most horrible beast. Only the spell’s subject can see the phantasmal killer. You see only a vague shape. The target first gets a Will save to recognize the image as unreal. If that save fails, the phantasm touches the subject, and the subject must succeed on a Fortitude save or die from fear. Even if the Fortitude save is successful, the subject takes 3d6 points of damage.

    If the subject of a _phantasmal killer_ attack succeeds in disbelieving and is wearing a _helm of telepathy,_ the beast can be turned upon you. You must then disbelieve it or become subject to its deadly fear attack.
- id: phantom_steed
  name: Phantom Steed
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 10 minutes
  range: 0 ft.
  target: One quasi-real, horselike creature
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    You conjure a Large, quasi-real, horselike creature. The steed can be ridden only by you or by the one person for whom you specifically created the mount. A phantom steed has a black head and body, gray mane and tail, and smoke-colored, insubstantial hooves that make no sound. It has what seems to be a saddle, bit, and bridle. It does not fight, but animals shun it and refuse to attack it.

    The mount has an AC of 18 (–1 size, +4 natural armor, +5 Dex) and 7 hit points +1 hit point per caster level. If it loses all its hit points, the phantom steed disappears. A phantom steed has a speed of 20 feet per caster level, to a maximum of 240 feet. It can bear its rider’s weight plus up to 10 pounds per caster level.

    These mounts gain certain powers according to caster level. A mount’s abilities include those of mounts of lower caster levels.

    _8th Level:_ The mount can ride over sandy, muddy, or even swampy ground without difficulty or decrease in speed.

    _10th Level:_ The mount can use _water walk_ at will (as the spell, no action required to activate this ability).

    _12th Level:_ The mount can use _air walk_ at will (as the spell, no action required to activate this ability) for up to 1 round at a time, after which it falls to the ground.

    _14th Level:_ The mount can fly at its speed (average maneuverability).
- id: phantom_trap
  name: Phantom Trap
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: Permanent (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    This spell makes a lock or other small mechanism seem to be trapped to anyone who can detect traps. You place the spell upon any small mechanism or device, such as a lock, hinge, hasp, cork, cap, or ratchet. Any character able to detect traps, or who uses any spell or device enabling trap detection, is 100% certain a real trap exists. Of course, the effect is illusory and nothing happens if the trap is “sprung”; its primary purpose is to frighten away thieves or make them waste precious time.

    If another _phantom trap_ is active within 50 feet when the spell is cast, the casting fails.

    _Material Component:_ A piece of iron pyrite touched to the object to be trapped while the object is sprinkled with a special dust requiring 50 gp to prepare.
- id: phase_door
  name: Phase Door
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: 0 ft.
  target: Ethereal 5 ft. by 8 ft. opening, 10 ft. deep + 5 ft. deep per three 
    levels
  duration: One usage per two levels
  save: None
  spell_resistance: No
  components: V
  target_label: Effect
  description: |-
    This spell creates an ethereal passage through wooden, plaster, or stone walls, but not other materials. The _phase door_ is invisible and inaccessible to all creatures except you, and only you can use the passage. You disappear when you enter the _phase door_ and appear when you exit. If you desire, you can take one other creature (Medium or smaller) through the door. This counts as two uses of the door. The door does not allow light, sound, or spell effects through it, nor can you see through it without using it. Thus, the spell can provide an escape route, though certain creatures, such as phase spiders, can follow with ease. A _gem of true seeing_ or similar magic reveals the presence of a _phase door_ but does not allow its use.

    A _phase door_ is subject to _dispel magic._ If anyone is within the passage when it is dispelled, he is harmlessly ejected just as if he were inside a _passwall_ effect.

    You can allow other creatures to use the _phase door_ by setting some triggering condition for the door. Such conditions can be as simple or elaborate as you desire. They can be based on a creature’s name, identity, or alignment, but otherwise must be based on observable actions or qualities. Intangibles such as level, class, Hit Dice, and hit points don’t qualify.

    _Phase door_ can be made permanent with a _permanency_ spell.
- id: planar_binding
  name: Planar Binding
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Calling) [see text for _lesser planar binding_]
  cast_time: ''
  range: ''
  target: Up to three elementals or outsiders, totaling no more than 12 HD, no 
    two of which can be more than 30 ft. apart when they appear
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Targets
  description: This spell functions like _lesser planar binding,_ except that 
    you may call a single creature of 12 HD or less, or up to three creatures of
    the same kind whose Hit Dice total no more than 12. Each creature gets a 
    save, makes an independent attempt to escape, and must be individually 
    persuaded to aid you.
- id: planar_binding_greater
  name: Planar Binding, Greater
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Calling) [see text for _lesser planar binding_]
  cast_time: ''
  range: ''
  target: Up to three elementals or outsiders, totaling no more than 18 HD, no 
    two of which can be more than 30 ft. apart when they appear.
  duration: ''
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: Targets
  description: This spell functions like _lesser planar binding,_ except that 
    you may call a single creature of 18 HD or less, or up to three creatures of
    the same kind whose Hit Dice total no more than 18. Each creature gets a 
    saving throw, makes independent attempts to escape, and must be persuaded to
    aid you individually.
- id: planar_binding_lesser
  name: Planar Binding, Lesser
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Calling) [see text]
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels); see text
  target: One elemental or outsider with 6 HD or less
  duration: Instantaneous
  save: Will negates
  spell_resistance: No and Yes; see text
  components: V, S
  target_label: Target
  description: |-
    Casting this spell attempts a dangerous act: to lure a creature from another plane to a specifically prepared trap, which must lie within the spell’s range. The called creature is held in the trap until it agrees to perform one service in return for its freedom.

    To create the trap, you must use a _magic circle_ spell, focused inward. The kind of creature to be bound must be known and stated. If you wish to call a specific individual, you must use that individual’s proper name in casting the spell.

    The target creature is allowed a Will saving throw. If the saving throw succeeds, the creature resists the spell. If the saving throw fails, the creature is immediately drawn to the trap (spell resistance does not keep it from being called). The creature can escape from the trap with by successfully pitting its spell resistance against your caster level check, by dimensional travel, or with a successful Charisma check (DC 15 + 1/2 your caster level + your Cha modifier). It can try each method once per day. If it breaks loose, it can flee or attack you. A _dimensional anchor_ cast on the creature prevents its escape via dimensional travel. You can also employ a calling diagram (see _magic circle against evil_) to make the trap more secure.

    If the creature does not break free of the trap, you can keep it bound for as long as you dare. You can attempt to compel the creature to perform a service by describing the service and perhaps offering some sort of reward. You make a Charisma check opposed by the creature’s Charisma check. The check is assigned a bonus of +0 to +6 based on the nature of the service and the reward. If the creature wins the opposed check, it refuses service. New offers, bribes, and the like can be made or the old ones reoffered every 24 hours. This process can be repeated until the creature promises to serve, until it breaks free, or until you decide to get rid of it by means of some other spell. Impossible demands or unreasonable commands are never agreed to. If you roll a 1 on the Charisma check, the creature breaks free of the binding and can escape or attack you.

    Once the requested service is completed, the creature need only so inform you to be instantly sent back whence it came. The creature might later seek revenge. If you assign some open-ended task that the creature cannot complete though its own actions the spell remains in effect for a maximum of one day per caster level, and the creature gains an immediate chance to break free. Note that a clever recipient can subvert some instructions.

    When you use a calling spell to call an air, chaotic, earth, evil, fire, good, lawful, or water creature, it is a spell of that type.
- id: plane_shift
  name: Plane Shift
  level_druid:
  level_cleric: 5
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Touch
  target: Creature touched, or up to eight willing creatures joining hands
  duration: Instantaneous
  save: Will negates
  spell_resistance: Yes
  components: V, S, F
  target_label: Target
  description: |-
    You move yourself or some other creature to another plane of existence or alternate dimension. If several willing persons link hands in a circle, as many as eight can be affected by the _plane shift_ at the same time. Precise accuracy as to a particular arrival location on the intended plane is nigh impossible. From the Material Plane, you can reach any other plane, though you appear 5 to 500 miles (5d%) from your intended destination.

    _Note: Plane shift_ transports creatures instantaneously and then ends. The creatures need to find other means if they are to travel back.

    _Focus:_ A small, forked metal rod. The size and metal type dictates to which plane of existence or alternate dimension the spell sends the affected creatures.
- id: polar_ray
  name: Polar Ray
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Cold]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S, F
  target_label: Effect
  description: |-
    A blue-white ray of freezing air and ice springs from your hand. You must succeed on a ranged touch attack with the ray to deal damage to a target. The ray deals 1d6 points of cold damage per caster level (maximum 25d6).

    _Focus:_ A small, white ceramic cone or prism.
- id: polymorph
  name: Polymorph
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: Willing living creature touched
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    This spell functions like _alter self,_ except that you change the willing subject into another form of living creature. The new form may be of the same type as the subject or any of the following types: aberration, animal, dragon, fey, giant, humanoid, magical beast, monstrous humanoid, ooze, plant, or vermin. The assumed form can’t have more Hit Dice than your caster level (or the subject’s HD, whichever is lower), to a maximum of 15 HD at 15th level. You can’t cause a subject to assume a form smaller than Fine, nor can you cause a subject to assume an incorporeal or gaseous form. The subject’s creature type and subtype (if any) change to match the new form.

    Upon changing, the subject regains lost hit points as if it had rested for a night (though this healing does not restore temporary ability damage and provide other benefits of resting; and changing back does not heal the subject further). If slain, the subject reverts to its original form, though it remains dead.

    The subject gains the Strength, Dexterity, and Constitution scores of the new form but retains its own Intelligence, Wisdom, and Charisma scores. It also gains all extraordinary special attacks possessed by the form but does not gain the extraordinary special qualities possessed by the new form or any supernatural or spell-like abilities.

    Incorporeal or gaseous creatures are immune to being _polymorphed_, and a creature with the shapechanger subtype can revert to its natural form as a standard action.

    _Material Component:_ An empty cocoon.
- id: polymorph_any_object
  name: Polymorph Any Object
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature, or one nonmagical object of up to 100 cu. ft./level
  duration: See text
  save: Fortitude negates (object); see text
  spell_resistance: Yes (object)
  components: V, S, M/DF
  target_label: Target
  description: |-
    This spell functions like _polymorph,_ except that it changes one object or creature into another. The duration of the spell depends on how radical a change is made from the original state to its enchanted state. The duration is determined by using the following guidelines.

    <table data-debug="no-caption" class="full-width-table"><tbody><tr><th>Changed Subject Is:</th><th>Increase to Duration Factor<sup>1</sup></th></tr><tr><td>Same kingdom (animal, vegetable, mineral)</td><td>+5</td></tr><tr><td>Same class (mammals, fungi, metals, etc.)</td><td>+2</td></tr><tr><td>Same size</td><td>+2</td></tr><tr><td>Related (twig is to tree, wolf fur is to wolf, etc.)</td><td>+2</td></tr><tr><td>Same or lower Intelligence</td><td>+2</td></tr><tr><td colspan="2">1 Add all that apply. Look up the total on the next table.</td></tr></tbody></table>

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Duration Factor</th><th>Duration</th><th>Example</th></tr><tr><td>0</td><td>20 minutes</td><td>Pebble to human</td></tr><tr><td>2</td><td>1 hour</td><td>Marionette to human</td></tr><tr><td>4</td><td>3 hours</td><td>Human to marionette</td></tr><tr><td>5</td><td>12 hours</td><td>Lizard to manticore</td></tr><tr><td>6</td><td>2 days</td><td>Sheep to wool coat</td></tr><tr><td>7</td><td>1 week</td><td>Shrew to manticore</td></tr><tr><td>9+</td><td>Permanent</td><td>Manticore to shrew</td></tr></tbody></table>

    Unlike _polymorph, polymorph any object_ does grant the creature the Intelligence score of its new form. If the original form didn’t have a Wisdom or Charisma score, it gains those scores as appropriate for the new form.

    Damage taken by the new form can result in the injury or death of the polymorphed creature. In general, damage occurs when the new form is changed through physical force.

    A nonmagical object cannot be made into a magic item with this spell. Magic items aren’t affected by this spell.

    This spell cannot create material of great intrinsic value, such as copper, silver, gems, silk, gold, platinum, mithral, or adamantine. It also cannot reproduce the special properties of cold iron in order to overcome the damage reduction of certain creatures.

    This spell can also be used to duplicate the effects of _baleful polymorph, polymorph, flesh to stone_, _stone to flesh_, _transmute mud to rock_, _transmute metal to wood,_ or _transmute rock to mud._

    _Arcane Material Component:_ Mercury, gum arabic, and smoke.
- id: power_word_blind
  name: Power Word Blind
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature with 200 hp or less
  duration: See text
  save: None
  spell_resistance: Yes
  components: V
  target_label: Target
  description: |-
    You utter a single word of power that causes one creature of your choice to become blinded, whether the creature can hear the word or not. The duration of the spell depends on the target’s current hit point total. Any creature that currently has 201 or more hit points is unaffected by _power word blind_.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Hit Points</th><th>Duration</th></tr><tr><td>50 or less</td><td>Permanent</td></tr><tr><td>51–100</td><td>1d4+1 minutes</td></tr><tr><td>101–200</td><td>1d4+1 rounds</td></tr></tbody></table>
- id: power_word_kill
  name: Power Word Kill
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Death, Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature with 100 hp or less
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V
  target_label: Target
  description: You utter a single word of power that instantly kills one 
    creature of your choice, whether the creature can hear the word or not. Any 
    creature that currently has 101 or more hit points is unaffected by _power 
    word kill_.
- id: power_word_stun
  name: Power Word Stun
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature with 150 hp or less
  duration: See text
  save: None
  spell_resistance: Yes
  components: V
  target_label: Target
  description: |-
    You utter a single word of power that instantly causes one creature of your choice to become stunned, whether the creature can hear the word or not. The duration of the spell depends on the target’s current hit point total. Any creature that currently has 151 or more hit points is unaffected by _power word stun_.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Hit Points</th><th>Duration</th></tr><tr><td>50 or less</td><td>4d4 rounds</td></tr><tr><td>51–100</td><td>2d4 rounds</td></tr><tr><td>101–150</td><td>1d4 rounds</td></tr></tbody></table>
- id: prismatic_sphere
  name: Prismatic Sphere
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: ''
  range: 10 ft.
  target: 10-ft.-radius sphere centered on you
  duration: ''
  save: ''
  spell_resistance: ''
  components: V
  target_label: Effect
  description: |-
    This spell functions like _prismatic wall,_ except you conjure up an immobile, opaque globe of shimmering, multicolored light that surrounds you and protects you from all forms of attack. The sphere flashes in all colors of the visible spectrum.

    The sphere’s _blindness_ effect on creatures with less than 8 HD lasts 2d4x10 minutes.

    You can pass into and out of the _prismatic sphere_ and remain near it without harm. However, when you’re inside it, the sphere blocks any attempt to project something through the sphere (including spells). Other creatures that attempt to attack you or pass through suffer the effects of each color, one at a time.

    Typically, only the upper hemisphere of the globe will exist, since you are at the center of the sphere, so the lower half is usually excluded by the floor surface you are standing on.

    The colors of the sphere have the same effects as the colors of a _prismatic wall._

    _Prismatic sphere_ can be made permanent with a _permanency_ spell.
- id: prismatic_spray
  name: Prismatic Spray
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation
  cast_time: 1 standard action
  range: 60 ft.
  target: Cone-shaped burst
  duration: Instantaneous
  save: See text
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: |-
    This spell causes seven shimmering, intertwined, multicolored beams of light to spray from your hand. Each beam has a different power. Creatures in the area of the spell with 8 HD or less are automatically blinded for 2d4 rounds. Every creature in the area is randomly struck by one or more beams, which have additional effects.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>1d8</th><th>Color of Beam</th><th>Effect</th></tr><tr><td>1</td><td>Red</td><td>20 points fire damage (Reflex half)</td></tr><tr><td>2</td><td>Orange</td><td>40 points acid damage (Reflex half)</td></tr><tr><td>3</td><td>Yellow</td><td>80 points electricity damage (Reflex half)</td></tr><tr><td>4</td><td>Green</td><td>Poison (Kills; Fortitude partial, take 1d6 points of Con damage instead)</td></tr><tr><td>5</td><td>Blue</td><td>Turned to stone (Fortitude negates)</td></tr><tr><td>6</td><td>Indigo</td><td>Insane, as <i>insanity</i> spell (Will negates)</td></tr><tr><td>7</td><td>Violet</td><td>Sent to another plane (Will negates)</td></tr><tr><td>8</td><td colspan="2">Struck by two rays; roll twice more, ignoring any “8” results.</td></tr></tbody></table>
- id: prismatic_wall
  name: Prismatic Wall
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Wall 4 ft./level wide, 2 ft./level high
  duration: 10 min./level (D)
  save: See text
  spell_resistance: See text
  components: V, S
  target_label: Effect
  description: |-
    _Prismatic wall_ creates a vertical, opaque wall—a shimmering, multicolored plane of light that protects you from all forms of attack. The wall flashes with seven colors, each of which has a distinct power and purpose. The wall is immobile, and you can pass through and remain near the wall without harm. However, any other creature with less than 8 HD that is within 20 feet of the wall is blinded for 2d4 rounds by the colors if it looks at the wall.

    The wall’s maximum proportions are 4 feet wide per caster level and 2 feet high per caster level. A _prismatic wall_ spell cast to materialize in a space occupied by a creature is disrupted, and the spell is wasted.

    Each color in the wall has a special effect. The accompanying table shows the seven colors of the wall, the order in which they appear, their effects on creatures trying to attack you or pass through the wall, and the magic needed to negate each color.

    The wall can be destroyed, color by color, in consecutive order, by various magical effects; however, the first color must be brought down before the second can be affected, and so on. A _rod of cancellation_ or a*mage’s disjunction* spell destroys a _prismatic wall_, but an _antimagic field_ fails to penetrate it. _Dispel magic_ and _greater dispel magic_ cannot dispel the wall or anything beyond it. Spell resistance is effective against a _prismatic wall_, but the caster level check must be repeated for each color present.

    _Prismatic wall_ can be made permanent with a _permanency_ spell.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>Color</th><th>Order</th><th>Effect of Color</th><th>Negated By</th></tr><tr><td>Red</td><td>1st</td><td>Stops nonmagical ranged weapons.<br>Deals 20 points of fire damage (Reflex half).</td><td><i>Cone of cold</i></td></tr><tr><td>Orange</td><td>2nd</td><td>Stops magical ranged weapons.<br>Deals 40 points of acid damage (Reflex half).</td><td><i>Gust of wind</i></td></tr><tr><td>Yellow</td><td>3rd</td><td>Stops poisons, gases, and petrification.<br>Deals 80 points of electricity damage (Reflex half).</td><td><i>Disintegrate</i></td></tr><tr><td>Green</td><td>4th</td><td>Stops breath weapons.<br>Poison (Kills; Fortitude partial for 1d6 points of Con damage instead).</td><td><i>Passwall</i></td></tr><tr><td>Blue</td><td>5th</td><td>Stops divination and mental attacks.<br>Turned to stone (Fortitude negates).</td><td><i>Magic missile</i></td></tr><tr><td>Indigo</td><td>6th</td><td>Stops all spells.<br>Will save or become insane (as <i>insanity</i> spell).</td><td><i>Daylight</i></td></tr><tr><td>Violet</td><td>7th</td><td>Energy field destroys all objects and effects.<sup>1</sup><br>Creatures sent to another plane (Will negates).</td><td><i>Dispel magic</i></td></tr><tr><td colspan="4">1 The violet effect makes the special effects of the other six colors redundant, but these six effects are included here because certain magic items can create prismatic effects one color at a time, and spell resistance might render some colors ineffective (see above).</td></tr></tbody></table>
- id: programmed_image
  name: Programmed Image
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Illusion (Figment)
  cast_time: ''
  range: ''
  target: Visual figment that cannot extend beyond a 20-ft. cube + one 10-ft. 
    cube/level (S)
  duration: Permanent until triggered, then 1 round/level
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Effect
  description: |-
    This spell functions like _silent image,_ except that this spell’s figment activates when a specific condition occurs. The figment includes visual, auditory, olfactory, and thermal elements, including intelligible speech.

    You set the triggering condition (which may be a special word) when casting the spell. The event that triggers the illusion can be as general or as specific and detailed as desired but must be based on an audible, tactile, olfactory, or visual trigger. The trigger cannot be based on some quality not normally obvious to the senses, such as alignment. (See _magic mouth_ for more details about such triggers.)

    _Material Component:_ A bit of fleece and jade dust worth 25 gp.
- id: project_image
  name: Project Image
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One shadow duplicate
  duration: 1 round/level (D)
  save: Will disbelief (if interacted with)
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You tap energy from the Plane of Shadow to create a quasi-real, illusory version of yourself. The projected image looks, sounds, and smells like you but is intangible. The projected image mimics your actions (including speech) unless you direct it to act differently (which is a move action).

    You can see through its eyes and hear through its ears as if you were standing where it is, and during your turn you can switch from using its senses to using your own, or back again, as a free action. While you are using its senses, your body is considered blinded and deafened.

    If you desire, any spell you cast whose range is touch or greater can originate from the projected image instead of from you. The projected image can’t cast any spells on itself except for illusion spells. The spells affect other targets normally, despite originating from the projected image.

    Objects are affected by the projected image as if they had succeeded on their Will save.

    You must maintain line of effect to the projected image at all times. If your line of effect is obstructed, the spell ends. If you use _dimension door, teleport, plane shift,_ or a similar spell that breaks your line of effect, even momentarily, the spell ends.

    _Material Component:_ A small replica of you (a doll), which costs 5 gp to create.
- id: protection_from_arrows
  name: Protection From Arrows
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature touched
  duration: 1 hour/level or until discharged
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, F
  target_label: Target
  description: |-
    The warded creature gains resistance to ranged weapons. The subject gains damage reduction 10/magic against ranged weapons. (This spell doesn’t grant you the ability to damage creatures with similar damage reduction.) Once the spell has prevented a total of 10 points of damage per caster level (maximum 100 points), it is discharged.

    _Focus:_ A piece of shell from a tortoise or a turtle.
- id: protection_from_spells
  name: Protection From Spells
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Up to one creature touched per four levels
  duration: 10 min./level
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M, F
  target_label: Targets
  description: |-
    The subject gains a +8 resistance bonus on saving throws against spells and spell-like abilities (but not against supernatural and extraordinary abilities).

    _Material Component:_ A diamond of at least 500 gp value, which must be crushed and sprinkled over the targets.

    _Focus:_ One 1,000 gp diamond per creature to be granted the protection. Each subject must carry one such gem for the duration of the spell. If a subject loses the gem, the spell ceases to affect him.
- id: prying_eyes
  name: Prying Eyes
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 minute
  range: One mile
  target: Ten or more levitating eyes
  duration: 1 hour/level; see text (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    You create a number of semitangible, visible magical orbs (called “eyes”) equal to 1d4 + your caster level. These eyes move out, scout around, and return as you direct them when casting the spell. Each eye can see 120 feet (normal vision only) in all directions.

    While the individual eyes are quite fragile, they’re small and difficult to spot. Each eye is a Fine construct, about the size of a small apple, that has 1 hit point, AC 18 (+8 bonus for its size), flies at a speed of 30 feet with perfect maneuverability, and has a +16 Hide modifier. It has a Spot modifier equal to your caster level (maximum +15) and is subject to illusions, darkness, fog, and any other factors that would affect your ability to receive visual information about your surroundings. An eye traveling through darkness must find its way by touch.

    When you create the eyes, you specify instructions you want them to follow in a command of no more than twenty-five words. Any knowledge you possess is known by the eyes as well.

    In order to report their findings, the eyes must return to your hand. Each replays in your mind all it has seen during its existence. It takes an eye 1 round to replay 1 hour of recorded images. After relaying its findings, an eye disappears.

    If an eye ever gets more than 1 mile away from you, it instantly ceases to exist. However, your link with the eye is such that you won’t know if the eye was destroyed because it wandered out of range or because of some other event.

    The eyes exist for up to 1 hour per caster level or until they return to you. _Dispel magic_ can destroy eyes. Roll separately for each eye caught in an area dispel. Of course, if an eye is sent into darkness, it could hit a wall or similar obstacle and destroy itself.

    _Material Component:_ A handful of crystal marbles.
- id: prying_eyes_greater
  name: Prying Eyes, Greater
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _prying eyes,_ except that the eyes can
    see all things as they actually are, just as if they had _true seeing_ with 
    a range of 120 feet. Thus, they can navigate darkened areas at full normal 
    speed. Also, a _greater prying eye_’s maximum Spot modifier is +25 instead 
    of +15.
- id: pyrotechnics
  name: Pyrotechnics
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: One fire source, up to a 20-ft. cube
  duration: 1d4+1 rounds, or 1d4+1 rounds after creatures leave the smoke cloud;
    see text
  save: Will negates or Fortitude negates; see text
  spell_resistance: Yes or No; see text
  components: V, S, M
  target_label: Target
  description: |-
    _Pyrotechnics_ turns a fire into either a burst of blinding fireworks or a thick cloud of choking smoke, depending on the version you choose.

    _Fireworks:_ The fireworks are a flashing, fiery, momentary burst of glowing, colored aerial lights. This effect causes creatures within 120 feet of the fire source to become blinded for 1d4+1 rounds (Will negates). These creatures must have line of sight to the fire to be affected. Spell resistance can prevent blindness.

    _Smoke Cloud:_ A writhing stream of smoke billows out from the source, forming a choking cloud. The cloud spreads 20 feet in all directions and lasts for 1 round per caster level. All sight, even darkvision, is ineffective in or through the cloud. All within the cloud take –4 penalties to Strength and Dexterity (Fortitude negates). These effects last for 1d4+1 rounds after the cloud dissipates or after the creature leaves the area of the cloud. Spell resistance does not apply.

    _Material Component:_ The spell uses one fire source, which is immediately extinguished. A fire so large that it exceeds a 20-foot cube is only partly extinguished. Magical fires are not extinguished, although a fire-based creature used as a source takes 1 point of damage per caster level.
- id: rage
  name: Rage
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One willing living creature per three levels, no two of which may be 
    more than 30 ft. apart
  duration: Concentration + 1 round/level (D)
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Targets
  description: Each affected creature gains a +2 morale bonus to Strength and 
    Constitution, a +1 morale bonus on Will saves, and a –2 penalty to AC. The 
    effect is otherwise identical with a barbarian’s rage except that the 
    subjects aren’t fatigued at the end of the rage.
- id: rainbow_pattern
  name: Rainbow Pattern
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Illusion (Pattern) [Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Colorful lights with a 20-ft.-radius spread
  duration: Concentration +1 round/ level (D)
  save: Will negates
  spell_resistance: Yes
  components: V (Brd only), S, M, F; see text
  target_label: Effect
  description: |-
    A glowing, rainbow-hued pattern of interweaving colors fascinates those within it. _Rainbow pattern_ fascinates a maximum of 24 Hit Dice of creatures. Creatures with the fewest HD are affected first. Among creatures with equal HD, those who are closest to the spell’s point of origin are affected first. An affected creature that fails its saves is fascinated by the pattern.

    With a simple gesture (a free action), you can make the rainbow pattern move up to 30 feet per round (moving its effective point of origin). All fascinated creatures follow the moving rainbow of light, trying to get or remain within the effect. Fascinated creatures who are restrained and removed from the pattern still try to follow it. If the pattern leads its subjects into a dangerous area each fascinated creature gets a second save. If the view of the lights is completely blocked creatures who can’t see them are no longer affected.

    The spell does not affect sightless creatures.

    _Verbal Component:_ A wizard or sorcerer need not utter a sound to cast this spell, but a bard must sing, play music, or recite a rhyme as a verbal component.

    _Material Component:_ A piece of phosphor.

    _Focus:_ A crystal prism.
- id: ray_of_exhaustion
  name: Ray of Exhaustion
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Ray
  duration: 1 min./level
  save: Fortitude partial; see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Effect
  description: |-
    A black ray projects from your pointing finger. You must succeed on a ranged touch attack with the ray to strike a target.

    The subject is immediately exhausted for the spell’s duration. A successful Fortitude save means the creature is only fatigued.

    A character that is already fatigued instead becomes exhausted.

    This spell has no effect on a creature that is already exhausted. Unlike normal exhaustion or fatigue, the effect ends as soon as the spell’s duration expires.

    _Material Component:_ A drop of sweat.
- id: reduce_person_mass
  name: Reduce Person, Mass
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: ''
  range: ''
  target: One humanoid creature/level, no two of which can be more than 30 ft. 
    apart
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: Target
  description: This spell functions like _reduce person_, except that it affects
    multiple creatures.
- id: refuge
  name: Refuge
  level_druid:
  level_cleric: 7
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Teleportation)
  cast_time: 1 standard action
  range: Touch
  target: Object touched
  duration: Permanent until discharged
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    You create powerful magic in some specially prepared object. This object contains the power to instantly transport its possessor across any distance within the same plane to your abode. Once the item is transmuted, you must give it willingly to a creature and at the same time inform it of a command word to be spoken when the item is used. To make use of the item, the subject speaks the command word at the same time that it rends or breaks the item (a standard action). When this is done, the individual and all objects it is wearing and carrying (to a maximum of the character’s heavy load) are instantly transported to your abode. No other creatures are affected (aside from a familiar that is touching the subject).

    You can alter the spell when casting it so that it transports you to within 10 feet of the possessor of the item when it is broken and the command word spoken. You will have a general idea of the location and situation of the item possessor at the time the _refuge_ spell is discharged, but once you decide to alter the spell in this fashion, you have no choice whether or not to be transported.

    _Material Component:_ The specially prepared object, whose construction requires gems worth 1,500 gp.
- id: remove_curse
  name: Remove Curse
  level_druid:
  level_cleric: 3
  level_wizard: 4
  level_bard: 3
  level_ranger:
  level_paladin: 3
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: Creature or item touched
  duration: Instantaneous
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S
  target_label: Target
  description: |-
    _Remove curse_ instantaneously removes all curses on an object or a creature. _Remove curse_ does not remove the curse from a cursed shield, weapon, or suit of armor, although the spell typically enables the creature afflicted with any such cursed item to remove and get rid of it. Certain special curses may not be countered by this spell or may be countered only by a caster of a certain level or higher.

    _Remove curse_ counters and dispels _bestow curse_.
- id: repulsion
  name: Repulsion
  level_druid:
  level_cleric: 7
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Up to 10 ft./level
  target: Up to 10-ft.-radius/level emanation centered on you
  duration: 1 round/level (D)
  save: Will negates
  spell_resistance: Yes
  components: V, S, F/DF
  target_label: Area
  description: |-
    An invisible, mobile field surrounds you and prevents creatures from approaching you. You decide how big the field is at the time of casting (to the limit your level allows). Any creature within or entering the field must attempt a save. If it fails, it becomes unable to move toward you for the duration of the spell. Repelled creatures’ actions are not otherwise restricted.

    They can fight other creatures and can cast spells and attack you with ranged weapons. If you move closer to an affected creature, nothing happens. (The creature is not forced back.) The creature is free to make melee attacks against you if you come within reach. If a repelled creature moves away from you and then tries to turn back toward you, it cannot move any closer if it is still within the spell’s area.

    _Arcane Focus:_ A pair of small iron bars attached to two small canine statuettes, one black and one white, the whole array worth 50 gp.
- id: resilient_sphere
  name: Resilient Sphere
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Force]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 1-ft.-diameter/level sphere, centered around a creature
  duration: 1 min./level (D)
  save: Reflex negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Effect
  description: |-
    A globe of shimmering force encloses a creature, provided the creature is small enough to fit within the diameter of the sphere. The sphere contains its subject for the spell’s duration. The sphere is not subject to damage of any sort except from a _rod of cancellation_, a rod _of negation_, a _disintegrate_ spell, or a targeted _dispel magic_ spell. These effects destroy the sphere without harm to the subject. Nothing can pass through the sphere, inside or out, though the subject can breathe normally.

    The subject may struggle, but the sphere cannot be physically moved either by people outside it or by the struggles of those within.

    _Material Component:_ A hemispherical piece of clear crystal and a matching hemispherical piece of gum arabic.
- id: reverse_gravity
  name: Reverse Gravity
  level_druid: 8
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Up to one 10-ft. cube per two levels (S)
  duration: 1 round/level (D)
  save: None; see text
  spell_resistance: No
  components: V, S, M/DF
  target_label: Area
  description: |-
    This spell reverses gravity in an area, causing all unattached objects and creatures within that area to fall upward and reach the top of the area in 1 round. If some solid object (such as a ceiling) is encountered in this fall, falling objects and creatures strike it in the same manner as they would during a normal downward fall. If an object or creature reaches the top of the area without striking anything, it remains there, oscillating slightly, until the spell ends. At the end of the spell duration, affected objects and creatures fall downward.

    Provided it has something to hold onto, a creature caught in the area can attempt a Reflex save to secure itself when the spell strikes. Creatures who can fly or levitate can keep themselves from falling.

    _Arcane Material Component:_ A lodestone and iron filings.
- id: rope_trick
  name: Rope Trick
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched piece of rope from 5 ft. to 30 ft. long
  duration: 1 hour/level (D)
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    When this spell is cast upon a piece of rope from 5 to 30 feet long, one end of the rope rises into the air until the whole rope hangs perpendicular to the ground, as if affixed at the upper end. The upper end is, in fact, fastened to an extradimensional space that is outside the multiverse of extradimensional spaces (“planes”). Creatures in the extradimensional space are hidden, beyond the reach of spells (including divinations), unless those spells work across planes. The space holds as many as eight creatures (of any size). Creatures in the space can pull the rope up into the space, making the rope “disappear.” In that case, the rope counts as one of the eight creatures that can fit in the space. The rope can support up to 16,000 pounds. A weight greater than that can pull the rope free.

    Spells cannot be cast across the extradimensional interface, nor can area effects cross it. Those in the extradimensional space can see out of it as if a 3-foot-by- 5-foot window were centered on the rope. The window is present on the Material Plane, but it’s invisible, and even creatures that can see the window can’t see through it. Anything inside the extradimensional space drops out when the spell ends. The rope can be climbed by only one person at a time. The _rope trick_ spell enables climbers to reach a normal place if they do not climb all the way to the extradimensional space.

    _Note:_ It is hazardous to create an extradimensional space within an existing extradimensional space or to take an extradimensional space into an existing one.

    _Material Component:_ Powdered corn extract and a twisted loop of parchment.
- id: scare
  name: Scare
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Necromancy [Fear, Mind-Affecting]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One living creature per three levels, no two of which can be more than
    30 ft. apart
  duration: 1 round/level or 1 round; see text for _cause fear_
  save: Will partial
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    This spell functions like _cause fear,_ except that it causes all targeted creatures of less than 6 HD to become frightened.

    _Material Component:_ A bit of bone from an undead skeleton, zombie, ghoul, ghast, or mummy.
- id: scintillating_pattern
  name: Scintillating Pattern
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Pattern) [Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Colorful lights in a 20-ft.-radius spread
  duration: Concentration + 2 rounds
  save: None
  spell_resistance: Yes
  components: V, S, M
  target_label: Effect
  description: |-
    A twisting pattern of discordant, coruscating colors weaves through the air, affecting creatures within it. The spell affects a total number of Hit Dice of creatures equal to your caster level (maximum 20). Creatures with the fewest HD are affected first; and, among creatures with equal HD, those who are closest to the spell’s point of origin are affected first. Hit Dice that are not sufficient to affect a creature are wasted. The spell affects each subject according to its Hit Dice.

    _6 or less:_ Unconscious for 1d4 rounds, then stunned for 1d4 rounds, and then _confused_ for 1d4 rounds. (Treat an unconscious result as stunned for nonliving creatures.)

    _7 to 12:_ Stunned for 1d4 rounds, then _confused_ for 1d4 rounds.

    _13 or more: Confused_ for 1d4 rounds.

    Sightless creatures are not affected by _scintillating pattern_.

    _Material Component:_ A small crystal prism.
- id: scorching_ray
  name: Scorching Ray
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation [Fire]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One or more rays
  duration: Instantaneous
  save: None
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    You blast your enemies with fiery rays. You may fire one ray, plus one additional ray for every four levels beyond 3rd (to a maximum of three rays at 11th level). Each ray requires a ranged touch attack to hit and deals 4d6 points of fire damage.

    The rays may be fired at the same or different targets, but all bolts must be aimed at targets within 30 feet of each other and fired simultaneously.
- id: screen
  name: Screen
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels)
  target: 30-ft. cube/level (S)
  duration: 24 hours
  save: None or Will disbelief (if interacted with); see text
  spell_resistance: No
  components: V, S
  target_label: Area
  description: |-
    This spell combines several elements to create a powerful protection from scrying and direct observation. When casting the spell, you dictate what will and will not be observed in the spell’s area. The illusion created must be stated in general terms. Once the conditions are set, they cannot be changed.

    Attempts to scry the area automatically detect the image stated by you with no save allowed. Sight and sound are appropriate to the illusion created.

    Direct observation may allow a save (as per a normal illusion), if there is cause to disbelieve what is seen. Even entering the area does not cancel the illusion or necessarily allow a save, assuming that hidden beings take care to stay out of the way of those affected by the illusion.
- id: scrying_greater
  name: Scrying, Greater
  level_druid: 7
  level_cleric: 7
  level_wizard: 7
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Divination (Scrying)
  cast_time: 1 standard action
  range: ''
  target: ''
  duration: 1 hour/level
  save: ''
  spell_resistance: ''
  components: V, S
  target_label: ''
  description: 'This spell functions like _scrying_, except as noted above. Additionally,
    all of the following spells function reliably through the sensor: _detect chaos_,
    _detect evil_, _detect good_, _detect law_, _detect magic_, _message_, _read magic_,
    and _tongues_.'
- id: sculpt_sound
  name: Sculpt Sound
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature or object/level, no two of which can be more than 30 ft. 
    apart
  duration: 1 hour/level (D)
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Targets
  description: |-
    You change the sounds that creatures or objects make. You can create sounds where none exist, deaden sounds, or transform sounds into other sounds. All affected creatures or objects must be transmuted in the same way. Once the transmutation is made, you cannot change it.

    You can change the qualities of sounds but cannot create words with which you are unfamiliar yourself.

    A spellcaster whose voice is changed dramatically is unable to cast spells with verbal components.
- id: secret_chest
  name: Secret Chest
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Summoning)
  cast_time: 10 minutes
  range: See text
  target: One chest and up to 1 cu. ft. of goods/caster level
  duration: Sixty days or until discharged
  save: None
  spell_resistance: No
  components: V, S, F
  target_label: Target
  description: |-
    You hide a chest on the Ethereal Plane for as long as sixty days and can retrieve it at will. The chest can contain up to 1 cubic foot of material per caster level (regardless of the chest’s actual size, which is about 3 feet by 2 feet by 2 feet). If any living creatures are in the chest, there is a 75% chance that the spell simply fails. Once the chest is hidden, you can retrieve it by concentrating (a standard action), and it appears next to you.

    The chest must be exceptionally well crafted and expensive, constructed for you by master crafters. The cost of such a chest is never less than 5,000 gp. Once it is constructed, you must make a tiny replica (of the same materials and perfect in every detail), so that the miniature of the chest appears to be a perfect copy. (The replica costs 50 gp.) You can have but one pair of these chests at any given time—even a _wish_ spell does not allow more. The chests are nonmagical and can be fitted with locks, wards, and so on, just as any normal chest can be.

    To hide the chest, you cast the spell while touching both the chest and the replica. The chest vanishes into the Ethereal Plane. You need the replica to recall the chest. After sixty days, there is a cumulative chance of 5% per day that the chest is irretrievably lost. If the miniature of the chest is lost or destroyed, there is no way, not even with a _wish_ spell, that the large chest can be summoned back, although an extraplanar expedition might be mounted to find it.

    Living things in the chest eat, sleep, and age normally, and they die if they run out of food, air, water, or whatever they need to survive.

    _Focus:_ The chest and its replica.
- id: secret_page
  name: Secret Page
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 10 minutes
  range: Touch
  target: Page touched, up to 3 sq. ft. in size
  duration: Permanent
  save: None
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    _Secret page_ alters the contents of a page so that they appear to be something entirely different. The text of a spell can be changed to show even another spell. _Explosive runes_ or _sepia snake sigil_ can be cast upon the _secret page._

    A _comprehend languages_ spell alone cannot reveal a _secret page_’s contents. You are able to reveal the original contents by speaking a special word. You can then peruse the actual page, and return it to its _secret page_ form at will. You can also remove the spell by double repetition of the special word. A _detect magic_ spell reveals dim magic on the page in question but does not reveal its true contents._True seeing_ reveals the presence of the hidden material but does not reveal the contents unless cast in combination with _comprehend languages._ A _secret page_ spell can be dispelled, and the hidden writings can be destroyed by means of an _erase_ spell.

    _Material Component:_ Powdered herring scales and will-o’-wisp essence.
- id: secure_shelter
  name: Secure Shelter
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 10 minutes
  range: Close (25 ft. + 5 ft./2 levels)
  target: 20-ft.-square structure
  duration: 2 hours/level (D)
  save: None
  spell_resistance: No
  components: V, S, M, F; see text
  target_label: Effect
  description: |-
    You conjure a sturdy cottage or lodge made of material that is common in the area where the spell is cast. The floor is level, clean, and dry. In all respects the lodging resembles a normal cottage, with a sturdy door, two shuttered windows, and a small fireplace.

    The shelter has no heating or cooling source (other than natural insulation qualities). Therefore, it must be heated as a normal dwelling, and extreme heat adversely affects it and its occupants. The dwelling does, however, provide considerable security otherwise—it is as strong as a normal stone building, regardless of its material composition. The dwelling resists flames and fire as if it were stone. It is impervious to normal missiles (but not the sort cast by siege engines or giants).

    The door, shutters, and even chimney are secure against intrusion, the former two being _arcane locked_ and the latter secured by an iron grate at the top and a narrow flue. In addition, these three areas are protected by an _alarm_ spell. Finally, an _unseen servant_ is conjured to provide service to you for the duration of the shelter.

    The _secure shelter_ contains rude furnishings —eight bunks, a trestle table, eight stools, and a writing desk.

    _Material Component:_ A square chip of stone, crushed lime, a few grains of sand, a sprinkling of water, and several splinters of wood. These must be augmented by the components of the _unseen servant_ spell (string and a bit of wood) if this benefit is to be included.

    _Focus:_ The focus of the _alarm_ spell (silver wire and a tiny bell) if this benefit is to be included.
- id: see_invisibility
  name: See Invisibility
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Divination
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M
  target_label: Target
  description: |-
    You can see any objects or beings that are invisible within your range of vision, as well as any that are ethereal, as if they were normally visible. Such creatures are visible to you as translucent shapes, allowing you easily to discern the difference between visible, invisible, and ethereal creatures.

    The spell does not reveal the method used to obtain invisibility. It does not reveal illusions or enable you to see through opaque objects. It does not reveal creatures who are simply hiding, concealed, or otherwise hard to see.

    _See invisibility_ can be made permanent with a _permanency_ spell.

    _Material Component:_ A pinch of talc and a small sprinkling of powdered silver.
- id: seeming
  name: Seeming
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature per two levels, no two of which can be more than 30 ft. 
    apart
  duration: 12 hours (D)
  save: Will negates or Will disbelief (if interacted with)
  spell_resistance: Yes or No; see text
  components: V, S
  target_label: Targets
  description: |-
    This spell functions like _disguise self,_ except that you can change the appearance of other people as well. Affected creatures resume their normal appearances if slain.

    Unwilling targets can negate the spell’s effect on them by making Will saves or with spell resistance.
- id: sending
  name: Sending
  level_druid:
  level_cleric: 4
  level_wizard: 5
  level_bard:
  level_ranger:
  level_paladin:
  school: Evocation
  cast_time: 10 minutes
  range: See text
  target: One creature
  duration: 1 round; see text
  save: None
  spell_resistance: No
  components: V, S, M/DF
  target_label: Target
  description: |-
    You contact a particular creature with which you are familiar and send a short message of twenty-five words or less to the subject. The subject recognizes you if it knows you. It can answer in like manner immediately. A creature with an Intelligence score as low as 1 can understand the _sending,_ though the subject’s ability to react is limited as normal by its Intelligence score. Even if the _sending_ is received, the subject is not obligated to act upon it in any manner.

    If the creature in question is not on the same plane of existence as you are, there is a 5% chance that the _sending_ does not arrive. (Local conditions on other planes may worsen this chance considerably.)

    _Arcane Material Component:_ A short piece of fine copper wire.
- id: sepia_snake_sigil
  name: Sepia Snake Sigil
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Conjuration (Creation) [Force]
  cast_time: 10 minutes
  range: Touch
  target: One touched book or written work
  duration: Permanent or until discharged; until released or 1d4 days + one 
    day/level; see text
  save: Reflex negates
  spell_resistance: No
  components: V, S, M
  target_label: Target
  description: |-
    When you cast _sepia snake sigil,_ a small symbol appears in the text of one written work such as a book, scroll, or map. The text containing the symbol must be at least twenty-five words long. When anyone reads the text containing the symbol, the _sepia snake_ springs into being and strikes the reader, provided there is line of effect between the symbol and the reader.

    Simply seeing the enspelled text is not sufficient to trigger the spell; the subject must deliberately read it. The target is entitled to a save to evade the snake’s strike. If it succeeds, the _sepia snake_ dissipates in a flash of brown light accompanied by a puff of dun-colored smoke and a loud noise. If the target fails its save, it is engulfed in a shimmering amber field of force and immobilized until released, either at your command or when 1d4 days + one day per caster level have elapsed.

    While trapped in the amber field of force, the subject does not age, breathe, grow hungry, sleep, or regain spells. It is preserved in a state of suspended animation, unaware of its surroundings. It can be damaged by outside forces (and perhaps even killed), since the field provides no protection against physical injury. However, a dying subject does not lose hit points or become stable until the spell ends.

    The hidden sigil cannot be detected by normal observation, and _detect magic_ reveals only that the entire text is magical.

    A _dispel magic_ can remove the sigil. An _erase_ spell destroys the entire page of text.

    _Sepia snake sigil_ can be cast in combination with other spells that hide or garble text, such as _secret page._

    _Material Component:_ 500 gp worth of powdered amber, a scale from any snake, and a pinch of mushroom spores.
- id: sequester
  name: Sequester
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Touch
  target: One willing creature or object (up to a 2-ft. cube/level) touched
  duration: One day/level (D)
  save: None or Will negates (object)
  spell_resistance: No or Yes (object)
  components: V, S, M
  target_label: Target
  description: |-
    When cast, this spell not only prevents divination spells from working to detect or locate the creature or object affected by _sequester,_ it also renders the affected creature or object invisible to any form of sight or seeing (as the _invisibility_ spell). The spell does not prevent the subject from being discovered through tactile means or through the use of devices. Creatures affected by _sequester_ become comatose and are effectively in a state of suspended animation until the spell wears off or is dispelled.

    _Note:_ The Will save prevents an attended or magical object from being _sequestered._ There is no save to see the _sequestered_ creature or object or to detect it with a divination spell.

    _Material Component:_ A basilisk eyelash, gum arabic, and a dram of whitewash.
- id: shades
  name: Shades
  level_druid:
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _shadow conjuration,_ except that it 
    mimics sorcerer and wizard conjuration spells of 8th level or lower. The 
    illusory conjurations created deal four-fifths (80%) damage to nonbelievers,
    and nondamaging effects are 80% likely to work against nonbelievers.
- id: shadow_conjuration
  name: Shadow Conjuration
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: 1 standard action
  range: See text
  target: See text
  duration: See text
  save: Will disbelief (if interacted with); varies; see text
  spell_resistance: Yes; see text
  components: V, S
  target_label: Effect
  description: |-
    You use material from the Plane of Shadow to shape quasi-real illusions of one or more creatures, objects, or forces. _Shadow conjuration_ can mimic any sorcerer or wizard conjuration (summoning) or conjuration (creation) spell of 3rd level or lower.

    _Shadow conjurations_ are actually one-fifth (20%) as strong as the real things, though creatures who believe the _shadow conjurations_ to be real are affected by them at full strength.

    Any creature that interacts with the conjured object, force, or creature can make a Will save to recognize its true nature.

    Spells that deal damage have normal effects unless the affected creature succeeds on a Will save. Each disbelieving creature takes only one-fifth (20%) damage from the attack. If the disbelieved attack has a special effect other than damage, that effect is only 20% likely to occur. Regardless of the result of the save to disbelieve, an affected creature is also allowed any save that the spell being simulated allows, but the save DC is set according to _shadow conjuration_’s level (4th) rather than the spell’s normal level. In addition, any effect created by _shadow conjuration_ allows spell resistance, even if the spell it is simulating does not. Shadow objects or substances have normal effects except against those who disbelieve them.

    Against disbelievers, they are 20% likely to work.

    A shadow creature has one-fifth the hit points of a normal creature of its kind (regardless of whether it’s recognized as shadowy). It deals normal damage and has all normal abilities and weaknesses. Against a creature that recognizes it as a shadow creature, however, the shadow creature’s damage is one-fifth (20%) normal, and all special abilities that do not deal lethal damage are only 20% likely to work. (Roll for each use and each affected character separately.) Furthermore, the shadow creature’s AC bonuses are one-fifth as large.

    A creature that succeeds on its save sees the _shadow conjurations_ as transparent images superimposed on vague, shadowy forms.

    Objects automatically succeed on their Will saves against this spell.
- id: shadow_conjuration_greater
  name: Shadow Conjuration, Greater
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _shadow conjuration,_ except that it 
    can duplicate any sorcerer or wizard conjuration (summoning) or conjuration 
    (creation) spell of 6th level or lower. The illusory conjurations created 
    deal three-fifths (60%) damage to nonbelievers, and nondamaging effects are 
    60% likely to work against nonbelievers.
- id: shadow_evocation
  name: Shadow Evocation
  level_druid:
  level_cleric:
  level_wizard: 5
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: 1 standard action
  range: See text
  target: See text
  duration: See text
  save: Will disbelief (if interacted with)
  spell_resistance: Yes
  components: V, S
  target_label: Effect
  description: |-
    You tap energy from the Plane of Shadow to cast a quasi-real, illusory version of a sorcerer or wizard evocation spell of 4th level or lower. (For a spell with more than one level, use the best one applicable to you.)

    Spells that deal damage have normal effects unless an affected creature succeeds on a Will save. Each disbelieving creature takes only one-fifth damage from the attack. If the disbelieved attack has a special effect other than damage, that effect is one-fifth as strong (if applicable) or only 20% likely to occur. If recognized as a _shadow evocation,_ a damaging spell deals only one-fifth (20%) damage. Regardless of the result of the save to disbelieve, an affected creature is also allowed any save (or spell resistance) that the spell being simulated allows, but the save DC is set according to \_shadow evocation’s_level (5th) rather than the spell’s normal level.

    Nondamaging effects have normal effects except against those who disbelieve them. Against disbelievers, they have no effect.

    Objects automatically succeed on their Will saves against this spell.
- id: shadow_evocation_greater
  name: Shadow Evocation, Greater
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: ''
  range: ''
  target: ''
  duration: ''
  save: ''
  spell_resistance: ''
  components: ''
  target_label: ''
  description: This spell functions like _shadow evocation,_ except that it 
    enables you to create partially real, illusory versions of sorcerer or 
    wizard evocation spells of 7th level or lower. If recognized as a _greater 
    shadow evocation_, a damaging spell deals only three-fifths (60%) damage.
- id: shadow_walk
  name: Shadow Walk
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: 1 standard action
  range: Touch
  target: Up to one touched creature/ level
  duration: 1 hour/level (D)
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Targets
  description: |-
    To use the _shadow walk_ spell, you must be in an area of shadowy illumination. You and any creature you touch are then transported along a coiling path of shadowstuff to the edge of the Material Plane where it borders the Plane of Shadow. The effect is largely illusory, but the path is quasi-real. You can take more than one creature along with you (subject to your level limit), but all must be touching each other.

    In the region of shadow, you move at a rate of 50 miles per hour, moving normally on the borders of the Plane of Shadow but much more rapidly relative to the Material Plane. Thus, you can use this spell to travel rapidly by stepping onto the Plane of Shadow, moving the desired distance, and then stepping back onto the Material Plane.

    Because of the blurring of reality between the Plane of Shadow and the Material Plane, you can’t make out details of the terrain or areas you pass over during transit, nor can you predict perfectly where your travel will end. It’s impossible to judge distances accurately, making the spell virtually useless for scouting or spying. Furthermore, when the spell effect ends, you are shunted 1d10x100 feet in a random horizontal direction from your desired endpoint. If this would place you within a solid object, you are shunted 1d10x1,000 feet in the same direction. If this would still place you within a solid object, you (and any creatures with you) are shunted to the nearest empty space available, but the strain of this activity renders each creature fatigued (no save).

    _Shadow walk_ can also be used to travel to other planes that border on the Plane of Shadow, but this usage requires the transit of the Plane of Shadow to arrive at a border with another plane of reality. The transit of the Plane of Shadow requires 1d4 hours.

    Any creatures touched by you when _shadow walk_ is cast also make the transition to the borders of the Plane of Shadow.

    They may opt to follow you, wander off through the plane, or stumble back into the Material Plane (50% chance for either of the latter results if they are lost or abandoned by you). Creatures unwilling to accompany you into the Plane of Shadow receive a Will saving throw, negating the effect if successful.
- id: shapechange
  name: Shapechange
  level_druid: 9
  level_cleric:
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: 10 min./level (D)
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, F
  target_label: Target
  description: |-
    This spell functions like _polymorph,_ except that it enables you to assume the form of any single nonunique creature (of any type) from Fine to Colossal size. The assumed form cannot have more than your caster level in Hit Dice (to a maximum of 25 HD). Unlike _polymorph,_ this spell allows incorporeal or gaseous forms to be assumed.

    You gain all extraordinary and supernatural abilities (both attacks and qualities) of the assumed form, but you lose your own supernatural abilities. You also gain the type of the new form in place of your own. The new form does not disorient you. Parts of your body or pieces of equipment that are separated from you do not revert to their original forms.

    You can become just about anything you are familiar with. You can change form once each round as a free action. The change takes place either immediately before your regular action or immediately after it, but not during the action. If you use this spell to create a disguise, you get a +10 bonus on your Disguise check.

    _Focus:_ A jade circlet worth no less than 1,500 gp, which you must place on your head when casting the spell. (The focus melds into your new form when you change shape.)
- id: shatter
  name: Shatter
  level_druid:
  level_cleric: 2
  level_wizard: 2
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Sonic]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: ''
  duration: Instantaneous
  save: Will negates (object); Will negates (object) or Fortitude half; see text
  spell_resistance: Yes (object)
  components: V, S, M/DF
  target_label: ''
  description: |-
    _Shatter_ creates a loud, ringing noise that breaks brittle, nonmagical objects; sunders a single solid, nonmagical object; or damages a crystalline creature.

    Used as an area attack, _shatter_ destroys nonmagical objects of crystal, glass, ceramic, or porcelain. All such objects within a 5-foot radius of the point of origin are smashed into dozens of pieces by the spell. Objects weighing more than 1 pound per your level are not affected, but all other objects of the appropriate composition are shattered.

    Alternatively, you can target _shatter_ against a single solid object, regardless of composition, weighing up to 10 pounds per caster level. Targeted against a crystalline creature (of any weight), _shatter_ deals 1d6 points of sonic damage per caster level (maximum 10d6), with a Fortitude save for half damage.

    _Arcane Material Component:_ A chip of mica.
- id: shout
  name: Shout
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard: 4
  level_ranger:
  level_paladin:
  school: Evocation [Sonic]
  cast_time: 1 standard action
  range: 30 ft.
  target: Cone-shaped burst
  duration: Instantaneous
  save: Fortitude partial or Reflex negates (object); see text
  spell_resistance: Yes (object)
  components: V
  target_label: Area
  description: |-
    You emit an ear-splitting yell that deafens and damages creatures in its path. Any creature within the area is deafened for 2d6 rounds and takes 5d6 points of sonic damage. A successful save negates the deafness and reduces the damage by half. Any exposed brittle or crystalline object or crystalline creature takes 1d6 points of sonic damage per caster level (maximum 15d6). An affected creature is allowed a Fortitude save to reduce the damage by half, and a creature holding fragile objects can negate damage to them with a successful Reflex save.

    A _shout_ spell cannot penetrate a _silence_ spell.
- id: shout_greater
  name: Shout, Greater
  level_druid:
  level_cleric:
  level_wizard: 8
  level_bard: 6
  level_ranger:
  level_paladin:
  school: Evocation [Sonic]
  cast_time: ''
  range: 60 ft.
  target: ''
  duration: ''
  save: Fortitude partial or Reflex negates (object); see text
  spell_resistance: ''
  components: V, S, F
  target_label: ''
  description: |-
    This spell functions like _shout,_ except that the cone deals 10d6 points of sonic damage (or 1d6 points of sonic damage per caster level, maximum 20d6, against exposed brittle or crystalline objects or crystalline creatures). It also causes creatures to be stunned for 1 round and deafened for 4d6 rounds. A creature in the area of the cone can negate the stunning and halve both the damage and the duration of the deafness with a successful Fortitude save. A creature holding vulnerable objects can attempt a Reflex save to negate the damage to those objects.

    _Arcane Focus:_ A small metal or ivory horn.
- id: shrink_item
  name: Shrink Item
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Touch
  target: One touched object of up to 2 cu. ft./level
  duration: One day/level; see text
  save: Will negates (object)
  spell_resistance: Yes (object)
  components: V, S
  target_label: Target
  description: |-
    You are able to shrink one nonmagical item (if it is within the size limit) to 1/16 of its normal size in each dimension (to about 1/4,000 the original volume and mass). This change effectively reduces the object’s size by four categories. Optionally, you can also change its now shrunken composition to a clothlike one. Objects changed by a _shrink item_ spell can be returned to normal composition and size merely by tossing them onto any solid surface or by a word of command from the original caster. Even a burning fire and its fuel can be shrunk by this spell. Restoring the shrunken object to its normal size and composition ends the spell.

    _Shrink item_ can be made permanent with a _permanency_ spell, in which case the affected object can be shrunk and expanded an indefinite number of times, but only by the original caster.
- id: silence
  name: Silence
  level_druid:
  level_cleric: 2
  level_wizard:
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Illusion (Glamer)
  cast_time: 1 standard action
  range: Long (400 ft. + 40 ft./level)
  target: 20-ft.-radius emanation centered on a creature, object, or point in 
    space
  duration: 1 min./level (D)
  save: Will negates; see text or none (object)
  spell_resistance: Yes; see text or no (object)
  components: V, S
  target_label: Area
  description: 'Upon the casting of this spell, complete silence prevails in the affected
    area. All sound is stopped: Conversation is impossible, spells with verbal components
    cannot be cast, and no noise whatsoever issues from, enters, or passes through
    the area. The spell can be cast on a point in space, but the effect is stationary
    unless cast on a mobile object. The spell can be centered on a creature, and the
    effect then radiates from the creature and moves as it moves. An unwilling creature
    can attempt a Will save to negate the spell and can use spell resistance, if any.
    Items in a creature’s possession or magic items that emit sound receive the benefits
    of saves and spell resistance, but unattended objects and points in space do not.
    This spell provides a defense against sonic or language-based attacks.'
- id: simulacrum
  name: Simulacrum
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Illusion (Shadow)
  cast_time: 12 hours
  range: 0 ft.
  target: One duplicate creature
  duration: Instantaneous
  save: None
  spell_resistance: No
  components: V, S, M, XP
  target_label: Effect
  description: |-
    _Simulacrum_ creates an illusory duplicate of any creature. The duplicate creature is partially real and formed from ice or snow. It appears to be the same as the original, but it has only one-half of the real creature’s levels or Hit Dice (and the appropriate hit points, feats, skill ranks, and special abilities for a creature of that level or HD). You can’t create a simulacrum of a creature whose Hit Dice or levels exceed twice your caster level. You must make a Disguise check when you cast the spell to determine how good the likeness is. A creature familiar with the original might detect the ruse with a successful Spot check (opposed by the caster’s Disguise check) or a DC 20 Sense Motive check.

    At all times the simulacrum remains under your absolute command. No special telepathic link exists, so command must be exercised in some other manner. A simulacrum has no ability to become more powerful. It cannot increase its level or abilities. If reduced to 0 hit points or otherwise destroyed, it reverts to snow and melts instantly into nothingness. A complex process requiring at least 24 hours, 100 gp per hit point, and a fully equipped magical laboratory can repair damage to a simulacrum.

    _Material Component:_ The spell is cast over the rough snow or ice form, and some piece of the creature to be duplicated (hair, nail, or the like) must be placed inside the snow or ice. Additionally, the spell requires powdered ruby worth 100 gp per HD of the simulacrum to be created.

    _XP Cost:_ 100 XP per HD of the simulacrum to be created (minimum 1,000 XP).
- id: slow
  name: Slow
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 3
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One creature/level, no two of which can be more than 30 ft. apart
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S, M
  target_label: Targets
  description: |-
    An affected creature moves and attacks at a drastically slowed rate. A _slowed_ creature can take only a single move action or standard action each turn, but not both (nor may it take full-round actions). Additionally, it takes a –1 penalty on attack rolls, AC, and Reflex saves. A _slowed_ creature moves at half its normal speed (round down to the next 5-foot increment), which affects the creature’s jumping distance as normal for decreased speed.

    Multiple _slow_ effects don’t stack. _Slow_ counters and dispels _haste_.

    _Material Component:_ A drop of molasses.
- id: solid_fog
  name: Solid Fog
  level_druid:
  level_cleric:
  level_wizard: 4
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: ''
  range: ''
  target: ''
  duration: 1 min./level
  save: ''
  spell_resistance: No
  components: V, S, M
  target_label: ''
  description: |-
    This spell functions like _fog cloud_, but in addition to obscuring sight, the _solid fog_ is so thick that any creature attempting to move through it progresses at a speed of 5 feet, regardless of its normal speed, and it takes a –2 penalty on all melee attack and melee damage rolls. The vapors prevent effective ranged weapon attacks (except for magic rays and the like). A creature or object that falls into _solid fog_ is slowed, so that each 10 feet of vapor that it passes through reduces falling damage by 1d6. A creature can’t take a 5-foot step while in _solid fog._

    However, unlike normal fog, only a severe wind (31+ mph) disperses these vapors, and it does so in 1 round.

    _Solid fog_ can be made permanent with a _permanency_ spell. A permanent _solid fog_ dispersed by wind reforms in 10 minutes.

    _Material Component:_ A pinch of dried, powdered peas combined with powdered animal hoof.
- id: song_of_discord
  name: Song of Discord
  level_druid:
  level_cleric:
  level_wizard:
  level_bard: 5
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Mind-Affecting, Sonic]
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Creatures within a 20-ft.-radius spread
  duration: 1 round/level
  save: Will negates
  spell_resistance: Yes
  components: V, S
  target_label: Area
  description: |-
    This spell causes those within the area to turn on each other rather than attack their foes. Each affected creature has a 50% chance to attack the nearest target each round. (Roll to determine each creature’s behavior every round at the beginning of its turn.) A creature that does not attack its nearest neighbor is free to act normally for that round.

    Creatures forced by a _song of discord_ to attack their fellows employ all methods at their disposal, choosing their deadliest spells and most advantageous combat tactics. They do not, however, harm targets that have fallen unconscious.
- id: soul_bind
  name: Soul Bind
  level_druid:
  level_cleric: 9
  level_wizard: 9
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: Corpse
  duration: Permanent
  save: Will negates
  spell_resistance: No
  components: V, S, F
  target_label: Target
  description: |-
    You draw the soul from a newly dead body and imprison it in a black sapphire gem. The subject must have been dead no more than 1 round per caster level. The soul, once trapped in the gem, cannot be returned through _clone, raise dead, reincarnation, resurrection, true resurrection,_ or even a _miracle_ or a _wish._ Only by destroying the gem or dispelling the spell on the gem can one free the soul (which is then still dead).

    _Focus:_ A black sapphire of at least 1,000 gp value for every Hit Die possessed by the creature whose soul is to be bound. If the gem is not valuable enough, it shatters when the binding is attempted. (While creatures have no concept of level or Hit Dice as such, the value of the gem needed to trap an individual can be researched. Remember that this value can change over time as creatures gain more Hit Dice.)
- id: sound_burst
  name: Sound Burst
  level_druid:
  level_cleric: 2
  level_wizard:
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Evocation [Sonic]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: 10-ft.-radius spread
  duration: Instantaneous
  save: Fortitude partial
  spell_resistance: Yes
  components: V, S, F/DF
  target_label: Area
  description: |-
    You blast an area with a tremendous cacophony. Every creature in the area takes 1d8 points of sonic damage and must succeed on a Fortitude save to avoid being stunned for 1 round.

    Creatures that cannot hear are not stunned but are still damaged.

    _Arcane Focus:_ A musical instrument.
- id: spectral_hand
  name: Spectral Hand
  level_druid:
  level_cleric:
  level_wizard: 2
  level_bard:
  level_ranger:
  level_paladin:
  school: Necromancy
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One spectral hand
  duration: 1 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Effect
  description: |-
    A ghostly, glowing hand shaped from your life force materializes and moves as you desire, allowing you to deliver low-level, touch range spells at a distance. On casting the spell, you lose 1d4 hit points that return when the spell ends (even if it is dispelled), but not if the hand is destroyed. (The hit points can be healed as normal.) For as long as the spell lasts, any touch range spell of 4th level or lower that you cast can be delivered by the _spectral hand_. The spell gives you a +2 bonus on your melee touch attack roll, and attacking with the hand counts normally as an attack. The hand always strikes from your direction. The hand cannot flank targets like a creature can. After it delivers a spell, or if the hand goes beyond the spell range, goes out of your sight, the hand returns to you and hovers.

    The hand is incorporeal and thus cannot be harmed by normal weapons. It has improved evasion (half damage on a failed Reflex save and no damage on a successful save), your save bonuses, and an AC of at least 22. Your Intelligence modifier applies to the hand’s AC as if it were the hand’s Dexterity modifier. The hand has 1 to 4 hit points, the same number that you lost in creating it.
- id: spell_turning
  name: Spell Turning
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Abjuration
  cast_time: 1 standard action
  range: Personal
  target: You
  duration: Until expended or 10 min./level
  self_duration: 1
  save: ''
  spell_resistance: ''
  components: V, S, M/DF
  target_label: Target
  description: |-
    Spells and spell-like effects targeted on you are turned back upon the original caster. The abjuration turns only spells that have you as a target. Effect and area spells are not affected. _Spell turning_ also fails to stop touch range spells.

    From seven to ten (1d4+6) spell levels are affected by the turning. The exact number is rolled secretly.

    When you are targeted by a spell of higher level than the amount of spell turning you have left, that spell is partially turned. The subtract the amount of spell turning left from the spell level of the incoming spell, then divide the result by the spell level of the incoming spell to see what fraction of the effect gets through. For damaging spells, you and the caster each take a fraction of the damage. For nondamaging spells, each of you has a proportional chance to be affected.

    If you and a spellcasting attacker are both warded by _spell turning_ effects in operation, a resonating field is created.

    Roll randomly to determine the result.

    <table data-debug="no-caption" class="half-width-table"><tbody><tr><th>d%</th><th>Effect</th></tr><tr><td>01–70</td><td>Spell drains away without effect.</td></tr><tr><td>71–80</td><td>Spell affects both of you equally at full effect.</td></tr><tr><td>81–97</td><td>Both turning effects are rendered nonfunctional for 1d4 minutes.</td></tr><tr><td>98–100</td><td>Both of you go through a rift into another plane.</td></tr></tbody></table>

    _Arcane Material Component:_ A small silver mirror.
- id: statue
  name: Statue
  level_druid:
  level_cleric:
  level_wizard: 7
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 round
  range: Touch
  target: Creature touched
  duration: 1 hour/level (D)
  save: Will negates (harmless)
  spell_resistance: Yes (harmless)
  components: V, S, M
  target_label: Target
  description: |-
    A _statue_ spell turns the subject to solid stone, along with any garments and equipment worn or carried. In statue form, the subject gains hardness 8. The subject retains its own hit points.

    The subject can see, hear, and smell normally, but it does not need to eat or breathe. Feeling is limited to those sensations that can affect the granite-hard substance of the individual’s body. Chipping is equal to a mere scratch, but breaking off one of the statue’s arms constitutes serious damage.

    The subject of a _statue_ spell can return to its normal state, act, and then return instantly to the statue state (a free action) if it so desires, as long as the spell duration is in effect.

    _Material Component:_ Lime, sand, and a drop of water stirred by an iron bar, such as a nail or spike.
- id: stinking_cloud
  name: Stinking Cloud
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard:
  level_ranger:
  level_paladin:
  school: Conjuration (Creation)
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: Cloud spreads in 20-ft. radius, 20 ft. high
  duration: 1 round/level
  save: Fortitude negates; see text
  spell_resistance: No
  components: V, S, M
  target_label: Effect
  description: |-
    _Stinking cloud_ creates a bank of fog like that created by _fog cloud_, except that the vapors are nauseating. Living creatures in the cloud become nauseated. This condition lasts as long as the creature is in the cloud and for 1d4+1 rounds after it leaves. (Roll separately for each nauseated character.) Any creature that succeeds on its save but remains in the cloud must continue to save each round on your turn.

    _Stinking cloud_ can be made permanent with a _permanency_ spell. A permanent _stinking cloud_ dispersed by wind reforms in 10 minutes.

    _Material Component:_ A rotten egg or several skunk cabbage leaves.
- id: stone_to_flesh
  name: Stone to Flesh
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard:
  level_ranger:
  level_paladin:
  school: Transmutation
  cast_time: 1 standard action
  range: Medium (100 ft. + 10 ft./level)
  target: One petrified creature or a cylinder of stone from 1 ft. to 3 ft. in 
    diameter and up to 10 ft. long
  duration: Instantaneous
  save: Fortitude negates (object); see text
  spell_resistance: Yes
  components: V, S, M
  target_label: Target
  description: |-
    This spell restores a petrified creature to its normal state, restoring life and goods. The creature must make a DC 15 Fortitude save to survive the process. Any petrified creature, regardless of size, can be restored.

    The spell also can convert a mass of stone into a fleshy substance. Such flesh is inert and lacking a vital life force unless a life force or magical energy is available. (For example, this spell would turn a stone golem into a flesh golem, but an ordinary statue would become a corpse.) You can affect an object that fits within a cylinder from 1 foot to 3 feet in diameter and up to 10 feet long or a cylinder of up to those dimensions in a larger mass of stone.

    _Material Component:_ A pinch of earth and a drop of blood.
- id: suggestion
  name: Suggestion
  level_druid:
  level_cleric:
  level_wizard: 3
  level_bard: 2
  level_ranger:
  level_paladin:
  school: Enchantment (Compulsion) [Language-Dependent, Mind-Affecting]
  cast_time: 1 standard action
  range: Close (25 ft. + 5 ft./2 levels)
  target: One living creature
  duration: 1 hour/level or until completed
  save: Will negates
  spell_resistance: Yes
  components: V, M
  target_label: Target
  description: |-
    You influence the actions of the target creature by suggesting a course of activity (limited to a sentence or two). The _suggestion_ must be worded in such a manner as to make the activity sound reasonable. Asking the creature to do some obviously harmful act automatically negates the effect of the spell.

    The suggested course of activity can continue for the entire duration. If the suggested activity can be completed in a shorter time, the spell ends when the subject finishes what it was asked to do. You can instead specify conditions that will trigger a special activity during the duration. If the condition is not met before the spell duration expires, the activity is not performed.

    A very reasonable _suggestion_ causes the save to be made with a penalty (such as –1 or –2).

    _Material Component:_ A snake’s tongue and either a bit of honeycomb or a drop of sweet oil.
- id: suggestion_mass
  name: Suggestion, Mass
  level_druid:
  level_cleric:
  level_wizard: 6
  level_bard: 5
  level_ranger:
  level_paladin:
