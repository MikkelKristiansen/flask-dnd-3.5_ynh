  target: Cone-shaped emanation
  duration: Concentration, up to 10 min./level (D)
  save: None
  spell_resistance: No
  components: V, S
  target_label: Area
  description: This spell functions like _detect evil_, except that it detects 
    the auras of good creatures, clerics of good deities, good spells, and good 
    magic items, and you are vulnerable to an overwhelming good aura if you are 
    evil.
- id: detect_law
