  label: Acid Fog
  kind: save
  base_damage: 2d6
  dmg_type: Syre
  alt_note: Ingen redningskast — 2d6 syre til alt i tågen hver runde (på din tur), 1 runde/niveau. Tågen slører syn og halverer bevægelse (som Solid Fog).

# Ice Storm — ingen redningskast; fast 3d6 knusning + 2d6 kulde til alle i
