  kind: ranged
  base_damage: 1d6
  dmg_per_level:
  dmg_per_level_div:
  dmg_per_level_max:
  dmg_bonus: 1
  to_hit: 1
  crit: x2
  dmg_type: Bludgeoning
  range_ft: 20
  charges: 3
  alt_note: 2d6+2 mod udøde

# Flame Blade — 3-fods ildklinge i hånden; nærkamps-touch-angreb (druid 2).
# 1d8 +1 ild pr. 2 casterniveauer (max +10) → druid 5 = 1d8+2. Skalerer nu
# fuldautomatisk via dmg_per_level_div: 2.
- spell_id: flame_blade
  label: Flame Blade (nærkamp)
  kind: melee_touch
  base_damage: 1d8
  dmg_per_level: 1
  dmg_per_level_div: 2
  dmg_per_level_max: 10
  dmg_bonus:
  to_hit:
  crit: x2
  dmg_type: Ild
  range_ft:
  charges:
  alt_note:

# ── Kategori E (område/save) ────────────────────────────────────────────────
# kind: save = intet til-hit; fjenden slår en redningskast mod en DC.
# TERNING-skalering: dice_per_level = antal skade-terninger pr. casterniveau,
# dice_per_level_max = cap på antal terninger. base_damage = terningtypen.
# Rene save-effekter uden skade (Sleep/Web) har tom base_damage.
# Rækkevidde/area/varighed hentes fra spells-tabellen — gentages ikke her.

