# sammen til 5d6 (samme fem d6 — identisk fordeling); splittet står i dmg_type.
- spell_id: ice_storm
  label: Ice Storm
  kind: save
  base_damage: 5d6
  dmg_type: 3d6 knusning + 2d6 kulde
  alt_note: Ingen redningskast — fast 3d6 knusning + 2d6 kulde (rullet samlet som 5d6) til alle i cylinderen. Varer 1 fuld runde; halverer bevægelse og −4 på Listen i området.
