# Cloudkill — tiered efter mål-HD (≤3 dør automatisk, intet save; 4-6 dør
# medmindre Fort-save, så kun 1d4 Con/runde; 6+ tager altid 1d4 Con/runde,
# Fort halverer). Rullbart tal = det fælles 1d4 Con/runde; resten er alt_note.
- spell_id: cloudkill
  label: Cloudkill
  kind: save
  base_damage: 1d4
  dmg_type: Con-skade (giftgas)
  save_type: fortitude
  save_effect: partial
  alt_note: HD≤3 dør automatisk (intet save); HD4-6 dør medmindre Fort-save (så kun 1d4 Con/runde); HD6+ tager altid 1d4 Con/runde, Fort halverer. Gentages hver runde i skyen (1 min./niveau, bevæger sig 10 ft/runde).

# Shatter — primært utility (smadrer skrøbelige genstande/ét solidt objekt,
