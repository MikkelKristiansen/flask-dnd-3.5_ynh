# spell_attacks — angreb der udledes når en spell står på "I brug".
# Skade udregnes i koden:
#   base_damage + min(floor(niveau*dmg_per_level/dmg_per_level_div), dmg_per_level_max) + dmg_bonus
# dmg_per_level_div tom = 1 (skalér pr. niveau); 2 = +X pr. 2 niveauer osv.
# charges (tom = ubegrænset varighed) giver en nedtælling pr. ramt på arket.
# mode_group (tom = intet): rækker med SAMME spell_id og SAMME mode_group er
#   gensidigt udelukkende tilstande af ét angreb (fx nærkamp-touch ELLER kastet).
#   Arket viser kun den valgte + en ⇄-knap til at skifte — ikke to samtidige rækker.

# Produce Flame — flamme i hånden; nærkamps-touch ELLER kastet ranged-touch.
# Ét angreb med to tilstande (mode_group: touch) — kan skiftes fra runde til runde.
# 1d6 +1/casterniveau, cappet ved +5 (druid 2 → 1d6+2).
- spell_id: produce_flame
  label: Produce Flame (nærkamp)
  kind: melee_touch
  mode_group: touch
  base_damage: 1d6
  dmg_per_level: 1
  dmg_per_level_div:
  dmg_per_level_max: 5
  dmg_bonus:
  to_hit:
  crit: x2
  dmg_type: Ild
  range_ft:
  charges:
  alt_note:
- spell_id: produce_flame
  label: Produce Flame (kastet)
  kind: ranged_touch
  mode_group: touch
  base_damage: 1d6
  dmg_per_level: 1
  dmg_per_level_div:
  dmg_per_level_max: 5
  dmg_bonus:
  to_hit:
  crit: x2
  dmg_type: Ild
  range_ft: 120
  charges:
  alt_note:

# Magic Stone — op til 3 sten, +1 til-hit og skade, kastet (rækkeforøgelse 20 ft).
# Hver sten aflades når den rammer → 3 ladninger. 2d6+2 mod udøde.
- spell_id: magic_stone
  label: Magic Stone (kastet)
  kind: ranged
  base_damage: 1d6
  dmg_per_level:
  dmg_per_level_div:
  dmg_per_level_max:
  dmg_bonus: 1
  to_hit: 1
  crit: x2
  dmg_type: Bludgeoning
  range_ft: 20
  charges: 3
  alt_note: 2d6+2 mod udøde

# Flame Blade — 3-fods ildklinge i hånden; nærkamps-touch-angreb (druid 2).
# 1d8 +1 ild pr. 2 casterniveauer (max +10) → druid 5 = 1d8+2. Skalerer nu
# fuldautomatisk via dmg_per_level_div: 2.
- spell_id: flame_blade
  label: Flame Blade (nærkamp)
  kind: melee_touch
  base_damage: 1d8
  dmg_per_level: 1
  dmg_per_level_div: 2
  dmg_per_level_max: 10
  dmg_bonus:
  to_hit:
  crit: x2
  dmg_type: Ild
  range_ft:
  charges:
  alt_note:

# ── Kategori E (område/save) ────────────────────────────────────────────────
# kind: save = intet til-hit; fjenden slår en redningskast mod en DC.
# TERNING-skalering: dice_per_level = antal skade-terninger pr. casterniveau,
# dice_per_level_max = cap på antal terninger. base_damage = terningtypen.
# Rene save-effekter uden skade (Sleep/Web) har tom base_damage.
# Rækkevidde/area/varighed hentes fra spells-tabellen — gentages ikke her.

# Fireball — 1d6 ild pr. casterniveau, cap 10d6 (wizard 5 → 5d6). Refleks halv.
- spell_id: fireball
  label: Fireball
  kind: save
  base_damage: 1d6
  dice_per_level: 1
  dice_per_level_max: 10
  dmg_type: Ild
  save_type: reflex
  save_effect: half

# Lightning Bolt — 1d6 elektricitet pr. niveau, cap 10d6. Refleks halv.
- spell_id: lightning_bolt
  label: Lightning Bolt
  kind: save
  base_damage: 1d6
  dice_per_level: 1
  dice_per_level_max: 10
  dmg_type: Elektricitet
  save_type: reflex
  save_effect: half

# Cone of Cold — 1d6 kulde pr. niveau, cap 15d6. Refleks halv.
- spell_id: cone_of_cold
  label: Cone of Cold
  kind: save
  base_damage: 1d6
  dice_per_level: 1
  dice_per_level_max: 15
  dmg_type: Kulde
  save_type: reflex
  save_effect: half

# Sleep — ingen skade; Vilje negerer (rammer 4 HD væsner). Ren save-effekt.
- spell_id: sleep
  label: Sleep
  kind: save
  base_damage:
  save_type: will
  save_effect: negates

# Web — ingen skade; Refleks negerer (fastholder i klæbrigt spind).
- spell_id: web
  label: Web
  kind: save
  base_damage:
  save_type: reflex
  save_effect: negates
