# domains — SRD v3.5 data (OGL v1.0a). Genereret fra importer.py, herefter kilden til sandheden.
- id: healing
  name: Healing
  granted_power: You cast healing spells (any spell with “cure” in its name) at +1 caster level.
- id: protection
  name: Protection
  granted_power: You can generate a protective ward as a supernatural ability. Grant someone you touch a resistance bonus on his or her next saving throw equal to your cleric level. Activating this power is a standard action. The protective ward is an abjuration effect with a duration of 1 hour that is usable once per day.
- id: war
  name: War
  granted_power: Free Martial Weapon Proficiency with your deity's favored weapon (if necessary) and Weapon Focus with that weapon.
- id: knowledge
  name: Knowledge
  granted_power: Add all Knowledge skills to your list of cleric class skills. You cast divination spells at +1 caster level.
- id: good
  name: Good
  granted_power: You cast good spells at +1 caster level.
- id: luck
  name: Luck
  granted_power: You gain the power of good fortune, usable once per day. It lets you reroll one roll you have just made, before the DM declares success or failure. You must take the result of the reroll, even if it is worse.

- id: air
  name: Air
  granted_power: "Turn or destroy earth creatures as a good cleric turns undead. Rebuke, command, or bolster air creatures as an evil cleric rebukes undead. Use these abilities a total number of times per day equal to 3 + your Charisma modifier. This granted power is a supernatural ability."
- id: animal
  name: Animal
  granted_power: "You can use speak with animals once per day as a spell-like ability. Add Knowledge (nature) to your list of cleric class skills."
- id: chaos
  name: Chaos
  granted_power: "You cast chaos spells at +1 caster level."
- id: death
  name: Death
  granted_power: "You may use a death touch once per day. Your death touch is a supernatural ability that produces a death effect. You must succeed on a melee touch attack against a living creature (using the rules for touch spells). When you touch, roll 1d6 per cleric level you possess. If the total at least equals the creature’s current hit points, it dies (no save)."
- id: destruction
  name: Destruction
  granted_power: "You gain the smite power, the supernatural ability to make a single melee attack with a +4 bonus on attack rolls and a bonus on damage rolls equal to your cleric level (if you hit). You must declare the smite before making the attack. This ability is usable once per day."
- id: earth
  name: Earth
  granted_power: "Turn or destroy air creatures as a good cleric turns undead. Rebuke, command, or bolster earth creatures as an evil cleric rebukes undead. Use these abilities a total number of times per day equal to 3 + your Charisma modifier. This granted power is a supernatural ability."
- id: evil
  name: Evil
  granted_power: "You cast evil spells at +1 caster level."
- id: fire
  name: Fire
  granted_power: "Turn or destroy water creatures as a good cleric turns undead. Rebuke, command, or bolster fire creatures as an evil cleric rebukes undead. Use these abilities a total number of times per day equal to 3 + your Charisma modifier. This granted power is a supernatural ability."
- id: law
  name: Law
  granted_power: "You cast law spells at +1 caster level."
- id: magic
  name: Magic
  granted_power: "Use scrolls, wands, and other devices with spell completion or spell trigger activation as a wizard of one-half your cleric level (at least 1st level). For the purpose of using a scroll or other magic device, if you are also a wizard, actual wizard levels and these effective wizard levels stack."
- id: plant
  name: Plant
  granted_power: "Rebuke or command plant creatures as an evil cleric rebukes or commands undead. Use this ability a total number of times per day equal to 3 + your Charisma modifier. This granted power is a supernatural ability. Add Knowledge (nature) to your list of cleric class skills."
- id: strength
  name: Strength
  granted_power: "You can perform a feat of strength as a supernatural ability. You gain an enhancement bonus to Strength equal to your cleric level. Activating the power is a free action, the power lasts 1 round, and it is usable once per day."
- id: sun
  name: Sun
  granted_power: "Once per day, you can perform a greater turning against undead in place of a regular turning. The greater turning is like a normal turning except that the undead creatures that would be turned are destroyed instead."
- id: travel
  name: Travel
  granted_power: "For a total time per day of 1 round per cleric level you possess, you can act normally regardless of magical effects that impede movement as if you were affected by the spell freedom of movement. This effect occurs automatically as soon as it applies, lasts until it runs out or is no longer needed, and can operate multiple times per day (up to the total daily limit of rounds). This granted power is a supernatural ability. Add Survival to your list of cleric class skills."
- id: trickery
  name: Trickery
  granted_power: "Add Bluff, Disguise, and Hide to your list of cleric class skills."
- id: water
  name: Water
  granted_power: "Turn or destroy fire creatures as a good cleric turns undead. Rebuke, command, or bolster water creatures as an evil cleric rebukes undead. Use these abilities a total number of times per day equal to 3 + your Charisma modifier. This granted power is a supernatural ability."
