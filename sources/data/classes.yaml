# classes — SRD v3.5 data (OGL v1.0a). Kilden til sandheden for klasse-data.
# Indlæses direkte af refdata.py (IKKE via importer.py/SQLite), fordi dataene er
# dokument-formede (skill-lister, sprog-grupper) og kun bruges ved karakter-
# oprettelse/level-up. Tilføj en klasse = tilføj én blok her, ingen Python-ændring.
#
# Felter:
#   hit_die        — terning til HP pr. level (default 8 hvis udeladt)
#   skill_points   — skill points pr. level før INT/race (default 2 hvis udeladt)
#   class_skills   — klassefærdigheder (koster 1 point/rank, cap = level+3)
#   languages      — {automatic: [...], bonus: [...]}; udeladt = ingen klassesprog
#   bonus_feats    — feats klassen giver gratis ved level 1 (tæller ikke mod valgte)
#   weapon_proficiency — {categories: [simple|martial|exotic], weapons: [id, …]}
#                        Hvad klassen må bruge uden −4 angrebs-straf. Tom kategori-
#                        liste + våben-liste = kun de nævnte våben (druid/monk/rogue).
#   armor_proficiency  — {types: [light|medium|heavy], shields: bool, tower_shield: bool}
#                        Uvant rustning → tjekstraffen (ACP) rammer også angreb +
#                        Str/Dex-skills. tower_shield er adskilt ("except tower shields").
#   needs_domains  — true hvis klassen vælger domæner ved oprettelse (cleric)
#   turn_undead    — true hvis klassen kan turn/rebuke undead (cleric)
#   wild_shape_from_level — laveste level hvor wild shape fås (druid: 5)
#   spontaneous_summon — true hvis klassen spontant kan ofre et forberedt spell
#                        til Summon Nature's Ally af samme niveau (druid)
#
# NB: Kun de klasser generatoren er bevist mod (cleric/druid/ranger/rogue) har fuld
# data (class_skills m.m.). De øvrige har indtil videre kun hit_die + skill_points;
# manglende felter er bevidste huller, ikke fejl.

barbarian:
  hit_die: 12
  skill_points: 4
  starting_gold: "4d4*10"
  age_group: fast        # SRD startalders-gruppe (fast/medium/slow)
  speed_bonus: 10        # Fast Movement: +10 ft (barbar er ikke prof. i heavy armor)
  weapon_proficiency:
    categories: [simple, martial]
    weapons: []
  armor_proficiency:
    types: [light, medium]   # ikke heavy
    shields: true
    tower_shield: false
  class_skills:
    - climb
    - craft
    - handle_animal
    - intimidate
    - jump
    - listen
    - ride
    - survival
    - swim

fighter:
  hit_die: 10
  skill_points: 2
  starting_gold: "6d4*10"
  age_group: medium        # SRD startalders-gruppe (fast/medium/slow)
  # bonus_feat_choices: antal ekstra feats spilleren vælger fra fighter-bonus-puljen
  # (feats med type=Fighter i feats.yaml), oveni de race-baserede valgte feats.
  bonus_feat_choices: 1
  weapon_proficiency:
    categories: [simple, martial]
    weapons: []
  armor_proficiency:
    types: [light, medium, heavy]
    shields: true
    tower_shield: true       # fighter er prof. MED tower shields
  class_skills:
    - climb
    - craft
    - handle_animal
    - intimidate
    - jump
    - ride
    - swim

paladin:
  hit_die: 10
  skill_points: 2
  starting_gold: "6d4*10"
  age_group: medium        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: wis        # Paladinen bruger Wisdom til bonus spell slots
  weapon_proficiency:
    categories: [simple, martial]
    weapons: []
  armor_proficiency:
    types: [light, medium, heavy]
    shields: true
    tower_shield: false
  class_skills:
    - concentration
    - craft
    - diplomacy
    - handle_animal
    - heal
    - knowledge_nobility
    - knowledge_religion
    - profession
    - ride
    - sense_motive

monk:
  hit_die: 8
  skill_points: 4
  starting_gold: "5d4"
  age_group: slow        # SRD startalders-gruppe (fast/medium/slow)
  # Level-1 bonus-feat fra en fast 2-feat-pulje; monken får den UDEN at opfylde
  # prerequisites (SRD). Adskiller sig fra fighter, hvis pulje er fighter_bonus-flaget.
  bonus_feat_choices: 1
  bonus_feat_pool: [improved_grapple, stunning_fist]
  bonus_feat_ignore_prereqs: true
  ac_ability: wis        # AC Bonus (Ex): + Wis-mod til AC når unarmored
  weapon_proficiency:
    categories: []
    weapons: [club, crossbow_light, crossbow_heavy, dagger, handaxe, javelin,
              kama, nunchaku, quarterstaff, sai, shuriken_5, siangham, sling]
  armor_proficiency:
    types: []              # monken er ikke prof. i nogen rustning
    shields: false
    tower_shield: false
  unarmed_damage:          # Unarmed Strike / Flurry skade pr. level-tærskel (SRD)
    medium: {1: 1d6, 4: 1d8, 8: 1d10, 12: 2d6, 16: 2d8, 20: 2d10}
    small:  {1: 1d4, 4: 1d6, 8: 1d8, 12: 1d10, 16: 2d6, 20: 2d8}
  class_skills:
    - balance
    - climb
    - concentration
    - craft
    - diplomacy
    - escape_artist
    - hide
    - jump
    - knowledge_arcana
    - knowledge_religion
    - listen
    - move_silently
    - perform
    - profession
    - sense_motive
    - spot
    - swim
    - tumble

