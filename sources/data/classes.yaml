    - disable_device
    - disguise
    - escape_artist
    - forgery
    - gather_information
    - hide
    - intimidate
    - jump
    - knowledge_local
    - listen
    - move_silently
    - open_lock
    - perform
    - profession
    - search
    - sense_motive
    - sleight_of_hand
    - spot
    - swim
    - tumble
    - use_magic_device
    - use_rope
