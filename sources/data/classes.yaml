# classes — SRD v3.5 data (OGL v1.0a). Kilden til sandheden for klasse-data.
# Indlæses direkte af refdata.py (IKKE via importer.py/SQLite), fordi dataene er
# dokument-formede (skill-lister, sprog-grupper) og kun bruges ved karakter-
# oprettelse/level-up. Tilføj en klasse = tilføj én blok her, ingen Python-ændring.
#
# Felter:
#   hit_die        — terning til HP pr. level (default 8 hvis udeladt)
#   skill_points   — skill points pr. level før INT/race (default 2 hvis udeladt)
#   class_skills   — klassefærdigheder (koster 1 point/rank, cap = level+3)
#   languages      — {automatic: [...], bonus: [...]}; udeladt = ingen klassesprog
#   bonus_feats    — feats klassen giver gratis ved level 1 (tæller ikke mod valgte)
#   needs_domains  — true hvis klassen vælger domæner ved oprettelse (cleric)
#   turn_undead    — true hvis klassen kan turn/rebuke undead (cleric)
#   wild_shape_from_level — laveste level hvor wild shape fås (druid: 5)
#
# NB: Kun de klasser generatoren er bevist mod (cleric/druid/ranger/rogue) har fuld
# data (class_skills m.m.). De øvrige har indtil videre kun hit_die + skill_points;
# manglende felter er bevidste huller, ikke fejl.

barbarian:
  hit_die: 12
  skill_points: 4
  starting_gold: "4d4*10"
  age_group: fast        # SRD startalders-gruppe (fast/medium/slow)
  speed_bonus: 10        # Fast Movement: +10 ft (barbar er ikke prof. i heavy armor)
  class_skills:
    - climb
    - craft
    - handle_animal
    - intimidate
    - jump
    - listen
    - ride
    - survival
    - swim

fighter:
  hit_die: 10
  skill_points: 2
  starting_gold: "6d4*10"
  age_group: medium        # SRD startalders-gruppe (fast/medium/slow)
  # bonus_feat_choices: antal ekstra feats spilleren vælger fra fighter-bonus-puljen
  # (feats med type=Fighter i feats.yaml), oveni de race-baserede valgte feats.
  bonus_feat_choices: 1
  class_skills:
    - climb
    - craft
    - handle_animal
    - intimidate
    - jump
    - ride
    - swim

