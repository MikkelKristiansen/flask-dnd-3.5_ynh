  hit_die: 6
  skill_points: 6
  starting_gold: "4d4*10"
  age_group: medium        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: cha        # Barden bruger Charisma til bonus spell slots
  weapon_proficiency:
    categories: [simple]
    weapons: [longsword, rapier, sap, sword_short, shortbow, whip]
  armor_proficiency:
    types: [light]
    shields: true
    tower_shield: false
  class_skills:
    - appraise
    - balance
    - bluff
    - climb
    - concentration
    - craft
    - decipher_script
    - diplomacy
    - disguise
    - escape_artist
    - gather_information
    - hide
    - jump
    - knowledge_arcana
    - knowledge_dungeoneering
    - knowledge_geography
    - knowledge_history
    - knowledge_local
    - knowledge_nature
    - knowledge_nobility
    - knowledge_planes
    - knowledge_religion
    - listen
    - move_silently
    - perform
    - profession
    - sense_motive
    - sleight_of_hand
    - speak_language
    - spellcraft
    - swim
    - tumble
    - use_magic_device

sorcerer:
  hit_die: 4
  skill_points: 2
  starting_gold: "3d4*10"
  age_group: fast        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: cha      # Sorcereren bruger Charisma til bonus spell slots
  cast_type: spontaneous # Spontan caster: kender en fast liste, caster fra slot-pulje
  weapon_proficiency:
    categories: [simple]
    weapons: []
  armor_proficiency:
    types: []
    shields: false
    tower_shield: false
  class_skills:
    - bluff
    - concentration
    - craft
    - knowledge_arcana
    - profession
    - spellcraft

wizard:
  hit_die: 4
  skill_points: 2
  starting_gold: "3d4*10"
  age_group: slow        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: int      # Wizarden bruger Intelligence til bonus spell slots
  cast_type: spellbook   # Forbereder dagligt FRA spellbogen (spells_known)
  weapon_proficiency:
    categories: []
    weapons: [club, dagger, crossbow_heavy, crossbow_light, quarterstaff]
  armor_proficiency:
    types: []
    shields: false
    tower_shield: false
  class_skills:
    - concentration
    - craft
    - decipher_script
    - knowledge_arcana
    - knowledge_dungeoneering
    - knowledge_geography
    - knowledge_history
    - knowledge_local
    - knowledge_nature
    - knowledge_nobility
    - knowledge_planes
    - knowledge_religion
    - profession
    - spellcraft
  languages:
    automatic: []
    bonus: [Draconic]

cleric:
  hit_die: 8
  skill_points: 2
  starting_gold: "5d4*10"
  age_group: slow        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: wis          # Cleriken bruger Wisdom til bonus spell slots
  needs_domains: true        # vælger 2 domæner ved oprettelse
  turn_undead: true          # kan turn/rebuke undead
  weapon_proficiency:
    categories: [simple]
    weapons: []              # + favored weapon via domæne (opfølgning, ikke v1)
  armor_proficiency:
    types: [light, medium, heavy]
    shields: true
    tower_shield: false
  class_skills:
    - concentration
    - craft
    - diplomacy
    - heal
    - knowledge_arcana
    - knowledge_history
    - knowledge_planes
    - knowledge_religion
    - profession
    - spellcraft
  languages:
    automatic: []
    bonus: [Abyssal, Celestial, Infernal]

druid:
  hit_die: 8
  skill_points: 4
  starting_gold: "2d4*10"
  age_group: slow        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: wis          # Druiden bruger Wisdom til bonus spell slots
  # Wild Shape (Su) — fuld progression som data (Table: The Druid). uses/sizes/
  # types er {laveste-niveau: værdi}; motoren tager den højeste tærskel ≤ niveau
  # (sizes/types akkumuleres). Varighed = 1 t/niveau; formens HD ≤ druideniveau.
  wild_shape:
    from_level: 5
    animal_uses:    {5: 1, 6: 2, 7: 3, 10: 4, 14: 5, 18: 6}
    elemental_from_level: 16
    elemental_uses: {16: 1, 18: 2, 20: 3}
    sizes: {5: [small, medium], 8: [large], 11: [tiny], 15: [huge]}
    types: {5: [animal], 12: [plant], 16: [elemental]}
  spontaneous_summon: true   # kan ofre et forberedt spell til SNA af samme niveau
  weapon_proficiency:
    categories: []
    weapons: [club, dagger, dart, quarterstaff, scimitar, sickle,
              shortspear, sling, spear]
  armor_proficiency:
    types: [light, medium]   # ikke heavy; metal-rustning forbudt separat (druid_ok)
    shields: true
    tower_shield: false
  class_skills:
    - concentration
    - craft
    - diplomacy
    - handle_animal
    - heal
    - knowledge_nature
    - knowledge_geography
    - listen
    - profession
    - profession_herbalist
    - ride
    - spellcraft
    - spot
    - survival
    - swim
  languages:
    automatic: [Druidic]
    bonus: [Sylvan]

ranger:
  hit_die: 8
  skill_points: 6
  starting_gold: "6d4*10"
  age_group: medium        # SRD startalders-gruppe (fast/medium/slow)
  cast_ability: wis        # Rangeren bruger Wisdom til bonus spell slots
  class_skills:
    - climb
    - concentration
    - craft
    - handle_animal
    - heal
    - hide
    - jump
    - knowledge_dungeoneering
    - knowledge_geography
    - knowledge_nature
    - listen
    - move_silently
    - profession
    - ride
    - search
    - spot
    - survival
    - swim
    - use_rope
  weapon_proficiency:
    categories: [simple, martial]
    weapons: []
  armor_proficiency:
    types: [light]           # kun let rustning
    shields: true
    tower_shield: false
  bonus_feats: [track]
  # Combat style (vælges ved niveau 2). Two-weapon ⇒ behandles som Two-Weapon
  # Fighting (uden Dex-krav) i let/ingen rustning; opgraderes ved 6/11. Motoren
  # læser valget fra class_features["Combat Style"] (se twf_context i rules.py).
  combat_style:
    choose_at_level: 2
    options:
      two-weapon:
        label: Two-Weapon Combat
        feats: {2: two_weapon_fighting, 6: improved_two_weapon_fighting, 11: greater_two_weapon_fighting}
        requires: light_or_no_armor
      archery:
        label: Archery
        feats: {2: rapid_shot, 6: manyshot, 11: improved_precise_shot}
        requires: light_or_no_armor

rogue:
  hit_die: 6
  skill_points: 8
  starting_gold: "5d4*10"
  age_group: fast        # SRD startalders-gruppe (fast/medium/slow)
  weapon_proficiency:
    categories: [simple]
    weapons: [crossbow_hand, rapier, sap, shortbow, sword_short]
  armor_proficiency:
    types: [light]
    shields: false           # rogue er IKKE prof. med skjolde
    tower_shield: false
  class_skills:
    - appraise
    - balance
    - bluff
    - climb
    - craft
    - decipher_script
    - diplomacy
    - disable_device
    - disguise
    - escape_artist
    - forgery
    - gather_information
    - hide
    - intimidate
    - jump
    - knowledge_local
    - listen
    - move_silently
    - open_lock
    - perform
    - profession
    - search
    - sense_motive
    - sleight_of_hand
    - spot
    - swim
    - tumble
    - use_magic_device
    - use_rope
