# weapons — SRD v3.5 (OGL v1.0a), parset fra equipment.md. Kilden til sandheden.
# cost_cp = pris i kobber (1 gp = 100 cp; null = — / variabel). weight = pund.
# metal: 0 = ikke-metal våben (træ/læder) der hverken kan laves af cold iron eller
#   forsølves (alkymisk sølv). Udeladt = metal (default) — de fleste våben. Styrer
#   hvilke materiale-modifikatorer udrustningsbutikken tilbyder (se rules.material_modifiers).
- id: gauntlet
  name: Gauntlet
  category: simple
  weapon_class: unarmed
  cost_cp: 200
  dmg_s: 1d2
  dmg_m: 1d3
  critical: x2
  range_ft:
  weight: 1.0
  damage_type: Bludgeoning
  description: This metal glove lets you deal lethal damage rather than nonlethal damage with unarmed strikes. A strike with a gauntlet is otherwise considered an unarmed attack. The cost and weight given are for a single gauntlet. Medium and heavy armors (except breastplate) come with gauntlets.
- id: unarmed_strike
  name: Unarmed strike
  category: simple
  weapon_class: unarmed
  cost_cp:
  dmg_s: 1d2
  dmg_m: 1d3
  critical: x2
  range_ft:
  weight: 0.0
  damage_type: Bludgeoning
  description: "A Medium character deals 1d3 points of nonlethal damage with an unarmed strike. A Small character deals 1d2 points of nonlethal damage. A monk or any character with the Improved Unarmed Strike feat can deal lethal or nonlethal damage with unarmed strikes, at her option. The damage from an unarmed strike is considered weapon damage for the purposes of effects that give you a bonus on weapon damage rolls.\n\nAn unarmed strike is always considered a light weapon. Therefore, you can use the Weapon Finesse feat to apply your Dexterity modifier instead of your Strength modifier to attack rolls with an unarmed strike."
