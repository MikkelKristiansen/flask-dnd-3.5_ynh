- id: longbow
  name: Longbow
  category: martial
  weapon_class: ranged
  cost_cp: 7500
  dmg_s: 1d6
  dmg_m: 1d8
  critical: x3
  range_ft: 100
  weight: 3.0
  damage_type: Piercing
  hands: 2
  description: You need at least two hands to use a bow, regardless of its size. A longbow is too unwieldy to use while you are mounted. If you have a penalty for low Strength, apply it to damage rolls when you use a longbow. If you have a bonus for high Strength, you can apply it to damage rolls when you use a composite longbow (see below) but not a regular longbow.
- id: longbow_composite
  name: Longbow, composite
  category: martial
  weapon_class: ranged
  cost_cp: 10000
  dmg_s: 1d6
  dmg_m: 1d8
  critical: x3
  range_ft: 110
  weight: 3.0
  damage_type: Piercing
  hands: 2
  description: "You need at least two hands to use a bow, regardless of its size. You can use a composite longbow while mounted. All composite bows are made with a particular strength rating (that is, each requires a minimum Strength modifier to use with proficiency). If your Strength bonus is less than the strength rating of the composite bow, you can’t effectively use it, so you take a –2 penalty on attacks with it. The default composite longbow requires a Strength modifier of +0 or higher to use with proficiency. A composite longbow can be made with a high strength rating to take advantage of an above-average Strength score; this feature allows you to add your Strength bonus to damage, up to the maximum bonus indicated for the bow. Each point of Strength bonus granted by the bow adds 100 gp to its cost.\n\nFor purposes of weapon proficiency and similar feats, a composite longbow is treated as if it were a longbow."
