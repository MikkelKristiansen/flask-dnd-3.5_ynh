# special_abilities — forklarings-katalog for væsners natural abilities (OGL v1.0a).
#
# Bruges af wild_shape.py: når en druide antager en form, slås formens
# special_attacks/special_qualities-fritekst op her, så hver evne kan vises med
# sin art (Ex/Su/Sp) og en forklaring.
#
# id        = slug. SKAL matche det normaliserede ledende navn i animals' fritekst:
#             lowercase, ikke-bogstaver/tal og parenteser strippes, mellemrum/bindestreg
#             → '_'. Fx "Improved grab" → improved_grab, "Low-light vision" → low_light_vision,
#             "Pounce, rake 1d6+2" → tokens 'pounce' + 'rake'.
# kind      = ex | su | sp. AFGØR overførsel ved wild shape:
#             animal-form  → kun Ex special ATTACKS kobles på (polymorph-RAW).
#             elemental-form (druide L16+) → alt (Ex+Su+Sp) + formens feats.
# category  = attack | quality (informativt; animals-feltet afgør reelt attack vs quality).
# buff_id   = valgfri FK til effects.id — en aktiverbar stat-buff (fx rage giver
#             +4 Str/+4 Con/−2 AC via det almindelige buff-system).
# description = generisk SRD/OGL-forklaring (form-specifikke tal står i selve labelen).
#
# SRD-tekst er Open Game Content fra System Reference Document v3.5 under OGL v1.0a.
#
# NB: Dette er kerne-kataloget. Resterende evner (elemental masteries, sjældnere
# special attacks, flere senses/immuniteter) udfyldes batch-vis.

# ── Special attacks (Ex — kobles på ved wild shape) ──────────────────────────
- id: rage
  name: Rage
  kind: ex
  category: attack
  buff_id: animal_rage
  description: >-
    En skabning med rage flyver i bersærkergang når den tager skade i kamp, og
    angriber vildt indtil enten den eller dens modstander er død. Den får +4
    Styrke, +4 Constitution og −2 til Armor Class. Skabningen kan ikke selv
    afslutte sin rage.

- id: trip
  name: Trip
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Rammer skabningen med det angreb evnen er knyttet til (typisk bid), kan den
    forsøge at vælte (trip) modstanderen som en fri handling uden at lave et
    touch-angreb og uden at provokere attack of opportunity. Mislykkes forsøget,
    kan modstanderen ikke modtrippe.

- id: pounce
  name: Pounce
  kind: ex
  category: attack
  rider_type: on_charge
  description: >-
    Når skabningen laver en charge, må den udføre et fuldt angreb (full attack)
    i samme runde — inkl. rake-angreb hvis den også har rake.

- id: improved_grab
  name: Improved Grab
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Rammer skabningen med det angreb evnen er knyttet til, kan den starte en
    grapple som en fri handling uden at provokere attack of opportunity. Vinder
    den grapple-checket, etablerer den et hold og kan bruge fx constrict eller
    swallow whole. Uden at risikere egen AC kan den vælge at tage −20 på grapple
    for at holde fast med kun én lem.

- id: constrict
  name: Constrict
  kind: ex
  category: attack
  rider_type: on_grapple
  description: >-
    Skabningen påfører automatisk skade (svarende til det anførte angreb) hver
    gang den vinder et grapple-check mod en fastholdt modstander.

- id: rake
  name: Rake
  kind: ex
  category: attack
  rider_type: extra_attacks
  rider_count: 2
  description: >-
    En skabning med rake får ekstra naturlige angreb (typisk med bagbenene) mod
    en modstander den har fat i. Den skal begynde sin tur med at gribe for at
    rake — den kan ikke både starte en grapple og rake i samme tur. Pounce
    tillader dog rake som del af et charge-fuldangreb.

- id: poison
  name: Poison
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Et angreb fra skabningen leverer gift. Offeret skal bestå et Fortitude-save
    (DC er Constitution-baseret) eller tage giftens initiale skade; efter en kort
    periode kræves endnu et save mod den sekundære skade.

- id: rend
  name: Rend
  kind: ex
  category: attack
  rider_type: two_hit
  description: >-
    Rammer skabningen samme mål med to anførte angreb (typisk begge kløer),
    river den i kødet og påfører automatisk ekstra skade.

- id: trample
  name: Trample
  kind: ex
  category: attack
  rider_type: trample
  description: >-
    Som en full-round-handling kan skabningen bevæge sig op til dobbelt fart og
    løbe hen over modstandere mindst én størrelseskategori mindre end den selv,
    og påføre trampeskade. Et offer kan vælge et Reflex-save for halv skade i
    stedet for et attack of opportunity (DC er Styrke-baseret).

- id: powerful_charge
  name: Powerful Charge
  kind: ex
  category: attack
  rider_type: on_charge
  description: >-
    Når skabningen charger og rammer, påfører dens angreb ekstra skade ud over
    den normale charge.

- id: ferocity
  name: Ferocity
  kind: ex
  category: attack
  description: >-
    Skabningen er så vild at den forbliver ved bevidsthed og kan kæmpe videre,
    selv når den er disabled (0 hp) eller dying (negativ hp).

- id: disease
  name: Disease
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Et angreb fra skabningen kan overføre en sygdom. Offeret skal bestå et
    Fortitude-save (DC er Constitution-baseret) eller blive smittet; sygdommen
    gør skade efter sin inkubationsperiode.

- id: blood_drain
  name: Blood Drain
  kind: ex
  category: attack
  rider_type: on_grapple
  description: >-
    Skabningen suger blod fra en fastholdt modstander og påfører Constitution-
    skade hver runde den opretholder sit hold.

- id: swallow_whole
  name: Swallow Whole
  kind: ex
  category: attack
  rider_type: on_grapple
  description: >-
    Begynder skabningen sin tur med et grabbet, mindre offer, kan den sluge det
    med et vellykket grapple-check. Slugte ofre tager bid-/syre-/ildskade hver
    runde og kan skære sig ud med et let stikkende/skærende våben.

- id: attach
  name: Attach
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Skabningen hægter sig fast på et offer ved at ramme med et angreb; derefter
    sidder den fast (AC falder) og kan automatisk gøre skade eller dræne blod
    hver runde indtil den rystes af.

# ── Su/Sp special attacks (fås IKKE ved animal-wild shape; KUN ved elemental) ──
- id: spell_like_abilities
  name: Spell-Like Abilities
  kind: sp
  category: attack
  description: >-
    Skabningen kan frembringe bestemte spell-effekter efter behag eller et antal
    gange om dagen, som spell-like abilities (Sp). En wild-shapet druide får dem
    IKKE i en almindelig (animal-)form — kun en elemental-form arver Su/Sp-evner.

# ── Special qualities / senses (Ex quality — fås IKKE ved animal-wild shape) ──
# (Vises gråt som reference. Overføres kun til en elemental-form, L16+.)
- id: scent
  name: Scent
  kind: ex
  category: quality
  description: >-
    Lader skabningen opdage fjender på lugten inden for 30 fod (mere i medvind,
    mindre i modvind), lokalisere en kilde inden for 5 fod, og spore via lugt
    (Survival/Wisdom). Stærk lugt og frisk spor øger rækkevidden.

- id: low_light_vision
  name: Low-Light Vision
  kind: ex
  category: quality
  description: >-
    Skabningen ser dobbelt så langt som et menneske i stjernelys, måneskin,
    fakkellys og lignende svag belysning, og bevarer evnen til at skelne farver
    og detaljer under sådanne forhold.

- id: darkvision
  name: Darkvision
  kind: ex
  category: quality
  description: >-
    Skabningen kan se uden nogen lyskilde ud til en angivet rækkevidde. Darkvision
    er sort-hvid, men ellers som normalt syn; skabningen kan fungere fint uden lys.

# ── Elemental-/outsider-/fey-special attacks (Su/Sp arves KUN af en elemental-form) ──
- id: air_mastery
  name: Air Mastery
  kind: ex
  category: attack
  description: >-
    Luftborne skabninger (flyvende eller svævende) tager −1 på angrebsruller og
    skaderullen mod et luftelement. Evnen er passiv og gælder automatisk så snart
    en modstander er i luften — elementalet behøver ikke foretage sig noget aktivt.

- id: whirlwind
  name: Whirlwind
  kind: su
  category: attack
  description: >-
    Elementalet kan forvandle sig til en hvirvelvind én gang pr. 10 minutter og
    opretholde formen op til én runde pr. 2 HD. I hvirvelvindsform kan det trække
    små nok fjender ind i hvirvelvindens krop; ofre kan flygte med et vellykket
    Reflex-save. Elementalet bevæger sig med sin fly-hastighed i denne form.

- id: burn
  name: Burn
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Ildelementalets krop er i konstant brand, og dets slagangrebs kontakt udsætter
    offeret for ild. Den ramte skabning skal bestå et Reflex-save eller bryde i
    brand; branden varer 1d4 runder. En brændende skabning kan bruge en move-action
    på at slukke ilden.

- id: earth_mastery
  name: Earth Mastery
  kind: ex
  category: attack
  description: >-
    Jordelementalet får +1 på angrebsruller og skade når både det og modstanderen
    rører jordbunden. Er modstanderen eller elementalet i luften eller under vand,
    tager elementalet −4 på angrebsruller og skade. Disse modifikatorer er ikke
    inkluderet i statblokken.

- id: push
  name: Push
  kind: ex
  category: attack
  description: >-
    Jordelementalet kan starte en bull rush-manøvre uden at provokere attack of
    opportunity. Earth Mastery-modifikatorerne gælder ligeledes for de modsatte
    Styrke-checks i bull rush-opgøret, hvilket giver elementalet en betydelig
    fordel på hjemmebane.

- id: water_mastery
  name: Water Mastery
  kind: ex
  category: attack
  description: >-
    Vandelementalet får +1 på angrebsruller og skade når både det og modstanderen
    rører vand. Rører modstanderen eller elementalet jordbunden, tager elementalet
    −4 på angrebsruller og skade. Disse modifikatorer er ikke inkluderet i
    statblokken.

- id: drench
  name: Drench
  kind: ex
  category: attack
  description: >-
    Vandelementalets berøring slukker fakler, bål, eksponerede lanterner og andre
    åbne ikke-magiske flammer af Stor størrelse eller mindre. Magiske ildeffekter
    det rører kan neutraliseres svarende til dispel magic med kasterniveau lig
    elementalets HD.

- id: vortex
  name: Vortex
  kind: su
  category: attack
  description: >-
    Under vand kan elementalet forvandle sig til en hvirvelstrøm én gang pr.
    10 minutter og opretholde formen op til én runde pr. 2 HD. I vortex-form
    bevæger det sig med swim-hastighed og kan trække og fastholde modstandere inde
    i strømmen; ofre kan frigøre sig med et vellykket Reflex-save.

- id: heat
  name: Heat
  kind: ex
  category: attack
  rider_type: on_hit
  description: >-
    Salamanderens krop udstråler ekstrem varme, og selv en overfladisk berøring
    påfører ekstra ildskade. Metalvåben som salamanderen bærer leder varmen og
    giver tilsvarende ekstra ildskade ved hvert vellykket træf.

- id: electricity_ray
  name: Electricity Ray
  kind: su
  category: attack
  description: >-
    Arrowhawken affyrer en stråle af elektricitet fra halen som et ranged touch
    attack én gang pr. runde med en rækkevidde på 50 fod. Som touch attack ignorerer
    strålen rustningsbeskyttelse og naturlig AC og påfører elektricitets-skade ved træf.

- id: ink_cloud
  name: Ink Cloud
  kind: ex
  category: attack
  description: >-
    Skabningen udsprøjter en sfærisk sky af kulsort blæk én gang pr. minut som en
    fri handling; skyen giver total concealment og blokerer synslinjer fuldstændigt.
    En tojanida kan uden for vand skyde blæk direkte i øjnene på en modstander — et
    vellykket Reflex-save er nødvendigt for at undgå blindhed.

- id: pipes
  name: Pipes
  kind: su
  category: attack
  description: >-
    Satyren spiller en magisk melodi på sin panfløjte. Alle skabninger (undtagen
    satyrer) inden for 60 fod skal bestå et Will-save eller blive ramt af charm
    person, sleep eller fear — satyren vælger melodien og dens effekt. Kasterniveauet
    er 10.

- id: entangle
  name: Entangle
  kind: su
  category: attack
  description: >-
    Assassinranken kan som en fri handling animere planter inden for 30 fod af sig
    selv. De animerede planter griber fat om alle skabninger i området og holder dem
    fast; ofre der klarer et Reflex-save er kun delvist indsnøret og bevæger sig halvt.

- id: fiddle
  name: Fiddle
  kind: su
  category: attack
  description: >-
    Én grig i gruppen bærer en lillebitte fele. Mens felen spilles, skal alle
    ikke-sprites inden for 30 fod bestå et Will-save eller blive tvunget til
    irresistible dance, så længe musikken fortsætter. Save DC er Karisma-baseret.

- id: change_size
  name: Change Size
  kind: sp
  category: attack
  description: >-
    Jannien kan to gange om dagen magisk ændre en skabnings størrelse som enlarge
    person eller reduce person efter eget valg — herunder på sig selv. Den ramte
    skabning kan afvise effekten med et vellykket Fortitude-save. Svarer til et
    2.-niveaus-trylleformular.

- id: charm_person
  name: Charm Person
  kind: sp
  category: attack
  description: >-
    Nixien kan tre gange om dagen bruge charm person som en spell-like ability.
    Skabninger der fejler et Will-save er charmede i 24 timer og bruges typisk til
    tungt arbejde eller vagttjeneste. Kort inden effekten udløber, eskorteres den
    charmede væk og beordres til at gå. Kasterniveauet er 4.

- id: special_arrows
  name: Special Arrows
  kind: ex
  category: attack
  description: >-
    Pixies bruger pile der ikke gør skade, men i stedet fremkalder søvn eller
    hukommelsestab. Søvnpilen sender offeret i søvn uanset HD (Fortitude-save).
    Hukommelsestabs-pilen sletter alle minder (Will-save) men bevarer færdigheder,
    sprog og klassevner; en heal-trylleformular eller lignende genopretter mindet.

# ── Special qualities: senses, DR, immuniteter, traits (arves KUN af elemental-form) ──
# NB: 'ink_cloud' ligger som special ATTACK ovenfor (samme evne) — ikke gentaget her.
- id: damage_reduction
  name: Damage Reduction
  kind: ex
  category: quality
  description: >-
    Skabningen ignorerer automatisk et vist antal points skade fra normale angreb
    — sår heler øjeblikkeligt eller våbnet preller af. Energiangreb og magi
    påvirkes ikke. Bestemt materiale eller magisk egenskab kan gennembryde
    reduktionen, som specificeret i skabningens beskrivelse.

- id: elemental_traits
  name: Elemental Traits
  kind: ex
  category: quality
  description: >-
    En elemental-type skabning er immun over for gift, søvneffekter, lammelse og
    bedøvelse; den er ikke genstand for kritiske hits eller flanking. Den spiser,
    sover eller ånder ikke, og dens sjæl og krop udgør én enhed — den kan ikke
    genopvækkes med normale resurrection-trylleformularer.

- id: immunity_to_fire
  name: Immunity to Fire
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for ild-skade uanset kilde — magisk,
    elementarisk eller ikke-magisk. Immunitet til ild er typisk knyttet til
    ild-subtypen eller specifikke race-træk.

- id: vulnerability_to_cold
  name: Vulnerability to Cold
  kind: ex
  category: quality
  description: >-
    Skabningen tager halvt mere skade end normalt (+50%) af kuldeangreb, uanset om
    et saving throw er tilladt, og uanset om det bestås eller mislykkes. Svagheden
    er modstykket til ild-immunitet hos skabninger med ild-subtypen.

- id: earth_glide
  name: Earth Glide
  kind: ex
  category: quality
  description: >-
    Skabningen glider ubesværet igennem sten, jord og lignende jordmateriale (ikke
    metal) som en fisk svømmer i vand. Den efterlader ingen tunnel, hul eller
    synlige spor af sin passage. Et move earth-trylleformel i området kaster
    skabningen 30 fod tilbage og kan bedøve den.

- id: hold_breath
  name: Hold Breath
  kind: ex
  category: quality
  description: >-
    Skabningen kan holde vejret i et antal runder svarende til et multiplum af sin
    Constitution-score, som angivet i dens beskrivelse, inden den risikerer at
    drukne. Dette giver den mulighed for at forblive under vand i langt længere
    tid end normalt.

- id: all_around_vision
  name: All-Around Vision
  kind: ex
  category: quality
  description: >-
    Skabningens sanseorganer dækker alle retninger simultant. Den får typisk +4
    racial bonus på Spot- og Search-checks og kan ikke flankes, da den aldrig
    betragtes som at have en bagside.

- id: resistance_to_electricity
  name: Resistance to Electricity
  kind: ex
  category: quality
  description: >-
    Skabningen ignorerer et vist antal points elektricitetsskade hver gang den
    rammes. Den specificerede mængde fratrækkes inden resterende skade beregnes.
    Resistens påvirkes ikke af om et saving throw er tilladt eller bestås.

- id: blindsight
  name: Blindsight
  kind: ex
  category: quality
  description: >-
    Skabningen navigerer og kæmper lige så godt som en seende skabning udelukkende
    via ikke-visuelle sanser — fx ekkolokalisering, vibrationer eller skarp lugt.
    Usynlighed, mørke og de fleste former for skjul er irrelevante; skabningen
    kræver dog stadig line of effect til sine mål.

- id: resistance_to_cold
  name: Resistance to Cold
  kind: ex
  category: quality
  description: >-
    Skabningen ignorerer et vist antal points kuldeskade hver gang den rammes. Den
    specificerede mængde fratrækkes inden resterende skade beregnes. Resistens
    påvirkes ikke af om et saving throw er tilladt eller bestås.

- id: tremorsense
  name: Tremorsense
  kind: ex
  category: quality
  description: >-
    Skabningen er følsom over for vibrationer i underlaget og bestemmer automatisk
    placeringen af alt i kontakt med jorden inden for den angivne rækkevidde.
    Akvatiske skabninger med tremorsense kan tilsvarende registrere bevægelse i vand.

- id: blindsense
  name: Blindsense
  kind: ex
  category: quality
  description: >-
    Skabningen registrerer tilstedeværelsen af skabninger den ikke kan se, via
    ikke-visuelle sanser som lugt eller hørelse. Modstanderen har dog stadig total
    concealment og dertilhørende miss chance, og skabningen mister sin
    Dexterity-bonus mod angreb fra usynlige fjender.

- id: keen_scent
  name: Keen Scent
  kind: ex
  category: quality
  description: >-
    Skabningen kan registrere andre væsner på lugten over usædvanligt store
    afstande — typisk 180 fod — og kan desuden spore blod i vand over meget lange
    afstande, op til en mil. Evnen er langt mere skarp end det almindelige Scent-træk.

- id: jet
  name: Jet
  kind: ex
  category: quality
  description: >-
    Skabningen kan springe baglæns i en ret linje med høj hastighed som en
    full-round-handling én gang pr. runde. Bevægelsen provokerer ikke attacks of
    opportunity. Præcis hastighed angives i skabningens beskrivelse.

- id: spell_resistance
  name: Spell Resistance
  kind: ex
  category: quality
  description: >-
    Skabningen kan modstå effekter fra trylleformularer og spell-like abilities der
    direkte påvirker den. Kasteren skal bestå et kasterniveau-check (1t20 +
    kasterniveau) mod SR-værdien for at tryllet virker — skabningen bevarer dog
    retten til et saving throw bagefter.

- id: immunity_to_acid_electricity_poison
  name: "Immunity to Acid, Electricity, and Poison"
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for syreskade, elektricitetsskade og alle
    former for gift. Ingen af disse skadestyper eller effekter har nogen virkning,
    uanset kilde, og uanset om et saving throw er tilladt.

- id: immunity_to_acid_and_cold
  name: Immunity to Acid and Cold
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for syreskade og kuldeskade. Ingen af
    disse skadestyper har nogen virkning på skabningen, uanset om de stammer fra
    magiske eller ikke-magiske kilder.

- id: immunity_to_cold_and_fire
  name: Immunity to Cold and Fire
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for kuldeskade og ildskade. Ingen af disse
    skadestyper har nogen virkning på skabningen, uanset om de stammer fra magiske
    eller ikke-magiske kilder.

- id: wild_empathy
  name: Wild Empathy
  kind: ex
  category: quality
  description: >-
    Skabningen kan forbedre et dyrs (animal) holdning på samme måde som
    Diplomacy-færdigheden forbedrer en persons holdning. Den ruller 1t20 og
    tilføjer relevante bonusser; skabning og dyr skal normalt befinde sig inden for
    30 fod af hinanden, og processen tager typisk 1 minut.

- id: immunity_to_electricity
  name: Immunity to Electricity
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for elektricitetsskade uanset kilde —
    magisk, naturlig eller ikke-magisk. Elektricitet-angreb og -effekter har ingen
    virkning på skabningen.

- id: plant_traits
  name: Plant Traits
  kind: ex
  category: quality
  description: >-
    En plante-type skabning er immun over for alle sinde-påvirkende effekter
    (charme, tvang, fantomeri, mønstre og morale) samt gift, søvn, lammelse,
    polymorph og bedøvelse. Den er ikke genstand for kritiske hits, og den spiser
    og ånder, men sover ikke.

- id: plane_shift
  name: Plane Shift
  kind: su
  category: quality
  description: >-
    Skabningen kan flytte sig øjeblikkeligt fra sit nuværende plan til et andet —
    typisk kun sig selv, medmindre beskrivelsen siger andet. Evnen fungerer som
    plane shift-tryllet med et kasterniveau svarende til skabningens HD.

- id: telepathy
  name: Telepathy
  kind: su
  category: quality
  description: >-
    Skabningen kan kommunikere telepatisk med alle skabninger inden for den angivne
    rækkevidde som har et sprog. Kommunikationen er tavs og kræver ingen handling;
    det er muligt at tale med flere skabninger på én gang, dog ligeså kognitivt
    krævende som at tale med flere personer samtidigt.

- id: resistance_to_fire
  name: Resistance to Fire
  kind: ex
  category: quality
  description: >-
    Skabningen ignorerer et vist antal points ildskade hver gang den rammes. Den
    specificerede mængde fratrækkes inden resterende skade beregnes. Resistens
    påvirkes ikke af om et saving throw er tilladt eller bestås.

- id: magic_circle_against_evil
  name: Magic Circle against Evil
  kind: su
  category: quality
  description: >-
    Skabningen omgives permanent af en effekt svarende til magic circle against
    evil-tryllet inden for en radius angivet i dens beskrivelse. Effekten beskytter
    omgivende allierede mod onde skabningers angreb og holder onde summoned
    creatures i ave. Skabningen kan normalt ikke undertrykke evnen.

- id: immunity_to_poison_charm_compulsion
  name: "Immunity to Poison, Charm, and Compulsion"
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for alle former for gift samt over for
    sinde-påvirkende charme- og tvang-effekter. Immuniteten gælder uanset om
    effekternes kilde er magisk, supernaturlig eller ekstraordinær.

- id: camouflage
  name: Camouflage
  kind: ex
  category: quality
  description: >-
    Skabningen kan bruge Hide-færdigheden i alle former for naturligt terræn, selv
    når terrænet ikke giver cover eller concealment. De naturlige omgivelsers
    varierede struktur er tilstrækkelig for en erfaren skabning til at forblive skjult.

- id: immunity_to_acid
  name: Immunity to Acid
  kind: ex
  category: quality
  description: >-
    Skabningen er fuldstændig immun over for syreskade uanset kilde — magisk,
    biologisk eller kemisk. Syrebaserede angreb og effekter har ingen virkning på
    skabningen.

- id: evasion
  name: Evasion
  kind: ex
  category: quality
  description: >-
    Lykkes skabningens Reflex-saving throw mod et angreb der normalt giver halv
    skade ved succesfuldt save, tager den slet ingen skade. Evnen fungerer kun i let
    eller ingen rustning. En hjælpeløs skabning drager ikke fordel af evasion.

- id: superior_low_light_vision
  name: Superior Low-Light Vision
  kind: ex
  category: quality
  description: >-
    Skabningen ser markant længere end normalt i svag belysning — typisk fem gange
    så langt som et menneske under tilsvarende lysforhold. Ellers fungerer evnen som
    standard low-light vision og bevarer fuld farve- og detaljeopfattelse.

- id: natural_invisibility
  name: Natural Invisibility
  kind: su
  category: quality
  description: >-
    Skabningen er konstant usynlig, også under angreb. Evnen er iboende i
    skabningens natur, er aktiv i hele dens levetid og er ikke underlagt
    invisibility purge. Den kan ikke dispelles som et ordinært tryllel.

- id: improved_tracking
  name: Improved Tracking
  kind: ex
  category: quality
  description: >-
    Skabningen er en konsummat sporer og benytter Spot-checks i stedet for de
    normale Survival-checks til at følge en skabnings spor. Dette giver en langt
    skarpere sporingsevne uafhængig af overfladens beskaffenhed.

- id: elemental_endurance
  name: Elemental Endurance
  kind: ex
  category: quality
  description: >-
    Skabningen kan overleve på elementarplanerne (Luft, Jord, Ild eller Vand) i op
    til 48 timer. Forbliver den på et elementarplan ud over denne grænse, tager den
    1 point skade pr. ekstra time, indtil den returnerer til det Materielle Plan
    eller dør.

- id: amphibious
  name: Amphibious
  kind: ex
  category: quality
  description: >-
    Skabningen er vandlevende, men kan overleve ubegrænset tid på land. Den kan ånde
    både luft og vand og bevæger sig frit i begge miljøer. Normalt holder den sig
    dog tæt på vand.

- id: water_breathing
  name: Water Breathing
  kind: ex
  category: quality
  description: >-
    Skabningen kan ånde under vand på ubestemt tid og kan bruge alle sine evner —
    herunder åndedrætsangreb, trylleformularer og særlige egenskaber — fuldstændig
    frit mens den er nedsænket.

- id: greater_invisibility
  name: Greater Invisibility
  kind: su
  category: quality
  description: >-
    Skabningen er konstant usynlig, også når den angriber. Evnen svarer til greater
    invisibility-tryllet, er aktiv i hele skabningens levetid og er ikke underlagt
    invisibility purge. Dette er en iboende supernaturlig egenskab, ikke en
    midlertidig effekt.

- id: energy_resistance
  name: Energy Resistance
  kind: ex
  category: quality
  description: >-
    Skabningen ignorerer et vist antal points skade af en bestemt energitype
    (typisk syre, kulde, ild eller elektricitet) hver gang den rammes. Resistensen
    angives som antal points plus energitype og fratrækkes inden resterende skade
    beregnes.


# ── Klasseevner (class features) ──────────────────────────────────────────
# Tilføjet for klik-for-forklaring på karakterarkets "Klasseevner"-sektion
# (se briefs/BRIEF-class-feature-descriptions.md). id'et er den normaliserede
# slug fra class_features.py/feature_slug() — dækker alle level-varianter af
# samme evne (fx "Rage 3/day" og "Rage 6/day" deler id'et 'rage').

# --- Barbarian --------------------------------------------------------------
- id: fast_movement
  name: Fast Movement
  kind: ex
  category: quality
  description: >-
    Skabningens landbevægelseshastighed er højere end normalt for hendes
    størrelse og udrustning, forudsat hun ikke bærer tung rustning og ikke er
    overbelastet.

- id: greater_rage
  name: Greater Rage
  kind: ex
  category: quality
  description: >-
    Som rage, men giver en større bonus til Styrke og Constitution samt til
    Will-saves, mens straffen på Armor Class forbliver den samme. Erstatter
    ikke rage — det er den samme tilstand, blot med bedre tal ved højere niveau.

- id: illiteracy
  name: Illiteracy
  kind: ex
  category: quality
  description: >-
    Barbaren kan hverken læse eller skrive fra start. Hun kan opnå læsefærdighed
    ved at bruge et færdighedspoint som var det et ekstra sprog, eller senere
    tage niveauer i en klasse der giver læsefærdighed automatisk.

- id: improved_uncanny_dodge
  name: Improved Uncanny Dodge
  kind: ex
  category: quality
  description: >-
    Skabningen kan ikke længere flankeres, undtagen af en angriber med
    tilstrækkeligt flere niveauer/hit dice end hende selv i en klasse der giver
    uncanny dodge. Bygger oven på uncanny dodge (bibeholder Dex-bonus til AC
    selv caught flat-footed eller mod usynlige modstandere).

- id: indomitable_will
  name: Indomitable Will
  kind: ex
  category: quality
  description: >-
    Mens barbaren rager, får hun en yderligere bonus på Will-saves mod
    enchantment-trylleformularer og -effekter, oveni enhver anden bonus hun
    måtte have.

- id: mighty_rage
  name: Mighty Rage
  kind: ex
  category: quality
  description: >-
    Som rage, men giver en endnu større bonus til Styrke, Constitution og
    Will-saves end greater rage, mens straffen på Armor Class forbliver
    uændret.

- id: tireless_rage
  name: Tireless Rage
  kind: ex
  category: quality
  description: >-
    Barbaren bliver ikke længere fatigued (svækket) efter at hendes rage
    slutter.

- id: trap_sense
  name: Trap Sense
  kind: ex
  category: quality
  description: >-
    Skabningen får en intuitiv sans for fælder: en bonus på Reflex-saves for
    at undgå fælder og en bonus på Armor Class mod angreb fra fælder.
    Bonusser fra flere klasser der giver trap sense lægges sammen.

- id: uncanny_dodge
  name: Uncanny Dodge
  kind: ex
  category: quality
  description: >-
    Skabningen beholder sin Dexterity-bonus til Armor Class selv når hun er
    caught flat-footed eller angribes af en usynlig modstander (hun mister dog
    stadig Dex-bonussen mod visse andre effekter). Hun kan heller ikke
    flankeres af en angriber med for få niveauer/hit dice til at omgå evnen.

# --- Bard --------------------------------------------------------------------
- id: bardic_knowledge
  name: Bardic Knowledge
  kind: ex
  category: quality
  description: >-
    Barden kan foretage et særligt check (1t20 + barde-niveau + Intelligence-
    modifikator) for at genkalde en løsreven, relevant oplysning om berømte
    personer, sagn, steder eller genstande. Sværhedsgraden afhænger af hvor
    obskur informationen er.

- id: bardic_music
  name: Bardic Music
  kind: ex
  category: quality
  description: >-
    Et antal gange om dagen kan barden bruge sang, digtning eller oration til
    at udløse særlige effekter (countersong, fascinate, inspire courage m.fl.),
    hver på bekostning af én runde af hendes bardic music-pulje. Kræver
    normalt at hun frit kan handle og blive hørt eller set af sine mål.

- id: countersong
  name: Countersong
  kind: su
  category: quality
  description: >-
    Barden bruger musik eller lyd til at modvirke sound- og language-baserede
    effekter. Alle inden for hørevidde der er udsat for en sådan effekt, kan
    bruge barden Perform-check i stedet for deres eget saving throw, så længe
    countersong-optrædenen fortsætter.

- id: fascinate
  name: Fascinate
  kind: sp
  category: quality
  description: >-
    Barden kan fange opmærksomheden hos et antal skabninger inden for
    rækkevidde med en musikalsk eller poetisk optræden. De skal bestå et
    Will-save eller sidde stille og opmærksomme på barden, distraheret fra
    andre handlinger, så længe optrædenen fortsætter.

- id: inspire_competence
  name: Inspire Competence
  kind: su
  category: quality
  description: >-
    Barden opmuntrer en forbunden skabning med sin optræden og giver hende en
    bonus på et bestemt færdigheds-check, så længe barden fortsætter med at
    optræde.

- id: inspire_courage
  name: Inspire Courage
  kind: su
  category: quality
  description: >-
    Barden opmuntrer sine forbundne med mod gennem sang eller ord. Alle der
    kan høre optrædenen får en bonus på saving throws mod frygt- og
    charm-effekter samt på angreb og skade, så længe optrædenen fortsætter.

- id: inspire_greatness
  name: Inspire Greatness
  kind: su
  category: quality
  description: >-
    Barden inspirerer op til et antal forbundne skabninger til storhed: hver
    får ekstra bonus hit dice (med tilhørende hit points og bonus på angreb)
    samt en bonus på Fortitude-saves, så længe de kan se og høre barden.

- id: inspire_heroics
  name: Inspire Heroics
  kind: su
  category: quality
  description: >-
    Barden inspirerer en enkelt forbunden skabning til heltemod og giver
    hende en betydelig bonus på alle saving throws samt på Armor Class, så
    længe optrædenen fortsætter.

- id: mass_suggestion
  name: Mass Suggestion
  kind: sp
  category: quality
  description: >-
    Som suggestion, men barden kan påvirke flere skabninger samtidig — alle
    inden for rækkevidde og i stand til at høre hendes optræden.

- id: song_of_freedom
  name: Song of Freedom
  kind: sp
  category: quality
  description: >-
    Barden kan opnå samme virkning som trylleformularen break enchantment på
    en enkelt skabning, ved at synge eller recitere i stedet for at kaste
    trylleformularen.

- id: suggestion
  name: Suggestion
  kind: sp
  category: quality
  description: >-
    Barden kan give en enkelt lyttende skabning et forslag til handling, som
    ved trylleformularen suggestion, gennem sin optræden i stedet for gennem
    almindelig casting.

# --- Monk ----------------------------------------------------------------
- id: abundant_step
  name: Abundant Step
  kind: su
  category: quality
  description: >-
    Munken kan forsvinde fra ét sted og genopstå et andet sted inden for kort
    rækkevidde, som ved trylleformularen dimension door, én gang om dagen.
    Hun kan ikke tage andre med sig.

- id: ac_bonus
  name: AC Bonus
  kind: ex
  category: quality
  description: >-
    Så længe munken er ubevæbnet, ikke bærer rustning eller skjold og ikke er
    overbelastet, tilføjer hun sin Wisdom-bonus til Armor Class (oveni
    Dexterity-bonussen). Ved højere niveau får hun desuden en fast bonus
    oveni. Bonussen mistes under samme omstændigheder som en Dex-bonus til AC.

- id: diamond_body
  name: Diamond Body
  kind: su
  category: quality
  description: >-
    Munken opnår immunitet over for alle gifte — hverken indtaget, injiceret,
    kontakt- eller inhaleret gift har effekt på hende.

- id: diamond_soul
  name: Diamond Soul
  kind: ex
  category: quality
  description: >-
    Munken får spell resistance svarende til hendes niveau plus en fast
    bonus. En caster skal bestå et caster level check mod denne SR for at
    kunne påvirke munken med en trylleformular.

- id: empty_body
  name: Empty Body
  kind: su
  category: quality
  description: >-
    Munken kan bruge sin ki til at blive æterisk i et antal runder om dagen,
    som ved trylleformularen etherealness, men kun på sig selv. Rundene
    behøver ikke bruges samlet.

- id: flurry_of_blows
  name: Flurry of Blows
  kind: ex
  category: quality
  description: >-
    Ved et fuldt angreb kan munken give afkald på sin normale angrebsrække
    for i stedet at få ét ekstra unarmed strike-angreb, mod en straf på
    angrebsbonussen for alle angreb i runden. Kræver at hun angriber ubevæbnet
    eller med et monk-våben.

- id: greater_flurry
  name: Greater Flurry
  kind: ex
  category: quality
  description: >-
    Ved højt niveau giver flurry of blows endnu et ekstra unarmed
    strike-angreb ved munkens højeste angrebsbonus, oveni det ekstra angreb
    hun allerede får fra flurry of blows.

- id: improved_evasion
  name: Improved Evasion
  kind: ex
  category: quality
  description: >-
    Som evasion, men munken tager kun halv skade selv ved et mislykket
    Reflex-save mod angreb der normalt giver halv skade ved succes — og intet
    ved et vellykket save. Fungerer kun i let eller ingen rustning; en
    hjælpeløs skabning drager stadig ikke fordel.

- id: ki_strike
  name: Ki Strike
  kind: su
  category: quality
  description: >-
    Munkens unarmed strikes behandles som magiske våben ved afgørelse af
    damage reduction. Ved højere niveau regnes angrebene desuden som lawful
    og/eller adamantine i denne sammenhæng.

- id: perfect_self
  name: Perfect Self
  kind: ex
  category: quality
  description: >-
    Munken bliver en outsider (native) i stedet for en humanoid, hvilket kan
    påvirke effekter der målretter kreaturtype. Hun får desuden damage
    reduction, som kun gennembrydes af magiske våben.

- id: purity_of_body
  name: Purity of Body
  kind: ex
  category: quality
  description: >-
    Munken bliver immun over for alle sygdomme, inklusive overnaturlige og
    magiske sygdomme.

- id: quivering_palm
  name: Quivering Palm
  kind: su
  category: quality
  description: >-
    Et begrænset antal gange om ugen kan munken sætte et dødeligt slag mod et
    mål hun rammer med et unarmed strike. Vælger hun senere at aktivere
    slaget (inden for et vist antal dage), skal målet bestå et Fortitude-save
    eller dø.

- id: slow_fall
  name: Slow Fall
  kind: ex
  category: quality
  description: >-
    Er munken inden for arms reach af en væg når hun falder, bremser hun
    faldet som ved feather fall og tager ingen faldskade. Ved højere niveau
    fungerer evnen uanset afstand til en væg.

- id: still_mind
  name: Still Mind
  kind: ex
  category: quality
  description: >-
    Munkens disciplinerede sind giver hende en bonus på saving throws mod
    enchantment-trylleformularer og -effekter.

- id: tongue_of_the_sun_and_moon
  name: Tongue of the Sun and Moon
  kind: su
  category: quality
  description: >-
    Munken kan tale og forstå alle sprog samt konversere med enhver skabning
    der har et sprog, uanset om hun normalt ville forstå det.

- id: unarmed_strike
  name: Unarmed Strike
  kind: ex
  category: quality
  description: >-
    Munken er trænet i ubevæbnet kamp og kan påføre dødelig eller
    ikke-dødelig skade med et unarmed strike-angreb uden straf, og rammer
    lige så effektivt med albuer, knæ og fødder som med næver. Hun udløser
    ikke attack of opportunity ved at angribe ubevæbnet.

- id: wholeness_of_body
  name: Wholeness of Body
  kind: su
  category: quality
  description: >-
    Munken kan bruge sin ki-pulje til at hele sig selv for et antal hit
    points om dagen, i stedet for at bruge ki-en til andre evner. Helbredelsen
    kan fordeles over flere anvendelser samme dag.

- id: timeless_body
  name: Timeless Body
  kind: ex
  category: quality
  description: >-
    Skabningen tager ikke længere ability-straffe fra alderdom (eksisterende
    straffe forbliver), men kan stadig dø af alderdom. Bonusser fra alder
    gælder fortsat.

# --- Paladin ---------------------------------------------------------------
- id: aura_of_courage
  name: Aura of Courage
  kind: su
  category: quality
  description: >-
    Paladinen er immun over for frygt (magisk eller ej). Alle allierede inden
    for kort rækkevidde af hende får en bonus på deres saving throws mod
    frygt.

- id: aura_of_good
  name: Aura of Good
  kind: ex
  category: quality
  description: >-
    Paladinens aura af godhed, som målt af effekter der detekterer eller
    reagerer på aura (fx detect good), er lige så stærk som en clerics af
    samme niveau.

- id: detect_evil
  name: Detect Evil
  kind: sp
  category: quality
  description: >-
    Paladinen kan til enhver tid, som en fri handling, koncentrere sig om at
    detektere ondskab i sine omgivelser, som ved trylleformularen detect
    evil.

- id: divine_grace
  name: Divine Grace
  kind: su
  category: quality
  description: >-
    Paladinen tilføjer sin Charisma-modifikator (hvis positiv) som bonus på
    alle sine saving throws.

- id: divine_health
  name: Divine Health
  kind: ex
  category: quality
  description: >-
    Paladinen er immun over for alle sygdomme, inklusive overnaturlige og
    magiske sygdomme.

- id: lay_on_hands
  name: Lay on Hands
  kind: su
  category: quality
  description: >-
    Paladinen kan helbrede skade ved berøring, med et samlet antal hit
    points om dagen svarende til hendes niveau ganget Charisma-modifikator.
    Hun kan bruge evnen på sig selv eller andre og fordele den over flere
    anvendelser.

- id: remove_disease
  name: Remove Disease
  kind: sp
  category: quality
  description: >-
    Et begrænset antal gange om ugen kan paladinen fjerne sygdom fra en
    berørt skabning, som ved trylleformularen remove disease.

- id: smite_evil
  name: Smite Evil
  kind: su
  category: quality
  description: >-
    Et begrænset antal gange om dagen kan paladinen forsøge et smite
    evil-angreb: som del af et normalt angreb tilføjer hun sin
    Charisma-modifikator til angrebsrullet og en fast bonus til skaden, hvis
    målet er ondt. Rammer hun et ikke-ondt mål, udføres angrebet stadig, men
    uden smite-bonusserne, og forsøget er brugt.

- id: special_mount
  name: Special Mount
  kind: su
  category: quality
  description: >-
    Paladinen kan tilkalde et særligt, magisk styrket ridedyr som en loyal
    følgesvend. Dør mountet, kan et nyt tilkaldes efter en ventetid.

- id: turn_undead
  name: Turn Undead
  kind: su
  category: quality
  description: >-
    Skabningen kan et antal gange om dagen forsøge at fordrive eller
    destruere udøde inden for rækkevidde. Et check afgør hvilken maksimal
    hit dice-styrke der påvirkes, og hvor mange udøde der berøres af
    forsøget.

# --- Ranger ------------------------------------------------------------------
- id: animal_companion
  name: Animal Companion
  kind: ex
  category: quality
  description: >-
    Skabningen tiltrækker en loyal dyre-følgesvend, som kæmper ved hendes
    side og bliver stærkere i takt med hendes niveau. Companionens egne
    egenskaber og evner fremgår af dens statblok.

- id: combat_style
  name: Combat Style
  kind: ex
  category: quality
  description: >-
    Rangeren vælger en kampstil (kamp med to våben eller bueskydning) og
    modtager den første feat i den valgte kæde gratis, selv hvis hun ikke
    opfylder de normale forudsætninger.

- id: combat_style_mastery
  name: Combat Style Mastery
  kind: ex
  category: quality
  description: >-
    Rangeren modtager den tredje og sidste feat i sin valgte kampstils-kæde
    gratis, selv hvis hun ikke opfylder de normale forudsætninger.

- id: endurance
  name: Endurance
  kind: ex
  category: quality
  description: >-
    Skabningen får en bonus på checks for at modstå ikke-dødelig skade fra
    træthed og på visse Constitution-baserede checks (fx svømning, gå uden
    søvn, sult og tørst, ekstremt vejr). Svarer til Endurance-feat'en, som
    gives gratis.

- id: favored_enemy
  name: Favored Enemy
  kind: ex
  category: quality
  description: >-
    Rangeren vælger en skabningstype (senere flere) som sin yndlingsfjende og
    får bonus på Bluff-, Listen-, Sense Motive-, Spot- og Survival-checks mod
    skabninger af den type, samt en bonus på skade i kamp mod dem.

- id: hide_in_plain_sight
  name: Hide in Plain Sight
  kind: ex
  category: quality
  description: >-
    Rangeren kan bruge Hide-færdigheden selv mens hun observeres, blot hun
    befinder sig i en form for naturligt terræn — undtagen mens hun
    observeres direkte i klart lys uden nogen form for dækning.

- id: improved_combat_style
  name: Improved Combat Style
  kind: ex
  category: quality
  description: >-
    Rangeren modtager den anden feat i sin valgte kampstils-kæde gratis, selv
    hvis hun ikke opfylder de normale forudsætninger.

- id: swift_tracker
  name: Swift Tracker
  kind: ex
  category: quality
  description: >-
    Rangeren kan spore i normal bevægelseshastighed uden straf, og i dobbelt
    hastighed med kun den almindelige straf på Survival-checket, i stedet for
    de skærpede straffe der normalt gælder for hurtig sporing.

- id: track
  name: Track
  kind: ex
  category: quality
  description: >-
    Skabningen kan bruge Survival-færdigheden til at følge skabningers spor.
    Svarer til Track-feat'en.

# --- Druid -------------------------------------------------------------------
- id: a_thousand_faces
  name: A Thousand Faces
  kind: su
  category: quality
  description: >-
    Druiden kan ændre sit udseende, som ved trylleformularen alter self, når
    som helst hun ønsker, uden begrænsning på antal gange om dagen.

- id: nature_sense
  name: Nature Sense
  kind: ex
  category: quality
  description: >-
    Druiden får en bonus på Knowledge (nature) og Survival-checks.

- id: resist_nature_s_lure
  name: Resist Nature's Lure
  kind: ex
  category: quality
  description: >-
    Druiden får en bonus på saving throws mod feers og planters magiske
    evner, herunder deres spell-like abilities.

- id: spontaneous_casting
  name: Spontaneous Casting
  kind: ex
  category: quality
  description: >-
    Druiden kan omdanne et forberedt trylleslag i sekundet til en Summon
    Nature's Ally-trylleformular af samme niveau, på samme måde som en
    cleric spontant kan omdanne trylleslag til cure- eller
    inflict-trylleformularer.

- id: trackless_step
  name: Trackless Step
  kind: ex
  category: quality
  description: >-
    Druiden efterlader intet spor i naturlige omgivelser og kan ikke spores,
    medmindre hun ønsker det. En normal Survival-baseret sporing af hende
    mislykkes automatisk.

- id: venom_immunity
  name: Venom Immunity
  kind: ex
  category: quality
  description: >-
    Druiden er immun over for alle former for gift.

- id: wild_shape
  name: Wild Shape
  kind: su
  category: quality
  description: >-
    Druiden kan antage form som et dyr af en given størrelseskategori, som
    ved trylleformularen polymorph, et antal gange om dagen. Formens fysiske
    egenskaber overtages, mens druidens egne mentale evner og en begrænset
    evne til at kommunikere bevares. Ved højere niveau udvides evnen til også
    at omfatte elemental- og planteformer.

- id: woodland_stride
  name: Woodland Stride
  kind: ex
  category: quality
  description: >-
    Skabningen kan bevæge sig gennem tætvokset naturligt terræn (tornekrat,
    underskov m.m.) i normal hastighed uden at tage skade eller på anden
    måde blive hindret af det. Magisk manipuleret plantevækst hindrer stadig
    som normalt.

# --- Rogue -------------------------------------------------------------------
- id: sneak_attack
  name: Sneak Attack
  kind: ex
  category: quality
  description: >-
    Skabningens angreb påfører ekstra skade når hun rammer et mål der er
    denied its Dexterity-bonus til AC, eller når hun flankerer målet.
    Gælder kun mod skabninger med sårbar anatomi — ikke fx oozes eller udøde
    uden vitale organer.

- id: trapfinding
  name: Trapfinding
  kind: ex
  category: quality
  description: >-
    Skabningen kan bruge Search-færdigheden til at finde fælder med en
    Disable Device-sværhedsgrad over 20, og kan bruge Disable Device til at
    desarmere magiske fælder.

# --- Wizard / Sorcerer -------------------------------------------------------
- id: scribe_scroll
  name: Scribe Scroll
  kind: ex
  category: quality
  description: >-
    Wizarden kan skrive magiske ruller af enhver trylleformular hun kender,
    hvilket indskriver formularens effekt i en genstand der senere kan
    aktiveres af hende selv eller andre. Svarer til Scribe Scroll-feat'en,
    som wizarden får gratis ved 1. niveau.

- id: summon_familiar
  name: Summon Familiar
  kind: sp
  category: quality
  description: >-
    Casteren kan tilkalde en familiar — et lille magisk væsen der tjener som
    følgesvend og forbedrer visse af hendes evner. Dør familiaren, kan en ny
    tilkaldes efter en ventetid, med en midlertidig straf for casteren.

# ── Animal companion / paladin-mount specials ──────────────────────────────
- id: link
  name: Link
  kind: ex
  category: quality
  description: >-
    Druiden eller rangeren kan håndtere sin animal companion som en free
    action, eller give den kommandoer som en move action, uden at have ranks
    i Handle Animal. Herudover får ejeren et cirkumstansbonus på +4 til wild
    empathy-checks og Handle Animal-checks der vedrører companion'en.

- id: share_spells
  name: Share Spells
  kind: ex
  category: quality
  description: >-
    Ejeren kan lade en trylleformular (ikke en spell-like ability) hun kaster
    på sig selv, også ramme companion'en, hvis den er inden for 5 fod på
    kastetidspunktet. Har effekten en varighed, ophører den hvis companion'en
    bevæger sig længere væk, og virker ikke igen selv om den vender tilbage.
    En formular med mål "dig selv" kan i stedet kastes direkte på companion'en
    som en touch-range-formular.

- id: devotion
  name: Devotion
  kind: ex
  category: quality
  description: >-
    Companion'en får et moralsk bonus på +4 til Will saves mod enchantment-
    trylleformularer og -effekter.

- id: empathic_link
  name: Empathic Link
  kind: su
  category: quality
  description: >-
    Paladinen har en empatisk forbindelse til sin mount ud til en afstand af
    op til 1 mil. Hun kan ikke se gennem mountens øjne, men de kan
    kommunikere empatisk. Forbindelsen giver desuden paladinen samme
    tilknytning til en genstand eller et sted som mounten har, ligesom en
    herre og hans familiar.

- id: share_saving_throws
  name: Share Saving Throws
  kind: ex
  category: quality
  description: >-
    For hver af sine saving throws bruger mounten enten sit eget grundlæggende
    save-bonus eller paladinens, alt efter hvad der er højest. Mounten
    anvender fortsat sine egne ability-modifikatorer på saves og deler ikke
    andre bonusser paladinen måtte have.

- id: improved_speed
  name: Improved Speed
  kind: ex
  category: quality
  description: >-
    Mountens hastighed forbedres permanent i forhold til dens grundform, som
    en del af den overnaturlige styrkelse den får i paladinens tjeneste.

- id: command
  name: Command
  kind: sp
  category: quality
  description: >-
    Et vist antal gange om dagen (afhængigt af paladinens niveau) kan mounten
    bruge denne evne til at kommandere andre normale dyr af nogenlunde samme
    art som den selv, forudsat målet har færre Hit Dice end mounten. Evnen
    fungerer som command-trylleformularen; målet kan forsøge et Will save for
    at afværge effekten.
