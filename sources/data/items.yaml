- id: acid_flask
  name: Acid (flask)
  category: substance
  cost_cp: 1000
  weight: 1.0
  small_quarter: 0
  description: You can throw a flask of acid as a splash weapon. Treat this attack as a ranged touch attack with a range increment of 10 feet. A direct hit deals 1d6 points of acid damage. Every creature within 5 feet of the point where the acid hits takes 1 point of acid damage from the splash.
- id: alchemist_s_fire_flask
  name: Alchemist’s fire (flask)
  category: substance
  cost_cp: 2000
  weight: 1.0
  small_quarter: 0
  description: "You can throw a flask of alchemist’s fire as a splash weapon. Treat this attack as a ranged touch attack with a range increment of 10 feet.\n\nA direct hit deals 1d6 points of fire damage. Every creature within 5 feet of the point where the flask hits takes 1 point of fire damage from the splash. On the round following a direct hit, the target takes an additional 1d6 points of damage. If desired, the target can use a full-round action to attempt to extinguish the flames before taking this additional damage. Extinguishing the flames requires a DC 15 Reflex save. Rolling on the ground provides the target a +2 bonus on the save. Leaping into a lake or magically extinguishing the flames automatically smothers the fire."
- id: antitoxin_vial
  name: Antitoxin (vial)
  category: substance
  cost_cp: 5000
  weight: 0.0
  small_quarter: 0
  description: If you drink antitoxin, you get a +5 alchemical bonus on Fortitude saving throws against poison for 1 hour.
- id: everburning_torch
  name: Everburning torch
  category: substance
  cost_cp: 11000
  weight: 1.0
  small_quarter: 0
  description: This otherwise normal torch has a _continual flame_ spell cast upon it. An everburning torch clearly illuminates a 20-foot radius and provides shadowy illumination out to a 40-foot radius.
- id: holy_water_flask
  name: Holy water (flask)
  category: substance
  cost_cp: 2500
  weight: 1.0
  small_quarter: 0
  description: "Holy water damages undead creatures and evil outsiders almost as if it were acid. A flask of holy water can be thrown as a splash weapon.\n\nTreat this attack as a ranged touch attack with a range increment of 10 feet. A flask breaks if thrown against the body of a corporeal creature, but to use it against an incorporeal creature, you must open the flask and pour the holy water out onto the target. Thus, you can douse an incorporeal creature with holy water only if you are adjacent to it. Doing so is a ranged touch attack that does not provoke attacks of opportunity.\n\nA direct hit by a flask of holy water deals 2d4 points of damage to an undead creature or an evil outsider. Each such creature within 5 feet of the point where the flask hits takes 1 point of damage from the splash.\n\nTemples to good deities sell holy water at cost (making no profit)."
- id: smokestick
  name: Smokestick
  category: substance
  cost_cp: 2000
  weight: 0.5
  small_quarter: 0
  description: This alchemically treated wooden stick instantly creates thick, opaque smoke when ignited. The smoke fills a 10- foot cube (treat the effect as a _fog cloud_ spell, except that a moderate or stronger wind dissipates the smoke in 1 round). The stick is consumed after 1 round, and the smoke dissipates naturally.
- id: sunrod
  name: Sunrod
  category: substance
  cost_cp: 200
  weight: 1.0
  small_quarter: 0
  description: This 1-foot-long, gold-tipped, iron rod glows brightly when struck. It clearly illuminates a 30-foot radius and provides shadowy illumination in a 60-foot radius. It glows for 6 hours, after which the gold tip is burned out and worthless.
- id: tanglefoot_bag
  name: Tanglefoot bag
  category: substance
  cost_cp: 5000
  weight: 4.0
  small_quarter: 0
  description: "When you throw a tanglefoot bag at a creature (as a ranged touch attack with a range increment of 10 feet), the bag comes apart and the goo bursts out, entangling the target and then becoming tough and resilient upon exposure to air. An entangled creature takes a –2 penalty on attack rolls and a –4 penalty to Dexterity and must make a DC 15 Reflex save or be glued to the floor, unable to move. Even on a successful save, it can move only at half speed. Huge or larger creatures are unaffected by a tanglefoot bag. A flying creature is not stuck to the floor, but it must make a DC 15 Reflex save or be unable to fly (assuming it uses its wings to fly) and fall to the ground. A tanglefoot bag does not function underwater.\n\nA creature that is glued to the floor (or unable to fly) can break free by making a DC 17 Strength check or by dealing 15 points of damage to the goo with a slashing weapon. A creature trying to scrape goo off itself, or another creature assisting, does not need to make an attack roll; hitting the goo is automatic, after which the creature that hit makes a damage roll to see how much of the goo was scraped off. Once free, the creature can move (including flying) at half speed. A character capable of spellcasting who is bound by the goo must make a DC 15 Concentration check to cast a spell. The goo becomes brittle and fragile after 2d4 rounds, cracking apart and losing its effectiveness. An application of _universal solvent_ to a stuck creature dissolves the alchemical goo immediately."
- id: thunderstone
  name: Thunderstone
  category: substance
  cost_cp: 3000
  weight: 1.0
  small_quarter: 0
  description: "You can throw this stone as a ranged attack with a range increment of 20 feet. When it strikes a hard surface (or is struck hard), it creates a deafening bang that is treated as a sonic attack. Each creature within a 10-foot-radius spread must make a DC 15 Fortitude save or be deafened for 1 hour. A deafened creature, in addition to the obvious effects, takes a –4 penalty on initiative and has a 20% chance to miscast and lose any spell with a verbal component that it tries to cast.\n\nSince you don’t need to hit a specific target, you can simply aim at a particular 5-foot square. Treat the target square as AC 5."
- id: tindertwig
  name: Tindertwig
  category: substance
  cost_cp: 100
  weight: 0.0
  small_quarter: 0
  description: "The alchemical substance on the end of this small, wooden stick ignites when struck against a rough surface. Creating a flame with a tindertwig is much faster than creating a flame with flint and steel (or a magnifying glass) and tinder. Lighting a torch with a tindertwig is a standard action (rather than a full-round action), and lighting any other fire with one is at least a standard action.\n\n### Tools and Skill Kits"
- id: alchemist_s_lab
  name: Alchemist’s lab
  category: tool
  cost_cp: 50000
  weight: 40.0
  small_quarter: 0
  description: An alchemist’s lab always has the perfect tool for making alchemical items, so it provides a +2 circumstance bonus on Craft (alchemy) checks. It has no bearing on the costs related to the Craft (alchemy) skill. Without this lab, a character with the Craft (alchemy) skill is assumed to have enough tools to use the skill but not enough to get the +2 bonus that the lab provides.
- id: artisan_s_tools
  name: Artisan’s tools
  category: tool
  cost_cp: 500
  weight: 5.0
  small_quarter: 0
  description: These special tools include the items needed to pursue any craft. Without them, you have to use improvised tools (–2 penalty on Craft checks), if you can do the job at all.
- id: artisan_s_tools_masterwork
  name: Artisan’s tools, masterwork
  category: tool
  cost_cp: 5500
  weight: 5.0
  small_quarter: 0
  description: These tools serve the same purpose as artisan’s tools (above), but masterwork artisan’s tools are the perfect tools for the job, so you get a +2 circumstance bonus on Craft checks made with them.
- id: climber_s_kit
  name: Climber’s kit
  category: tool
  cost_cp: 8000
  weight: 5.0
  small_quarter: 1
  description: This is the perfect tool for climbing and gives you a +2 circumstance bonus on Climb checks.
- id: disguise_kit
