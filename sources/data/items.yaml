  weight: 0.0
  small_quarter: 0
  description: "This simple lens allows a closer look at small objects. It is also useful as a substitute for flint and steel when starting fires. Lighting a fire with a magnifying glass requires light as bright as sunlight to focus, tinder to ignite, and at least a full-round action. A magnifying glass grants a +2 circumstance bonus on Appraise checks\n\ninvolving any item that is small or highly detailed."
- id: musical_instrument_common
  name: Musical instrument, common
  category: tool
  cost_cp: 500
  weight: 3.0
  small_quarter: 1
  description: A masterwork instrument grants a +2 circumstance bonus on Perform checks involving its use.
- id: musical_instrument_masterwork
  name: Musical instrument, masterwork
  category: tool
  cost_cp: 10000
  weight: 3.0
  small_quarter: 1
  description: A masterwork instrument grants a +2 circumstance bonus on Perform checks involving its use.
- id: scale_merchant_s
  name: Scale, merchant’s
  category: tool
  cost_cp: 200
  weight: 1.0
  small_quarter: 0
  description: A scale grants a +2 circumstance bonus on Appraise checks involving items that are valued by weight, including anything made of precious metals.
- id: spell_component_pouch
  name: Spell component pouch
  category: tool
  cost_cp: 500
  weight: 2.0
  small_quarter: 0
  description: A spellcaster with a spell component pouch is assumed to have all the material components and focuses needed for spellcasting, except for those components that have a specific cost, divine focuses, and focuses that wouldn’t fit in a pouch.
- id: spellbook_wizard_s_blank
  name: Spellbook, wizard’s (blank)
  category: tool
  cost_cp: 1500
  weight: 3.0
  small_quarter: 0
  description: A spellbook has 100 pages of parchment, and each spell takes up one page per spell level (one page each for 0-level spells).
- id: thieves_tools
  name: Thieves’ tools
  category: tool
  cost_cp: 3000
  weight: 1.0
  small_quarter: 0
  description: This kit contains the tools you need to use the Disable Device and Open Lock skills. Without these tools, you must improvise tools, and you take a –2 circumstance penalty on Disable Device and Open Locks checks.
- id: thieves_tools_masterwork
  name: Thieves’ tools, masterwork
  category: tool
  cost_cp: 10000
  weight: 2.0
  small_quarter: 0
  description: This kit contains extra tools and tools of better make, which grant a +2 circumstance bonus on Disable Device and Open Lock checks.
- id: tool_masterwork
  name: Tool, masterwork
  category: tool
  cost_cp: 5000
  weight: 1.0
  small_quarter: 0
  description: This well-made item is the perfect tool for the job. It grants a +2 circumstance bonus on a related skill check (if any). Bonuses provided by multiple masterwork items used toward the same skill check do not stack.
- id: water_clock
  name: Water clock
  category: tool
  cost_cp: 100000
  weight: 200.0
  small_quarter: 0
  description: "This large, bulky contrivance gives the time accurate to within half an hour per day since it was last set. It requires a source of water, and it must be kept still because it marks time by the regulated flow of droplets of water.\n\n### Clothing"
- id: artisan_s_outfit
  name: Artisan’s outfit
  category: clothing
  cost_cp: 100
  weight: 4.0
  small_quarter: 1
  description: This outfit includes a shirt with buttons, a skirt or pants with a drawstring, shoes, and perhaps a cap or hat. It may also include a belt or a leather or cloth apron for carrying tools.
- id: cleric_s_vestments
  name: Cleric’s vestments
  category: clothing
  cost_cp: 500
  weight: 6.0
  small_quarter: 1
  description: These ecclesiastical clothes are for performing priestly functions, not for adventuring.
- id: cold_weather_outfit
  name: Cold weather outfit
  category: clothing
  cost_cp: 800
  weight: 7.0
  small_quarter: 1
  description: "A cold weather outfit includes a wool coat, linen shirt, wool cap, heavy cloak, thick pants or skirt, and\n\nboots. This outfit grants a +5 circumstance bonus on Fortitude saving throws against exposure to cold weather."
- id: courtier_s_outfit
  name: Courtier’s outfit
  category: clothing
  cost_cp: 3000
  weight: 6.0
  small_quarter: 1
  description: This outfit includes fancy, tailored clothes in whatever fashion happens to be the current style in the courts of the nobles. Anyone trying to influence nobles or courtiers while wearing street dress will have a hard time of it (–2 penalty on Charisma-based skill checks to influence such individuals). If you wear this outfit without jewelry (costing an additional 50 gp), you look like an out-of-place commoner.
- id: entertainer_s_outfit
  name: Entertainer’s outfit
  category: clothing
  cost_cp: 300
  weight: 4.0
  small_quarter: 1
  description: This set of flashy, perhaps even gaudy, clothes is for entertaining. While the outfit looks whimsical, its practical design lets you tumble, dance, walk a tightrope, or just run (if the audience turns ugly).
- id: explorer_s_outfit
  name: Explorer’s outfit
  category: clothing
  cost_cp: 1000
  weight: 8.0
  small_quarter: 1
  description: This is a full set of clothes for someone who never knows what to expect. It includes sturdy boots, leather breeches or a skirt, a belt, a shirt (perhaps with a vest or jacket), gloves, and a cloak. Rather than a leather skirt, a leather overtunic may be worn over a cloth skirt. The clothes have plenty of pockets (especially the cloak). The outfit also includes any extra items you might need, such as a scarf or a wide-brimmed hat.
- id: monk_s_outfit
  name: Monk’s outfit
  category: clothing
  cost_cp: 500
  weight: 2.0
  small_quarter: 1
  description: This simple outfit includes sandals, loose breeches, and a loose shirt, and is all bound together with sashes. The outfit is designed to give you maximum mobility, and it’s made of high-quality fabric. You can hide small weapons in pockets hidden in the folds, and the sashes are strong enough to serve as short ropes.
- id: noble_s_outfit
  name: Noble’s outfit
  category: clothing
  cost_cp: 7500
  weight: 10.0
  small_quarter: 1
  description: This set of clothes is designed specifically to be expensive and to show it. Precious metals and gems are worked into the clothing. To fit into the noble crowd, every would-be noble also needs a signet ring (see Adventuring Gear, above) and jewelry (worth at least 100 gp).
- id: peasant_s_outfit
  name: Peasant’s outfit
  category: clothing
  cost_cp: 10
  weight: 2.0
  small_quarter: 1
  description: This set of clothes consists of a loose shirt and baggy breeches, or a loose shirt and skirt or overdress. Cloth wrappings are used for shoes.
- id: royal_outfit
  name: Royal outfit
  category: clothing
  cost_cp: 20000
  weight: 15.0
  small_quarter: 1
  description: This is just the clothing, not the royal scepter, crown, ring, and other accoutrements. Royal clothes are ostentatious, with gems, gold, silk, and fur in abundance.
- id: scholar_s_outfit
  name: Scholar’s outfit
  category: clothing
  cost_cp: 500
  weight: 6.0
  small_quarter: 1
  description: Perfect for a scholar, this outfit includes a robe, a belt, a cap, soft shoes, and possibly a cloak.
- id: traveler_s_outfit
  name: Traveler’s outfit
  category: clothing
  cost_cp: 100
  weight: 5.0
  small_quarter: 1
  description: "This set of clothes consists of boots, a wool skirt or breeches, a sturdy belt, a shirt (perhaps with a vest or jacket), and an ample cloak with a hood.\n\n### Food, Drink, and Lodging"
