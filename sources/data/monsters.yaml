  source_note: "KONSTRUERET (ikke en trykt SRD-tabel): menneske Warrior 1 bygget efter SRD's NPC-klasse-regler. Ability scores følger den nonelite-array-fordeling SRD selv bruger til alle sine 1st-Level Warrior-racer (Str 13/Dex 11/Con 12/Int 10/Wis 9/Cha 8, her uden racial justering da mennesket ikke har nogen). Udstyr (forstærket læder + tungt træskjold + langsværd + kastespyd) er et generisk soldater-loadout, ikke trykt. Warrior har 2 skill-point/niveau, mennesket lægger 4 bonus-point til ved niveau 1 (i alt 12 point) — kun tre repræsentative færdigheder er listet i stedet for at udtømme alle point. Feats: ét almindeligt niveau-1-feat + menneskets bonus-feat."

