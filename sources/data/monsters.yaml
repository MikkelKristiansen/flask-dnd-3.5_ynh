  source_note: "KONSTRUERET (ikke en trykt SRD-tabel): menneske Bard 4 efter Table: The Bard (character-classes-i.md) — BAB +3, Fort +1, Ref +4, Will +4, spells/dag 3/2/0 og spells known 6/3/2, samt Special-kolonnen: bardic music + bardic knowledge + countersong + fascinate + inspire courage +1 (L1), inspire competence (L3). Spontan caster (kaster frit fra kendte spells; ingen 2.-niveau-slot fra tabellen, kun via Cha-bonus). Elite array Cha-primært; +1 ability-increase ved character-niveau 4 lagt på Cha (15 → 16). Array: Cha 16/Dex 14/Con 13/Int 12/Str 10/Wis 8. HP = gennemsnit 4d6 (14) + Con-mod×4 (+4) + Toughness (+3) = 21. AC 15 = 10 + 3 forstærket læder + 2 Dex (barder kaster uhindret i let rustning). Kårde bruges med Weapon Finesse (angreb = BAB 3 + Dex 2 = +5; skade er stadig Str 0). Bardisk musik = 1/dag pr. bard-niveau = 4/dag. Bardic knowledge = +bard-niveau 4 + Int-mod 1 = +5. Slots/dag = base 3/2/0 + Cha-bonusspells (Cha-mod +3 giver +1 på spell-niveau 1 og 2) = 3/3/1; spells known påvirkes IKKE af Cha (2.-niveau-known kræver dog Cha høj nok til bonusspell, hvilket Cha 16 opfylder). DC = 10 + spell-niveau + Cha-mod (3). Feats: L1 Weapon Finesse, human bonus Toughness, L3 Skill Focus (Perform). Skill-point = (6 + Int 1) × (4 + 3 niveauer) + 4 human = 53, fordelt på fem viste class-skills (maks 7 ranks ved niveau 4)."

