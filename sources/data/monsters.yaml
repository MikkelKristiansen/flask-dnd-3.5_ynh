# monsters — DM-bestiar (SRD v3.5, OGL v1.0a). Kilden til sandheden.
#
# TRYKT HYBRID: gem den FÆRDIGE SRD-statblok direkte (HP/AC/saves/angreb som
# trykt). Monstre har ofte klasse-niveauer (kriger/tyv) eller skabeloner (skelet)
# der ikke beregnes rent fra rå stats — derfor transkriberes den trykte statblok.
# Ability-modifiers udledes ved VISNING (bestiary.monster_view), aldrig gemt.
#
# Felt-noter:
#   type      = væsen-type (humanoid/undead/animal/giant/magical beast/…). Fri tekst.
#   cr        = challenge rating som trykt (streng: "1/3", "2").
#   hd        = trykt HD-linje, fx "1d12 (6 hp)". hp_max = tallet i parentes.
#   ac/ac_touch/ac_flat = de tre trykte AC-tal. ac_note = den trykte opdeling.
#   str…cha   = ability scores; brug ~ (null) for "—" (fx undead uden Con/Int).
#   attacks   = JSON-liste: [{name, bonus, damage, crit?, notes?}] — ét objekt pr.
#               angrebsform (bonus/damage som trykte strenge, fx "+1"/"1d6+1").
#   full_attack = fri tekst: den fulde angrebs-rutine hvis der er mere end ét angreb.
#   skills    = JSON-liste [{name, total}]; ~ hvis væsenet ingen skills har.
#   feats     = JSON-liste af feat-navne.
#
# NB: starter-bestiaret (skelet, goblin, ork, kobold, hobgoblin, gnoll, bugbear,
# ulv, dire-rotte, zombie) er transkriberet fra trykte SRD-tabeller i
# rules/srd-v3.5-md/monsters/. kriger og tyv er derimod KONSTRUEREDE menneske-
# NPC'er (Warrior 1 / Rogue 1) bygget efter SRD's NPC-klasse-regler, ikke en
# direkte trykt tabel — se deres source_note for detaljer.

