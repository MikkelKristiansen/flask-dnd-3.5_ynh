# summon_lists — Summon Nature's Ally-tabellen (SRD v3.5, OGL v1.0a).
#
# Mapper SNA-spellniveau (I=1 … IX=9) → liste af væsen-id'er. Id'erne refererer
# ind i data/animals.yaml (det delte væsen-katalog). Et væsen kan optræde på
# flere lister er ikke tilfældet i SRD, men flere companion-dyr går igen her.
#
# Dokument-formet data (ikke SQLite) — indlæses af refdata.py.
#
# Status: SNA I-III komplet (Fase 0). SNA IV-V påbegyndt (Fase 6, batch 1):
# elementaler tilføjet og SRD-verificeret. De øvrige IV-V-væsner (dyr, outsidere,
# magical beasts) følger i senere batches; listerne udvides efterhånden.
#
# Note: Aquatic-væsner (octopus, porpoise, shark, squid) kan kun summones i
# vand/vådt miljø (SRD-fodnote 1). Det håndhæves ikke mekanisk — det er en
# spil-beslutning ved bordet.

