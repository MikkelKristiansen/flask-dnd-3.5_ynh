# specific_items — navngivne magiske våben/rustninger/skjolde (SRD Magic Items II).
#
# Del C: hver række er et PRESET for Del A's give-loot — base_ref + enhancement +
# abilities giver et fungerende InventoryItem (angrebs-motoren wirer flaming/frost/
# keen osv. automatisk). De BESPOKE-effekter (charge-skade, slay-on-crit, 1/dag-
# stråle …) er ren note-tekst — samme trin-1-filosofi som resten af magic-items.
#
# price_cp = markedspris i kobber (gp × 100). Kurateret ikonisk start-sæt; den lange
# hale (fler specifics + skjolde) kan udvides fra SRD-klonen senere (evt. via Sonnet).

