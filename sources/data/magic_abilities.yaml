# Magiske special abilities for våben/rustning/skjold (SRD v3.5, Magic Items II).
#
# Prissættes på to måder (styrer 'price'):
#   type: bonus  → "effektiv bonus"; value lægges oven på enhancement ved
#                  prisberegning (samlet effektiv bonus, cap +10). SELVE enhancement
#                  (til-hit/AC/skade) er UÆNDRET — abilities har egne effekter.
#   type: flat   → fast gp-tillæg (value i gp), lægges direkte på prisen.
#
# 'slots' = hvilke genstandstyper ability'en kan sidde på (weapon|armor|shield).
# 'note'  = kort dansk beskrivelse. TRIN 1: kun navn/note/pris vises — de mekaniske
# effekter (fx flaming = +1d6 ild) wires i et senere lag (som +N-skade i Fase C).
#
# Dette er et kurateret start-katalog (de hyppigste). Den lange hale (fx anarchic,
# axiomatic, ki focus, spell storing, dancing) kan udvides fra SRD-klonen senere.

# ── Våben ──────────────────────────────────────────────────────────────────
