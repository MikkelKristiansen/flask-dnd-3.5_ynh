# effects — mekaniske effekter (buffs & tilstande) som modifiers. Kilden til sandheden.
#
# Hver effekt har 0..n modifiers og 0..n riders, gemt som JSON-TEKST (samme mønster
# som animals' JSON-felter — afkodes i db._effect_row). En modifier:
#   {target, type, value, only_vs?, note?}
# Ability-targets (str..cha) KASKADERER via effective_ability_scores → angreb, skade,
# saves, skills, grapple, init, AC. Direkte targets (ac/save_*/attack/damage/...) lægges
# på i deres egen beregning (Fase 2+). only_vs-modifiers ryger IKKE i overskriftstallet.
#
# id matcher buffens spell_id (fra BUFF_CATALOG) hhv. tilstandens id, så app.py kan
# slå effekten op ud fra en aktiv buff/condition.

# ── Ability-buffs (kaskaderer fuldt — aktive fra Fase 1) ────────────────────
- id: bull_strength
  name: Bull's Strength
  kind: buff
  source_spell_id: bull_strength
  modifiers: '[{"target": "str", "type": "enhancement", "value": 4}]'

  picker: buff
  note: '+4 Str — alle Str-rul: angreb, skade, grapple, Str-skills'
  affects: '["str"]'
- id: cat_grace
  name: Cat's Grace
  kind: buff
  source_spell_id: cat_grace
  modifiers: '[{"target": "dex", "type": "enhancement", "value": 4}]'

  picker: buff
  note: +4 Dex — AC, Reflex, init, Dex-skills, ranged angreb
  affects: '["dex"]'
- id: bear_endurance
  name: Bear's Endurance
  kind: buff
  source_spell_id: bear_endurance
  modifiers: '[{"target": "con", "type": "enhancement", "value": 4}]'

  picker: buff
  note: +4 Con — HP, Fortitude-save, Con-checks
  affects: '["con"]'
- id: owl_wisdom
  name: Owl's Wisdom
  kind: buff
  source_spell_id: owl_wisdom
  modifiers: '[{"target": "wis", "type": "enhancement", "value": 4}]'

# ── Direkte bonusser (data klar — anvendes mekanisk fra Fase 2) ─────────────
  picker: buff
  note: +4 Wis — Will-save, Wis-skills, druide-spell-DC'er
  affects: '["wis"]'
- id: resistance
  name: Resistance
  kind: buff
  source_spell_id: resistance
  modifiers: '[{"target": "save_all", "type": "resistance", "value": 1}]'

  picker: buff
  note: +1 resistance på alle saves
  affects: '["save"]'
- id: bless
  name: Bless
  kind: buff
  source_spell_id: bless
  modifiers: '[{"target": "attack", "type": "morale", "value": 1}, {"target": "save_will",
    "type": "morale", "value": 1, "only_vs": "fear"}]'

  picker: buff
  note: +1 på angrebsrul og +1 saves mod frygt
  affects: '["attack", "save"]'
- id: shield_of_faith
  name: Shield of Faith
  kind: buff
  source_spell_id: shield_of_faith
  modifiers: '[{"target": "ac", "type": "deflection", "value": 2}]'

  picker: buff
  note: +2 deflection-bonus til AC (mere ved højere niveau)
  affects: '["ac"]'
- id: barkskin
  name: Barkskin
  kind: buff
  source_spell_id: barkskin
  modifiers: '[{"target": "ac", "type": "natural", "value": 2}]'

  picker: buff
  note: +2 naturlig rustning til AC (mere ved højere niveau)
  affects: '["ac"]'
# Wizard/arcane-buffs — vises i deres egen 'Arcane'-gruppe i buff-vælgeren (category).
- id: mage_armor
  name: Mage Armor
  kind: buff
  source_spell_id: mage_armor
  modifiers: '[{"target": "ac", "type": "armor", "value": 4}]'

  picker: buff
  category: arcane
  note: +4 armor-bonus til AC (force; ikke i touch, stacker ikke med båret rustning)
  affects: '["ac"]'
- id: magic_fang
  name: Magic Fang
  kind: buff
  source_spell_id: magic_fang
  modifiers: '[{"target": "attack", "type": "enhancement", "value": 1}, {"target":
    "damage", "type": "enhancement", "value": 1}]'

  picker: buff
  note: +1 angreb og skade på ÉT naturligt våben (godt til companion)
  affects: '["attack"]'
- id: magic_fang_greater
  name: Magic Fang, Greater
  kind: buff
  source_spell_id: magic_fang_greater
  # SRD: +1 pr. 4 casterniveauer (maks +5). Samme kendte forenkling som Divine
  # Favor herunder — fladt +1 (korrekt CL 1-4); fuld niveauskalering hører til
  # en senere polish-fase af buff-motoren (ingen buff-modifier er niveau-følsom endnu).
  modifiers: '[{"target": "attack", "type": "enhancement", "value": 1}, {"target":
    "damage", "type": "enhancement", "value": 1}]'

  picker: buff
  note: +1 angreb og skade på ÉT (eller alle) naturlige våben (+1 pr. 4 casterniveauer, maks +5)
  affects: '["attack"]'
- id: magic_weapon
  name: Magic Weapon
  kind: buff
  source_spell_id: magic_weapon
  modifiers: '[{"target": "attack", "type": "enhancement", "value": 1}, {"target":
    "damage", "type": "enhancement", "value": 1}]'

  picker: buff
  note: +1 angreb og skade på ÉT våben (stacker ikke med mesterværk)
  affects: '["attack"]'
- id: magic_weapon_greater
  name: Magic Weapon, Greater
  kind: buff
  source_spell_id: magic_weapon_greater
  # SRD: +1 pr. 4 casterniveauer (maks +5) — samme kendte fladt-+1-forenkling som
  # Divine Favor/Magic Fang Greater herover.
  modifiers: '[{"target": "attack", "type": "enhancement", "value": 1}, {"target":
    "damage", "type": "enhancement", "value": 1}]'

  picker: buff
  note: +1 angreb og skade på ÉT våben (+1 pr. 4 casterniveauer, maks +5)
  affects: '["attack"]'
- id: longstrider
  name: Longstrider
  kind: buff
  source_spell_id: longstrider
  modifiers: '[{"target": "speed", "type": "enhancement", "value": 10}]'

  picker: buff
  note: +10 ft. til land-bevægelse
  affects: '["speed"]'
- id: divine_favor
  name: Divine Favor
  kind: buff
  source_spell_id: divine_favor
  # +1 luck pr. 3 casterniveauer (min +1). Modelleret fladt +1 (korrekt CL 1–2);
  # fuld niveauskalering hører til polish-fasen.
  modifiers: '[{"target": "attack", "type": "luck", "value": 1}, {"target": "damage",
    "type": "luck", "value": 1}]'

# ── Roll-only / temp-HP / rene tracking-buffs (modifiers tomme indtil Fase 3) ─
  picker: buff
  note: +1 luck på angreb og skade (+1 pr. 3 casterniveauer)
  affects: '["attack"]'
- id: guidance
  name: Guidance
  kind: buff
  source_spell_id: guidance
  riders: '[{"type": "roll_only", "note": "+1 competence på ÉT angreb, save eller
    skill (engangs — tap-to-apply)"}]'

  picker: buff
  note: +1 competence på ÉT angreb, save eller skill (engangs)
  affects: '["attack", "save", "skill"]'
- id: virtue
  name: Virtue
  kind: buff
  source_spell_id: virtue
