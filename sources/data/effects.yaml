# effects — mekaniske effekter (buffs & tilstande) som modifiers. Kilden til sandheden.
#
# Hver effekt har 0..n modifiers og 0..n riders, gemt som JSON-TEKST (samme mønster
# som animals' JSON-felter — afkodes i db._effect_row). En modifier:
#   {target, type, value, only_vs?, note?}
# Ability-targets (str..cha) KASKADERER via effective_ability_scores → angreb, skade,
# saves, skills, grapple, init, AC. Direkte targets (ac/save_*/attack/damage/...) lægges
# på i deres egen beregning (Fase 2+). only_vs-modifiers ryger IKKE i overskriftstallet.
#
# id matcher buffens spell_id (fra BUFF_CATALOG) hhv. tilstandens id, så app.py kan
# slå effekten op ud fra en aktiv buff/condition.

# ── Ability-buffs (kaskaderer fuldt — aktive fra Fase 1) ────────────────────
- id: bull_strength
  name: Bull's Strength
  kind: buff
  source_spell_id: bull_strength
  modifiers: '[{"target": "str", "type": "enhancement", "value": 4}]'

- id: cat_grace
  name: Cat's Grace
  kind: buff
  source_spell_id: cat_grace
  modifiers: '[{"target": "dex", "type": "enhancement", "value": 4}]'

- id: bear_endurance
  name: Bear's Endurance
  kind: buff
  source_spell_id: bear_endurance
  modifiers: '[{"target": "con", "type": "enhancement", "value": 4}]'

- id: owl_wisdom
  name: Owl's Wisdom
  kind: buff
  source_spell_id: owl_wisdom
  modifiers: '[{"target": "wis", "type": "enhancement", "value": 4}]'

# ── Direkte bonusser (data klar — anvendes mekanisk fra Fase 2) ─────────────
- id: resistance
  name: Resistance
  kind: buff
  source_spell_id: resistance
  modifiers: '[{"target": "save_all", "type": "resistance", "value": 1}]'

- id: bless
  name: Bless
  kind: buff
  source_spell_id: bless
  modifiers: '[{"target": "attack", "type": "morale", "value": 1}, {"target": "save_will", "type": "morale", "value": 1, "only_vs": "fear"}]'

- id: shield_of_faith
  name: Shield of Faith
  kind: buff
  source_spell_id: shield_of_faith
  modifiers: '[{"target": "ac", "type": "deflection", "value": 2}]'

- id: barkskin
  name: Barkskin
  kind: buff
  source_spell_id: barkskin
  modifiers: '[{"target": "ac", "type": "natural", "value": 2}]'

- id: magic_fang
  name: Magic Fang
  kind: buff
  source_spell_id: magic_fang
  modifiers: '[{"target": "attack", "type": "enhancement", "value": 1}, {"target": "damage", "type": "enhancement", "value": 1}]'

- id: longstrider
  name: Longstrider
  kind: buff
  source_spell_id: longstrider
  modifiers: '[{"target": "speed", "type": "enhancement", "value": 10}]'

- id: divine_favor
  name: Divine Favor
  kind: buff
  source_spell_id: divine_favor
  # +1 luck pr. 3 casterniveauer (min +1). Modelleret fladt +1 (korrekt CL 1–2);
  # fuld niveauskalering hører til polish-fasen.
  modifiers: '[{"target": "attack", "type": "luck", "value": 1}, {"target": "damage", "type": "luck", "value": 1}]'

# ── Roll-only / temp-HP / rene tracking-buffs (modifiers tomme indtil Fase 3) ─
- id: guidance
  name: Guidance
  kind: buff
  source_spell_id: guidance
  riders: '[{"type": "roll_only", "note": "+1 competence på ÉT angreb, save eller skill (engangs — tap-to-apply)"}]'

- id: virtue
  name: Virtue
  kind: buff
  source_spell_id: virtue
  riders: '[{"note": "+1 midlertidigt HP"}]'

- id: produce_flame
  name: Produce Flame
  kind: buff
  source_spell_id: produce_flame
  riders: '[{"note": "Låser et spell-angreb op (se Angreb)"}]'

- id: endure_elements
  name: Endure Elements
  kind: buff
  source_spell_id: endure_elements

# ── Tilstande med typede straffe (id matcher conditions-tabellen) ───────────
# Tilføjes via tilstands-vælgeren; effekten slås op på samme id og giver tallene.
- id: shaken
  name: Shaken
  kind: condition
  modifiers: '[{"target": "attack", "type": "penalty", "value": -2}, {"target": "save_all", "type": "penalty", "value": -2}, {"target": "skill_all", "type": "penalty", "value": -2}]'

- id: sickened
  name: Sickened
  kind: condition
  modifiers: '[{"target": "attack", "type": "penalty", "value": -2}, {"target": "damage", "type": "penalty", "value": -2}, {"target": "save_all", "type": "penalty", "value": -2}, {"target": "skill_all", "type": "penalty", "value": -2}]'

# Fatigued = −2 Str og −2 Dex → kaskaderer automatisk via ability-modellen.
- id: fatigued
  name: Fatigued
  kind: condition
  modifiers: '[{"target": "str", "type": "penalty", "value": -2}, {"target": "dex", "type": "penalty", "value": -2}]'

# Exhausted = −6 Str og −6 Dex (kaskaderer) + halv fart.
- id: exhausted
  name: Exhausted
  kind: condition
  modifiers: '[{"target": "str", "type": "penalty", "value": -6}, {"target": "dex", "type": "penalty", "value": -6}]'
  riders: '[{"type": "half_speed", "note": "Halv bevægelse"}]'

# ── Mister Dex-til-AC (lose_dex) + −2 AC ────────────────────────────────────
- id: blinded
  name: Blinded
  kind: condition
  modifiers: '[{"target": "ac", "type": "penalty", "value": -2}]'
  riders: '[{"type": "lose_dex", "note": "Mister Dex-bonus til AC"}, {"type": "half_speed", "note": "Halv bevægelse"}, {"note": "50% miss chance (alle modstandere har total concealment)"}, {"note": "−4 på Search og de fleste Str/Dex-skills"}]'

- id: cowering
  name: Cowering
  kind: condition
  modifiers: '[{"target": "ac", "type": "penalty", "value": -2}]'
  riders: '[{"type": "lose_dex", "note": "Mister Dex-bonus til AC"}, {"note": "Frosset af frygt — kan ikke handle"}]'

- id: stunned
  name: Stunned
  kind: condition
  modifiers: '[{"target": "ac", "type": "penalty", "value": -2}]'
  riders: '[{"type": "lose_dex", "note": "Mister Dex-bonus til AC"}, {"note": "Kan ikke handle; taber alt i hænderne"}]'

- id: flat_footed
  name: Flat-footed
  kind: condition
  modifiers: '[]'
  riders: '[{"type": "lose_dex", "note": "Mister Dex-bonus til AC"}, {"note": "Kan ikke lave attacks of opportunity"}]'

# ── Ability-/attack-straffe der kaskaderer (resten er flag) ─────────────────
- id: entangled
  name: Entangled
  kind: condition
  modifiers: '[{"target": "dex", "type": "penalty", "value": -4}, {"target": "attack", "type": "penalty", "value": -2}]'
  riders: '[{"type": "half_speed", "note": "Halv fart; kan ikke løbe eller charge"}, {"note": "Spells kræver Concentration-check (DC 15)"}]'

- id: grappled
  name: Grappled
  kind: condition
  modifiers: '[{"target": "dex", "type": "penalty", "value": -4}]'
  riders: '[{"note": "−4 attack med lette våben; kan ikke bevæge sig"}, {"note": "Spells kræver Concentration"}]'

- id: dazzled
  name: Dazzled
  kind: condition
  modifiers: '[{"target": "attack", "type": "penalty", "value": -1}]'
  riders: '[{"note": "−1 på syns-baserede Spot-checks"}]'

- id: frightened
  name: Frightened
  kind: condition
  modifiers: '[{"target": "attack", "type": "penalty", "value": -2}, {"target": "save_all", "type": "penalty", "value": -2}, {"target": "skill_all", "type": "penalty", "value": -2}]'
  riders: '[{"note": "Flygter fra kilden hvis muligt"}]'

- id: panicked
  name: Panicked
  kind: condition
  modifiers: '[{"target": "attack", "type": "penalty", "value": -2}, {"target": "save_all", "type": "penalty", "value": -2}, {"target": "skill_all", "type": "penalty", "value": -2}]'
  riders: '[{"note": "Taber alt i hænderne og flygter"}]'

- id: deafened
  name: Deafened
  kind: condition
  modifiers: '[{"target": "init", "type": "penalty", "value": -4}]'
  riders: '[{"note": "20% spell failure (verbale komponenter)"}, {"note": "Fejler automatisk Listen-checks"}]'

# ── Rene flag (ikke-numeriske / betingede / handlingsøkonomi) ───────────────
- id: prone
  name: Prone
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "−4 på melee-angreb"}, {"note": "+4 AC mod ranged, −4 AC mod melee"}]'

- id: helpless
  name: Helpless
