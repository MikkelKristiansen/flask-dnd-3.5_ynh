  modifiers: '[]'
  riders: '[{"note": "Behandles som Dex 0; coup de grace muligt"}, {"note": "Modstandere i nærkamp får +4 til angreb"}]'

- id: paralyzed
  name: Paralyzed
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "Str og Dex behandles som 0; helpless"}, {"note": "Coup de grace muligt for modstandere"}]'

- id: nauseated
  name: Nauseated
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "Kun én move-action pr. runde; ingen angreb/spells"}]'

- id: confused
  name: Confused
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "Tilfældig handling hver runde (slå d%)"}]'

- id: disabled
  name: Disabled
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "0 HP: én handling/runde; anstrengelse koster 1 skade"}]'

- id: fascinated
  name: Fascinated
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "−4 på Spot og Listen; tager ingen handlinger"}]'

- id: staggered
  name: Staggered
  kind: condition
  modifiers: '[]'
  riders: '[{"note": "Kun én handling/runde (move eller standard)"}]'

- id: unconscious
