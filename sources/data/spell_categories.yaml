# Menneske-verificerede mekanik-kategorier (override af triage_spells.py's auto-gæt).
# Format: <spell_id>: <bogstav>  (A-G, se briefs/STRATEGY-spells.md)
# Ryddes ALDRIG automatisk — det er den permanente menneske-sandhed.
#
# To sektioner med FORSKELLIG proveniens (vises som forskellig 'konf' i triagen):
#   corrected          = auto-gæt var FORKERT, aktivt rettet af mennesket
#   confirmed_from_low  = auto-gæt var 'lav' sikkerhed men GODKENDT ved review.
#                         Bevidst markeret, så mistanker fra spiltest kan spores hertil.

# --- Rettelser (review runde 1, 4. jul 2026) ---
corrected:
  air_walk: F              # utility — fanget forkert som B pga. skade-omtale
  dimension_door: F        # teleport-utility
  ethereal_jaunt: F        # utility
  fly: F                   # utility
  geas_quest: F            # tvang/utility, ingen angrebsrul
  mages_faithful_hound: C  # tilkalder en vagthund → summon
  meld_into_stone: F       # utility
  quench: F                # utility (slukker ild)
  repel_vermin: F          # beskyttelses-utility
  solid_fog: F             # battlefield-utility, ingen angrebsrul
  teleport: F              # utility
  transmute_rock_to_mud: F # terræn-utility
  weird: E                 # phantasmal killer-variant, save mod mål

  # --- runde 2: kontrol-E falske-E → A/F (fanget af gen_control_e_rows.py) ---
  # Auto-klassificeret E pga. en rigtig save, men mekanisk buff/utility. Får ingen
  # save-række i spell_attacks.yaml; her rettes triage-kategorien tilsvarende.
  animal_growth: A         # størrelses-/evne-buff på egne dyr
  enlarge_person: A        # størrelses-buff
  reduce_person: A         # størrelses-buff
  sanctuary: A             # defensiv buff (beskytter den ramte)
  awaken: F                # gør egen dyr/træ sansende — utility
  bless_water: F           # laver vievand — object-save
  chill_metal: F           # metal-effekt — object-save (ingen ren save-for-skade)
  curse_water: F           # laver vanvand — object-save
  gentle_repose: F         # bevarer lig — object-save
  ghost_sound: F           # illusion (disbelief)
  hallucinatory_terrain: F # illusion (disbelief)
  heat_metal: F            # metal-effekt — object-save (ingen ren save-for-skade)
  illusory_wall: F         # illusion (disbelief)
  mages_disjunction: F     # dispel — object-save
  magic_mouth: F           # object-save
  obscure_object: F        # object-save
  open_close: F            # object-save
  polymorph_any_object: F  # object-save
  project_image: F         # illusion (disbelief)
  purify_food_drink: F     # object-save
  sculpt_sound: F          # object-save
  seeming: F               # illusions-forklædning — utility
  shadow_conjuration: F    # illusion (disbelief)
  shadow_evocation: F      # illusion (disbelief)
  shadow_walk: F           # transport — utility
  shrink_item: F           # object-save
  silence: F               # object-save
  silent_image: F          # illusion (disbelief)
  stone_to_flesh: F        # object-save
  telekinetic_sphere: F    # object-save
  teleport_object: F       # object-save
  undetectable_alignment: F # object-save
  veil: F                  # illusions-forklædning — utility
  ventriloquism: F         # illusion (disbelief)
  warp_wood: F             # object-save
  wood_shape: F            # object-save

  # --- runde 3: kategori-E-hul-gennemgang, 5. jul (BRIEF-spell-gaps-category-e.md) ---
  # Verificeret mod rå SRD-tekst — ingen af disse fem er reelt "offensiv m/ save-DC":
  snare: F                 # RETTELSE af tidligere "E": SRD siger "Saving Throw: None"
                           # — magisk fælde, ikke et angreb med redningskast.
  spike_growth: F          # terræn-fælde (1 time/niveau (D)) — skade er pr. bevægelse,
                           # ikke ét cast-og-rul; saven er mod en SEPARAT effekt
                           # (halveret fart), ikke mod skaden. Passer duration-trackeren.
  spike_stones: F          # samme mønster som spike_growth.
  telekinesis: F           # tre vidt forskellige undertilstande (sustained/kamp-
                           # manøvre/kast), ingen enkelt skade-formel — for komplekst
                           # til én række, ude af scope for denne batch.
  wall_of_ice: F           # væg-spell (som wall_of_fire/wall_of_iron, se
                           # BRIEF-spell-gaps-category-b.md) — skaden er "no save"
                           # ved gennembrud, IKKE knyttet til det nævnte Reflex-save
                           # (som kun forhindrer selve væggens dannelse).

  # --- runde 4: kategori D-gennemgang, 5. jul (BRIEF-weapon-buff-spells.md) ---
  mages_sword: C           # RETTELSE fra "D": Bigby's-sværdet er et selvstændigt,
                           # angribende kraftfelt (som Clenched Fist/Crushing Hand,
                           # se BRIEF-spell-gaps-category-b.md) — ikke en buff på et
                           # eksisterende våben. Hverken C- eller D-motoren dækker
                           # det endnu; kategorien er nu bare korrekt.

# --- Godkendte auto-gæt der var 'lav' (review runde 1) ---
