# magic_items — selvstændige magiske genstande (SRD v3.5, Magic Items III & V).
#
# Del B1 (wondrous/ringe): permanente bonusser modelleret som `modifiers` (samme
# JSON-form som effects.yaml). Et BÅRET item (state=worn i inventaret) bidrager sine
# modifiers til active_modifiers via effekt-motoren (effects.magic_item_modifiers),
# så AC/saves/abilities-pipelinen håndterer stacking automatisk (samme type stacker
# ikke). Forbrugsvarer (potions/scrolls/wands) kommer i B2 (spell_id + charges_max).
#
# price_cp = markedspris i kobber (gp × 100). Modifier-typer der IKKE stacker med
# hinanden: deflection (Ring of Protection), natural (Amulet of Natural Armor),
# armor (Bracers of Armor), resistance (Cloak of Resistance), enhancement (ability).

# ── Cloak of Resistance (+N resistance til ALLE saves) ──────────────────────
