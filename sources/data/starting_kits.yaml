# starting_kits — anbefalede startkøb pr. klasse (level 1).
#
# Dette er DATA, ikke regler: hvad en ny karakter af hver klasse typisk bør købe.
# Bruges KUN til at markere 'anbefalet'-flaget i udrustningsbutikken — det styrer
# intet og tvinger ingenting. Id'erne refererer til weapons/armor/items-katalogerne
# (bare id, matches inden for sin egen tabel).
#
# &common-ankeret er fælles eventyrgrej alle klasser vil have; *common indsætter det.
# Tilføj/ret frit — en ukendt id ignoreres bare (markerer intet).

_common: &common
  - backpack_empty
  - bedroll
  - flint_and_steel
  - torch
  - rope_hempen_50_ft
  - waterskin
  - rations_trail_per_day
  - explorer_s_outfit

kits:
  barbarian:
    - greataxe
    - javelin
    - hide
    - *common

  bard:
