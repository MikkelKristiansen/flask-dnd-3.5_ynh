# animals — SRD v3.5 basis-statblokke for væsner (OGL v1.0a). Kilden til sandheden.
#
# DELT KATALOG: rummer både animal companions OG væsner der kan summones med
# Summon Nature's Ally (se data/summon_lists.yaml for niveau→væsen-tabellen).
# Trods navnet "animals" kan kataloget også indeholde elementaler, magical beasts
# og fey (de summonbare ikke-dyr).
#
# Kun det RÅ basis-væsen gemmes her. Alt mekanisk (HP, AC, BAB, grapple, saves,
# initiativ, til-hit, skade) BEREGNES (companion.py for companions; summon.py for
# summons) ud fra base_hd + abilities. Gem aldrig beregnede totaler.
#
# Felt-noter:
#   base_hd      = antal hit dice før bonus-HD fra avancement.
#   type         = animal (UDELAD = default) | magical_beast | elemental | fey.
#                  Styrer BAB: animal/elemental ¾·HD · magical_beast 1·HD · fey ½·HD.
#   hit_die      = terningtype pr. HD. UDELAD for dyr/elementaler (= d8); sæt 10
#                  for magical beasts, 6 for fey. Bruges kun til HP-beregning.
#   good_saves   = JSON-liste over de "gode" saves. UDELAD = udled af type
#                  (animal/magical_beast: ["fort","ref"] · fey: ["ref","will"]).
#                  KRÆVES for elementaler (varierer pr. element: luft/ild ["ref"],
#                  jord/vand ["fort"]).
#   companion_ok = UDELAD (eller true) = kan vælges som animal companion;
#                  false = kun summonbar (vises ikke i companion-vælgeren).
#   attacks  = JSON: group=primary får fuld Str (eller ×1,5 hvis ENESTE angreb),
#              secondary får −5 til-hit og ½ Str. count = antal af samme våben.
#   skills   = JSON: misc = printet total − basis-abilitymod, så totalen følger
#              med når avancement hæver Str/Dex. note = situationsbestemt bonus.
#   feats    = JSON: navne (Weapon Finesse/Weapon Focus aflæses af beregningen).
#
# ── Animal companions (standard druide/ranger-liste, level 1) ────────────────
# (companion_ok udeladt = egnet; flere af disse er også på SNA-tabellen.)

