# animals — SRD v3.5 basis-statblokke for dyreledsagere (OGL v1.0a). Kilden til sandheden.
#
# Kun det RÅ basis-dyr gemmes her. Alt mekanisk (HP, AC, BAB, grapple, saves,
# initiativ, til-hit, skade) BEREGNES i companion.py ud fra base_hd + abilities
# + companion-avancement (effektivt druideniveau). Gem aldrig beregnede totaler.
#
# Felt-noter:
#   base_hd  = antal d8 før bonus-HD fra avancement.
#   attacks  = JSON: group=primary får fuld Str (eller ×1,5 hvis ENESTE angreb),
#              secondary får −5 til-hit og ½ Str. count = antal af samme våben.
#   skills   = JSON: misc = printet total − basis-abilitymod, så totalen følger
#              med når avancement hæver Str/Dex. note = situationsbestemt bonus.
#   feats    = JSON: navne (Weapon Finesse/Weapon Focus aflæses af beregningen).
#
# Standard druide/ranger-liste (level 1, ingen niveaujustering).

- id: badger
  name: Badger
  size: small
  base_hd: 1
  str: 8
  dex: 17
  con: 15
  int: 2
  wis: 12
  cha: 6
  natural_armor: 1
  speed: "30 ft., burrow 10 ft."
  attacks: '[{"name": "Claw", "damage": "1d2", "group": "primary", "count": 2}, {"name": "Bite", "damage": "1d3", "group": "secondary"}]'
  special_attacks: Rage
  special_qualities: "Low-light vision, scent"
  skills: '[{"id": "escape_artist", "misc": 4}, {"id": "listen", "misc": 2}, {"id": "spot", "misc": 2}]'
  feats: '["Track", "Weapon Finesse"]'

