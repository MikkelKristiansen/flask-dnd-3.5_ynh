# races — SRD v3.5 data (OGL v1.0a). Kilden til sandheden for race-data.
# Indlæses direkte af refdata.py (IKKE via importer.py/SQLite), fordi dataene er
# dokument-formede (nested skill-bonusser, sprog-lister, traits) og kun bruges ved
# karakter-oprettelse. Tilføj en race = tilføj én blok her, ingen Python-ændring.
#
# Felter:
#   size, speed              — størrelse og bevægelse
#   ability_adjust           — racial ability-justeringer (lægges på basis-scores)
#   skill_bonuses            — racial skill-bonusser (lægges i skills' misc)
#   languages.automatic      — sprog man altid kan (tæller ikke mod Int-bonus)
#   languages.bonus          — bonussprog man kan vælge ('any' = alle standardsprog)
#   bonus_feats              — ekstra feats spilleren vælger ved level 1
#   skill_point_bonus_per_level — ekstra skill points pr. level (human: 1)
#   save_bonus               — racial bonus på ALLE saves (lægges på i save_total)
#   traits                   — fri-tekst race-traits, pre-udfyldes på karakteren

human:
  size: medium
  speed: 30
  ability_adjust: {}
  skill_bonuses: {}
  # Human kan vælge et hvilket som helst standardsprog (bonus: any).
  languages:
    automatic: [Common]
    bonus: any
  bonus_feats: 1                   # ekstra feat ved level 1
  skill_point_bonus_per_level: 1   # +1 skill point pr. level
  traits:
    bonus_feat: "1 ekstra feat ved level 1"
    skill_points: "+1 skill point pr. level (medregnet automatisk)"
    size: Medium
    speed: "30 ft."

elf:
  size: medium
  speed: 30
  ability_adjust: {dex: 2, con: -2}
  skill_bonuses: {listen: 2, spot: 2, search: 2}
  languages:
    automatic: [Common, Elven]
    bonus: [Draconic, Gnoll, Gnome, Goblin, Orc, Sylvan]
  bonus_feats: 0
  traits:
    stat_mods: "+2 DEX, -2 CON"
    immunities: "Immun over for magisk sleep; +2 på saves mod enchantment"
    low_light_vision: true
    keen_senses: "+2 på Listen, Spot og Search; automatisk Search-tjek for hemmelige døre inden for 5 ft."
    weapon_proficiency: "Longsword, rapier, longbow, shortbow"
    size: Medium
    speed: "30 ft."

gnome:
  size: small
  speed: 20
  ability_adjust: {con: 2, str: -2}
  skill_bonuses: {listen: 2}
  languages:
    automatic: [Common, Gnome]
    bonus: [Draconic, Dwarven, Elven, Giant, Goblin, Orc]
  bonus_feats: 0
  traits:
    stat_mods: "+2 CON, -2 STR"
    size: Small
    size_bonuses: "+1 AC, +1 angreb, +4 Hide"
    low_light_vision: true
    illusion_save_bonus: 2
    illusion_dc_bonus: 1
    attack_bonus_vs: "Kobolder og goblinoids +1"
    dodge_ac_vs: "Giant-type monstre +4"
    listen_bonus: 2
    spell_like_abilities:
      - {id: speak_with_animals, note: "gravende dyr", freq: "1/dag"}
      - {id: dancing_lights, freq: "1/dag"}
      - {id: ghost_sound, freq: "1/dag"}
      - {id: prestidigitation, freq: "1/dag"}

halfling:
  size: small
  speed: 20
  ability_adjust: {dex: 2, str: -2}
  # Racial skill-affinitet (ikke størrelses-Hide — den er kun tekst, som hos gnome).
  skill_bonuses: {climb: 2, jump: 2, move_silently: 2, listen: 2}
  languages:
    automatic: [Common, Halfling]
    bonus: [Dwarven, Elven, Gnome, Goblin, Orc]
  save_bonus: 1                    # +1 på ALLE saves (racial)
  bonus_feats: 0
  traits:
    stat_mods: "+2 DEX, -2 STR"
    size: Small
    size_bonuses: "+1 AC, +1 angreb, +4 Hide"
    saves: "+1 på alle saves (medregnet i tallene)"
    fear_save_bonus: "+2 morale mod frygt (oveni racial +1)"
    thrown_attack_bonus: "+1 angreb med kastevåben og slynge"
    skill_affinity: "+2 Climb, Jump og Move Silently; +2 Listen"
    favored_class: Rogue
