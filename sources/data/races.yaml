# races — SRD v3.5 data (OGL v1.0a). Kilden til sandheden for race-data.
# Indlæses direkte af refdata.py (IKKE via importer.py/SQLite), fordi dataene er
# dokument-formede (nested skill-bonusser, sprog-lister, traits) og kun bruges ved
# karakter-oprettelse. Tilføj en race = tilføj én blok her, ingen Python-ændring.
#
# Felter:
#   size, speed              — størrelse og bevægelse
#   ability_adjust           — racial ability-justeringer (lægges på basis-scores)
#   skill_bonuses            — racial skill-bonusser (lægges i skills' misc)
#   languages.automatic      — sprog man altid kan (tæller ikke mod Int-bonus)
#   languages.bonus          — bonussprog man kan vælge ('any' = alle standardsprog)
#   bonus_feats              — ekstra feats spilleren vælger ved level 1
#   skill_point_bonus_per_level — ekstra skill points pr. level (human: 1)
#   save_bonus               — racial bonus på ALLE saves (lægges på i save_total)
#   bio                      — SRD højde/vægt/alder-tabeller (adulthood, age_dice pr.
#                              klassegruppe, height/weight base pr. køn + modifier-terning)
#   traits                   — fri-tekst race-traits, pre-udfyldes på karakteren

human:
  size: medium
  speed: 30
  ability_adjust: {}
  skill_bonuses: {}
  # Human kan vælge et hvilket som helst standardsprog (bonus: any).
  languages:
    automatic: [Common]
    bonus: any
  bonus_feats: 1                   # ekstra feat ved level 1
  bio:
    adulthood: 15
    age_dice: {fast: "1d4", medium: "1d6", slow: "2d6"}
    height_mod: "2d10"
    weight_mod: "2d4"
    height_base: {male: 58, female: 53}
    weight_base: {male: 120, female: 85}
  skill_point_bonus_per_level: 1   # +1 skill point pr. level
  traits:
    bonus_feat: "1 ekstra feat ved level 1"
    skill_points: "+1 skill point pr. level (medregnet automatisk)"
    size: Medium
    speed: "30 ft."

elf:
  size: medium
  speed: 30
  ability_adjust: {dex: 2, con: -2}
  skill_bonuses: {listen: 2, spot: 2, search: 2}
  languages:
    automatic: [Common, Elven]
    bonus: [Draconic, Gnoll, Gnome, Goblin, Orc, Sylvan]
  bonus_feats: 0
  bio:
    adulthood: 110
    age_dice: {fast: "4d6", medium: "6d6", slow: "10d6"}
    height_mod: "2d6"
    weight_mod: "1d6"
    height_base: {male: 53, female: 53}
    weight_base: {male: 85, female: 80}
  traits:
    stat_mods: "+2 DEX, -2 CON"
    immunities: "Immun over for magisk sleep; +2 på saves mod enchantment"
    low_light_vision: true
    keen_senses: "+2 på Listen, Spot og Search; automatisk Search-tjek for hemmelige døre inden for 5 ft."
    weapon_proficiency: "Longsword, rapier, longbow, shortbow"
    size: Medium
    speed: "30 ft."

gnome:
  size: small
  speed: 20
  ability_adjust: {con: 2, str: -2}
  skill_bonuses: {listen: 2}
  languages:
    automatic: [Common, Gnome]
    bonus: [Draconic, Dwarven, Elven, Giant, Goblin, Orc]
  bonus_feats: 0
  bio:
    adulthood: 40
    age_dice: {fast: "4d6", medium: "6d6", slow: "9d6"}
    height_mod: "2d4"
    weight_mod: "1"
    height_base: {male: 36, female: 34}
    weight_base: {male: 40, female: 35}
  traits:
    stat_mods: "+2 CON, -2 STR"
    size: Small
    size_bonuses: "+1 AC, +1 angreb, +4 Hide"
    low_light_vision: true
    illusion_save_bonus: 2
    illusion_dc_bonus: 1
    attack_bonus_vs: "Kobolder og goblinoids +1"
    dodge_ac_vs: "Giant-type monstre +4"
    listen_bonus: 2
    spell_like_abilities:
      - {id: speak_with_animals, note: "gravende dyr", freq: "1/dag"}
      - {id: dancing_lights, freq: "1/dag"}
      - {id: ghost_sound, freq: "1/dag"}
      - {id: prestidigitation, freq: "1/dag"}

halfling:
  size: small
  speed: 20
  ability_adjust: {dex: 2, str: -2}
  # Racial skill-affinitet (ikke størrelses-Hide — den er kun tekst, som hos gnome).
  skill_bonuses: {climb: 2, jump: 2, move_silently: 2, listen: 2}
  languages:
    automatic: [Common, Halfling]
    bonus: [Dwarven, Elven, Gnome, Goblin, Orc]
  save_bonus: 1                    # +1 på ALLE saves (racial)
  bonus_feats: 0
  bio:
    adulthood: 20
    age_dice: {fast: "2d4", medium: "3d6", slow: "4d6"}
    height_mod: "2d4"
    weight_mod: "1"
    height_base: {male: 32, female: 30}
    weight_base: {male: 30, female: 25}
  traits:
    stat_mods: "+2 DEX, -2 STR"
    size: Small
    size_bonuses: "+1 AC, +1 angreb, +4 Hide"
    saves: "+1 på alle saves (medregnet i tallene)"
    fear_save_bonus: "+2 morale mod frygt (oveni racial +1)"
    thrown_attack_bonus: "+1 angreb med kastevåben og slynge"
    skill_affinity: "+2 Climb, Jump og Move Silently; +2 Listen"
    favored_class: Rogue

dwarf:
  size: medium
  speed: 20
  ability_adjust: {con: 2, cha: -2}
  # Dværgens skill-bonusser er betingede (kun sten/metal) → står i traits, ikke
  # som ubetingede skill_bonuses (jf. gnome). Save-bonusser er også betingede.
  skill_bonuses: {}
  languages:
    automatic: [Common, Dwarven]
    bonus: [Giant, Gnome, Goblin, Orc, Terran, Undercommon]
  bonus_feats: 0
  bio:
    adulthood: 40
    age_dice: {fast: "3d6", medium: "5d6", slow: "7d6"}
    height_mod: "2d4"
    weight_mod: "2d6"
    height_base: {male: 45, female: 43}
    weight_base: {male: 130, female: 100}
  traits:
    stat_mods: "+2 CON, -2 CHA"
    size: Medium
    speed: "20 ft. (reduceres ikke af rustning eller bæring)"
    darkvision: "60 ft."
    stonecunning: "+2 Search for usædvanligt stenarbejde; kan søge inden for 10 ft.; fornem dybde under jorden"
    weapon_familiarity: "Dwarven waraxe og urgrosh tæller som martial weapons"
    stability: "+4 mod bull rush og trip når man står på jorden"
    poison_save_bonus: "+2 på saves mod gift"
    spell_save_bonus: "+2 på saves mod spells og spell-like abilities"
    attack_bonus_vs: "+1 angreb mod orker og goblinoids"
    dodge_ac_vs: "+4 dodge-AC mod giant-type monstre"
    skill_affinity: "+2 Appraise og Craft for sten- eller metalgenstande"
    favored_class: Fighter

half-orc:
  size: medium
  speed: 30
  ability_adjust: {str: 2, int: -2, cha: -2}
  skill_bonuses: {}
  languages:
    automatic: [Common, Orc]
    bonus: [Draconic, Giant, Gnoll, Goblin, Abyssal]
  bonus_feats: 0
  bio:
    adulthood: 14
    age_dice: {fast: "1d4", medium: "1d6", slow: "2d6"}
    height_mod: "2d12"
    weight_mod: "2d6"
    height_base: {male: 58, female: 53}
    weight_base: {male: 150, female: 110}
  traits:
    stat_mods: "+2 STR, -2 INT, -2 CHA"
    size: Medium
    speed: "30 ft."
    darkvision: "60 ft."
    orc_blood: "Tæller som ork for effekter relateret til race"
    favored_class: Barbarian

half-elf:
  size: medium
  speed: 30
  ability_adjust: {}
  # Ubetingede racial skill-bonusser (jf. elf) → i skill_bonuses, ikke kun traits.
  skill_bonuses: {listen: 1, search: 1, spot: 1, diplomacy: 2, gather_information: 2}
  languages:
    automatic: [Common, Elven]
    bonus: any
  bonus_feats: 0
  bio:
    adulthood: 20
    age_dice: {fast: "1d6", medium: "2d6", slow: "3d6"}
    height_mod: "2d8"
    weight_mod: "2d4"
    height_base: {male: 55, female: 53}
    weight_base: {male: 100, female: 80}
  traits:
    stat_mods: "Ingen ability-justeringer"
    size: Medium
    speed: "30 ft."
    low_light_vision: true
    immunities: "Immun over for magisk sleep; +2 på saves mod enchantment"
    keen_senses: "+1 på Listen, Search og Spot"
    social: "+2 på Diplomacy og Gather Information"
    elven_blood: "Tæller som elver for effekter relateret til race"
    favored_class: Any
