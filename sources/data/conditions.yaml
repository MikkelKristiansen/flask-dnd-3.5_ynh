# conditions — SRD v3.5 data (OGL v1.0a). Genereret fra importer.py, herefter kilden til sandheden.
- id: blinded
  name: Blinded
  summary: –2 AC, lose DEX bonus, –4 attacks & Spot/Search
  description: The character cannot see. He takes a –2 penalty to Armor Class, loses his Dexterity bonus to AC (if any), moves at half speed, and takes a –4 penalty on Search checks and on most Strength- and Dexterity-based skill checks. All checks and activities that rely on vision automatically fail. All opponents are considered to have total concealment (50% miss chance) to the blinded character. Characters who remain blinded for a long time grow accustomed to these drawbacks and can overcome some of them.
- id: confused
  name: Confused
  summary: 'Random action each round (d%: babble/do nothing/attack nearest/act normally)'
  description: "A confused character's actions are determined by rolling d% at the beginning of his turn: 01–10 Attack caster. 11–20 Act normally. 21–50 Do nothing but babble incoherently. 51–70 Flee from caster. 71–100 Attack nearest creature. A confused character who can't carry out the indicated action does nothing but babble incoherently. Attackers are not at any special advantage when attacking a confused character."
- id: cowering
  name: Cowering
  summary: Frozen with fear, –2 AC, loses DEX bonus, no actions
  description: The character is frozen in fear and can take no actions. A cowering character takes a –2 penalty to Armor Class and loses his Dexterity bonus (if any).
- id: dazzled
  name: Dazzled
  summary: –1 on attack rolls and sight-based Perception checks
  description: The creature is unable to see well because of overstimulation of the eyes. A dazzled creature takes a –1 penalty on attack rolls and sight-based Perception checks.
- id: deafened
  name: Deafened
  summary: –4 on Initiative, 20% spell failure chance, can't use Listen
  description: A deafened character cannot hear. He takes a –4 penalty on initiative checks, automatically fails Listen checks, and has a 20% chance of spell failure when casting spells with verbal components. Characters who remain deafened for a long time grow accustomed to these drawbacks and can overcome some of them.
- id: disabled
  name: Disabled
  summary: '0 HP: one action/round, strenuous actions deal 1 damage'
  description: A character with 0 hit points, or one who has negative hit points but has become stable and conscious, is disabled. A disabled character may take a single move or standard action each turn (but not both, nor can she take full-round actions). She moves at half speed. Taking a standard action (or any other strenuous action) deals 1 point of damage after the action is complete.
- id: entangled
  name: Entangled
  summary: –2 attacks, –4 DEX, can't move (or half speed), spells need Concentration
  description: The character is ensnared. Being entangled impedes movement, but does not entirely prevent it unless the bonds are anchored to an immobile object or tethered by an opposing force. An entangled creature moves at half speed, cannot run or charge, and takes a –2 penalty on all attack rolls and a –4 penalty to Dexterity. An entangled character who attempts to cast a spell must make a Concentration check (DC 15) or lose the spell.
- id: exhausted
  name: Exhausted
  summary: –6 STR & DEX, half speed; rest 1 hour to become Fatigued
  description: An exhausted character moves at half his normal speed and takes a –6 penalty to Strength and Dexterity. After 1 hour of complete rest, an exhausted character becomes fatigued. A fatigued character becomes exhausted by doing something else that would normally cause fatigue.
- id: fascinated
  name: Fascinated
  summary: Standing/sitting quietly, –4 Spot & Listen, no actions
  description: A fascinated creature is entranced by a supernatural or spell effect. The creature stands or sits quietly, taking no actions other than to pay attention to the fascinating effect, for as long as the effect lasts. It takes a –4 penalty on skill checks made as reactions, such as Listen and Spot checks. Any potential threat, such as a hostile creature approaching, allows the fascinated creature a new saving throw.
- id: fatigued
  name: Fatigued
  summary: –2 STR & DEX, can't run or charge; rest 8 hours to recover
  description: A fatigued character can neither run nor charge and takes a –2 penalty to Strength and Dexterity. Doing anything that would normally cause fatigue causes the fatigued character to become exhausted. After 8 hours of complete rest, fatigued characters are no longer fatigued.
- id: flat_footed
  name: Flat-Footed
  summary: Loses DEX bonus to AC, can't make AoO
  description: A character who has not yet acted during a combat is flat-footed, not yet reacting normally to the situation. A flat-footed character loses his Dexterity bonus to AC (if any) and cannot make attacks of opportunity.
- id: frightened
  name: Frightened
  summary: Flees from source, –2 attacks/saves/checks while in sight
  description: A frightened creature flees from the source of its fear as best it can. If unable to flee, it may fight. A frightened creature takes a –2 penalty on all attack rolls, saving throws, skill checks, and ability checks. A frightened creature can use special abilities, including spells, to flee; indeed, it must use such means if they are the only way to escape. Frightened is like shaken, except that the creature must flee if possible.
- id: grappled
  name: Grappled
  summary: –4 DEX, –4 attack (light weapons), no move, spells need Concentration
  description: Engaging a creature in grapple imposes a –4 penalty to Dexterity on both the grappler and the target. A grappling character may only make attacks with light weapons or natural attacks at –4. Casting spells requires a Concentration check (DC 20).
- id: helpless
  name: Helpless
  summary: DEX 0, coup de grace possible; adjacent enemies get +4 attack
  description: A helpless character is paralyzed, held, bound, sleeping, unconscious, or otherwise completely at an opponent's mercy. A helpless target is treated as having a Dexterity of 0 (–5 modifier). Melee attacks against a helpless character get a +4 bonus (equivalent to attacking a prone target). Ranged attacks gets no special bonus. A helpless character is also subject to a coup de grace.
- id: nauseated
  name: Nauseated
  summary: Only one move action/round, no attack/spell/other
  description: Experiencing stomach distress. Nauseated creatures are unable to attack, cast spells, concentrate on spells, or do anything else requiring attention. The only action such a character can take is a single move action per turn.
- id: panicked
  name: Panicked
  summary: Drops held items, flees; –2 attacks/saves/checks
  description: A panicked creature must drop anything it holds and flee at top speed from the source of its fear, as well as any other dangers it encounters, along a random path. It can't take any other actions. In addition, the creature takes a –2 penalty on all saving throws, skill checks, and ability checks. If cornered, a panicked creature cowers and does not attack, typically using the total defense action.
- id: paralyzed
  name: Paralyzed
  summary: STR & DEX 0, helpless; adjacent foes get +4 melee, coup de grace
  description: A paralyzed character is frozen in place and unable to move or act. A paralyzed character has effective Dexterity and Strength scores of 0 and is helpless, but can take purely mental actions. A winged creature flying in the air at the time becomes paralyzed and falls. A paralyzed swimmer can't swim and may drown. A creature can move through a space occupied by a paralyzed creature — ally or not. Each square occupied by a paralyzed creature is considered difficult terrain.
- id: prone
  name: Prone
  summary: –4 melee attacks, +4 AC vs ranged, –4 AC vs melee
  description: The character is on the ground. An attacker who is prone has a –4 penalty on melee attack rolls and cannot use a ranged weapon (except for a crossbow). A defender who is prone gains a +4 bonus to Armor Class against ranged attacks, but takes a –4 penalty to AC against melee attacks. Standing up is a move-equivalent action that provokes an attack of opportunity.
- id: shaken
  name: Shaken
  summary: –2 on attacks, saves, checks, and ability checks
  description: A shaken character takes a –2 penalty on attack rolls, saving throws, skill checks, and ability checks. Shaken is a less severe state of fear than frightened or panicked.
- id: sickened
  name: Sickened
  summary: –2 on attacks, damage, saves, skill checks, ability checks
  description: The character takes a –2 penalty on all attack rolls, weapon damage rolls, saving throws, skill checks, and ability checks.
- id: staggered
  name: Staggered
  summary: Only one action/round (move or standard, not both)
  description: A character whose nonlethal damage exactly equals his current hit points is staggered. A staggered character may take a single move action or standard action each round (but not both, nor can he take full-round actions). A character whose nonlethal damage exceeds his current hit points becomes unconscious.
- id: stunned
  name: Stunned
  summary: No actions, drops held items, –2 AC, loses DEX bonus
  description: A stunned creature drops everything held, can't take actions, takes a –2 penalty to AC, and loses its Dexterity bonus to AC (if any). Attackers can make coup de grace attempts against stunned defenders.
- id: unconscious
  name: Unconscious
  summary: 'Helpless, unaware; at negative HP: dying unless stable'
  description: Unconscious creatures are knocked out and helpless. Unconsciousness can result from having current hit points between –1 and –9 (but not yet dead), or from nonlethal damage in excess of current hit points.
