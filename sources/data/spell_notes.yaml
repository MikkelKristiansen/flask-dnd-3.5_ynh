# Korte "hvad gør den"-noter til utility-spells (kategori F). Én dansk linje pr. spell.
# Kilde: spells.yaml description, komprimeret. Ren display — påvirker ingen tal.
# Se briefs/BRIEF-category-f-notes.md. 5 håndskrevne + 237 Sonnet-batch (review 4. jul).

