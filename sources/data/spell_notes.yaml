speak_with_plants: "Du kan forstå og tale med planter og plantevæsener — spørge dem om deres nærmeste omgivelser."
spectral_hand: "En spøgelseshånd lader dig levere berøringsangreb-spells på afstand."
spell_turning: "Spells rettet direkte mod dig som mål bliver kastet tilbage mod den oprindelige kaster (7-10 spell-niveauer)."
spider_climb: "Kravl på vægge og lofter med 6 m fart, hænder fri; kan ikke bruge hænderne til andet."
spike_growth: "Vegetation eller jord i området bliver til skarpe pigge, der skader dem som går igennem."
spike_stones: "Sten eller jord i området formes til skarpe pigge; halv fart og piercing-skade at gå igennem."
statue: "Målet (med udstyr) bliver til massiv sten (hårdhed 8), men beholder sine hitpoints og kan se, høre og lugte."
stoneskin: "Giver damage reduction 10/adamantine — ignorerer de første 10 skadepoint pr. våbenangreb."
summon_instrument: "Tilkalder ét håndholdt musikinstrument i dine hænder eller ved dine fødder."
summon_swarm: "Tilkalder en sværm af flagermus, rotter eller edderkopper, der angriber alt i nærheden."
sympathetic_vibration: "Skaber en vibration i en fritstående struktur der gør 2d10 skade pr. runde (hårdhed tæller ikke)."
telekinesis: "Flytter genstande eller skabninger med tanken — som en langsom, vedvarende kraft eller ét kraftigt stød."
telekinetic_sphere: "Som Resilient Sphere, men indholdet vejer næsten intet, så du kan telekinetisk løfte selv meget tunge ting inde i kuglen."
telepathic_bond: "Skaber en telepatisk forbindelse mellem villige deltagere — de kan kommunikere telepatisk uanset sprog."
teleportation_circle: "Skaber en cirkel på gulvet, der teleporterer enhver som står på den til et fast, forudvalgt mål."
time_stop: "Tiden fryser for alle andre end dig — du får 2-5 ekstra runder til at handle frit."
tiny_hut: "Skaber en ufarlig kraftkuppel om dig, hvor op til ni andre kan søge ly sammen med dig."
tongues: "Målet kan tale og forstå ethvert intelligent sprog eller dialekt, den hører."
transformation: "Du bliver en nærkampsmaskine: +4 Str/Dex/Kon, +4 naturlig rustning, +5 på Fort saves — men kan ikke kaste spells."
transmute_mud_to_rock: "Forvandler mudder eller kviksand permanent til blød sten."
transmute_rock_to_mud: "Forvandler almindelig, ubearbejdet sten til mudder — fanger dem der står i det."
trap_the_soul: "Fanger en skabnings livskraft og krop i en ædelsten, indtil stenen knuses."
tree_shape: "Du antager formen af et stort, levende træ eller en busk — ser ud som et helt almindeligt træ."
tree_stride: "Du kan træde ind i ét træ og ud af et andet af samme art — kender straks alle sådanne træer i rækkevidde."
true_seeing: "Ser gennem mørke, illusioner, blur/displacement, forklædninger og polymorph — ser tingene som de virkelig er."
true_strike: "Dit næste angreb får +20 på angrebsrullet og ignorerer miss chance mod skjulte mål."
undetectable_alignment: "Skjuler en genstands eller skabnings alignment for al divination."
unseen_servant: "Skaber en usynlig, tankeløs kraft der udfører enkle opgaver (bære, åbne, holde) på din kommando."
veil: "Ændrer udseendet på målene til hvad som helst du ønsker — de ligner, føles og lugter som den anden skabning."
ventriloquism: "Din stemme (eller en lyd) lyder, som om den kommer fra et andet sted end der, hvor du faktisk er."
wall_of_fire: "Skaber en flammemur: 2d4 ildskade inden for 3 m, 1d4 fra 3-6 m — også ved gennemgang."
wall_of_force: "Skaber en usynlig, ubevægelig kraftvæg, immun mod skade og de fleste spells."
wall_of_ice: "Skaber en mur eller kuppel af is, der blokerer bevægelse og syn."
wall_of_thorns: "Skaber en tornemur; alle der tvinges igennem tager skade svarende til 25 minus deres AC."
water_breathing: "Berørte kan ånde frit under vand (fordelt varighed mellem flere mål)."
whispering_wind: "Sender en besked eller lyd med vinden til et kendt, angivet sted i rækkevidde."
wind_wall: "Skaber en usynlig vindmur der blæser pile og lette væsener væk og river papir ud af hænder."
wish: "Det mest kraftfulde spell — kan kopiere næsten ethvert andet spell eller skabe stort set enhver effekt."
zone_of_silence: "I og de nærmeste omkring dig kan tale normalt, men ingen udefra kan høre jeres stemmer eller lyde."
