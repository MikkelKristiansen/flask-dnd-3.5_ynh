# summon_monster_lists — Summon Monster-tabellen (SRD v3.5, OGL v1.0a).
#
# Mapper Summon Monster-spellniveau (I=1 … IX=9) → liste af væsner. Hver entry er
# enten:
#   - {base: <id>, template: celestial|fiendish}   # skabelon-udgave af et katalog-dyr
#   - {base: <id>}                                  # ægte outsider (uden skabelon)
# `base` refererer ind i data/animals.yaml (det delte katalog). Skabelonen lægges
# på ved kast (creature_template.apply_template) — DR/resist/SR/smite/darkvision.
#
# Dokument-formet — indlæses af refdata.py (summon_entries("sm", niveau)).
#
# Status (Fase B, Sonnet, 1. jul): SM I-III komplet og SRD-verificeret mod
# rules/srd-v3.5-md/spells/spells-s.md (Summon Monster-tabellen, linje ~1887).
# SM IV-V tilføjet 3. jul (samme kilde). SM VI-IX udestår.
#
# Note: Aquatic-væsner (porpoise, octopus, squid, shark) kan kun summones i
# vand/vådt miljø (SRD-fodnote 1 på tabellen). Håndhæves ikke mekanisk — samme
# spil-beslutning som i summon_lists.yaml (SNA).
#
# Udeladt: "Fiendish raven" (SM I, LE). SRD giver Raven 1/4 HD (1 hp) — motoren
# (summon.py) kræver et heltals base_hd og udleder HP af FULDE hit dice
# (floor((hit_die+1)/2 · hd) + con_mod·hd), hvilket ikke kan give et 1/4-HD-væsen
# korrekt uden schema-/beregningsændring. Uden for denne fases scope (data-only).

