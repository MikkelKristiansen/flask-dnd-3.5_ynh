- id: buckler
  name: Buckler
  armor_bonus: 1
  max_dex:
  armor_check: -1
  spell_failure: 5
  druid_ok: 0
  type: shield
  cost_cp: 1500
  weight: 5.0
  description: "This small metal shield is worn strapped to your forearm. You can use a bow or crossbow without penalty while carrying it. You can also use your shield arm to wield a weapon (whether you are using an off-hand weapon or using your off hand to help wield a two-handed weapon), but you take a –1 penalty on attack rolls while doing so. This penalty stacks with those that may apply for fighting with your off hand and for fighting with two weapons. In any case, if you use a weapon in your off hand, you don’t get the buckler’s AC bonus for the rest of the round.\n\nYou can’t bash someone with a buckler."
- id: light_wooden_shield
  name: Light Wooden Shield
  armor_bonus: 1
  max_dex:
  armor_check: -1
  spell_failure: 5
  druid_ok: 1
  type: shield
  cost_cp: 300
  weight: 5.0
  description: "You strap a shield to your forearm and grip it with your hand. A light shield’s weight lets you carry other items in that hand, although you cannot use weapons with it.\n\n_Wooden or Steel:_ Wooden and steel shields offer the same basic protection, though they respond differently to special attacks.\n\n_Shield Bash Attacks:_ You can bash an opponent with a light shield, using it as an off-hand weapon. See Table: Weapons for the damage dealt by a shield bash. Used this way, a light shield is a martial bludgeoning weapon. For the purpose of penalties on attack rolls, treat a light shield as a light weapon. If you use your shield as a weapon, you lose its AC bonus until your next action (usually until the next round). An enhancement bonus on a shield does not improve the effectiveness of a shield bash made with it, but the shield can be made into a magic weapon in its own right."
