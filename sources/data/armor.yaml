- id: tower_shield
  name: Tower Shield
  armor_bonus: 4
  max_dex: 2
  armor_check: -10
  spell_failure: 50
  druid_ok: 0
  type: shield
  cost_cp: 3000
  weight: 45.0
  description: "This massive wooden shield is nearly as tall as you are. In most situations, it provides the indicated shield bonus to your AC. However, you can instead use it as total cover, though you must give up your attacks to do so. The shield does not, however, provide cover against targeted spells; a spellcaster can cast a spell on you by targeting the shield you are holding. You cannot bash with a tower shield, nor can you use your shield hand for anything else.\n\nWhen employing a tower shield in combat, you take a –2 penalty on attack rolls because of the shield’s encumbrance."
